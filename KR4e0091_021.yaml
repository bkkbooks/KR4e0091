body:
  text: 文敏集卷二十一明楊榮撰墓志銘故榮祿大夫少保兼太子少傅户部尚書贈特進光祿大夫太師諡忠靖夏公墓志銘國家當太平興盛之運必有股肱心膂之臣以謀猷輔相於其間而後克成治功故榮祿大夫少保兼太子少傳户部尚書夏公實其人焉公諱原吉字維哲其先自浙之㑹稽徙三衢五代時有諱膺者惡吳越虐政復自開化徙饒之德興祖希政仕元為湖廣行省都事值兵亂死節家屬流寓沔嶽間父時敏國朝以明經起為湘隂教諭遂為湘隂人曽祖復及祖父皆以公推恩贈榮祿大夫少保兼太子少傅户部尚書曽祖妣李氏贈夫人祖妣劉氏妣廖氏皆加贈一品夫人公年十三而孤母太夫人守節自誓辛勤訓誨俾務於學公祗服慈訓夙夜克勤弱冠充縣學生洪武庚午領湖廣鄉薦明年試禮部弗偶入太學壬申授户部四川司主事有能聲歲戊寅升户部右侍郎太宗皇帝入正大統以公謹厚可任轉左侍郎尋升尚書永樂癸未夏四月蘇松水患公承命往治既至詢衆議浚决壅滯水患以寧復請發粟三十餘萬石以賑饑民全活甚衆乙酉召還益見寵任己丑車駕巡狩北京公與扈從明年春三月太宗親征朔漠今上以皇太孫留守北京承命輔導秋八月駕還以公克盡匡輔之職賜鞍馬楮幣羊酒以旌異之明年九載秩滿降勑奬諭錫宴於便殿既而承詔監修太祖髙皇帝實録既成賜綵幣衣鈔宴於禮部庚子以北京宮殿成奉勑召皇太子於南京既至賜以白金羊酒鞍馬辛丑太宗以朔方遺孽未殄復議征之公以邊儲未偹被繫甲辰秋七月太宗賔天仁宗皇帝即位首釋公復其官賜冠帶衣服帷帳之屬公以母喪未終辭仁宗勉留之賜米四十斛鈔一萬貫胡椒二斛令家屬護喪以歸命有司治喪葬八月拜太子少傅户部尚書尋拜榮祿大夫少保兼太子少傅户部尚書給以銀章其文曰繩愆紏繆凡朝政闕失民間利病切於時務欲有所言者輒用之密封以聞公由是屢有所陳多所禆益乙已奉勑監修太宗實録是歲夏五月仁宗晏駕今上皇帝即位復承詔監修仁宗實録宣德戊申上以師保之重專職寅亮不煩以政事命輟户部之務日在左右討論至理以寧邦家公益竭乃心忠勤彌篤庚戌春正月壬戌進兩朝實録賜白金綵幣襲衣鞍馬戊寅錫宴於中府明旦入謝既退得微疾命家人具湯沐正襟端坐召其弟及子告之曰吾以一介書生叨居重任愧無以報國家言訖而終訃聞上為之嗟悼命有司製棺給賻物追贈特進光祿大夫太師諡忠靖遣禮部尚書胡濙祭之官其子瑄為尚寶司丞永蠲其家差役仍給舟車歸其喪為造墳塋公生元至正丙午八月草六日享年六十有五配鄭氏賢而克相子男三人長珫早卒次即瑄次瑾女一人善金適虞㻞故宗人府經歷暹之子也弟原乾奉公柩歸以某年某月某日葬某山之原乃以户部員外郎惠政所為行狀請豫銘豫辱知於公最久且厚知公為悉其何敢辭惟公忠信和易喜怒弗形坦夷直諒無忤於物可謂寬仁厚德之君子矣歷事纍朝荐膺寵眷信任益專參决機務疑難之際往往一言而定卓然為國家輔弼之大臣是宜有銘銘曰天啓皇明實生賢輔蚤孤而立發迹郎署二卿之任邦計所司國有儲恃民無阻饑於赫太宗入正大統進公司徒益被恩寵東南諸郡洪水湯湯彼民其咨若昔懷襄命公往治公如已溺寢食弗遑水患以息自公還朝信任益專扈從兩京厥聲隆然仁宗嗣位眷顧尤隆簡賢任舊爵位是崇進秩三孤公有重望在帝左右惟公寅亮今皇繼統舊德是資政務弗煩治道所咨翼然在廷公尚弗耄遽兹遐逝帝用嗟悼豐爵美諡恩禮薦加既官厥嗣復恤其家恩榮終始惟公克稱允矣大臣永光休命湘江之隂有巋者墳後有求公視兹刻文故儒林郎左春坊左贊善兼翰林編修陳先生墓志銘始豫遊郡庠聞長樂陳先生仲完以文學行誼著於鄉心甚慕之而以末識為恨暨豫由科第入翰林之四載為永樂初元遂得胥㑹於京師覩其儀表聆其論議迹其操存踐履之誠於是益敬而愛之而信昔之所聞者為弗虛也既而先生用知者薦擢翰林編修明年升左春坊左贊善仍兼編修皆同寮由是日得相親以篤斯文之契鄉郡之好藹然甚歡也不數年豫以扈從北上而先生留南京雖睽違既久嚮慕彌切每復一見而情意益密焉惟先生之在詞林日侍內廷小心慎密編摩纂輯克專克勤其在春坊論思精切贊輔得宜夙夜在公恪盡乃職以是深䝉恩眷錫賚益隆時東宮殿下以皇孫日長乃察先生忠厚特命侍講學先生貌恭氣和詞意懇欵啓迪有方多所禆益十五年春三月隨侍來北京十八年夏五月復還南京是秋大比承命主京闈文衡去取惟公士論悅服比冬復至北京蓋先生崇道敦德樂善好義之志愈老而愈篤人無戚疏賢愚貴賤皆稱其為有德君子二十年十二月初九日以疾卒於北京之寓舍方疾亟時以其子泠在鄉遺命訓飭之甚至而殯殮之事一皆以命其從子中書舍人登與泠而復得甥壻文選主事陳良鄉友翰林修撰李騏贊襄之一時斯文莫不臨哭弔祭欷歔太息以為無復有斯人矣非先生之德之誠曷克致是哉明年春泠始聞訃匍匐而來將奉喪歸葬其鄉大溪山之原以登所述行實來謁豫銘義不可辭按狀先生諱完仲完其字也以其恬憺簡約自號曰簡齊其先光州固始人五代時因避梁難入閩居玉融南陽之新豐至諱泰者析居長樂之江田再世有諱龜圖者登宋進士第歷國子監丞朝散大夫信州府知府又傳十一世諱叔友者為宋興化軍主學先生之髙祖也曾祖諱世榮任福清知縣有善政祖諱宗舉考諱天雄皆隱居弗仕而樂善好施輕財重義人多德之母張氏有賢行先生自幼務學孝友謙恭年十五以民秀選充邑庠生從吳彥信葉希武二先生受學洪武甲子與從子湜洵皆薦於鄉鄉人有一門三舉子之謡是年丁外艱弗及㑹試服闋用薦分教延平郡學復改直隸寧國其為人雍容和緩簡默凝重而表裏一致其為學以窮理為務實踐為要而不屑屑章句其教人循循有序不厭不倦而多所造就其接人禮意兼盡而無忤於物凡有求詩文者皆弗拒輒舉筆成之雖若不經意而詞理俱造人鮮能及有迂藁若干卷藏於家嘗以事還鄉率宗人建祠堂以奉先而尤諄諄訓戒子姓以務學力善無忝祖宗姻戚鄉族莫不倚賴焉先生生元至正己亥十月十有八日享年六十有四配林氏元玉融書院山長某之孫次李氏胡氏子男一即泠女二長適林禔次適林鉎孫男一曰緒女二未卒前數日豫與學士金公幼孜相繼往問之先生從容與語移時若無事者及屬纊之際神氣清明未嘗少亂非養之有素其能然乎銘曰氣和儀恭內淳且仁孝友惇睦端已淑人善浹惠周學充才贍踐履持循始終無玷職訓於庠顯秩屢遷餘二十年聲光煜然進侍講筵寵眷攸盛執經陳義贊輔以正維德維善肇積於先顯榮遭際食報自天爰及後昆繩繩繼繼衍慶流芳有永無替大溪之山𤣥室是藏銘以昭之遺德孔彰故奉訓大夫右春坊右諭德兼翰林侍讀林君墓志銘宣德二年五月辛亥奉訓大夫右春坊右諭德兼翰林侍讀林君卒于官交遊之士莫不為之傷慟臨終之夕其孤雲瀚適自南京至幸獲一見不及有所言而絶良可哀也將奉柩歸葬於鄉某山之原乃匍匐涕泣以翰林修撰王君鈺所述行狀來乞銘豫與君同鄉又同官而素相好弗可以辭按狀君諱志字尚默晉黃門侍郎頴之後頴從晉元帝渡江居建康其子祿由散騎常侍出為閩之晉安太守子孫因家焉是後有仕為宋御醫院使諱古松者君之五世祖也曾祖諱清祖諱顓父諱興皆隱德弗耀母遊氏宋監察御史廣平公之後嘗夜夢梁僧寶志入室而生君因以名焉幼穎悟其母嘗口授經傳即朗然成誦在髫齓時己喜為文辭後從學於王稱孟揚極好辨論因字之曰尚默將弱冠選入郡庠益自勤勵於經史子集旁及天文地理星命醫卜之書無不研䆒而尤工舉業性至孝父早世事母益謹母或有疾則憂形於色親調湯藥不敢輒離左右及母歿家雖貧薄而殯殮葬祭一於禮而不茍永樂辛卯鄉試壬辰㑹試皆第一殿試賜進士第二人授翰林編修考滿升修撰嘗纂修五經四書性理大全古今名臣奏議郡邑志書辨論精確勤於編述逈出儔輩甲辰秋九月升侍讀尋升右春坊右諭德仍兼舊職階奉訓大夫給二俸嘗兩為京闈考試官去取惟公士子敬服洪熙改元䝉恩賜誥得推恩追贈其父如君之職母為宜人每痛二親不逮祿養語及必悽愴終日蓋君治家儉而有禮待宗黨極厚族弟喜幼孤無依養於異姓取歸撫育迄于成立勸子姪讀書言不輟口聞有領鄉薦者輒加慰勉與鄉人周旋欵洽不事矯飾鄉人亦多敬愛之事其師孟揚最謹孟揚後為翰林檢討以事沒于京為之經畫家事以反其妻子于閩處僚友必誠必信於人無所毁譽在朝十有五年入則恭勤趨事惕然警勵雖隆冬盛暑不自知其為勞退則靜坐一室優遊疏散醉吟自適淡然若與世事不相干者家居時郡庠後進多從之遊若今湖廣參政黃澤浙江按察使林碩輩皆親及門受業時多推其學問有源委以為吾閩之傑然者自號蔀齊又號見一居士所著詩文雄健簡古多為人所傳誦與修二聖實録方擬告成歸省丘墓展焚黃之禮而乃以是春疾作自知必不起遂請於朝得告而疾日加劇第奄奄一息以待其子之至而卒其生洪武戊午八月四日至是享年五十配陳氏有淑德封宜人子男二人長即雲瀚次雲瀣女三人長適黃淑敏次適程稔皆宦族也其一尚幼嗚呼幼學壯行君子之志也惟君荷聖朝教育之恩學既有成官兼顯職可謂榮且盛矣亦可謂得行其所志矣烏可以無銘其辭曰林氏之先閥閲以崇粵自建康始居閩中歷世相傳其積彌厚發之於君獨禀其秀孝友篤至信誼卓然學有源委思如湧泉爰擢巍科超出流輩拜官翰林詞益雱霈編摩纂述克慎克勤侍讀講筵忠言是陳輔導春宫多所禆益考藝京闈公論籍籍不盈以矜志節允堅無毁無譽罔不推賢善積厥躬惟君之德學淑諸人惟君之澤閩山蒼蒼閩水汪汪藏石於斯百世不忘翰林修撰承德郎李德良墓志銘永樂乙巳某月某日翰林修撰李德良卒於官其孤輝奉柩將以某年某月某日葬於其鄉某山之原而以監察御史吳實狀來乞銘豫忝同鄉且又同官素與之善誼弗可辭按狀德良其字姓李名馬閩之長樂人其先有仕宋為提幹者至今鄉人稱提幹李家曽祖某祖某父原善皆隱德弗仕德良少穎悟甫十嵗輒能通孝經論語悉其義既長學益進入補縣庠弟子員昕夕勤勵弗懈肆筆為文出人意表前輩多讓之嵗丁酉鄉薦戊戌試南宮皆居前列三月朔旦殿試士凡二百五十人上親閲其文擢為第一改其名曰騏越三日傳制唱名凡三唱無敢應者上曰即李馬也騏乃受詔賜狀元及第明日賜紗帽銀帶朝服拜翰林修撰中外相傳以為榮德良為人嚴毅方正事父母極孝敬奉繼母尤謹與人交和而有節直而能信非禮之言不出諸口人有不善輒面言之無有所隱平居慊然若無所為及議所當為者則勇於為之不倦親族有孤貧者必收撫之鄉黨有窮匱者必賑恤之其與內廷纂修及在翰林考校恭勤廉謹不怠於所事人無非之者癸卯秋承命典文衡京闈去取進退一循至公士論歸之甲辰夏忽遘疾逾時乃愈方愈值太宗皇帝升遐聞之驚悸哀怛即出哭臨或勸其宜且慎疾則曰吾受主上厚恩不能他有所禆益今龍顔天語不可復瞻聼矣如又不獲一出涕拜几筵以罄臣子之情將抱恨無極豈暇恤吾身哉未幾疾復作久而弗瘥雖未至殆劇然不能復事筆硯矣明年己巳春正月䝉朝廷恩典頒賜勑命得以推恩賜其父原善如德良之官贈嫡母葉氏為安人繼母黃氏及妻陳氏皆封安人兾病愈欲得所請以歸焚黃不數月而繼母訃至扶疾奔喪抵家幾一月喪其配又越月德良竟以疾卒享年四十有八配即陳氏有賢行子男一人即輝孫男若干人嗚呼若德良者可謂賢也已而位未及大顯年未及中夀夫婦相繼而歿誠可哀也誠可哀也烏可無銘以慰之銘曰徂徠之松既材以構荆山之璞既琢而疚胡畀其才而嗇其夀位雖不豐名則不朽鄉山之陽鬱其深秀勒銘藏之以垂永久國子司業張公墓志銘永樂丙戌秋七月三日國子司業張先生以疾卒於太學之官舍京師士大夫與夫六館諸生皆相與哭之盡哀既奉柩南還卜以某年某月某日葬其鄉某山之原國子學正順昌黃立為述先生之行徵豫銘之豫生也晚忝以科目入京師濫官翰林辱先生折輩行相契厚今先生歿矣烏可無銘文以告後世遂弗獲辭按狀先生諱智字𤣥略姓張氏其先為延平之順昌人曽祖某隱德弗耀祖某元贈滄州路平陽州判官父升元以神童薦補太學授祕書郎五轉而為江西儒學提舉母范氏周氏生母陸氏先生以元統乙亥某月某日生自幼有大志聰明穎悟讀書過目成誦羣兒為嬉戲之事必正色端謹如老成人稍長即能勵志於問學嘗慨然曰采玉必於崑山探珠必於滄海士之為學豈不出户庭管窺蠡測所能至哉即日挾策入元都交當世之名士用薦補入國學元之季四方兵興先生以才出參閩省機務省臣承制授先生同知新喻州事已而知事不可為浩然退歸國朝初定天下先生即建陽之崇化里灑掃一室置古今書籍其中窮搜博覽沛然有得於心鄉黨爭企慕之洪武戊午以明經應薦上吏部授夷陵州學正凡九載以內艱歸既服除入覲太祖高皇帝方任賢圖治知先生才可用遂超拜禮部試左侍郎即首言宜以書籍頒布北方學校議者以費財不便先生正色曰使賢才彚征利益生民何惜此費衆大慙未幾實授右侍郎其在職能秉禮不遷綱紀秩然人莫不敬服之居二嵗以事左遷為國子學録尋升博士後遂擢司業先生能誘掖奬勸以誨諸生故鮮弗底于造就其教人一本於道德仁義之說孜孜焉開導後進老而弗衰一時學者莫不師宗之永樂初今上幸學衆推先生講易特䝉寵異賜豫甚厚至是卒享年七十有二初娶魏氏繼室某氏子男二人長時早夭次旻孫男若干人曰某曰某榮於先生同里少時己聞先生名心竊仰慕暨官京師得朝夕從先生杖屨之末以聆緒論私以為幸孰謂先生奄然永逝而竟弗得以終惠教嗚呼可勝惜哉然先生之文章事業不可以無述也謹撰為銘文一通以納諸墓庶後之人有考焉銘曰猗嗟先生早馳駿聲搜羅百家學霈以盈元政不綱才弗大顯聖朝肇化齎志斯奮筮仕夷陵允為範模諸生雲從濟濟文儒爰二春官帝心簡在讜論嘉猷國史具載晚教成均為學者師六館化之時雨是資書林之原卜此窀穸過者式之先生之德勑封左春坊左司直郎髙公墓志銘洪熙元年十月乙未勑封左春坊左司直郎髙公元昭以疾卒於家其子榖方遷翰林侍讀聞訃號踴慟絶既而屬中書舍人張益述公之行匍匐詣豫拜且泣曰榖不幸先人奄棄生既弗獲侍湯藥沒又弗克躬飯含罪莫大焉願先生賜之銘以賁諸幽庶少慰先人於地下而榖亦得以逭不孝之愆豫弗獲辭按狀公諱焯元昭其字也世居揚之丁溪曽大父諱彬祖諱明父諱壽之皆業儒弗仕兄弟四人長元吉次元暉次即公次元昕公幼有節槩事親至孝而於兄弟尤相友愛甫冠遭元季兵亂挈家避地吳中值艱險必以身先之而於飲食衣服常推讓居後一家雍睦藹如也洪武初始歸興化占籍於利名鄉嵗癸丑長兄元吉出為廣東樂昌縣簿又十有一年癸亥仲兄元暉為屯田主事先後皆卒於官公不憚險逺皆負喪以歸葬焉弟元昕亦先卒公痛念父母早亡兄弟相繼而沒嵗時修祀必泫然流涕倍加悲痛事二寡嫂恭謹如兄在時嫁孤姪女四人如己出宗黨咸稱之嘗渡揚子江適有舟壞者乏資以完即探篋中金以濟之又嘗見刑尸暴露輒解衣覆之一市人皆笑其迂公蹙然而去父兄既沒家日荒落遂不得已行賈以給衣食往來吳楚晉趙之間遇竒勝暨名賢遺迹必登髙弔古嘯歌觴詠意氣豁如也尤好問學長於詩其所著有聼雨集自號義翁雅愛菊人或以菊軒先生稱之配黃氏松江右族有淑德先卒子三長闕次即榖以進士歷翰林授中書舍人遷左春坊左司直郎升擢今官次稷女二人長適同邑成忠次適李衡公以榖推恩受勑命得封今職其生元至正戊子某月某日至是享年七十有八以某年某月某日葬西郭城堡先塋之側嗚呼公誠篤善好義之士哉學足以淑身行足以敦俗而又有子如榖者以承其家訓發身科目顯榮當世是可尚也烏可無銘以貽後世銘曰孝友篤至操履孔純德裕于躬義孚于人周遊晉楚歷覽四方晚節東籬一詠一觴生榮死哀振前啓後勒銘藏幽永垂不朽故處士江公墓志銘永樂十五年二月己巳子友監察御史江鐵聞其祖父處士公之喪哭泣盡哀既而謁告豫曰鐵不幸早失所怙賴吾祖誨育之勤俾克成立兹又奄棄傷痛何可言今將歸葬敢丐銘文以掩諸幽庶幾先德垂之不朽則鐵之罪為少逭也豫忝同里又托姻戚之好不容固辭謹叙而為之銘處士諱子洀字伯載世居建安之瓊溪曽祖諱安仁祖諱永寧父諱道生皆隱德不仕母黃氏兄弟二人處士其次自其少時穎敏端重喜讀書事父母處兄弟克盡孝敬比長恂恂謹飭待宗戚有恩接朋友有禮見人有善則揚譽之有非義者則勸戒之饑寒疾病賙給之惟恐弗及死無棺衾孤寡弗能自存貧乏不能婚嫁者必具資裝捐錢榖以資助之至爭鬪辨論者片言折之無敢弗服鄉鄰多䝉其惠而未嘗有德色尤好道家法雨暘疾病有所祈輒響應元季兵戈之後家日衰落乃躬率子弟力稼穡資遂饒裕嘗於舊居西偏創樓以居其傍别築室聚書延聘師儒訓誨諸孫及鄉鄰子弟遣其孫鐵入郡庠以明經中甲申進士從孫濟領鄉薦皆處士之教也豫幼時常侍諸父得拜處士於璜溪之上覩其風度聆其論議心竊慕焉其後既仕而歸省屢得從處士杖屨謂榮今日克有爵祿以享其貴富者皆先世積德之故又歷道前代忠臣義士流芳後世者以相勉勵凡寺觀橋梁有頽圯者必捐已資完治之雖巨費不復計暮年尤好安逸又於所居東南石鼓山下築廬一區固以垣墉傍植竹木花果日徜徉其中自號清隱叟嵗時伏臘召諸孫羅列于前稱觴嬉戲以為樂人咸羡之永樂丙申冬十一月朔旦忽命具湯沐更衣告子孫曰吾今往矣汝輩宜益加修飭母辱吾宗處士生於故元元統甲戌至是享年八十有四娶李氏有賢德子二長淵先處士十二年卒次源女二李子真連福其壻也孫男八曰鐵曰鏗曰鎮曰鐶曰鉉曰鉦曰銘曰某孫女五人曽孫男幾人曽孫女幾人將以某年某月某日葬於石鼓山之原銘曰閩有耆舊行服鄉閭守正慕道神人感孚壽富康寧惟德之符善積于家慶澤實敷生弗獲施其命也夫歿而流芳其理然歟石鼓之陽山回水紆勒銘幽宮承世弗渝陳處士墓志銘永樂丙申冬十月翰林檢討陳君用扈從自北還即聞其父處士公之喪頓哭幾絶既而謁告于天官匍匐將歸皇上特命其襄事輒來不令終制用將行乃以編修黃暘所述行狀泣告於豫請銘豫於用有僚友之誼不獲辭謹序次而銘之按狀處士諱觀字宗仁姓陳氏其先光州固始人五代時遷閩中因家莆之水南逺祖諱某復析居郡右之龍門至諱某者即公之髙祖也曽祖諱起考宋末以明經領薦時稱貢元祖諱湄父諱大同皆潛德弗耀大同二子處士居次幼穎敏不妄言笑長而敦厚能甘清苦淡泊不為紈綺膏粱之習事父母盡孝晨昏定省左右奉養惟恐不得其歡心母氏早亡處士哀毁致疾遇嵗時祭祀輒號泣終日人不忍聞父亦哀其志為之終身不復娶父沒事兄益謹出入起居必偕事不咨禀弗敢自専飲食衣服未嘗敢先焉待姻戚甚厚處鄰里有恩僮僕有疾必命醫市藥躬視扶持之惟恐失所與人交誠實無僞鄉鄰有為不善者卒皆化之當元季時家用匱乏人所弗堪處士處之泰然不以為意嘗曰富貧命耳吾豈纍於此耶惟供祭祀待賔客則豐腆而自奉甚薄年四十方有子稍長則教之讀書後入郡庠遂以明經登進士第處士聞之喜曰豫家自貢元以下皆晦而不彰今吾子得列科目是能亢吾宗矣及授官處士益喜嘗以書戒之諄諄然惟以竭誠報國為言不及家事處士晚益康寧龎眉皓首神采煜然優逰里巷中咸稱為福人郡邑舉行鄉飲必推處士齒德屢為正賔邑里有爭鬪不能平者唯聼處士一言决之罔不信服藩憲欲求民瘼及有司賢否必咨於處士以其存心公而無所阿徇故也以今年七月十二日卒於家距其生元至元丙子六月十六日享年八十有一初娶林氏繼徐氏俱有賢行先卒子男一人曰用徐氏出也女二人長適翰林檢討黃夀次適新安士族王鳯孫男二曰肅曰雍孫女一人將以明年某月某日奉柩葬于某里某山之原嗚呼天道常與善人若處士之為善而福壽兼偹俯仰無愧可謂至矣烏可無銘以告後世銘曰閩有陳氏固始來遷世本淳篤厥嗣永延處士紹之和易溫淑生質之良如金如玉孝行於家信孚其鄉存弗獲施歿而有芳莆山崔嵬莆水浼浼勒銘于斯爰示千載處士姚用恕墓志銘福之懷安處士姚用恕生洪武庚戌十二月壬戌卒宣德五年八月戊寅其子刑科給事中銑聞訃將歸奉柩與處士之配葉氏合葬於仙宗鄉飛來山之原以豫同出閩郡乃匍匐涕泣來請銘豫弗獲辭按狀處士諱忠用恕其字也其先自光州固始徙閩因家懷安遂為懷安人八世祖諱子材仕宋為國子祭酒其昆仲五人相繼登第家聲大振至髙祖萬曽祖珧祖觀父鸞世以德善稱皆隱弗仕處士年甫冠而失怙賴母陳氏訓育之比長好學師事國子博士志仁林先生朝夕講誦專以明理篤行為務不事藻飾久之深得聖賢之㫖士大夫咸稱重之其為人節儉恬淡雅好山水不樂仕進洪武乙亥郡邑有薦其才於藩省者心不樂焉卒竟罷去乃於榕城東百餘里構屋數椽旁植松竹又於旁近治田百畝種雜果百餘株遨逰其間嘗曰以此終吾身足矣夫復何求自號耕雲山人每念父早喪言及輒流涕事母敬謹得一異味母或未嘗不敢先食嵗時伏臘及值先世諱日必竭誠奉祀不惟牲醴豐潔而傷感之情益至篤愛二弟怡怡和睦始終無間言其為孝友類如此而又克自修飭聞一善言見一善行不啻若已出聞一惡言見一惡行若將凂焉撫育甥姪輩如己子族之貧窶不能自存者推衣及食與之男女長而不能嫁娶者具資裝以遣之間出行遇有持劵號泣者問之則曰母死無棺立此劵以為質即以白金贈之而焚其劵其樂善好義又如此尤諄諄以教其子既而銑果克承處士之志登永樂辛丑進士第擢授今職將受勑命推恩錫封而遽興風木之歎可勝惜哉處士初娶葉氏有婦德能孝事其姑姑嘗曰吾自得新婦家事不勞而治葉氏生洪武壬子七月壬申卒永樂乙酉正月癸亥得年三十有四男一人即銑女二人適某某繼王氏亦克盡婦道男二人録銎側室郭氏出也孫男幾孫女幾嗚呼處士孝義昭彰自足以致不朽况於篤意教子以底于成今居禁近克盡厥職異時不次之擢駸駸逺大而泉壤之間抑豈不光耀乎是烏可以無銘銘曰閩有姚姓來自固始子材肇興家聲崛起繩繩繼繼世以善稱爰至處士韞玉潛珍孝行于家德被于里感慕弗忘淪肌浹髓沂流浚源浩其津津匪昌厥躬徯其後人故資善大夫户部尚書李公墓志銘宣德六年冬十月己亥户部尚書李公以疾卒於京其子將奉柩歸葬于涇陽先塋之次乃奉中書舍人張恕所述行狀來請銘余與公同仕于朝交久而厚弗容辭按狀公諱昶字文煜姓李氏世居隴西之涇陽曽大父諱榮大父諱通父諱成皆積德行善樂義好施為邑里所推重洪熙初以公貴得推恩贈其祖與父皆為正議大夫資治尹户部右侍郎祖母韓氏母李氏繼母孫氏皆淑人公自少敦厚穎敏刻志問學事親孝事長敬處夫婦昆弟族黨姻戚之間恩義藹然及為邑庠生益自修飭為師友所稱洪武丙子由鄉薦入太學司成論秀擢左軍都事有能聲尋升户部郎中績用茂著永樂初肇建北京增置行部而難其人天官以公薦聞特升行部右侍郎北京當靖難之後民甚凋弊而行部初置政務紏紛公惟夙夜敬勤盡心協贊凡所施設各適其宜嵗丁酉北京營建材用所需行部最為繁劇公則不遑寧處協心經畫事無廢缺壬寅春轉户部贊佐彌至國之儲蓄民之貢輸以至賦稅之損增金帛之出納或四方之旱潦災傷年榖之所收豐歉公皆調度有方規畫有法及扈從北征董運糧餉道經數千里士馬足用而無匱乏之虞公之力又居多焉宣德五年冬公以老成為皇上眷念特降勑升公為資善大夫户部尚書賜以寶帶且命專督收支京都及通州諸處倉糧方有條緒而大故及之嗚呼惜哉公生元至正癸卯六月某日至是享年六十有九訃聞上為之嗟悼親為文遣官以祭命工部為治墳塋凡在朝公卿大夫皆相率弔奠莫不流涕太息以為無復有斯人也配史氏有賢行封淑人子男三長曰遹次遵次邇女二長適同里武景次適金吾右衛指揮劉剛孫男四曰楙曰樞曰杲曰梓孫女六人曽孫女一人惟公慈祥愷悌謹畏小心居官任事克致成效已有差失聞人言即改弗吝人有愆過從容諭之不峻不迫雖奴隸有犯亦不施刑公退之暇獨拳拳督勵諸子讀書務實母事矜夸性不喜事生業所得俸祿及朝廷之恩賜者皆均施姻族不少留卒之日家無餘資故歷仕三十餘年人無怨惡之者若公之所為非所謂篤厚之君子也耶是宜有銘以昭遺德銘曰猗歟李公忠厚仁恕發迹幕僚尋陟郎署二卿之任贊佐有方政不競絿民乃樂康營建都邑百需具舉公殫厥心以慰當寧從征塞外逺陟遐荒饋餉有餘師武用張逮進司徒出納是董條理經營益隆恩寵云胡遽棄不究其功終惠自天以表公忠惟公之忠歷事四聖始終弗渝秉心公正休命駢臻從古所稀生榮死哀夫復何悲涇陽之原靈秀攸萃刻石埋幽用告後世黔寧昭靖王夫人耿氏墓志銘宣德辛亥十一月壬戌朔黔寧昭靖王夫人卒訃聞上為之感悼親製文遣中官諭祭命有司為治墳塋恩至厚矣其子駙馬都尉昕將以明年某月某日奉葬乃述夫人事行請豫銘夫人姓耿氏世居鳯陽父再成僉都督追封泗國公諡武莊母鮑氏贈泗國夫人夫人孝敬慈惠出於天性及笄以德儀婉娩為黔寧昭靖王繼室王姓沐諱英父母早亡幼䝉太祖髙皇帝鞠育保愛恩猶已出長而忠勇四征有功眷待益隆自僉大都督府事纍封西平侯卒贈黔寧王諡昭靖夫人亦屢承恩禮兩受褒封貴而益恭富而能儉言非禮不發事非禮不為閨門整肅勤於內助王甚敬重之時國家開創之初王多效勞于外夫人綜理家政其奉先禮賔待姻族雍容而有禮表率諸婦恤孤撫幼嚴謹而有恩以至處媵妾馭婢僕周貧濟乏酬應往來皆寬恕而周浹人無小大莫不翕然稱為賢夫人是以王無內顧之憂而得展布忠力為朝廷所倚重既沒夫人訓迪諸子咸底成立安享祿養壽八十有七王先夫人馮氏一子曰春襲侯爵而卒夫人子男四人曰晟嗣封積勳進爵黔國公加封太傅總戎鎮雲南將卒感其誠士民懷其德而蠻夷亦莫不帖服曰昂右軍都督同知掌雲南都司事規畫撫綏咸適其宜曰昶早卒曰昕駙馬都尉尚常寧公主太宗皇帝以昕肺腑之親屢任以事皆稱上意令譽有聞女四人亦賢淑長適指揮戴玉次適右府右都督追封定國公徐增夀次適營州衛指揮孫毅次適朔州衛指揮周忠孫男九人儼僖俁俊某某某某某女八人長壽昌王妃次趙王妃次適成國公朱勇次適右府右都督陳政次許嫁武定侯郭玹餘在室曾孫男二長曰玘次曰某女幾人於戲夫人作配元勳婦道母儀淑德懿行偹於身著於家恩榮壽考享有全福是宜有銘以昭不朽銘曰猗歟夫人名閥育秀惟淑惟賢益長益懋乃配雄傑感㑹風雲樹勳明時為國將臣篤生賢子克紹前烈為侯為公光輔邦國天錫之福彌久彌敦為國夫人壽逾八旬恩命荐臨哀榮終始委祉遺休子孫世世爰卜佳宅京山之陽銘以藏之千載垂光詹事府少詹事兼翰林院侍讀學士贈嘉議大夫禮部左侍郎曽公墓志銘宣德七年春正月辛巳詹事府少詹事兼翰林侍讀學士曽公卒於北京之官舍豫與少傅楊公往哭之士大夫皆往㑹哭翌日豫二人以聞皇上悼歎即命禮部賜祭贈嘉議大夫禮部左侍郎命工部治墳塋兵部給舟歸其喪將行其季子种謁豫拜且泣曰种父未卒前二日屬春坊庶子周公狀其事行命种請墓銘於先生先生幸賜之以慰先人於地下豫聞而益悲念與公交好三十年而今已矣奚可辭銘公諱棨字子啓吉之永豐人其先世出自武城西漢末郕國十四代孫諱據者避王莾之亂率族人南遷散居南豐廬陵諸郡至宋兵部侍郎江西湖廣安撫使贈武城伯諱晞顔者公之髙祖也元翰林直學士諱德裕者公之伯祖也翰林編修知制誥諱巽申者公之祖也考諱叔本妣張氏公幼穎敏端重言笑不易五嵗盡識象戲字七嵗從學伯父兩皋十五以其所學訓族人子弟十七出教新淦胡氏孰已有名時儒者鄒仲熙鄒幼亨輩皆忘年與之交二十充邑庠生教諭戴正心文學老成尤重公既作詩勵之復為龍說期其大用永樂元年中江西鄉試明年禮部㑹試中選者四百七十人公在第八廷試遂中第一賜進士及第太宗皇帝竒其才親批所對䇿褒美之賜冠帶朝服授翰林修撰承務郎未幾詔選進士二十八人俾進學文淵閣公為之首上嘗召問典故公奏對如響每應制詩文皆立就由是深沐寵眷纂修永樂大典命為副總裁授儒林郎五年升侍講授承直郎丁內艱大駕巡狩北京起復扈從同邑有坐姦黨事逮公者人以為危太宗特原之謂曰朕惜爾才也公所居西長安門外家人不戒火延及禁垣上亦以公故置不問嘗與諸才俊賦天馬海青歌於上前公獨先成詞氣豪宕太宗深加歎賞升承德郎滿升侍讀學士與修太祖髙皇帝實録書成重沐賜賚丁父憂復起就職仁宗皇帝嗣位皇上正位儲宫升右春坊大學士仍兼侍讀學士授奉議大夫賜誥命贈其父為奉議大夫左春坊大學士兼翰林侍讀學士母為宜人洪熙初元侍皇上監國南京宣德改元與修兩朝實録書成賜金織襲衣白金文綺進詹事府少詹事賜寶帶日直文淵閣嵗時屢拜御酒珍饌白金鈔幣之賜恩意隆洽一日趨朝以咳嗽遽引退上遙見之詔免朝參公益敬慎弗懈踰年疾復作上亟命醫往治公知不可起自為贊遺相知者訣别遂卒公生洪武壬子八月戊戌享年六十有一既卒公侯六卿以下皆往哭奠而士林君子咸共悼惜以為斯人不可復得矣其配鍾氏有賢行封宜人子男三長秬先卒次稷次种女五劉敦㑹鍾公鉉周秀夫胡顓勉髙欽夫其壻也公姿貌魁偉襟度夷曠孝友忠實出乎天性而才氣志行尤超卓不羣兩京鄉試禮部㑹試屢典文衡去取率公平素奬勵後進以為已務宗姻鄉䣊有急難靡不用情善飲酒與賔朋觴詠談笑傾倒意豁如也為文章才思滂沛頃刻千百言不待思索工書而草書尤精得晉人風致四方慕而求之者足相躡其門至於商確古今講論政治無不切當其葬以某年某月某日其墓在某山之原銘曰偉哉曽公卓犖瑰竒少處鄉邑才已不羈永樂初科首賜及第玉質金聲為國令器居官翰苑克慎克勤文行之懿逺近著聞歷事三朝竭心贊翌寵眷殊深屢進清職弗究厥施遽止於斯恩命之隆生榮死哀惟兹鄉邑山盤水繞銘諸其藏千古有耀文敏集卷二十一
