body:
  text: 文敏集卷十五明楊榮撰序胡氏族譜後序自宗法廢而氏族無統隋唐之世始為譜牒以明其宗之所自出然茍非子孫世有賢者其不至于湮沒而莫考者幾希矣今户科都給事中晉陵胡君濙奉使西回間以其族譜謁豫請曰豫之族實出於胡公滿乃有虞氏之裔也自滿而下至周惠王時幾八百年而其子姓益蕃衍厥後有輔於漢顯于晉建功於宋著名于唐者皆歷可考及安定徙宗城由宗城居合肥至壯侯藩始遷豫章遂分為三派其後有諱璚者即壯侯之裔生子持五代時占籍常州安上鄉遂為晉陵人持三傳至宿始以文章仕宋為樞密副使繼是有登兩府掌絲綸列侍從出鎮帥府持使一路任牧民之寄居師儒之位者率皆聲光烜赫不可殫舉逮于濙幼荷父師訓育長而遭際聖明由科第發身忝居侍從于今有年感念祖宗之所從來斯須弗敢忘謹以圖譜裝潢成帙願一言以貽諸後豫覽之慨然因為之言曰為人子孫莫重乎知所本本之所系莫切於譜牒譜牒之傳否氏族之顯晦實不在乎言語文字之間惟在乎所以自立者何如爾茍能自立則族姓雖微其終必至於著不能自立則其初雖盛而後必至於微興替無常此理勢之自然也胡氏自周迄今歷二千餘年上泝其本原之所自下詳其支派之所分益逺而益明愈久而愈盛非其族屬世有賢才者出疇克爾耶君亦可謂胡氏賢子孫而卓然能自立者也及今獨能惓惓致謹於譜系以盡夫尊祖敬宗之意此其用心之厚為何如哉則其後之蕃衍昌大其又可以涯涘窺之哉豫因序其世次之概俾為胡氏子孫者知所重而不敢忽也周氏族譜序古昔先王之世有大宗小宗之法故當時氏族傳至數十百年而苖裔貴賤族屬疏戚粲然可考由是昭穆明而恩義篤親親之意何自而間哉三代以降宗法既廢圖譜失官子孫蔓延抉疏於天下源流支派弗復可辨士大夫家始自為譜牒以究其所自出而致夫尊祖敬宗之意然而歷世既久轉徙不常盛衰隆替之有時居處地望之靡定於此而能保其家譜弗至失墜豈不難哉此豫於吉水周氏之族不能不為之歎羡而嘉美也吉水泥田之派其先蓋出吳將瑜之子都鄉侯胤始家廬陵之烏東唐長慶中有曰沂濱者來居泥田沂濱生整整四子其後遂分為四大族由四族而分者又不可以一二計其間詩書相傳簮紱相望延至數百餘年繼繼繩繩彌久而益盛此非其先世積德之厚以垂裕于其嗣續者其能然乎今其裔曰彥竒曰岐鳯皆以文學入官彥竒由教職用薦為刑科給事中擢雲南按察僉事入為大理少卿岐鳯初分教桐城後為國子學正遂升漢府紀善今典教長洲屢司文衡甚有聲于時而其子敘又由進士選入翰林為庶吉士聰敏好學豫深器之間持其譜來徴言以辨其端嗟夫士君子之世業不有祖宗之德無以啓于前不有子孫之賢無以承於後周氏歷隋晉唐宋以來至于今尚不失其家譜俾其後嗣皆得相親相睦以免於塗人之誚而又能以詩禮紹續其家祿仕顯榮有聞於世則其忠厚之澤為何如哉繼今為子孫者尚益知其所重而敬守之又豈特為今日閥閲之榮而已也楊氏族譜序楊氏系出於關西豫家建安與今參政景衡君實同所自出蓋景衡之先自唐司馬某始居閩長溪之瀲村司馬生長史暄暄之後有為司録都護者有父子繼為侍御史者有為國博郡守者其他膺貢舉躋膴仕者先後相望是皆瀲村之派也其遷今瑞安之洲村則自士芳公始士芳宋紹興間以書經請浙漕解淳熙中其兄宗旦仕為瑞安縣令士芳實從遊宦因受學永嘉止齋陳先生之門其後樂瑞安山水之勝因遂家焉士芳生斯泰為太學生再上書論賈似道専權誤國不報以卒斯泰生鵬飛鵬飛生筠玉筠玉生伯祥世有隱德筠玉伯祥以景衡貴俱贈福建布政司左參政階嘉議大夫伯祥之兄伯容國朝洪武初厯武邑保寧令是皆洲村之派也嗚呼何楊氏世澤之逺衣冠之盛若此哉景衡君由鄉貢進士授夏官主事擢司勳郎中遂遷今官其在閩前後三十餘年德望政事蔚然為方面重臣卓卓乎其可敬而愛也間以其族譜一編示豫求為之序惟士大夫家之有譜所以篤祖宗之義隆親親之恩非茍然而作也故凡同是譜者上以知本原之所自下以明派系之所傳昭穆戚疏秩然有序不以貴富而攀附不以貧賤而棄斥而後尊祖之義隆喜必慶喪必吊衰耄無所依者必養孤貧無所仰者必恤而後親親之恩篤如是而謂譜之作無益於人不可也若夫為子孫者觀于是譜服勳烈之懿仰位望之崇奮然感發思踵其美相與紹緒於無窮則譜牒之傳愈逺而有光此譜之所以關係甚重豈茍然而作者乎然則景衡君今日惓惓於斯者得無意哉昔范文正公參大政時嘗於吳中置義莊以贍族人其子孫食其餘澤至今未泯君將歸老於家試舉文正公之事倣而行之俾吾楊氏之在瑞安者皆知有詩書之習無不給之患得不有所倚賴以自植立而君之後將享其餘慶者其又有窮耶是蓋君之本心其即斯譜收族之義矣因題其端敢併及之戴氏族譜序戴氏望出譙國其後有居閩之武安者莫究厥始而族屬蕃盛所居之巷邑人以姓目之由戴巷徙古倉則自諱顯者始至今浙江右參議同吉蓋四世矣參議之父復原嘗有志於家譜未就而卒同吉始繼志而嗣成之然荐更兵燹薄蝕殘缺之餘逺者漫弗可稽僅自髙祖而下至其子篤凡六世而圖以系之世以次之本支相屬敘述詳明秩然而不可紊同吉來京師間持以謁余請為序之惟人之有身本於親也由親而上則為祖為曽為髙推而至於百世皆身之自出也又旁而推之則自兄弟以至族屬之疏逺其本皆同也然歷世滋久逺者易忘疏者易忽不有圖譜以紀之使人泝流求源自幹達支以崇本始隆愛敬敦宗族篤倫誼則人道不幾熄乎是以先王作為大宗小宗之法設官以掌之其所以維持防範乎世教者非小補也哉後世宗法既廢圖譜失官士大夫家始自為之以紀一姓之源流是猶有先王之遺意焉奈何競門閥者援貴顯以自誣侈觀美者強不知以求詳此其於孝子慈孫之心何如哉今戴氏斯譜於其不可知者寧闕而不録不敢妄自援引至於髙曽而下則名諱生卒配享墳塋纎悉必備使後之人即是編而觀之庶幾知所以崇本始隆愛敬厚宗族篤倫誼之道而不敢援貴顯強不知以厚誣其祖也其用心亦至矣哉同吉釋褐甲申進士歷户部員外郎以至今官旬宣所至聲譽流著蓋所謂能亢厥宗者至於立祠堂定家規又皆具載諸譜其貽謀豈不逺哉為之子孫者誠能即是以求其用心思世守而弗墜焉則戴氏之澤豈不衍迤而未艾也歟田氏族譜序宗法既廢譜牒遂興而世之氏族明系緒别尊卑篤恩義厚風俗皆有賴於此也然則族豈可以無譜乎田氏世居鳯陽之夀州元始有仕為亷訪副使及提舉者蔚為宦族至正間有曰秀實者以儒士任太平之宣城同知歷知滁州永新洪武初改福建行都司斷事遂家建寧今其諸孫忠繇永樂甲申進士厯任户部主事兵部郎中以薦升江西布政司左參議聲華茂著兹以其家譜示余請言以冠其篇按譜其逺祖弗可考者皆不録斷自夀州而下則詳著之實而不泛核而不妄與昔之人拜汾陽者霄壤不侔矣大抵作譜者所以求其苗裔别其源流庶幾得以興起孝弟之心以相親相睦於無窮免為塗人之視則幸矣然而近時之為譜者往往強附貴富擯斥貧賤惟欲矜其閥閲之盛遂至棄其祖宗欺其子孫而寖失其真焉嗚呼是豈尊祖敬宗之道哉今田氏之譜據實而書闕其可疑著其可知使一覽之間昭穆尊卑之序長幼疏戚之分粲然畢備孝弟之心油然而生矣其於水木本源之義豈不至哉余於田氏之譜深為之嘆賞者蓋以此也田氏之先積德深厚故其嗣續至今蕃衍盛大若此况今復有如忠者以科目發身荐登顯仕則其餘慶之所萃灼有徴矣語云源深者流逺本盛者末蕃其斯譜之謂歟忠於余有同門之契因其請遂書以歸之侯官林氏族譜序譜有關於氏族甚重也自宗法廢而族無統故後世士大夫家往往自為譜以紀其一姓之苗裔源流俾昭穆相承尊卑有序雖百世之逺有以篤親親之恩不至於相視為途人其敦本厚倫之意為甚至矣然歷世既逺兵燹荐更求能保其先世之譜久存而弗廢者蓋亦鮮焉吾閩中林氏最蕃且盛然多出於唐九牧之後長樂之派則以為韶州牧薦之子録事參軍愈之後分居於此而竟失其相傳世次今特舉其所可知諱烏者為始祖烏七傳至宷仕宋纍官至禮部侍郎食邑侯官子孫因家焉至今吏部司封郎中祐七世矣祐嘗慨其上世之不可知者既弗可譜而其所可知者又不著之於譜則後之子孫將何所據以盡夫尊祖敬宗之義乎乃畀其子憲彚其世系法歐陽氏之遺意作家譜一編來請豫言辨其端惟林氏之族布列閩之諸郡簮纓閥閲歷數百年繩繩弗替然求其若侯官一族詩書相傳世濟其美者蓋亦罕見譬之木焉本既盛矣培之則其末益蕃譬之水焉源既深矣浚之則其流益逺林氏之先積德之厚及今復有如祐者溫雅端謹卓然有聞尤能篤念厥初而存心於譜牒以致其水木本源之意可謂培之益固浚之益深其慶澤衍迤於其後者又詎可以涯涘乎為林氏之嗣者尚有以自勉楊氏族譜序譜牒所以統一姓之苖裔隆百世之本支俾昭穆相承戚踈有辨不徒為文具也然至于族屬蕃衍子孫綿延雖仕宦商賈轉徙四方數傳之後子孫有不相聞者惟考之譜牒則祖宗之源流系緒粲然可見名行官位昭然可知鄉居地望墳墓所在無不歷歷可指於是水木本源之義至於久而弗失逺而弗忘者良以此也然則世家大族又烏可以無譜牒哉吾建楊氏皆出漢太尉震其後世子孫宦逰于閩因而家焉浦城一派其先在唐世有曰齊宣者仕為諌議大夫以言事忤旨出為建安令嘗過浦城樂其風土思欲居之上元中召還至信州會劉展之亂江淮洶洶道路遂梗因携家還居浦城歷五季宋元以至于今蓋幾世矣今楊意字文遂者聰敏敦雅亦自言為浦城之後兹以謁選來京間持其譜牒詣豫拜而請曰先世譜牒家傳既久子孫幸遂保此以得致惇敘親睦之意庶幾不墜先緒敢請一言以冠其端豫與其同郡且又同出華隂之系其何可辭遂為之言曰萬物本乎天人本乎祖為人子孫者其又可以忘其本乎譬之木焉本必盛而後枝葉蕃若不能培植其本則將萎然而悴矣抑何敢望其榮茂而暢逹哉吾楊氏自關西以清白相傳子孫雖散處四方而詩書簮紱先後相望是雖祖宗積德之厚然亦豈非為子孫者善於培植其本也歟今觀文遂之譜牒綿綿瓜瓞愈逺愈盛而尊卑長幼秩乎弗紊隱顯始終確乎有據則所以光其祖顯其族莫大乎是抑安得不為之起敬乎詩曰豈無他人不如我同姓然則文遂之請而豫為之序不辭者是皆宜也遂書此以辨焉李氏族譜序宗族有譜實倫理風俗之所關而仁人君子所宜重者也茍不之修則服盡情盡不相視如塗人者幾希烏知夫水木本源之義者乎若今翰林侍讀學士李君時勉所以惓惓於其宗譜者蓋深有見於此也君家吉之安成泝厥先本於南唐江王景逖王乃烈祖第五子嘗節度處州唐亡王之幼子茂先潛迹吉虔間教授生徒以自給吉守李鬯重其韜晦不強其仕乃舉其子光為安成閻嶺鐵務使因家焉自光而下由進士登仕籍者代有其人在元時曰蒙發者仕至金紫光祿大夫詹事府詹事國朝有思焕者知浙江紹興府事實為景逖十七世孫嘗懼源逺而派益分久而失所自遂因故譜修之學士君去思焕雖未久又慮宗姓之蕃富貴貧賤之不齊不因譜以明尊卑則富而凌貧貴而輕賤其能喜而慶憂而弔孤而字患難而相恤者鮮於是因思焕之所修者續而書之是固重夫本源之義其用心亦勤矣譜成詣豫請序嗚呼譜之作推所自出合所已分以明倫理以厚風俗非為觀美設也第近世之修譜者往往冒先代之顯人為所自出附同姓之豪右為其宗親薄其厚而厚其薄其有乖於倫理風俗非細故也今觀李氏之譜自景逖迄今四百餘年凡二十世派分而源一幹異而本同昭穆尊卑秩然不紊視世之冒附以為美觀者豈可同日而語哉雖然學士君之心固以其祖宗之心為心使為厥後及同宗之賢者皆能心是心焉敬所當敬親所當親慶吊相往來孤貧患難相賙恤則於倫理風俗之有補不亦大乎是為序題跋恭書封贈誥命後臣榮猥以駑鈍叨列侍從十有餘年太宗皇帝俯念勞勤頒鍚誥命追贈父母及妻時文臣惟尚書蹇義等八人學士胡廣及臣榮等五人得以霑此後十有二年仁宗皇帝嗣位大舉褒崇之典廷臣及方面大臣皆給誥命臣榮蒙荷寵眷十旬之內兼拜三職錫以誥命且追贈二代祖考妣何榮如之逮至今上皇帝嗣位之五年特升臣榮少傅仍兼尚書大學士之職不數月復受誥命追贈三代祖考皆如榮官祖考妣及妻皆為一品夫人聖恩宏大被于存歿顯榮光耀無以復加顧惟菲薄曷以致兹斯實三聖天地大恩之所賜而臣榮黽勉拜受豈勝愧悚况大訓諄切臣榮所當朝夕祗服不敢忘者謹用繕寫稡為一卷退朝之暇肅容展閲常若對紱扆之嚴仰日月之光鞠躬盡力以圖無忝且俾士大夫之欲快覩天章龍文之光華以知聖朝優禮臣下之意厚臣榮不敢私亦不敢閟舉此示之實一便也恭書仁廟御批後禮部馮主事吉郡人也資稟溫厚性識暢達昔仁宗皇帝臨御日在朝列嘗以奏牘進仁宗嘉之親御宸翰批其奏面命名曰敏既而龍駕上賓敏亦丁內艱去乃者起服至京師祗奉御批裝潢為卷而寶愛若珙璧然請豫言以識之臣榮竊惟敏者聰也達也以人有偉質而言也孔子謂好古敏以求之又云敏於事而慎於言又曰敏則有功然則聖人論學與事功皆不能外敏以為言仁宗之所以命之者抑豈無意哉為敏者奚可不顧名思義夙夜勉勵勤於問學懋建事功以副恩眷之隆乎臣榮展玩之際不勝慨歎故不辭拜書于後以致尊仰之意焉書蘭亭帖後仁宗皇帝昔在儲位夙夜孜孜緝熙聖學然於協贊萬機之暇鋭意翰墨於古法書真迹尤為篤好放情揮灑往往造妙入神嘗以唐禇遂良所臨禊帖摹勒于石間以紙本賜近臣然亦未嘗輕授也永樂八年冬臣榮扈從車駕南還首蒙慰諭特賜一本退而深自感激以為非眷念之至何以得此因寶而藏之以為子孫珍玩距此十又七年仁宗御極升遐之後而大理卿臣虞謙乃捧其昔所蒙賜本以示榮且請言識之惟謙以文學老成荐歷榮顯其任職小心慎密知無不言方是時為都察院右副都御史涖事南京日侍左右親受知遇然則其所以得此賜者豈偶然哉嗟夫鼎湖寥邈龍馭上賓墮弓遺劍皆足以繫羣臣之攀慕况於翰墨又精神心術之所寓者乎展玩再拜不勝感愴書宋丞相文山遺墨後廬陵文丞相天祥以孤忠大節報宋家三百年養士之恩英風義氣至于今赫赫在人耳目何其壯也今其裔孫紹節持丞相手簡與詩謁拜請題嗟夫丞相之死節非惟有以報宋且有光於歷代為人臣之死義者然則其流風遺烈猶足以使人感激奮發矧為丞相之子孫者乎宜乎紹節寶藏之也詩曰無念爾祖聿修厥德因紹節之請并書此于左方云書趙松雪所書嵇康山濤絶交書後趙松雪以善書名重當世然公之所長豈止於一藝哉公之文章雄深而贍蔚公之政事疏通而識體觀於國史所載可見然則書特公之餘事爾此其所寫嵇康與山濤絶交書溫潤遒徑非尋常可及今户部尚書夏公得之深加愛重且以示豫俾識其後嗚呼昔人謂王右軍為內史長於政事後人但知其善書蓋其他長為書所掩爾然則若公者大槩亦類此因書所聞附於左方以俟知者書淵明歸去來圖後晉陶淵明既宰彭澤恥折腰郡督郵即日解印歸賦歸去來辭以見志後人髙之往往取其辭中之意繪以為圖所以寫髙情於尺素播清風於千載何其至也此圖吾閩士朱孟淵所臨持以見遺豫既得之裝潢成卷復求善書者各書歸去來辭一通以附其後嗟夫淵明之髙風逸節卓然冠絶固有不待於圖而後著然而後人尚之率皆寫其容儀態度之若是此豈淵明之意哉殆不過係髙山仰止之思而已豫既謹而藏之復識此于後庶俾後人有以知豫意之所寓云書赤壁圖後右監察御史江志堅所藏赤壁圖不見畫者名氏然布置有法筆意精妙殊非近時畫師所及誠可愛玩志堅既裝潢成卷復求中書舍人程南雲𨽻古朱廷暉楷書東坡前後赤壁賦以係于後且請豫言識之惟東坡以文章擅名當代傳誦於天下後世如此賦尤為竒崛讀之鏘然若振乎黃鍾大吕之音令人擊節歎賞而又得圖畫之工字書之妙皆可為翰墨之珍玩矣志堅其寶之書麥舟圖後范文正公父子麥舟一事雖出於一時志同意合然至今以為美談蓋宜其然也且自古磊落豪傑之士其心志度量往往相符矧文正忠宣又出於父子者乎古人云有是父必有是子觀於范氏可見矣若文正之厚宗族仁鄉里慷慨尚義海內之士莫不仰其流風遺韻况忠宣為之子者乎公父子以文章行誼昭著簡册流光垂榮於後世者何限夫豈特麥舟一事之美而已哉而世之人景慕之者蓋自有不能已也姑蘇范暹啓東持此圖請豫言夫以世之搢紳大夫於公父子平生行事莫不奮發而興起况啓東出於范氏而又世家於姑蘇者乎宜其希企又有過於衆人矣啓東賦性聰敏好文而工畫有足尚者因其請書此於圖之左方云書東萊黃氏教儀後工部尚書兼詹事府詹事黃公之再鎮南交也將行命其子琮讀書于應天府學因手書教儀以訓之其為言皆切實略無浮泛冗長之辭蓋公自少力學勤苦以底成立至擢科第登仕版以享其榮名盛福於今日而尤恆歉然弗敢自滿故於其去惓惓焉思有以訓其子而惟恐其習於驕縱流於奢靡而弗知所以樹立以至虧行辱親公之意亦勤且至矣今之世貴遊之家子弟往往或至於狂悖狠傲慿藉父兄之貴富以凌駕當時者人皆謂其習性之使然也夫豈理也哉假令為父兄者皆如公之善訓而所以開導戒飭之者若是其至則凡為子弟者雖欲為不善又豈可得乎琮裝潢成卷以請豫識豫素知公之賢德而又嘉琮之善承公之教也遂書此以歸之書江氏隂德卷後惟施德於人而不求知於世無責報之心者謂之隂德人有是德者雖不求知不責報而天之所以報之者自不能違矣三衢江氏其先有諱景房者仕吳越為鎮東節度判官時國俗奢靡費用無節由是重斂其民兩浙大困幾無以為生後吳越內附景房遂沉其賦籍于河故當時吳越之臣咸備録用獨景房坐此以廢然景房不忍其民重困沉籍以泯其祻雖遭擯斥實所弗辭故其後世子孫蕃衍盛大科第仕宦綿延弗窮其後萬里遂登相位何其盛哉今襄府紀善秉心實其後裔間以元翰林張樞子長所述景房事實而名之曰江氏隂德以求豫題豫因掇拾其槩書此于末簡俾世之人知有隂德者之獲報如是且有所勸焉書朱氏先德卷後元之季錢塘朱自明以才見知於時其為池陽郡掾執法不阿能平反銅陵許氏疑獄活三十有二人為杭郡平凖庫副切切於民減歲額换易鈔十二萬錠官不為擾而民免於害為吳郡許浦監稅潔已奉公商旅便之而國課無虧當時新安滕文祿胡宗海鄞尉陳淵皆有序述以稱道之逮至國朝隆興于今已五六十年而自明諸孫暉乃萃於一卷屬豫言惟世之為人子孫者鮮有能知其先世之德而寶藏其翰墨得以考見當時行事之迹可勝慨哉今暉以其祖之遺德弗逺而其父之手澤尚存惓惓焉愛襲不啻珙璧此其賢於人也逺矣宜夫澤之及其後者愈久而弗泯也豈不可尚己乎暉字廷暉復姓蔣氏今為禮部郎中兼翰林侍書亦可謂善繼者矣披玩之餘書此以歸之書東陽李氏忠愛堂卷後右忠愛堂詩文一卷為浙之東陽李氏作也李氏在宋南渡後有誠之者知蘄州時金人入境援兵不至誠之以七百之衆屢挫金人於孤城之外勢窮力盡決戰而死闔門妻子慷慨就義其孤忠大節炳烺宇宙逮今赫然弗衰誠之從弟太常博士大有工部尚書大同極敦友愛怡然和樂平居講學自相師友風采氣誼師表當世然而誠之與大有大同俱從東萊吕先生與紫陽朱夫子遊傳道受業淵源有自則其所以奮勇敵愾以盡其忠友于雍睦以篤其愛者皆灼知大義明於理道之所致也夫豈偶然哉今大有之孫敘繇太學生仕監察御史嘗作忠愛堂以表其先世之德且將以寓弗忘之意一時賢士大夫皆嘉其志相與為詩文以昭厥美敘持以請豫言識之惟君臣兄弟皆人之大倫民生日用不可一日而廢者世降道衰其義乖闕往往有昧於此而遂至于泯沒天性者李氏之先從遊大賢不惟有得於講論之餘又能身體而力行之故能盡人臣之大節敦同氣之至親以至于今人皆仰而望之况於為其後者乎雖然敘之心亦可謂勤且厚而能顯其先德於無窮者矣所謂莫為於前雖美而弗彰莫為於後雖盛而弗傳若李氏者誠可謂世濟其美者矣豫故樂而書之且將以為世勸書鴒原别意卷後此豫友文淵閣大學士兼左春坊大學士胡公光大扈從居北京時别其兄與其兄初度日有懷之作共二詩蓋公之兄字方大為人清雅謹飭敦尚友愛喜為江湖之遊嘗一至京師留數日輒去未嘗以弟之貴顯而有驕盈之色公於方大尤盡敬恭弗敢少違手足之情篤厚切實今觀其詩同氣之誼藹然溢於言表何其至哉方大裝潢成卷而題其首曰鴒原别意間命其從子永實請豫言識之嗟夫孝友之道能盡之者古今無幾故詩稱張仲書美君陳不過一二人而已若方大之居家事母竭力奉養公之詩亦拳拳然於其母與兄如此豈非兩盡孝友之道者乎是可以為訓也胡氏之後人誦其詩味其言其將有所感發而興起乎因書此以識之書劉氏族譜後辨宗合族必由乎譜系有家者不可以不作也然作譜非難而世守之難自非其先德之積深厚而文獻之傳代不乏人則又奚能繼承而不替哉今觀劉氏之譜上稽周秦以逮兩漢其得姓受氏逺有源委自晉關內侯衍以來歷唐宋今凡四十餘世其間若文靜之勳伐翺之隂德韐子羽純錡之忠節子翬崇之之道學先後相望炳耀史册矧今貴州大參永賢發身科第揚歷明時聲光德業表表愈偉可謂世濟其美矣雖然有以先之必有以後之有以基之必有以構之劉氏先德之稽既有以及乎永賢永賢可不思所以及其後人乎必講學以植之務德以培之循禮以固之若然何患其不能世守耶余與永賢同為閩人且有斯文之雅故以是諗之永賢尚以是而勗其後人可也書黃母劉夫人傳後右眉山蘇公伯衡所撰永嘉黃母劉夫人傳夫人之曽孫今少保户部尚書兼武英殿大學士淮宗豫出以示豫且徴言識之傳稱夫人劉氏出巨族居家孝事其母鄉族稱之歸黃氏亦故家其夫應發仕松陽教諭夫人辛勤克相事舅姑敬謹甚宜其家八年無子為聘娣生子通通年十二而應發卒撫育訓誨使知務學既而通以墮井得狂疾夫人恐其不久於世亟為之娶屠氏生子性已而通果弗祿有欲害性者夫人冒白刃脫之復鞠養之而獲見其成立夫人始以疾終嗟夫婦人之德莫大於無妬忌故往往著之於經以為後世女婦楷範若夫人者可謂有其德矣向使夫人歸黃氏無嗣不早聘娣則通之生未可必通之疾不早置室則性之生未可知彼操刃戕性者非夫人勇於赴救則黃氏之宗嗣不既替矣乎然則夫人以一女婦之身而能全黃氏兩世之孤以綿延其後裔至於蕃衍盛大可謂賢且烈哉今宗豫由洪武進士自中書舍人積官至今職因得以顯揚其先世夫人雖在泉壤與其榮焉若是則天於報施之道亦可謂昭昭不誣矣因宗豫之請書此以歸之且將以為世勸云恭題仁廟勑蹇忠貞卷後今少師吏部尚書西蜀蹇公當仁宗在東宫監國時以尚書兼詹事之職悉心輔導知無不言夙夜惕厲勤勞所職弗避險艱始終弗渝雖古之股肱心膂以身係國家之重者亦不過此由是特蒙眷遇倚注尤深暨洪熙改元益見親任遂進公以三孤之位賚錫駢蕃恩寵隆盛海內縉紳之士莫不仰望以為誠曠古之竒逢希世之知遇也既而仁宗親降勑錫以忠貞圖書褒諭甚至念及子孫保全終始恩德之厚無以復加自古君臣相與之意罕能及此何其盛哉公録此勑裝潢示臣榮請言以識之嗟夫鼎湖龍升雖遺弓墮劍臣子見之莫不灑泣而况聖意之所寓乎謹頓首拜書于後且以寓哀感之情於萬一焉公其寶藏之恭題御賜牧牛圖後右牧牛圖一幅皇上親寓翰墨寫以賜臣榮者其平原草長春流汗漫之態與夫牧豎嬉戲牛犢間逸之狀皆精妙入神夫牛實耕農之本牧之者貴得其性情賢才之牧民使皆能如牧者之識其性而順遂其生又烏有不得其所者哉且放牛於桃林武王所以偃武修文也然則上於斯圖豈無意哉臣榮受賜惶悚惟思夙夜竭心庶幾或有毫髮可以上副聖意因題于末簡而謹藏之恭題御筆寫竹菊圖後皇上嗣登寶位克勤庶政海內晏然遂於視朝之暇留意翰墨嘗作竹菊圖賜翰林侍讀臣粲天機所到精妙入神粲以示臣榮且屬言以識之夫竹有嵗寒之操菊有晚節之榮皆可以比清貞特立之君子非凡卉木之足倫也上以是為賜豈非有望其臣之能砥礪其節操者乎粲於此可不敬承恩意以自勉哉拜觀之餘不勝欣躍謹書此于左方粲其寶之恭題四書性理大全後欽惟太宗文皇帝臨御之日宵旰孜孜誕興文教以斯道為己任萬機之暇嘗與儒臣論議以為四書雖有宋儒朱熹為之集注以便學者然而羣儒之説頗有異同純駁不一至今幾三百餘年紛紜糅雜莫知適從兹欲會而通之去其駁而録其純庶幾聖賢之道昭然大明臣榮忝居侍從恭奉德音於是敬承謹率四方學者彚以成編上親商確以定去取書成賜名曰四書性理大全即以刋布天下學校凡從事於聖賢之學者莫不欣焉若披雲霧而仰青天若剪荆棘而循大路坦然無疑釋然有悟誠萬世之寶也豫鄉郡建陽葉添德氏家素饒貫而好學博雅間於庠序得覩此書遂求抄録鋟諸梓以廣其傳乃以書來京師請豫言識之夫奉揚上之盛德美意以昭示於無窮者人臣之事也昔太宗文皇帝惓惓纂輯是書以嘉惠天下後世有功於聖門大矣然而添德以民間之傑然者乃能廣播而盛傳之此其所以超乎衆人者豈不逺哉是可嘉尚也已因拜手以識于後恭題仁宗御書卷後今右春坊右庶子兼翰林侍讀學士臣王直昔侍仁廟於東宫特賜扇暨藥其來北京也復賜道里之費又賜其父瓊州府知府伯貞致仕直祗承厚恩感服無已比以先後所得寶翰稡為一卷將永為家寶間出示臣榮拜覽之際天章焕發雲漢昭回令人起敬起慕有以見當時君臣藹然相得之意何其盛也蓋當時侍從儒臣得者無幾人直可為希闊之遭際矣嗚呼王氏子孫其世世寶此以勉圖無忝哉題大理少卿吕升恭和御製嘉禾詩後嘉禾詩一章太祖髙皇帝御製也永樂之初太宗文皇帝始出墨迹于中祕俾勒石摹拓頒賜廷臣然聖心寶愛之至由是拜賜者無幾焉今大理寺少卿臣吕升既獲録本珍藏又從而奉和之以寓忠愛之意是亦人臣之至情也豫惟二聖相承五六十載之久深仁厚澤霑被生靈者深矣故凡窮閻茆屋之人至于今猶愛戴感慕矧公卿大夫叨近日月之清光致身霄漢之上者乎則夫拜覩製作之出自天𠂻表章之本于聖孝當時亦幸與恩賜者又將何如耶臣榮於是泫然感泣拜識于後以歸于升若臣榮嘗所拜受石摹墨本一通者謹用什襲珍藏以為家寶云題晦庵先生遺墨後文公朱先生遺墨一幅答其鄉先輩徴言之簡也先生講道之餘著書立言不厭不倦觀諸此簡亦足倣佛當時之氣象蓋其道髙則不固拒德盛則詞恭遜無一而非教也况翰墨古雅清潤飄然揮灑之中而自不踰於法度尤為世所寶愛者乎駙馬都尉趙公得此珍襲於家間出示豫三復展玩敬拜手書諸左方識景仰之意云題唐宰相李德裕見客圖後宋宣和摹韓滉畫李德裕見客圖并親疏其勳迹於後榮竊觀所畫德裕據床仰視三客侍坐唯謹若有所計議者蓋德裕為相時嘗喻御史有以事見宰相者必先白臺乃聽自是無敢輒至閣者然方其時武宗欲殺楊嗣復李珏德裕乃率三宰相入見相與救之意者坐間所論必預計其所以為之解者是未可知也此圖其為此而作歟及觀德裕出入朝鎮經綸謀畫諌諍剴切深得大臣之體至於用兵決䇿制勝威振河朔其意氣丰采尤偉然超乎物表宜乎後世有以表章之也都督沐公得此圖甚寶愛之若將景慕而感發者間持以示豫蓋德裕故相吉甫之子而能繼承先志使功名事業光昭前聞可謂賢矣都督公實黔寧王之子今太傅黔國公之弟駙馬都尉之兄也家世之盛方之德裕尤為顯赫而况入總督府之政出當藩閫之寄忠勤茂著功能弗伐其於德裕復何愧哉詩云髙山仰止景行行止都督公之謂矣因其請遂書于左方題宋進士袁鏞傳後宋有天下三百餘年而後失之其間忠臣義士英聲大節昭著于簡册者歷歷可考獨袁進士鏞以一介書生遭喪家居值元兵壓境乃與謝昌元趙孟傅誓死許國而鏞獨先出諭以大義不少屈遂被擒憤罵而死家人凡十七口聞之皆赴水死嗚呼袁氏一門忠義若此惜其有遺於簡册弗得大顯于世可勝悼哉今鏞四代孫太常司丞珙及珙之子中書舍人忠徹皆能樹立慨然念其前烈乃以其先代所傳所聞求諸名筆為傳記以述其事辭詳而意備固不待豫言之贅兹因其請之堅乃不獲辭姑書此于末簡題貝祭酒聖賢像後竊惟聖賢之道如天地之大日月之明萬世之所瞻仰至于簡册所載聖賢容貌詞氣動靜語默之間則不能不為之慨然想見其儀刑於千載之上况得覩其遺像者乎覩其遺像猶足以使人感發而興起又况於當時親炙之者乎此吳興錢舜舉所畫聖賢遺像今國子祭酒貝君宗魯所藏以求豫題撫卷拜玩肅然生敬遂書此于左方宗魯尚寶藏之題張御史和唐詩後監察御史四明張楷嘗悉取襄城楊伯謙所選唐音七言律詩和其韻凡若干首間持謁余請識其後夫詩自三百篇以來而聲律之作始盛於唐開元天寶之際伯謙所選蓋以其有得於風雅之餘騷些之變楷取而和之其殆究夫伯謙所選之意與唐人所作之旨矣不然奚其好之之篤也嗚呼詩豈易言哉本諸性情沛然流出胸次而無雕刻煆錬之迹者斯造其妙若乃苦心危思摩切對偶専以麗整為工此則末流之弊也楷於所和抑嘗得其妙而戒其弊者乎俟余有暇尚當披玩而審夫所得云題楊少保編纂用藥真珠囊詩括後士君子負濟世之志者其仁恤之心隨寓而存雖當憂鬱常情弗堪之際而精神念慮亦未嘗不惓惓於是焉若今少保禮部尚書兼武英殿大學士江陵楊公是已公昔坐繫幽間無所用心因覽東垣所著用藥真珠囊舉其要語約為詩括凡若干首簡直易見誠學醫者之便也公之用心其仁矣乎雖然公以光明正大之學思納斯民於仁夀之域固非徒事乎醫而醫亦濟人之一端也使凡業醫者得公是書熟讀而有得焉其為利濟之功不既博乎然則是編之作雖不足以窺公之大致而亦可識公之心云題聚奎堂卷後古者士大夫之有官于朝雖勤於職務夙夜不懈然亦必有休沐之時優遊燕息之所以適其志觀於羔羊之詩可見矣豫來北京其所居密邇東城地僻且逺恆不得一遂退休之適乃於長安東門之南得隙地構屋數楹繚以周垣雜植花卉軒檻虛明几席淨潔退食之餘時得偃休于此是嵗三月己丑皇上親䇿天下士以馬愈為第一拜翰林修撰其次杜寧謝璉皆拜翰林編修既入院就職太常卿兼翰林學士江陵楊公率僚友致酒宴樂其中衣冠偉然衆皆樂甚因念良辰之難期幸文會之可樂為名其堂曰聚奎而請少傅兵部尚書兼華蓋殿大學士西昌楊公為文以識之衆皆賦詩惟奎主文章天下文明則五星聚奎非偶然也洪惟我朝混一海宇文運誕興五六十年之間列聖相承丕昭鴻業宏闡聖猷以開萬世太平之盛五星聚奎惟其時矣豫幸受知纍朝列官禁近垂三十年以至于今叨蒙聖眷荐臻祿秩報稱未能而乃復得從容於儤直之餘與羣公燕飲於此以敘天然之樂實皆皇上之所賜也夫豈適然相聚以為酣嬉之樂而已哉少傅公既為之記豫謹題于卷末後之人欲觀聖朝亨嘉之運與夫文物之盛者尚於此徴焉題崇恩堂卷後堯舜禹湯文武之道著於治者蓋一時之盛耳孔子以六經之道為教而萬世之治繫焉故大賢謂孔子賢於堯舜豈虛語哉由是歷代以來隆其諡爵通天下而祀之可謂盛矣然不特此也又世封其後以崇德象賢其榮名厚祿可謂與天地相為無窮者歟我朝當文運亨嘉之會六經之道大明而於衍聖公尤為眷厚其祿秩二品世襲爵邑雖仍前代之舊而褒崇禮遇可謂超越前代矣太宗文皇帝嘗躬詣太學行釋菜禮而仁宗昭皇帝即位衍聖公孔彥縉來朝燕勞賜豫情文兩致縟禮多儀具著為令彥縉躬膺眷遇以謂褒崇之盛莫踰於今日乃作堂於其家而扁曰崇恩魯王殿下親書大字以賜之金薤雲章照耀闕里何其盛哉夫孔子之道生民至今永賴凡冠章甫衣逢掖者皆知尊尚而敬仰之而况其子孫乎况帝王於先師之胤乎昔漢肅宗東巡至魯親祀孔廟作六代之樂大會孔氏子孫謂孔僖曰今日之會於卿族榮乎僖對曰自古明王聖主莫不尊師重道今親屈萬乘辱臨敝里此乃崇禮先師增輝聖德非臣家之私榮也肅宗喜曰非聖人子孫焉有斯言然則彥縉之所以名堂者其亦若僖之知所本乎異時書諸金匱以傳萬世其為仁廟聖德增輝豈小也哉豫故樂為書之以系于諸作之後題北京八景卷後余嘗考天下山川形勝雄偉壯麗可為京都者莫逾於金陵至若地勢寬厚關塞險固總握中原之夷曠者又莫過於燕薊雖云長安有崤函之固洛邑為天地之中要之帝王都會為億萬年太平悠久之基者莫金陵燕薊若也昔太祖髙皇帝受天明命混一九有以金陵龍蟠虎踞長江天塹遂定都焉逮我皇上繼承大統又以燕薊左環滄海右擁太行內跨中原外控朔漠宜為天下都會乃詔建北京焉及今十餘年車駕凡兩巡狩榮叨祿翰林既嘗歷觀金陵之勝今而復忝扈從得以追陪文臣之末隨侍皇上遍閲北京山川之槩退而與諸僚友討論莫不稱嘆以為斯文千載之竒逢一日翰林學士兼左春坊大學士胡公光大偕翰林侍讀兼左春坊左中允鄒公仲熙考求其迹以昔人有燕山八景之作而簡册無聞今聖朝天下一統皇上建都于兹誠非往昔之比不可無賦詠以播於無極於是仲熙倡為北京八景之詩學士胡公兩和其韻而又序之僚友同賦者凡十三人榮亦厠名其間亦何幸哉竊自幼時嘗閲地志考其山川形勝心目為之開明精神為之飛動思欲遨遊覽觀而不可得及今得以循歷兩京又得屢承上命奉使西北由江淮道大梁洛邑踰關中以至玉門關之外及侍皇上兩率師出塞肅清邉塞北至極漠西抵和林觀兩京之地王氣所鍾實為天下形勝之最東南西北道里適均真足以控制萬方而為聖子神孫萬世磐石之基也榮以菲材叨逢恩遇涓塵海嶽效報未能兹以北京八景圖并詩裝潢成卷因舉足迹所至書于卷末具以諸景之槩所以得名疏于圖首誠非欲誇耀於人人將以告夫來者俾有考於斯不惟知天下山川形勝之重而又有以知八景所在如目親覩有若豫輩之菲薄叨承國家眷遇之厚樂其職於優遊得以詠歌帝都之勝於無窮者皆上賜也然則觀於是者豈無感發興起以自奮於明時者哉因書此于末簡以識嵗月云題香山九老圖卷後昔唐白樂天以刑部尚書致仕歸洛陽與懷州司馬胡杲衛尉卿致仕吉􅌈磁州刺史劉真龍武軍長史鄭據侍御史盧貞永州刺史張渾祕書狄兼謨洛中遺民李元爽合尚齒之會且各賦詩以記之遂傳諸好事者以為美談然樂天居香山自號香山居士其八人者時時相從觴咏以為樂至寫形貌於圖畫名香山九老至于今縉紳尚焉此圖乃豫友南京兵部郎中田伯邑所藏求豫言識之觀其山水秀麗林木森蔚泉石清峭而九老逍遙其中以從事於壺觴翰墨棊局之間豈不超然自得也哉於此亦足以見唐家承平日久四方無虞而士大夫得進退以禮優遊燕休以畢其餘齒此何其盛哉洪惟國朝列聖相承熙然垂拱無為之化矣而豫也叨蒙厚恩忝膺重寄雖欲乞身以遂其田園之樂有不可得則於此圖烏能不惓惓致意焉異時幸獲賜歸故鄉與同志者退尋此樂尚未晚也因伯邑之請姑書此以識之題雅集圖後雅集圖者世傳宋元祐諸賢會王晉卿西園而李伯時即席中所畫也後人相傳摹寫往往不同近侍講鄒仲熙得此圖有葉石林所序圖凡十二人蓋東坡先生王晉卿蔡天啓蘇子由黃魯直李伯時秦少逰陳碧虛米元章王仲至圓通大士劉巨濟也豫嘗考之鄭天民記復增張文潛李端叔陳無已朝無咎為十六人近觀陳思允所題則又少李端叔陳無已二人為十四人今豫此圖景物位置大略與思允所述相似獨卷首增張文潛為四人則與述古堂所記實同而於石林天民序記皆不相合惟西園之會出於一時而龍眠在坐所畫必得其真何後人模寫若是其相戾耶嗟夫繪圖之會可以適情於一時所謂榮華飄風好音過耳者其或同或異抑何必留意於其間哉然而辨駁考究亦學者之所當務姑以所聞所見識諸左方俟博雅君子相與考焉題雪夜唱和詩後士君子之重交友尚矣蓋心孚誼合自昔以為難而况官守之同居處之近道德文章之相契尤所難得者焉昔晉王子猷居山隂夜雪初霽月色澄朗忽憶戴安道時戴在剡溪即乘小艇造門不前而返一時懷友之興流輩髙之千載相傳以為美談宋司馬君實范景仁其名德髙風足以師表當世二公相得歡甚皆自以為莫及又嘗約更相為傳而後死者則志其墓既而景仁先卒君實克踐其言至今天下後世稱用舍大節不謀而符者惟二公焉豫觀今少傅兵部尚書兼華蓋殿大學士泰和楊公當永樂中為左春坊諭德時與前翰林學士兼左春坊大學士贈少師吉水胡公同居館閣為莫逆交其官舍同在長安門之西而道德文章之懿又無不同也嵗己丑正月十九日大雪初霽胡公薄暮載酒踏雪訪公時公亦由雪中訪友歸遂開樽同酌觀詩論事三鼓乃歸胡公賦古選十四韻而公和之胡公自序謂兹興不減山隂惜子猷不見安道而其樂反歉於吾二人士大夫以為確論胡公既沒朝廷纍加褒贈公復為志其墓其事視之君實景仁蓋異時而一轍者也於乎論一時之興則胡公克邁於子猷究平生之義則楊公有光於君實所謂交友之難得者俱於二公見之尚何古今之人不可同哉雖然豫竊有感焉當時館閣同事七人與豫同年者三人胡公其一也皆不啻兄弟之相愛幾四十年間而存沒出處頓異今獨公與豫在爾寧能無晨星落落之歎耶因公出所畫雪中清興圖并唱和之詩示豫三復展玩之次敬題于左方題咏菜軒記後昔胡文定公嘗言人須是一切世味淡泊方好不要有富貴相及聞汪信民言人常咬得菜根則百事可做擊節嘆賞數百年來學者深潛玩味如親炙焉兹復見國子祭酒胡公命其從子曦藏修之軒曰味菜既為之記復書司馬溫公暨東坡晦庵二三先生訓儉之詞于左方以垂教戒非有得於家傳之心法曷克拳拳若是乎吁人有古今心無古今心同則道同道同則其所嗜者必同矣何也蓋人之為學貴在立志堅苦不以奢靡為務則此心自然收斂將必駸駸然有得而日進夫髙明逺大之業茍耻淡泊而務鮮甘則此心自然放縱將必汲汲然奔馳而日流於汙下矣大抵奢則驕驕則惰惰則志有不立儉則勤勤則不息不息則學無不成豫忝交祭酒公今二十餘年每見其處已治家一皆安乎淡泊絶無纎毫矯揉蓋有不待形之於言自足以為人之所視效况今復命其從子以味菜而又申之以雅言其丁寧反覆之意豈不益深切乎然此豈惟曦當思所以自勵凡為胡氏之賢子孫者皆當有以自朂也題柴義士傳後兵部職方郎中錢塘柴車與豫同仕于朝一日以前史官蘇公伯衡所撰其父宗禮義士傳相示且俾豫題其後豫不能辭乃為之言曰夫人之大倫有五而朋友居其一焉且人之生也孰不具夫仁義禮智之性孰不知夫三綱五常之重惟其梏於形氣之私溺於物欲之纍然後喪其良心失其本性而不自知爾茍非究夫天理民彛之實而灼知倫誼之為重則於父母兄弟夫婦之際尚不免於忿爭鬬鬩之患况朋友乎今宗禮以一介之士而能慨然捐已之資以葬其友人金觀之三喪此真足以見其交義之篤而能重夫彛倫之道者矣使其得一命以效見於當時而推其所施以及於人人則其澤物濟人而有補於人倫世教豈淺淺哉惜其未獲一施於世而死也吁宗禮雖歿而其子車際遇明時出參大藩入贊司馬令聞綽然尚夙夜孜孜思所以成行立名以顯其親則天之所以報宗禮者庶幾其在斯乎豫故為是説以識于左方俾有徴於後日云跋晦庵先生遺墨卷後右宋朱夫子晦庵先生手書三通觀其於撰述張魏公銘志與他書所載不同不免悔之至其所修通鑑綱目十年而後成然汲汲尚欲求正於人則知前賢於為文及著書二事其不敢忽如此後進之士卒爾妄作者觀於此可不致其謹乎此卷今藏何彥澄氏間以請豫識把玩之餘遂書于末簡以歸之跋黃氏手澤後黃先生手澤凡若干幅豫友吏部侍郎宗載之所寶藏也先生字子貞世居豐城宗載實先生之子而手澤則先生所以示之者也先生承先代詩書之舊晦迹授徒以行率人儒素終身焉觀手澤所示宗載者皆立身行已之道事君愛親之要當官處事待人交友之方惓惓本諸仁義忠孝以為之説亦奚其懇切如是哉誠父子親愛之至情有莫能已者所謂義方之訓即此是已昔孔伯魚以聖人為父所得者僅聞詩禮致陳亢有聞君子逺其子之喜説者謂亢以私心窺聖人其誠然矣乎蓋當時髙第弟子未嘗不聞仁義忠孝之言乃於伯魚而言此者蓋因其所學方由是而深入者歟抑安知其後不引而進之爾今先生所示若此其至固以子之質美而有足受之者夫豈私意耶然度所以示人者亦必無異於此矣宗載終身奉行之其將有餘師焉故自名進士為大行人按察僉事又為監察御史升詹事府丞纍至今秩前後三十餘年所涖悉有令名非先訓有自詎能底是哉兹值聖明在上推恩贈先生如其子之秩所以顯揚之者為何如耶先生可謂無負於教子宗載可謂無負先生之教矣傳曰為人子止於孝為人父止於慈由此觀之信有徴矣哉跋李黻詩後右七言律詩一首元江州總管李黻子威之作且其所自書也子威守江州罵賊而死後之忠臣烈士聞其風者尚猶感激思奮况於得覩其手筆也哉詩之前有歐陽圭齋所撰本傳後有潞國張公諡議復有杭郡文學胡粹中跋共為一卷禮部郎中兼翰林侍書蔣廷暉以求豫題蓋子威之詩則廷暉先人子澄所藏而親題識者也然則世之所以貴人臣之忠義而廷暉之所以重其親之手迹遺物者是皆分內事也因其請特書以嘉美之云文敏集卷十五
