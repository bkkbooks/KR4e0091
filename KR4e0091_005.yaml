body:
  text: 文敏集卷五明楊榮撰歌行送吕少卿升常歸省先生宋代名臣裔簮紱蟬聯輝奕世潛心力學紹前聞碩望清才更誰似一自英年領薦書騫騰獨步青雲衢暫淹侯頖師儒席還擁行臺使者車手持憲節僉風紀盛有香名滿人耳徑氣寒飛楚樹霜襟懷湛徹西江水移官閩憲益馳聲政成超擢佐廷平釋之自信無寃濫戴胄偏能適重輕昨來入覲明光殿奏績從容荷深眷綵雲仗裏綴朝班瑞雪光中侍恩宴天語丁寧復舊官兹晨拜舞出金鑾錦袍香惹爐煙暖玉珮聲搖曙色寒羡君紫誥推恩久褒典榮親世稀有松楸鬱鬱霜露深欲薦蘋蘩酹尊酒翩然承詔遂南歸晝日煌煌絢錦衣人生得意有如此富貴功名願不違宦逰何幸逢昭代况復明良際嘉會話舊空驚白髮生攄忠諒有丹心在平生託好最相親官路俄經三十春棘寺知君體欽恤廟堂顧我乏經綸驪駒明發催程早祖席都門且傾倒殘臘遙辭紫禁門還官重上金陵道輔治由來需老成華資今已亞諸卿此行珍重慰時望有待嘉謨答聖情雪窩為苖修撰題昔聞讀書泮池上一室臨池頗虛曠室邊面面種梅花惟愛寒香來紙帳有時雪後天復晴皎皎夜月當軒楹梅花雪月共一色室中湛若氷壺清欣然把書映雪讀雪光照書同秉燭况兹素月復流輝四壁熒熒如削玉一從錢塘徙畿甸擢科入侍金鑾殿時看雪月宛猶昨只有梅花苦難見當時此室名雪窩别後相思魂夢多月華雪色諒依舊南枝消息今如何已知襟懷尚清景雪消月落空梅影有待枝頭結實成試作和羮為調鼎送都御史熊概之南京曉風吹花飄紫陌陌上青青楊栁色繡衣驄馬何輝煌祖帳臨岐送行客客初拜命出都門意氣偏承明主恩霜威凜凜孰敢犯狐兔斂迹鯨鯢奔強摧弱植安田里閭閻處處謳歌起還朝入對重敷陳九重顧盼天顔喜南京憲臺席久虛特承寵眷荷新除玉壺酒盡意不盡欲别不别仍躊躇知君此去肅風紀要使聲華滿人耳不見當年攬轡流千古芳名照青史送甌寧大尹章文郁復任吾鄉風土冠七閩建甌二邑相比鄰清和之風此融結山水秀異民心淳風淳俗朴無乖戾從古迄今稱易治况當聖世仁化行令長人人盡良吏章君自是錢唐彥早入成均與髦選驥足髙騰迥出群牛刀小試初為縣治成綽有昔賢風人方卓茂與魯恭晨霜翳蓋躬行學春雨乘車出勸農六載守官如一日藹然仁惠聲洋溢來朝仍著尚方履課最重書考功筆關樹生涼宿雨晴還辭北闕向南行雨露濃霑雙袖濕江風遙送一帆輕邑中耆老相望久有待來臨如父母長途風景秋正佳馬上看山莫回首我皇注意在愛民守令于今務得人勉旃終始樹嘉政褒命行看下紫宸送陳必恭參政考績還雲南陳君家住錦江里居傍好山千仭起鍾靈孕秀在斯人少小留心事經史一從領薦上神京成均肄業超群英黃甲題名沐光寵烏臺列職揚清聲日持白簡趍丹闕徑氣稜稜凜霜雪平生心事孰與倫皎若澄潭湛秋月繡衣一出山嶽搖翩翩鷹隼凌九霄輶車按涖懾貪墨封章奏劾驚藩僚更聞攬轡向吳土狐鼠豺狼遁無所掃除姦弊一以空要使髙名照今古一朝參佐居黔中薇垣頓覺春融融遐荒草木被膏雨閭閻黎庶歌仁風昔年報政好顔色此日重來頭已白懸車未遂歸老心匹馬還看别京國旗亭楊栁何青蔥送君南去情無窮願推仁政洽荒服莫教中道隳成功顧豫同郡托交誼衰老猶慙侍楓陛聖恩他日許歸休同看錦江山色翠送太平知府姚政之任禁城漏徹天門開紅雲捧日東方來仙蹕聲傳六龍至明堂朝罷千官回羡君卓犖多才智此日榮看荷恩意手分銅虎任專城袖帶爐薰出丹陛賜來寶勑何煌煌龍文五綵生輝光旗亭車馬集冠蓋祖筵酒泛葡萄香漙漙涼露浥芳草道上塵氛淨如掃蘭橈曉發潞河濵回首雲山隔瓊島秋深水落波不興白蘋紅蓼爭鮮明雲連齊魯黍初熟雨過秦淮山更青道傍雜遝森童稚共迓雙旌日邊至閭閻已喜樂雍熙宛若春陽發輝媚黃堂宣化敷聖恩撫綏黎庶旌仁賢和風拂拂藹生意明月皎皎行青天况君昔嘗效勞績一寸丹心炯虛白早從絳郡著能聲兩入樞庭贊籌策地官分職衆所推敬敷五教昭民彛翩翩一鶚上霄漢騑騑五馬趍南畿朱幡皂蓋照雲日勳名坐與龔黃匹公庭無事清晝間絃誦聲連萬家室古來郡守非不多惟有循良名不磨朂君此去慎終始再聽民間襦袴歌題曹義編修花木翎毛圖同雲黯淡嵗華逼老樹輪囷雪初積瘦蛟起舞凍欲僵一鳥歸棲頭已白中山有物明月精睢盱相顧如有情天寒獵罟不復出靜倚叢薄無人驚樹傍枸杞枝裊裊搖落之餘見應少葉在猶如翠羽滋實成尚綴瓊珠小嗟哉植物胡不同榮枯開落誰能窮晴忩看畫坐嘆息默識乾坤造化功送禮部郎中蔣廷暉致仕還鄉薊門二月春晝長有客翩然還故鄉為言衰邁已七帙乞身幸已辭明光憶昔年華正強盛工書深得臨池興逺師羲獻爭清妍近法歐虞擅遒徑龍飛九五永樂初姓名早已登薦書拜官雖列鳳池上載筆每向詞林趍毫端日日傳恩旨綸綍輝煌播遐邇乘間縱意時一揮多在人家畫屏裏後來遷職尚書郎內庭如舊承寵光白金文綺頻有賜三十餘年鬢髮蒼顧豫自昔同供奉青眼相看意逾重只今别我遂歸休千里湖山入清夢祖筵酒滿黃金巵盡醉休嗟臨路岐他時倘遂懸車碩定過錢唐話别離送田萬陶教諭之沙縣田君性質淳且良早年力學攻文章曉窺藝簡碧忩靜夜對蘭燈清漏長平生卓犖有髙志淬拭青萍不輕試韜藏寶匣幾經年時有輝光動星緯秋風藩省棘闈開揚眉吐氣爭先魁九重霄漢翔鳳羽雲程千里馳龍媒一朝飛步上京國擬向彤墀獻三䇿日華五色過眼迷乙榜登名衆皆惜聖恩掄選重才賢成均三載加精研誰知富貴自先定科名特達非偶然拜官再向黌宫裏得此欣然為親喜封章懇欵動淵衷錫命南行近閭里都門草緑春日明臨岐使我不勝情官河水滿快征棹指日諸生相拜迎東風吹雨潤芹藻泮水優遊景逾好親闈迎養足歡娛遙想藍輿到官早顔童髮白八十齡年來况喜身康寧公餘娛侍有真樂不羡富貴兼功名送大尹謝仲廉之沙縣東風吹花舞晴雪正是京華夏初月上林日暖散鶯聲似與行人送離别翩翩鳬舄出九關一尊酒盡添朱顔丈夫慷慨别知已仗劍寧辭行路難憶昔君初擢科第際會風雲多意氣繡衣絢綵立青霄白簡飛霜侍丹陛豈知利鈍亦有時得失往往常相隨只今承命宰百里况是閩南風俗竒喜君卓犖負髙節世態從教尚炎熱玉壺秋月炯虛明金井寒泉自清冽兹行正好展才猷時將民瘼勤咨諏夜深無犬吠村巷春到有農耕緑疇夫耕婦織各安所比屋謳歌歌父母三年報政著勤勞佇見芳名同卓魯由來邑令任不輕君行莫傷離别情秋風若有燕鴻便應好緘封遙寄聲送顧都御史致仕還鄉憶昔與君同射䇿兩鬢相看如漆黑流光迅速不可拘轉眼蕭蕭頭總白君初釋褐宰花封桑麻百里春融融欻從鶚薦上霄漢手持玉斧乘青驄英姿徑氣獨超絶不好尋常事容恱三春柏府凜嚴霜六月江南灑飛雪銀臺進秩曽幾時擢官都憲蒙主知四方顒昻想風采百寮震肅瞻威儀聖恩優老古無比一朝勑賜歸田里清名已見重當時况復光榮善終始漢家解組有二疏都門相送多軒車髙風卓卓振寥廓夾道人稱賢大夫君今髙步踵前軌不使先賢獨專美歸來林下更優遊錦繡輝煌照桑梓蹇豫衰老思退休才薄應慙今尚留冥鴻何日遂髙舉九霄接翼橫清秋送中書陳宗淵致仕還鄉天台山水鍾靈氣人物挺生多秀異陳君敻出流輩中襟宇舂容富才藝能書能畫莫與肩揮灑毫素人爭傳芳聲早嵗聞京國雅志不得栖林泉永樂之初領髙薦一時同召皆英彥儤直常居白玉堂承恩日侍金鑾殿從此飛騰際盛時草年染翰鳯凰池炯炯雙眸明似電蕭蕭兩鬢白如絲詔許歸休娛晚節買舟即日還東越故園遙指赤城霞片帆輕度滄江月我與相知為獨早見君少壯今衰老送行難盡舊時情聊復長歌寫懷抱到家正是菊花天把酒東籬興浩然惟有丹心常戀闕時時飛夢五雲邊題紫芥圖贈同知王朝佐中園百蔬雨後長紫芥新香味偏爽錦文繞葉光陸離金縷攢花色鮮朗莫嫌氣烈俄驚嚏滌滯消煩功獨廣紛紛春韭與秋菘那得與之相比倣徽州二守最賢明厚撫煢嫠薄自養晨餐暮膳無重味味此甘腴勝熊掌勤勞民事自忘疲不似庾郎同偃仰康侯擊節信民言我亦為君加嘆賞繪圖相贈雖若微託此聊將寄遐想方今廉吏盡登庸不限內朝并外壤碩言終始務清修佇見徴書降天上題竹泉石坡贈宣城錢教諭古來何人善畫竹湖州太守眉山蘇二公已去數百載每嘆絶筆人間無此圖幾竿何灑落生氣瀟森動寥廓胸中不有真琅玕筆下那能發竒作崢嶸老石莓苔青叩之似作金玉聲虛竇玲瓏暗泉滴深根盤結微雲生子今振鐸宣城去為拂新圖寫新句梅花未發栁未生持此聊將嵗寒意不用截取長竿釣玉璜不用裁為律吕鳴鳯凰惟應殺青著書比班揚廣文之官雖冷夫何傷翠筠軒為黔國公子沐可觀題世人見竹愛者稀子獨愛種當軒墀長稍密葉自瀟灑虛心徑節同襟期拂雲髙並青霄直秀壓琅玕繞簷碧千竿颯爽風雨聲四面隂森氷雪色蒼然滿眼如瀟湘敲金戛玉相鏗鏘虬龍露角帶春雨鳯凰振羽鳴朝陽有時攜客玩佳景滿地扶疏散涼影掃石彈棊白晝長鈎簾對月清宵永有時截製紫鸞笙希音吹徹鈞天清空中似引飛仙度翠翹緑珮何輕盈塵氛不到淨如洗幾回吟嘯霜天裏蔣徑寂寥何足論淇澳猗猗自堪擬君家慶澤流無窮種德應與種竹同繩繩後嗣盡英傑撫綏夷落推元功羡子才髙踵前躅早有芳名動南服碩言長養資汗青留紀清朝世勳録重慶堂為曲靖知府晏毅題堂中慈母雪滿顛况是大母尤髙年福祿康寧姑婦樂旨甘備養孫曽賢人生重慶有如此孝慈同萃一門裏綺席歡承綵服鮮緑醅香泛金樽美彤幡皂蓋綰銀章慈竹隂連萱草芳錦衣屢得拜家慶幾回庭户生輝光知君久作青雲客御勑曽看侈褒錫寧將宦逰恱親顔直遣夷氓沾聖澤顯揚已喜振芳聲更兼祿養承恩榮願殫忠孝保終始不負髙堂鍾愛情送李參議復任藩維之任實匪輕古來重此良足徴咨詢州牧載虞典旬宣江漢垂葩經李君早嵗乘驄馬煜煜才名滿都下蒼隼橫秋振羽翰白簡飛霜肅朝野一朝受命參閩邦聖皇德化能宣揚政平訟理息愁嘆坐令八郡生春陽朅來報政上京國官舍相逢慰相憶暖風碧草三月春緑酒紅亭送歸客蒲香酒熟下車時再施惠澤安黔黎心如玉雪保終始廟堂峻擢應有期送從弟尚文復任南京吏部郎中憶昔少時居故鄉兄弟相親恩愛長碧忩燈火照經史肯以暇逸虛流光一朝歘動青雲志泮水傳經汝來侍夢草春吟每得詩聽雨夜眠常共被是時愛汝才且賢靜觀羲畫窮先天隂陽變化悟消息為汝指授加精研嵗逢己卯仲秋月我獨攀桂登蟾闕鵬程浩蕩遂騫騰翰苑編摩愧疏劣一從别後難與同喜汝攜書來辟雍日下聨輝想華萼雲邊接羽看飛鴻時從官舍話衷曲顧戀情深如手足領薦欣題鴈塔名為郎喜作天官屬十年粉署政績多彤庭奏最承恩波官階已齒大夫列煌煌紫誥頒鑾坡曽懷先隴多荒草拜上封章歸祭掃始憐别我去路遙旋喜辭家到官早于今又是五載餘重來慰此情鬱紆官舍論心未逾月都亭又擬歌驪駒關河迢遞渺南北潞水鍾山兩京客百年兄弟皆過半此日相看總頭白匆匆且莫傷别離金臺會面恆有期秋風驛路多歸使時遣平安報汝知别仲子讓歸鄉省母常聞七十古所稀我今行年當此時鏡中朱顔已非昔鬢邊玄髮半成絲汝來官舍兹十載定省晨昏恆不改趍朝上馬每親扶退直還家立相待承顔養志希前修要使吾心百不憂撫摩弟妹恩愛厚應對賔朋情誼周家庭綜理協規矩僮僕歡欣無間語眼中塵俗不相關幹蠱承家應賴汝今晨拜别還故鄉秪為慈親在北堂劬勞鞠育思報德豈憚關河歸路長到家正是小春節綵服登堂慰離别鄉園桑梓須敬恭先隴松楸宜拜謁兄弟惟敦手足情閨門禮法在持循睦宗恤衆恆留念敬老尊賢勿厭頻我家種德自先世忠厚相傳貴相繼還將經史細研精莫遣箕裘業荒廢汝行日逺思日深去後平安多寄音殷勤侍母有餘暇重到京華慰我心汝來京侍養已十年小心敬慎夙夜不怠治家接人罔失禮度足慰老懷今以弟錫來乃欲歸省母雖命汝行而汝之庶母弟妹及諸親舊咸弗忍舍汝者皆由汝平素孝友誠敬之所致實非偶然吾雖欲留旦夕侍左右然汝念母久違孝心誠切不可沮遏乃賦長歌一篇以朂汝行汝且暫歸以安母心尚期促裝重來以慰吾懷庶幾子道兩盡汝其服膺勿忘也題竹贈登州太守楊頥浴鳳池頭雨露濃波濤翻硯飛墨龍倐忽變化騰太空蜿蜒影挂尺素中初疑吐霧春濛濛崢嶸山角雲雷從徐觀滿座生清風凌霄徑節氷霜容葛陂昔日留遺蹤至今勾漏思仙翁羡君久典千里封琅玕萬箇藏心胸嵗寒之操期相同長才他日須登庸簫韶九奏重華宫竹雪書房為畫士戴文進題戴君舊業家錢塘幽齋剩種青篔簹氷森玉立鬱蕭爽珮珂時動音鏗鏘一林遙接淇園緑萬箇如臨渭川曲涼宵白晝風月清翠影重重覆書屋四時佳致迥不同况兹清絶當嚴冬朔風吹雪滿空下凝梢綴葉相玲瓏素娥冉冉來雲表皓鶴翩翩舞林杪是時掩卷一憑欄清興滿襟應不少恍如玉壺照八忩牙籖玉軸生輝光開徑便宜同蔣詡映書更覺慕孫康一從寄迹京華地翹首山房想初志陽春桃李任紛紛徑節貞心自無異何人為君寫此圖故鄉景物渾不殊興來展玩對立久一點塵埃忩外無送修撰楊夀夫致政歸鄉蓐收司令大火流金井涼生梧葉秋玉堂詞客歎衰老振袂翩然思退休封章曉上五雲裏恩命旋頒倍欣喜香飄紫殿拜龍顔日轉西清别知已顧豫同邑又同窗少小論交情誼長一從筮仕列中禁南北迢迢天一方君從泮水歌芹藻化雨春風起枯稿烏紗白髮三十春一榻寒氊碩終老幾回受命司文衡南宫藩省推公平由兹薦剡上天闕擢任詞垣沾寵榮先皇龍馭升天後國史恭修喜承詔書成進入蓬萊宫聖德神功永垂耀褒升華秩錫瓊筵更頒獸錦宫袍鮮老成效用方自此如何拂袖翻歸田今晨酌酒送君去行色匆匆留不住自是平生泉石心不辭萬里關山路到家想值秋暮時籬邊黃菊猶芳菲親朋歡會如相問為説南還今可期題孤峯疊秀圖送太守况鍾復任東南名郡稱姑蘇土壤深厚山縈紆雲中黛色接天目天際江流瀦具區具區之中峙重屋孤峯髙瞰湖波緑獅岩虎阜相蔽虧紫翠浮光眩人目此中佳景真如畫閭閻盛世涵清化湖山處處有漁樵隴畝人人樂耕稼偉哉太守才且賢悉心撫字今幾年鉏姦擊暴植孤弱詩書比屋聲相傳有時勸農行屬縣露冕輕軒逰歷遍村童野老競歡迎甘雨和風總如碩比來政譽何洋洋喜看奏最朝明光聊賦兹圖慰離别相期事業齊龔黃送兵部侍郎徐良玉考滿復任朝廷圖治臻虞唐峩峩廊廟登俊良六卿分理各有屬大綱一舉衆目張夏官司馬掌邦政統制戎師衛民命任髙責重職匪輕德厚才良始能稱徐君筮仕當壯年皇華使節周八埏為郎粉署著勞績佐政銀臺承寵遷金閨出入久通籍瞻望天顔才咫尺惓惓夙夜竭忠誠炯炯丹心抱清白先皇擢二夏官卿幾年蒞職居南京提綱挈領百事舉往往群僚推老成朅來考績覲楓陛書最南還别知已驛路霜酣木葉丹潞水風髙翠濤起山連岱嶽神秀鍾路入徐揚風物同石城鍾阜自天設虎踞龍蟠今古雄君歸為政勵初志上副宸衷廣仁治惟將盛業繼古人終有清名照來世宋徽宗耕牛圖為黃福少保之子題春原過雨春日熙春樹連隂春草肥田家力耕貴及時手挽牛兮肩負犁草香泉美牛步遲農心汲汲應何為上恐公家賦稅虧下慮私門妻子飢吁嗟牛兮胡不知宣和之初能念兹九重燕暇親寫之驕奢一動萬事隳塞草黃沙千載悲送許編修歸省秋風蕭瑟天氣涼梧桐落葉鴻鴈翔詞林有客思故鄉雙親夀考俱在堂滿頭白髮明秋霜久矣離别各一方白雲飄飄日飛揚欲往從之道路長朝回幾度心倣徨東山岌嶪恆在望九重懇懇陳封章拜恩歸去喜莫量舉桂棹兮理蘭槳錦衣白晝生輝光到家正是籬菊芳親雖已老身尚強烏紗珠翟相焜煌撾鐘考鼓獻夀觴碩祝千嵗猶未央人生此樂應不常於乎人生此樂應不常聖恩廣大安可忘送夏仲昭主事歸省青年射䇿成名早文采風流出人表校書間雅在鑾坡染翰優遊趍鳳沼揚歷清華嵗月多九重天上沐恩波粉署初遷司考課石渠還復預編摩從容退食無塵事時寫琅玕發清思風梢雨葉倐忽成綽有湖州筆端意髙堂慈母雪盈頭定省心勞不自由上疏喜承明詔許束書便買江南舟難兄解組歸未久相見欣然復攜手綵衣雙舞夀筵前此樂人間信稀有玉峯秀色似崑丘乘興還堪載酒逰聖主恩深容暫去鄉園雖好莫淹留題御史曹習古推篷清趣圖青年攬轡臨三吳清宵舉棹經西湖西湖湖上月初出推篷對月思林逋逋仙舊宅無人住尚有寒梅千萬樹老幹槎牙屈鐵垂嫩蕊參差雪花墜暗香細逐東風來疏影橫斜照緑苔夜深寒氣沁肌骨眼前清絶無纎埃湖邊又似湘江曲傍有千竿萬竿竹密葉紛如金錯刀髙枝森若琅玕玉雲際何人吹玉笙清音倣佛鸞鳳聲此君自昔重髙節乃與梅花同結盟須臾月落東方白滿眼猶餘霜雪色道逢四明一老翁為拂生綃灑香墨筆力精妙意無窮御史氷霜節操同朝回靜坐一披玩恍在西湖湘水東送少卿沈民望歸鄉祭掃雲間自昔多才俊二陸文章著西晉君家兄弟際明時褎然並以能書進文皇在御涣綸音雙鳳翩翩入翰林東觀校書延譽盛西清應制沐恩深從此超遷登要地講殿齋廬常入侍久官庶子輔青宫新拜亞卿居棘寺四朝寵眷豈徒然染翰今踰三十年曽奉聖言方逸少還同筆諌效公權優詔初承拜雙闕先塋祭掃歸心切祖筵群餞出都門正是登髙菊花節九峯松柏秋容老到日逰觀展懷抱鄉閭士子共追陪見者爭誇錦衣好我念平生故舊情聊歌長句贈君行再三相囑來須早勉盡忠勤答聖明竹石圖為都指揮徐信題長林雨晴露山骨怪狀竒形何突兀有似煙消虎豹蹲更疑水落黿鼉出修篁落落共幾竿碧玉交映金琅玕老虬青春露骨角威鳳白日生羽翰吁嗟物情易衰朽惟此竹石能持久欲看踐履竟何如一片貞堅更相守題陳進士竹石圖往時湖郡松雪翁竹石戲墨天下妙即今亦有淡然者筆意精工頗同調數枝瀟灑自不群髙堂白晝生風雲乃知雅趣脫塵俗何可一日無此君送葉俊太守致政歸鄉浙之東兮君所居嗣先業兮宗文儒早年俊邁風骨殊渥窪颯爽千里駒一從振足登雲衢才猷卓犖罕與俱擢宰臨桂向南趍邊氓已喜疲癃蘇三考績最朝帝都髙超赤縣意自如寸心炯炯氷玉壺榮膺鶚薦分虎符出守太原民心孚絃誦之聲盈里廬桑麻遍野隂紛敷夫何未及三載餘翻然乞此衰病軀聖恩霈若雨露濡告别使我情鬱紆諒君之歸志不孤尊有酒兮架有書田可耕兮圃可蔬山可樵兮水可漁退休之適安以舒嗟君之樂兮世所無白雲為侣鷗為徒文敏集卷五
