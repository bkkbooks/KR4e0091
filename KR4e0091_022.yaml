body:
  text: 文敏集巻二十二明楊榮撰墓誌銘封榮禄大夫少保户部尚書兼武英殿大學士黄公墓誌銘宣徳六年冬十一月丙寅封榮禄大夫少保户部尚書兼武英殿大學士黄公卒於家禮部以聞上遣官諭祭詔有司治墳塋如制將以卒之明年某月某日葬于邑之大羅山與其配夫人王氏合窆其子淮述行實請銘予嘗與淮同官得拜公于南京親其丰儀聆其議論而悉其徳善銘奚可辭公諱性字思恭别號静菴世為温之永嘉人宋時有諱衮者張九成榜進士官御史檢法公八世祖也修職郎諱適道者公髙祖也元衢州明正書院山長諱南一其曾祖也松陽縣儒學教諭諱應發其祖也父諱通以淮貴公之祖若父贈官皆與公同祖妣劉妣屠配王皆贈夫人公生而秀偉少失怙鞠于祖母克砥礪于學髫年賦新竹詩出語驚人師友大竒之元季方國珍據温置官屬人莫不趨附以茍求利禄公獨晦迹不汙值嵗凶貲產盡廢公自處儉約而於奉親事先之禮益謹弗違國朝混一寰宇公之家業復振婣族閭里貧乏者皆仰給於公内弟王時中少孤公綴于籍中資遣為邑庠生升太學生督事山西馳書告公無禦寒衣公嘉其能守即緘衣遺之閩人陳興祖客于温公善之死無以為歛公捐貲完其䘮家有蔬圃里惡少侵奪之公不與較或問之公曰妄人不可以理諭也未發惡少遭横死鄉人以公為有容㑹時中得罪公家坐同籍沒入公懇告所司求先世神主遺像及祖母劉傳屬其壻珍蔵之謂人曰吾家世積善性亦不敢為惡今不宜有此及至京果得直而還先世制勑有遺失者皆得於鄉人人謂黄氏積善之報初遣子淮補鄉校弟子員至是復令入學卒業升太學登洪武丁丑進士授中書舍人公至京師訓勵切至歸復賦詩勉以忠君奉職永樂壬辰推恩封公奉政大夫右春坊大學士配為宜人洪熙改元加封今職公善談論素不甚飲酒賔朋相過必滿酌浩歌為樂喜法書名畫古器物尤好宋道學諸儒詩嘗録康節安樂窩吟置之座右時或憇息朗然髙誦作詩詞理兼至有静庵集八巻暮年重聼屏人事怡情泉石之間年逾九十鬚髪不盡白齒落更生歩履强健淮謝病歸或侍公遨遊林壑或駕扁舟徃來别墅衣冠偉然煇暎後先近世未之有也公淳實持已以澹素處尊貴以謙抑待人以寛厚鄉稱為長者疾既劇猶閲故舊贈遺詩文以自慰易簀之際手書遺言朂淮疾愈當趨朝圖報凡含歛葬祭必循古禮勿效世俗事浮屠勿蔵器玩於壙書畢伸手足以示子孫瞑目而逝聞者莫不嗟悼焉公生元至元己卯四月癸未享年九十有三王夫人孝敬儉勤相夫有道訓子有法母儀婦徳族里稱之壽八十有五先公九年卒永樂壬寅十一月十三日也子男二長濟庶出次即淮自中書舍人累官至少保户部尚書武英殿大學士為時名臣女一適王士昌先卒孫男五樂早夭棻棐采槃女三長適葉璣次適王宜嘉次在室曾孫男四旭暉珣瑜孫女一尚幼銘曰猗歟黄氏永嘉令族世徳之厚簪纓相續維公湜湜秀穎不群卓有善行夙已著聞既謙以和惟孝而敬其心休休於物無競中罹于難人為公危既直其枉公乃來歸天報徳善有偉令子早登科甲擢職禁侍勞效茂著爵位益崇褒封之命再及于公惟公父子福祉天錫簪紱光華聞望赫奕公今已矣公徳未亡懿彼夫人同穴而蔵公與夫人儀行具美存歿恩榮垂耀無已大羅巖巖靈秀所鍾子子孫孫世世其隆太宜人曽氏墓誌銘宣徳七年正月丙寅詹事府少詹事兼翰林侍讀學士王英之母太宜人曽氏以疾卒于家訃至京師朝之卿大夫咸徃弔詹事禮部尚書胡公以聞特命遣官賜祭詔有司治墳塋命英乘傳奔䘮英卜是年某月某日葬其山之原乃以其姻家進士何自學所述太宜人行實號泣請予銘太宜人諱隆曾氏世居江西之南豐後徙旴江之楓坑又由楓坑徙金谿之黄通里遂占籍焉曽大父諱文以學行著聞元至正間以崇文先生聘之不起大父諱仍鵞湖書院山長父易洪武間為金谿縣學教諭母鄭氏太宜人生而淑慧甫笄父為擇配得門弟子王修本遂歸焉克孝舅姑敬事其夫族里以賢稱既而舅姑與其夫相繼而沒太夫人年甫三十一男二女皆幼男即英也太宜人躬治䘮葬舉無違禮時家道貧乏賦役繁重有勸其鬻書籍及田園者太宜人作色曰此王氏世業以遺子孫安可自我棄之乃盡賣簪珥服飾以資用甚至躬操井臼其孤拾薪以供炊爨雖極艱苦而於奉先禮賔婣族鄰里慶弔饋問之禮罔有遺缺英少長即遣入邑庠為弟子旦夕戒其務學永樂癸未英領鄉薦明年登進士第由翰林庶吉士擢修撰陞侍講兩迎太宜人就養洪熙改元英以右春坊大學士兼翰林侍講學士得推恩封太宜人英謁告捧命書歸省抵家未久太宜人謂曰荷國厚恩當圖報稱勿以吾逗留也乃促之還朝宣徳初英請以俸之半給於鄉邑以充養及受賜金帛每寓奉之太宜人皆弗自用悉以散之内外姻戚自英仕於朝太宜人持家三十年家益饒裕而布衣蔬食始終一節紡績織紝垂老不廢嵗常以所製布寄英病革餘布尚多悉以給諸孫遂瞑目而逝生元至正戊戌六月丁亥享年七十有五女長歸徐洪次歸許鼎孫男五長曰裕宣徳丁未進士廣西道監察御史次曰祐曰考曰禎曰褍孫女一妙安曽孫男二述暹女四惟太宜人出自儒門配于士族令徳令儀偹于身著于家康寧壽考重沐恩命是宜有銘銘曰嗟哉王母天賦贒淑内助維嘉夙著雍睦中遭艱匱克成厥家訓育其子茂著才華獲際聖明寵眷日盛恩及慈闈光膺褒命壽福既崇顯榮始終我銘其徳垂耀無窮洪徵士墓誌銘三山洪徵士以宣徳癸丑二月乙未卒于家其子吏部主事英聞訃將歸卜以是年秋九月某甲奉徵士葬懷安梅亭先塋之次與其配安人林氏合窆而以其外姪孫監察御史嚴烜所具事狀詣予泣拜請銘予閱其狀知徵士之為曠逹君子也徵士諱奐字子美先世來自光州固始曾大父諱某元尤溪縣尹大父均玉建陽縣儒學教諭考均爵福州路儒學掾晚年退隱號竹軒世以文學行義為邑里所稱徵士生而聰敏性至孝年十一䘮母號泣動人其父以配早䘮棄妾媵出居北嶺左徵士獨隨養甫長值元季不振無心致用惟閉門讀書雖學無專師而書法遒美作詩有理趣每感物興懷聊自賦以適意時邀賔朋飲酒唱和以琴書為樂不問家之有無壯年尤宏放不覊見人之善則奨諭之若自己出聞人之惡則麾斥之若凂諸身親鄰事有不直者夜不安寢聞雞馳赴必别白是非而後已國朝統一寰宇思欲試用以展其所蘊而動輒不利退而嘆曰是有命焉不可幸致自是引晦若將終身暇則課諸子讀書尤愛其姪順秀慧每語其兄曰此子必亢吾宗後順登進士第入翰林讀中秘書與學士曾公子棨號二十八宿擢刑部主事陞山東按察僉事已而徵士被薦於有司懇以瞶眊辭不就人或勸之公曰吾老矣此事當付之諸郎遂遣子英入邑庠受經數戒家人勿以他事撓之曰非静無以成學也後英以禮經領鄉薦㑹試禮部第一既取進士擢禮部主事調吏部每嵗郡行鄉飲酒禮必以大賔處徵士太守不躬詣請則不行鄉人無賢愚少長莫不愛重之年逾八旬鬚髪皓白猶康健日杖屨徃復婣族家優逰以樂今年春忽遘疾不起聞者咸悼惜之公生元至正丙戌八月甲子享年八十有八配即林氏静重淑慧諳書史克勤教子先徵士十年卒子男四興垣寧英女四人馬顯余謐何興陳晶其壻也孫男五瑋瑩㻞琤珵女四人嗚呼徵士抱負才器既不得用于時然能成其子俾有禄位褒封之命將及之而遽已焉良可悲也是用序述其大槩而為之銘銘曰徳善振振孝友肫肫才足有為志弗克伸嗟哉若人韞玉潛珍銘以昭之千古不湮姜寺丞墓誌銘宣徳七年九月丁丑北京行大僕寺丞姜謨嘉謀以疾卒于官其妻子既如禮殯歛乃遣人報訃于家嘉謀之父廷振公聞之大哭頓足而嘆曰天何奪吾兒耶亟具裝來北京挈其柩歸卜以明年癸丑某月某日祔葬于邑之赤松鄉袁村坂先塋之次乃以禮部郎中陳景茂所具事狀來請銘按狀姜氏世居金華白砂鄉之長山宋時有諱天與者為都廵使國子監簿自長山徙居城中桐齊坊有登寳祐丙辰進士諱子賢者嘉謀六世祖也髙祖天瑞曽祖仁徳元海北廣東道㢘訪憲使大父公壽父銑即廷振俱隱徳弗耀母陶氏陜西按察使温之姪女有賢行以洪武戊辰八月壬戌生嘉謀幼秀慧向學年十三郡守方素易選為郡庠生僅五載應選來京送文淵閣習書初至時予愛其聰俊時復召其隨行詢及學問政事歴歴條對如響予固知其能也是後預修永樂大典益慎益勤自總裁官而下亦莫不喜之書成去歴政秋官法律一覽即通曉罪囚經問者罔有寃初擢都察院都事轉廣東道監察御史授承事郎俱著能聲既而扈從來北京聞母訃馳歸哀毁踰禮奉祖母及其父孝敬始終弗替服闋調陜西道授文林郎以溢員改湖廣武昌府推官讞議平允獄無淹滯而詞訟日簡僚屬咸推重之藩臬並稱其有幹濟才乃委其督徵各郡累年逋租所至鎮静不擾而撫輯有方徵歛如法不數月逋租悉完民之逃移者亦皆復業有因逋負鬻子女者則出已帑贖歸其父母人咸徳之尤惓惓作興學校凡殿宇齋廡弊陋者捐其貲俸勸率守令修葺之延接士大夫禮意周至與人交必敬必信且諳諸醫方恒以藥物濟人有驗尤能賑恤貧乏憐憫困窮接人待物藹然春風和氣無纎毫拂忤意由是人人愛之辛亥冬秩滿考最陞今職夙夜躬勤趨事以圖報稱兾得推恩榮其親而遽止於斯嗚呼其命也夫配汪氏繼李氏俱先卒復娶湯氏子男一曰某女一俱幼予悲廷振年老失其愛子而又䟦渉遠來挈其柩歸葬且擕諸孤詣予泣拜請銘予何忍辭是用序述其大槩而為之銘銘曰猗歟姜氏婺之顯族世徳相承益隆益篤爰及寺丞遭遇聖明渉躐仕途茂著休聲方期𢎞逺胡乃遽棄親老子幼孰不傷喟赤松之鄉先隴在焉祔葬勒銘千古其傳封翰林院編修文林郎謝以敬墓誌銘宣徳癸丑正月乙卯朔封翰林院編修文林郎謝以敬卒于家鄉人咸相謂曰以敬用子璉貴得受封與其配陳氏孺人光榮且美宜享夀禄而遽以疾終可勝惜哉兹璉聞訃將歸卜以某年某月某甲奉柩葬于郡之圓峯先塋之次匍匐涕泣奉狀來請銘予弗獲辭按狀以敬諱得原其先河南光州固始人曾祖大有隱而弗仕祖雲從博通經史為泉州路儒學正凡其弟子經指授者皆克有成所著三塲策要百餘篇行於世父立中抱負才器遭時多艱乃自泉徙漳之龍溪今為龍溪人母余氏淑慎柔嘉克勤内助以敬幼穎敏有志於學篤孝其親甫冠父歿而事母尤謹常依依不忍離左右侍起居奉甘㫖咸得其歡心母嘗有疾躬侍湯藥日夜不脱巾帶母歿哀毁成疾嵗時祀先每於正寢而病其隘乃創家廟于居室之東既成告奠儼若祖宗之來格於是神安心妥人咸羡之其為孝類若此為人襟度灑落不吝施予事所當為者莫不竭盡心力處邑里之間惇於信義不妄與人交交則必誠與少長親疎貴賤之相接莫不各當於禮有犯不校見人之善則奬勵之有惡則勸戒之人人悦服故人之子有逋負官錢者輙以所乘馬與償不論其直人有坐事繫獄者其妻擕金泣拜求觧以敬拒之曰吾惟義是視金奚用哉乃宻為規畫事竟得白其為義又如此尤篤於教子每聞書聲則喜而自得時課諸子至夜分不厭不倦晩年好静别搆一室以居自號曰聚翁生元至正丙申某月某甲至是享年七十有八子男四人長安貞次添養早卒次鼎季即璉以進士及第為翰林編修以敬所由受封者也女二適周聰學鄭陽初皆士族孫男三進祖進宗進觀嗚呼以敬克持其身享有髙年榮受封秩其福可謂偹矣是可銘也銘曰謝氏之先來自固始由泉徙漳世濟厥美以敬承之孝義是崇乃生令子以臻顯融褒命自天享此蕃祉夀雖有終名則奚已圓峯之陽先塋在兹爰祔于斯潛徳永垂封太安人樓母胡氏墓誌銘浙東世稱文獻之邦所居多名家大族若金華義烏樓氏其一也簮纓文獻之澤奕葉相承代有顯人今太安人胡氏亦名族也乃配于樓氏之子孫曰子惠者焉太安人諱住字安真大父季良仕元授官將仕郎父世舍母張氏太安人生而淑慧㓜從姆教讀孝經列女傳諸書悉領要義嘗語人曰此人道之當然女婦之所當習者也聞者莫不歎服稍長擇壻遂配于子惠既入門相夫有禮事舅姑盡孝奉宗祖盡誠處妯娌待姻族以和以敬禮賔恤下莫不各恊其宜家雖饒裕而自處儉約每聞人貧困及有䘮不能舉孤貧無所依者必語之於夫以財周給之惟恐不及夫沒持身益嚴謹理家有條序子婦是則是效罔敢少違内外交贊其賢尤諄諄然篤勵諸子讀書以文昌性穎悟令入邑庠受經既而領永樂丁酉鄉薦卒業于太學擢冬官主事洪熙改元得推恩於親贈子惠如文昌之秩太安人始受封焉宣徳五年得請歸省太安人一見喜動顔色謂之曰汝父臨終以汝屬我今克成立庶無負汝父之志矣未數月遣其還朝曰事君當敬謹厥職夙夜無懈勿以吾老眷戀則忠孝可兩盡矣文昌既還以秩滿陞屯田員外郎未閱月以薦陞郎中兾得誥進封以為親榮而太安人遽以疾卒實宣徳八年六月丁亥也生元丁酉六月庚午至是享年七十有七葬某鄉某山之原子男四人文潮文思次則文昌又次曰文成女一適陳景善孫男十一永壽永原永福永宗永衡永華永貴永堅永寧永泰永安孫女二妙齡妙貞嗚呼婦徳以孝敬勤儉相夫教子為賢太安人盡兼有之而竟以子貴膺受褒封優逰安榮享有壽考非賢徳曷克致此是宜有銘以示來世銘曰女婦之行孝敬柔懿維太安人其徳斯偹既享壽祉爰受褒封嗣續孔蕃世業益隆髙山峩峩新阡欝欝鐫石刻辭永賁𤣥室致仕訓導逯希逺墓誌銘宣徳癸丑冬十月某甲致仕訓導逯氏希逺卒于家初希逺疾作其子翰林庶吉士端聞之切切懇告歸省而弗果既而聞訃呼天號地頓哭㡬絶越旬日匍匐拜告予曰端不肖罪孽深重殃罹先人今將歸與兄善謀卜以某年某月某甲奉柩葬杭之西湖南山先塋之次惟先人之徳恐久而湮泯乃囑吾父門人四川叅議沈升為述事行請銘於先生先生幸賜之銘雖死猶不死也予憐其意乃按狀序而銘之希逺諱宏號怡菴其先女直人族屬多仕金至六世祖諱某為金駙馬歿封魯王生某不仕某生某仕元為河南行中書省左丞卒贈廣平郡公實希逺之曽祖也因家懷慶之修武左丞生子三長師顔元江浙行中書省左右司員外郎次魯曾永貞俱登元泰定天厯進士顯庸于時師顔生江浙行中書省都事元臣實希逺之父也家于杭之仁和遂為仁和人母某氏希逺幼失怙克勵志讀書奉母盡孝事兄尤謹國朝洪武初選為郡庠生從大章受書經既而上書論時政髙廟召見命賦秋柳念其年幼俾歸卒業不數載充貢太學親炙張美和錢宰諸先生益嗜學雖星厯醫卜之書亦皆渉獵嘗奉命使河南湖廣山東諸處所至有能聲嵗庚申以母老懇告得歸侍養時二兄已歿家甚貧有薦為湖郡訓導者力以母疾辭弗就惟居鄉授徒以奉母母歿哀毁踰禮經營䘮葬纎悉不茍嵗時祭祀哀泣動人自是無心仕進寄情于湖山之間以自適焉庚辰當道者薦之授海寧縣學訓導教法甚嚴諸生多造就陞蘇之呉江教諭先是呉江司教者縱弛諸生弗克成效希逺至督勵如海寧時學者方遵其教而以秩滿上京師天官以舉人弗及員遷常之武進訓導武進學者聞其至皆喜得之已而致仕歸鄉閒居優㳺切於教子端登宣徳庚戌進士第績學中秘將躋於大用凡其先後所教生徒至是亦彬彬軰出擢巍科升胄監膺顯仕者多有其人卒之日聞者莫不悼惜焉希逺生元至正癸巳十月某甲享年八十有一配呉氏淑慎儉勤子男二長曰善次即端女一慧蓮適監察御史上海陳質孫男三希逺學問明正言動不妄喜賔客而不濫交能容物而好惡不爽賦詩作文理趣兼至尤長於古選有怡菴藁村居吟紀行藁藏於家淑諸後進惇本務實不求近效蓋淳謹忠厚之士也是宜有銘銘曰孝友克敦博學有文振鐸庠校教道是尊厥徳孔昭宜衍而茂不大其榮式昌厥後封刑部主事張添祐墓誌銘宣徳癸丑十一月甲辰封承徳郎刑部主事松江張添祐卒於家其子吏部稽勲員外郎錞聞訃將歸以明年甲寅某月某甲葬某山先塋之右奉翰林修撰同郡陳詢汝同所述行實來請銘泣且告曰錞承嚴訓竊禄於朝吾父幸䝉初命褒封矣而錞今陞秩加禄列為大夫方期迎養冀得加封以躋顯榮而不能待抱痛曷窮先生幸哀而賜以銘庶幾先德君恩兩不泯也按狀添祐諱祐世居松江上海之烏溪曽大父徳山大父仲文父汝弼皆晦迹務善母沈氏有淑行添祐生有至性舉動異群兒長而務實好學甫知嚮導而失所怙弗克終業惟日孜孜砥礪厥行急於為義始終弗替故貧困者頼以賙濟危急者頼以扶持至於嫁娶愆期䘮葬弗克舉者莫不捐貲以助焉有惡少張勝安者為患鄉里奮然率衆祛之其友潘文英為凶徒焚死即擕其孤珙白發擒戮之仍撫珙長成而妻以孫女所居西近有橋曰太平嵗久頽圯將新之以便行者而術者云弗利則毅然曰吾志在濟人設有不利請自當之術者大沮而橋竟成鄉人尤服其公凡有闘争是非曲直不辨者得一言即止不復論故號曰張一句或勸之仕則曰吾固當効力但學識未充將有待於吾子也於是遣錞入邑庠受業於黄成章既而以善書應召入太學擢工部主事調刑部俱著能聲洪熙紀元封添祐如錞之職配繆氏太安人自是屏絶外累搆軒溪側扁曰野趣與賔友賦詩飲酒為樂人莫不賢之一日疾作召其子與孫諭之曰吾平生敬慎不蹈非禮凡義所當為者罔不奮力今被光榮非偶然也汝軰宜勉㫋錞歸亦以吾言諭之言訖而逝享年七十有二子男二長即錞次曰釪女二淑清適潘讓淑端在室孫男三曰浡曰泳曰沂女三曰妙賢即珙妻妙婉妙娩皆幼嗚呼善為百行之首義為制行之宜觀添祐之持身操行非所謂力善而行義者歟宜乎有子顯揚而享其夀禄也不可無銘以昭其休銘曰存沐恩光歿而有藏銘以旌之厥徳彌彰故儋州同知林文範墓誌銘閩多故家而林氏之族為最盛今儋州同知林洪文範世居莆之澄渚其一也系出唐賜紫金魚袋上柱國贈睦州刺史披之裔披九子同時為九州刺史號九牧林家後五世諱永者復遷城東前埭子孫因居焉至諱權者文範之曽祖也良玉者其祖也徳貴者其父也母周氏昆仲五人文範居三幼穎敏務學弱冠選為郡庠生事父母孝處兄弟敬嵗丙子領鄉薦以外艱居制哀毁踰節痛父不待養而事母益謹己卯將别母去京就試屬妻鄭氏善事無違庚辰擢進士授湖廣辰溪邑令是邑轄五溪諸洞猺獠雜處性俗頑獷難治文範躬勤撫字訓廸有方其人漸化乃修文廟闢學宫選其俊秀讀書習禮俾知為學之貴由是領鄉薦登胄監者嵗不乏人邑田雖廣而荒蕪者多嵗計所收不足以充租額且以郵傳役重有妨農務民多逃徙即條陳上訴詔允之蠲租額四千餘石郵傳許借力於旁邑士庶愛戴逃徙者皆復乃聚而相謂曰生我者父母活我訓我者林牧也九載滿秩民不忍舍率耆老百餘人詣闕乞留弗允遂懸其靴於邑之譙樓以寓其思永樂乙未陞滄州同知時北京建都營繕方興郡邑各委賢能以司其事而文範實董磚埴之役潔己奉公施設得宜人皆樂於趨事工不勞而集三載考績例應去職而總督其事者以其能且得人心特奏留之又一年聞母訃號慟㡬絶抵家營葬畢率族人修治先世祠宇墳塋遇嵗時節序及祖妣忌辰奉祀愈謹感愴益増訓族姓子姪以禮待婣黨賔朋以誠宣徳戊申服闋改儋州夙夜竭心贊佐撫字一如辰溪時州治朽敝謀諸僚友撤而新之㡬三載政理民安邑有巨猾積嵗漁獵以賂勢要文範欲除之而未發先為其揑詞赴憲司誣搆其罪至京偹述其枉以聞内臺察其寃即移檄械巨猾以直之因得寓其外姪户部主事王凱家遘疾踰月而卒實宣徳甲寅四月十七日也先是月十二日朝廷降勑恤刑法司録文範情節以進二十一日䝉恩例得復職而文範卒巳五日矣聞者莫不悼惜焉距生洪武己酉八月五日得年六十有六配即鄭氏南湖三先生之裔識書逹禮奉舅姑處妯娌相夫訓子咸協于道且善理家文範仕外三十餘年而無内顧之憂者皆本於婦之賢也子男四長曰橙早卒次寳次莆今為郡庠生俱鄭出季曰完側室出女一適同郡致仕教諭顧在軒之長子某孫男八瓘琬璀璟玓琨瑢瑛孫女三卒之時惟側室鄭與寳在為殯殮如儀扶柩南歸卜以某年某月某日葬于邑之文賦里石門紫㡌山之原其族弟賜進士及第翰林編修文為述行實偕寳來請銘予與文範同年登第相知最深弗可以辭乃摭拾其大槩而為之銘銘曰嗟哉林君孝友肫肫持家撫民既惠且仁始宰辰溪興學勸稼減租貸力蠻民順化繼陞華秩佐於滄州董工輸作厥事孔修儋耳之政益務豈弟巨猾騁奸㡬被誣毁既直其枉仰荷聖明雖云歿矣足慰九京惟古循良魯恭卓茂化行澤流名昭不朽君實希之徳富才優鐫石刻銘永世垂休杏隱居士彭叔敏墓誌銘宣徳八年十月戊寅杏隱居士卒於家其子建寧儒學教授勗聞訃奔歸將以某年某月某甲遵治命葬於居後之小金岡戍山辰向專遣人奉居士行實來請銘子家建寧素知勗之學行其淵源本於父祖也居士卒惜不能徃哭以慰勗之哀銘奚可辭按狀居士姓彭字叔敏杏隱其號也先世有諱玕者唐天祐間吉州刺史又有諱思永者為宋御史中丞名最顯世居廬陵山口至居士高祖少英曽祖子淳俱從信國文公起兵勤王寓永豐新陂繼遷龍潭之西遂居焉今為永豐令族祖貴徳以書經鳴世號雪崖先主父諱景忠丁元季避兵移徙于外而貲産罄竭乃學醫以資其身居士既長克承父業而醫術益精凡邑里間有疾得其療而愈者不責其報人或以衣食與之則持歸以獻其父母父歿奉母尤謹母抱瘵疾十餘年所用藥餌及所思珍饌必竭力供辦衣服澣濯坐卧扶持必躬為之始終弗替母疾危殆或云瘵疾歿後能染人必焚之可絶其患居士泣曰吾身即父母之身父母有大故雖殞身莫贖可付于烈熖之中乎寧以疾傳吾雖死無憾聞者莫不歎服而居士竟無恙母歿之日哀毁動人遇節序及祖考妣忌辰必齋沐致奠悲感不勝撫其弟文敏從弟時敏及兄仲敏之孤恩愛篤至訓育婚娶費由已出無所吝惜嘗重以金幣招延儒者曽子厚曽以南教其二子由是皆力學勗登永樂乙未進士擢南雄教授九載滿秩改建寧昂領宣徳丙午鄉薦授四川大邑教諭皆能以學行淑人聲譽甚著於是居士得以優㳺禄養老而彌健也生平温雅忠謹動止有恒言不妄發人不妄交處宗黨驩然有恩秩然有禮間有拂其性者亦怡怡然未嘗少有觸忤性頗嗜酒非節序親朋過從未嘗少醉人皆稱其長厚生元至正己亥三月丙午享年七十有五卒之日無少長賢愚咸悼惜之配同邑井源黄氏有賢行子男二即勗昂也女一適同鄉劉伯端孫男四鉉鐸釗鋭孫女六長適富平王成名次適馮恊祥餘在室曾孫男一曰珙嗚呼居士之處心制行自少至老始終弗渝身雖弗顯乃能教成二子久膺禄養夀考令終非有盛徳曷克至此是不可無銘也銘曰猗嗟居士簮纓之胄業儒通醫惠澤孔茂孝行聿彰神明是祐湜湜二子士林之秀享其安榮臻此遐壽卒藏于斯尚𢎞厥後故翰林檢討致仕陳君墓誌銘吾友陳君嗣初諱繼號怡菴先世呉興長城人諱鄴者自蜀徙南康之都昌七世祖篆宋明州通判徙星子五世咸淳鄉貢進士洽其高祖也元翰林待制仝其曾祖也祖諱徵號天倪受學臨川呉文正公得㫖歸人稱天倪先生至正間徙呉城父汝言國初濟南經歴有政績母呉氏廬江名族永樂初以貞節旌表汝言初未有子呉夜夢白衣神人授之兒遂産嗣初實洪武庚戌十一月丙戌也明年八月父卒母抱歸呉城躬紡績以訓育之嗣初既長奮志於學受詩於鄉先生酈尚徳秦師尹受易于俞立菴既而忡忡然若不足復從半軒王止仲用是學日益博時家貧甚嗣初躬事農圃以供祭養親時或讀書或援琴高歌因以耕樂自號及筋力少衰乃開門授徒學者謂其善教多從之人尤以其為文簡健有法度求者相屬由是道益尊名益重郡邑交章薦之屢以目眚母老辭不就母卒䘮葬盡禮有聞於人仁宗皇帝即位少傅廬陵楊公首以文學薦初授國子博士尋改翰林五經博士命同太常卿南郡楊公直𢎞文閣偹顧問時以為得人皇上嗣位命修先朝實録書成荷白金文綺之賜陞翰林檢討逾年以老疾乞歸明年疾作既亟命其季子完誦西銘至存吾順事沒吾寧也因接誦不已門人劉溥請問先生如何直答曰無事遂卒實宣徳九年五月六日也享年六十有五宗黨姻友門生畢至哭之皆盡哀守令而下咸徃弔哭朝之縉紳大夫士聞之莫不悼惜配金氏故郡守綗之季女初受聘綗之長壻坐法併沒官嗣初訴於朝乃得釋金素有禮教亦甘清苦事姑以孝謹聞先十二年卒子男五宗寛宏宣先卒季即完女二長適謝壙次幼孫男七傅儀仁偉佃佶俌女四卜是年九月十日葬呉縣太平鄉薦福山先塋之次所著文集四十巻藏於家其賦性純淑聰敏過人孝友篤至恒以不及事父為恨言及未嘗不流涕奉母甚謹尤善養志長姊失所天養之終身訓育其子甚至少姊早寡存恤其家曲盡恩意友人死無以為葬買棺葬之他凡婚䘮貧困與夫鰥寡孤煢之弗克振者輙賑恤之無少吝其為行大率類此完奉治命走京師謂予有疇昔之好徵銘諸墓予按其門人大理評事張益述為之銘曰繄陳之先呉興孔昌既徙于蜀復居南康瞻彼呉㑹具區之澳爰及中葉居用載卜光前振後詩禮簮纓蔚乎孫枝繼繼繩繩有華其躬孝友斯著有豁其心問學斯富既塞而通晚遭竒逄秩列𢎞文侍從九重日月清光荐被寵遇于焉退休式慰衰暮歸視其庭子孫滿前云胡不樂乃奪其年薦福之山先塋之側既藏既銘永昭令徳故翰林檢討黄君墓誌銘宣徳甲寅六月壬戌翰林檢討掌國子博士事黄君𦙍宗卒其子安將扶柩南歸以某年某月某日葬于邑里某山之原乃奉狀偕其門生建陽主簿唐誠來請銘予與𦙍宗出同年素相友善弗可辭𦙍宗諱某浙之嘉興海塩人世業儒曾祖某祖某俱隱徳弗仕父文傑洪武中為秦王府教授母顧氏𦙍宗生而秀偉幼克嚮學聰敏出於天賦孝友本於自然伯父文俊為鳯陽淮逺丞卒于官無嗣𦙍宗承父命為之後躬徃迎其柩歸葬服䘮盡禮由是著名遂舉為郡庠生嵗庚辰以易經登進士第當得顯官固辭不就乃擢福建汀州府儒學教授丁内艱服闋改河南之彰徳能以其道訓諸生諸生學成而仕者彬彬然嘗兩受聘校文闗西甄㧞精審士論歸之以績最陞北京國子博士講論有章課試有法得其開益者莫不敬服秩滿陞今職益克盡心以求報稱既歴三載例得授勑且封贈父母及妻恩命已行㑹𦙍宗卒遂寢可勝惜哉其素性簡約罕與人接公退則閉門静坐無求無營不徇不阿凡為詩文下筆立就然不求甚工取適意而已蓋類其為人焉生洪武辛亥三月戊申得年六十有四初娶張繼費子男二長即安次正嗚呼師儒之職古今所重惟𦙍宗克紹先業既不慕顯榮而安於恬淡素位而行三十餘年清慎之操始終弗替蓋其所得於已者既多而造就於人者亦不少焉是宜有銘銘曰偉哉斯人學行夙著恂恂其言煜煜其譽既登科第辭尊就卑兩教名邦舉有良規闗右大藩文衡是寄去取惟公式振士氣爰陞胄監為士子師講道談經斯文是資榮陞翰苑仍典教事恩命將及夫何不俟維邑有山體魄是棲銘以昭之潛徳永垂故翰林學士奉政大夫沈公墓誌銘公諱度字民則姓沈氏也世居松江之華亭公以儒發身累官至翰林院學士階奉政大夫宣德甲寅冬十月乙丑卒于北京之第訃聞上遣官賜祭給舟車歸其䘮詔有司營葬朝之公卿大夫士素相交者莫不悼歎弔祭之其孤藻奉柩東歸以某年某月某日葬于邑之玉屏山先塋之次乃狀公行實泣拜請予銘予與公為僚友三十餘年相知最深誼弗容辭乃誌而銘之公大父徳輝號竹庭嘗為郡史平反寃獄鄉稱長者祖妣宗氏儒家女父易元末為諮議叅軍棄官還鄉里授徒養親人稱苦節先生妣顧氏出士族公賦性敦敏言動不茍刻志讀書喜親筆札及長學問該博於書法尤精洪武中郡邑以文學薦而以家艱坐稽緩謫戍南詔岷王聞其賢延至藩邸接待甚厚時學士董公倫亦謫居南詔一見公甚相敬愛董公歸朝首薦公召還未及登用伏遇太宗皇帝入正大統詔求文學翰林編修今禮部尚書楊公𢎞濟首薦之擢翰林典籍與修太祖髙皇帝實録賜白金綵幣織金紗衣復承命書孝慈皇后傳及古今列女傳書法精妙式稱上意自是詔誥制勑及御撰詩文碑刻皆屬於公未㡬陞檢討陞修撰復陞侍講學士上嘉其清勤賜二品袍服象笏命大官日給盛饌以寵異之官其子藻為中書舍人公與其弟翰林侍讀粲扈從徃來兩京䝉被恩贈賚不可勝計仁宗皇帝登祚賜誥推恩贈其父如公職母贈宜人公請告焚黄詔賜鈔幣給驛傳仍命藻侍其行鄉里榮之皇上嗣位陞今職年七十有三屢乞致事不允逾年特命食禄不煩以事公素有痰疾至秋輙作是秋益劇遂卒享年七十有八配鍾氏先二十二年歿贈宜人繼陳氏子男二長芹先歿娶髙氏次即藻今陞大理寺副娶王氏孫男二潮有志于學早夭源娶李氏孫女三曾孫男一曰寅生嗚呼公胸次坦夷持身儉約孝友忠勤出自天性居常以不獲終養為憾言及必流涕嵗時祀事惟謹粲嘗感疾公晝夜守視調護甚至出入禁闥小心慎宻始終一誠甞侍顧問得以從容進言多見采納至於講論古今薦引士類無不精當所居構軒扁曰樂琴書處旦夕逰憇其中以自樂為號人稱自樂先生所著詩文有滇南藁隨筆録西清餘暇自樂藁若干巻藏于家公之歿宜有銘以昭于世銘曰偉哉沈宗積世長厚維公紹承厥徳益茂初起鄉邑乃罹困窮用玉於成由塞而通遂登詞垣受知列聖恩賚洊臨實公之慶惟公之慶既夀而康子肖弟賢舉荷寵光玉屏之山營兹宅兆銘以藏之千古有耀文敏集巻二十二
