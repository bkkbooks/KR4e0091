body:
  text: 文敏集巻十六明楊榮撰箴清慎堂箴清如之何清匪為人以潔吾心以持吾身慎如之何慎匪為彼以審于幾以飭于已心或不潔私欲紛拏正理日淪惟利之趨幾或不審終戾于善火始一燼燎原斯見惟利是趨憸人之歸善茍戾焉害必隨之曰清曰慎勿肆以汙日篤不忘綽有餘裕矧兹服政以涖厥官事上馭下云為百端清則無擾慎則無過匪清匪慎云何其可清或不慎亦曰徒清既清且慎式安其榮從事於斯終必如始益之以勤斯為善矣終食或間棄于前功一念以爽斯玷厥躬譬行百里九十方半惟能勉旃金石斯貫清省居箴為深州守蕭伯辰作人之一心湛然常静其動以時事至而應心茍弗清本體遂昏㝠行瞽蹈舛錯紛紜涵養之功曰惟敬爾方寸之間烱如止水惟其清矣天君泰然酧酢萬變若無事焉翼翼髙居在彼公署以兹自存政績尤著心既克清衆欲弗干事既克省民生孔安心清而虚事省而逸敬以持之永永無斁銘世直堂銘有序翰林侍讀文江周功叙名其所居之堂曰世直葢其六世伯祖伯寛仕宋直寳謨閣憤賈似道誤國嘗䟽斥其奸曽大父鰲溪山長以立元至正中修三史上書請以宋為正統而附載遼金父職方貟外郎岐鳯國朝永樂中為漢府紀善王有異謀作寳賢堂箴以諫三君子者皆言人所不敢言非直道之至其能然乎矧功叙取以名堂其善於繼述又可嘉矣為之銘曰天有直氣在人能全人有直節貴世其傳周之世直寳謨諤諤繼以鰲溪職方有作歴宋及元至我皇明勁辭正色蟬聫厥聲莫熾相奸臣强主弱炎籙既㣲孰攻其惡莫紊帝統元實承宋史館昌言時莫能用莫僣王謀窺覬儲位梁園納邪曷輔以義壯哉朱雲乞斬安昌麟經貶楚董相格王直道不容官奚不黜其黜復揚皇鑑如日文江之滸有堂潭潭喬木如雲欎與天叅我銘先猷以迪乃後永執厥心奕世有耀勤有堂銘為御醫杜彦達作所其無逸書著于篇民生在勤左氏有言嗟嗟學徒遑肆于怠資匪睿智功必百倍矧醫之道務底于精茍或不勤曷冀其成惟勤乃有遺訓攸示勿怠以荒庶繼先志毋謂途逺其難其劬不已于行千里斯逾百年幾何日月云邁尚其朂之夙夜匪懈退思齋銘為蹇少師作惟心之靈厥官則思心有所感思則從之粤稽古聖弗思而得自餘賢智必思乃獲人臣之道謇謇匪躬退思補過進思罄忠朝斯夕斯罔敢怠忽慎終如始確乎不拔公任冢宰進秩三孤位尊望隆厥思何如秉心律已思無過舉進賢退奸思存仁恕綱紀法度思所設施禮義㢘耻思所維持兆民未寜而思安業四序愆和而思調燮百職未修思以勵勤庶政未理思以解紛謀猷允諧尚思啓沃教化未洽尚思樂育夙興夜寐亹亹以思思而弗置乃有所禆庶績咸熈厥思無斁豈曰徒思恪恭乃職公之思矣百度惟貞叶賛皇謨底于太平凡公之思海内是賴輔國庇民興利去害翼翼髙齋有圖有書我作銘詩以永終譽廣勤堂銘維人之生戴天履地㕘乎其間孰弗事事凡百所事莫匪由勤勤則廣業怠則因循農勤于畝士勤于學稼穡以豐道義斯擴徳勤于積職勤于修世澤逾逺政績日優相彼昊天厥運有恒健而不息歳功乃成聖人希天純亦不已雖曰自然寜或怠止惟賢希聖惟士希賢咸克由勤乃可至焉卓哉葉宗閥閱有偉家積簡編世敦詩禮昭茲扁掲眷若書紳以承先訓以飭厥身咨爾後人周旋兢惕無怠無荒是效是則我銘厥詞堂構有輝咨爾後人式敬勿違克一齋銘為太醫院判蔣主善作惟人有生萬善咸備博而求之斯實可貴善原所在惟人攸歸約而守之乃底厥㣲大哉斯人該括無極純粹至精攸久不息匪恊奚㑹匪克曷存萬殊一本萬派一源君子之學斯實為要成始達終窮神知妙一或間之表裏交違其克有造於乎幾希卓哉恭靖致誨厥嗣俾求於博顧名思義惟此君子父命弗膺思守於約克一其承有開必先有紹斯顯輝光日宣世徳逾逺髙齋翼翼扁掲有嚴我作銘詩朝夕視瞻進修齋銘為訓導王䆅作大易有訓終日乾乾進徳修業實宜勉旃内積忠信曰惟進徳擇言篤志所以居業可上可下不驕不憂夕惕若厲終無咎尤卓彼佳士齋居是樂致知力行仰止先覺學聚問辨進徳所資寛居仁行修業在斯聖學始終惟此而已朂哉弗替永揚厥美栢臺霜月銘為御史范宗淵作鬰鬰古栢曰惟剛勁峩峩内臺㢘隅以正金風既嚴惟霜之清太空湛然惟月之明有偉柱史實居于此豸冠綉衣𢎞振風紀栢之孤直同此嵗寒臺之髙峻羣邪莫干匪霜伊清我肅其令匪月伊明我心若鏡朝斯夕斯以警以規銘之座右令譽其垂為善最樂銘為清河單慶原吉作人之一心衆理具焉本然之善實稟于天君子履之順其自然不為利撓不為慾遷行已待物弗違弗諐心廣體胖至樂斯全世人役役弗悟弗悛汨溺嗜好厥善乃捐有美君子於時實賢為善以樂東平為肩我銘座隅尚其勉旃說朱鑑士明字説朱氏之先家松江華亭洪武中以閭右起𨽻應天上元今為上元人有曰鑑字士明者春坊中允孔暘之從弟翰林侍書銓之兄而朱氏之彦也今年來京師省視其兄若弟間謁予請言申其名與字之義辭之固而請益篤因為之説曰名者已之所以自稱字則人之所以稱乎已也古之君子先其實而不浮其名急乎内而不張乎外故孜孜於省身修徳而名與字之美惡則非所計也後世士無陋名行不古若則雖以之自美而人不之予焉今鑑父命之名而賓友以士明字之可謂務治身修徳而慕乎古人者矣夫鑑鏡之别名唐太宗云以銅為鏡可以正衣冠以古為鏡可見興替以人為鏡可知得失杜子美有清鑑懸明鏡持衡留藻鑑之句則鑑之為義不越乎明而已然鑑為器本明而塵垢或昏之於是拂拭磨淬之功不能無假於人人心之體如鑑涵物之動静燭人之是非初無不明而私意或昧之故克治省察之功又不能不假於學人能致力問學日新又新去其物欲之汙俾本體之明不虧而天下之是非得失皆不能逃乎心鏡此古之君子所以致力於内而不事乎外也鑑自茲以往誠克念父兄師友所以命名立字之意専志於聖賢大學之道而不蔽於聲色貨利之誘然後此心真若鑑明灼有所見視古之君子夫豈不可及哉若徒以此隆譽於人而不思所以省身修徳以當之則非吾所知也鑑其朂焉雷鐔士鍔字説吾建雷氏當元之時杭以易經登進士第終廣東之程鄉縣令其學葢深得潔静精㣲之藴至于今為學者師其後裔亦皆能讀書為士弗墜先業吾郡稱衣冠之族雷氏葢巨擘焉有名鐔字士鍔者為程鄉令之曽孫吾女弟實歸之士鍔嘗請其字之説予諾之而未暇今年冬以事至北京復申其請乃告之曰劍者天下之利器而鐔為劒之鼻葢手握之下口旁而出者鍔則其鋒也劒雖至利然非握之以用其鋒未見其能利也人徒知劒之為利而不知其出於大鹵之金棠谿之工土以範之火以煉之水以淬之然後有以成其器雖以之斷蛟鱷剸犀兕無往而不得矣假令不出於陶鎔之妙淬礪之功則亦塊然頑鑛而已何以稱利器哉人之於學亦然故雖有美質必資於學而學之為道又須加之以切磋琢磨之力講貫討論之功孜孜矻矻然後其學底于有成以之修身則身修以之齊家則家齊推而至於邦國天下焉往而不得哉亦猶夫劒之所以為利也古者父命名而賓字之葢所以責成人之道今士諤尚當顧其名而思其義則庻幾不負父賓之意而雷氏之世澤可以無替矣士鍔其朂之童衡文安字説童氏為吾郡巨族家累豐貲而尤好禮文今其裔曰衡字文安者實予之娣壻嘗以事至京館於予間從容請曰衡雖承父師之命名之以衡而字曰文安每顧名思義未有以副其實幸一言以發之夫衡之為器所以度物輕重而使其平也凡天下事事物物必皆得其平則安茍有弗平而欲求其安不可得也文安之處心必當如衡之平以之應事無不適其宜以之待物無不得其均則吾方寸之間湛然而明泰然而舒於日用動静云為之際自無所弗安而各得其正矣然則父師之命名與字其為義亦深矣乎且夫所以命之者欲其終身體事行之以求無愧也文安惓惓能以是存之於心行之於躬而弗敢有毫髪之或悖焉則庶幾可以副其實矣且夫同律度量衡者所以一其制度也在璇璣玉衡者所以齊七政也是皆古昔聖王之世所當先務者茍制度一而七政齊則天下事物固無不安矣此固命名言外之意因併以告之使知天下國家一本而已矣文安尚將有以朂之哉王氏二子字説古者子生三月見於父父名之弱齡而學禮有成人之道始加冠於首故重其名而賓字之重其名而字之者父師有望於子弟也成人者何以其有孝弟忠信之行為人子為人弟為人臣為人少者之禮也能行四者之禮於身則可以治人矣重其名而字之也亦宜晉陵王氏二子長曰譲次曰謙讓既冠矣有待而不字以謙從予學故因謙之冠而請并字焉爰進讓于前謂之曰傳有之先之以敬讓而民不争讓者能推其有以與人之謂也能推其有與人而無敬以綱維之則將當仁而讓違道干譽而讓非美譲也君子固當譲然有對朋友而懇至詳勉者蒞人民而直言正色者勇於為義而不敢退避者凡此皆至理所在不容於不居非直内以察之則或失之於過譲矣不失其譲之實則可為美丈夫故字之曰敬夫復命其仲子謙曰子未學易乎易為卦六十四而謙居其一雖乾之大亨利正猶不免於亢况他卦乎唯謙卦六爻皆吉者以其謙而不至於亢也其為象也山在地中山有嶃岩髙大之形可仰而不可即乃卑抑而居地中其謙可知也若為物卑而在下乃其分也不可謂之謙唯有髙大之勢而不自髙故謂之謙耳聖人賛謙之辭曰天道虧盈而益謙月之上弦而就明氣漸進而就陽非益謙乎月既望而減毁氣漸盈而復消非虧盈乎仰觀懸象之化俯察氣序之變是宜守謙而受益不可居盈而招損也唯能虚以受人亦可謂美丈夫故字之曰益夫尚慎旃哉無以予言為虚辭也二子再拜曰敢不夙夜以求合先生之訓詞遂筆之以為字說贊沐駙馬像贊侯門華胄皇家懿戚秉徳謙虚小心翼翼資兼文武志樂書詩煌煌勲業光照鼎彛有峩其冠有偉其服允矣君子温其如玉蹇少師公服像賛儼其盛服垂紳正笏持志謙虚秉心惇實受知遇於四朝惟表裏之如一既從容於廟堂復叅贊於機宻允為國家之師臣卓乎百僚之表率是宜令徳顯著享福禄於攸隆保榮名於貞吉也歟少傅東里公像贊春和玉粹儼乎其貎之温氷潔霜清瑩乎其心之存贊皇猷而黼黻輔聖治以經綸文章師表於今世事業煇映於古人所謂國之柱石朝之元老而冠冕乎縉紳者也黄少保像贊垂紳正笏儼其儀容踐華歴要時其遭逢典絲綸而鋪張於盛業居輔弼而克亮於天工人之所見者位望之顯而已之自信者報國之忠此所以享夀考康寜之福辭聖明寵眷之隆而逺繼乎疏傅之髙風也歟魏尚書待漏像贊允矣君子間氣所鍾廓乎其藴温乎其容登科甲之妙選欣聖世之遭逢蚤馳聲於憲紀凜柏府之英風其遷秩外臺也益振才猷之美受任方伯也誕宣恵澤之隆載膺寵命簡在宸𠂻居秋卿之顯秩審刑罰之適中盖將勵志以超羣弼竭誠以建茂功宜乎待漏之際垂紳正笏惕然而欽敬藹然而肅雍也羅侍郎小像贊豐乎其容偉乎其器早發身於巍科遂登庸於明世優優乎詞林載筆之榮凜凜乎柏臺持憲之貴佐理冬官爰大展其材猷出使南交克逺宣夫徳意嘉績著乎闗陜乃愈久而愈隆丹心在乎闕廷雖彌老而彌勵此其所以荷賜歸之寵恩而樂乎林泉之髙致也章侍郎行樂圖賛此春官亞卿章君行樂之圖謂其身居廊廟也則興似適乎林壑之間謂其髪垂斑白也則心實存乎補報之丹擢賢科遊詞苑文章蔚然而可覩佐邦禮專使命政績偉然而莫攀榮顯其親煥恩封於鸞誥教成于子接步武於鵷班宜其事四聖而振英稱於海内行将正八座而作良弼於朝端也吳副都御史畫像贊儀觀雍容有飭厥躬肅乎其外確乎其中幸遭逢于聖世遂日躋於顯融偉蜚英而騰實儼衣繡以乘驄其始陞也具見清慎之美其再進也愈著聲譽之隆此所以重士林簡帝𠂻沐恩光於未艾而享夀祉於無窮也歟金學士畫像贊瑰傑之才宏博之學擅譽詞場馳芳館閣粲朝陽之孤鳯矯秋空之黄鶴勵氷雪之清操承雨露之恩渥爰黼黻乎宸猷乃動中夫矩矱希古人而並馳覩儀容之沃若也沈學士畫像贊其心休休其色怡怡有確素行有翼令儀優游玉署出入彤墀仕歴三朝而恩渥逾厚年踰七袠而志節弗移此所以享盛福於髙年而播芳聲於明時也歟陳祭酒待漏像賛肅其威儀端其瞻視珮玉峩冠從容盛世徳隆望重學茂才優詞林太學光振儒流仕歴四朝師尊六館對越聖明永篤忠欵周岐鳯畫像贊承家之學博采而深造用世之材有為而疏通四揚教鐸於中外藹乎育賢之盛三典文衡於閩浙允矣得士之公出佐花封也心勤而政理入副郎署也徳邵而譽隆噫其大節尤著者納誨親藩以繼先業之謇諤其髙情足尚者退休林壑而覩後嗣之顯融兹非所謂遺直之羊舌氏盛福之香山翁者耶陳仲完畫像贊詞氣雍雍狀貎顒顒其標格昂乎若瑶臺之鶴其節操挺乎若嵗寒之松始出而仕也其經術模範足以職教於泮水暨登于朝也其文學徳誼足以受知乎宸衷優游玉堂贊輔青宫若先生者可謂卓然有君子之行藹然有儒者之風也歟蔣院判畫像贊氣充而和神完而舒其進也褒衣巍冠典乎從容之職其退也葛巾野服類乎山澤之癯或壺觴之並列或琴鶴之與俱此盖通夫岐黄之學習夫孔孟之書而為世之醫而儒者歟何太守竹鶴老人小像贊有偉厥躬有煜厥容晬然其外充然其中以練逹之才際聖明之運内荐歴于正郎外出典于名郡茂實既著英聲四傳爰追跡於古人亦孰後而孰先至其所友者竹所與者鶴尤超乎其不羣而自逺於汙濁期始終之不渝顧内省之無怍則膺寵渥縻好爵至於久且邈也教授程伯昌小像贊藹然而粹者貎之清儼然而直者心之誠其宦譜出伊川分派之裔其家學得啇瞿所傳之經觀其致身也則遭逢於盛代究其歴官也則造就乎時英宜乎遷掌教事於名郡而髙年碩徳尤煥乎大振於厥聲者耶教授何源渭畫像贊維氣之和維色之愉有肅其儀冠衣儼如出嶺南之閥閱承先世之詩書才徳之純卓為一代之師表學行之懿藹然三學之宗儒郁乎菁莪時雨之化盛哉桃李春風之餘此其為當代之老成後進之軌躅而繼美於先哲之徒也歟静菴王處士彦昭畫像贊貎和而荘氣完而暢志超乎物表神遊乎清曠竒言妙㫖得賢聖之真傳深衣大帶儼儒林之氣象盖其徳邵而彌彰身老而益壯人徒見其態度雍容進退閒雅而意趣之髙尚抑孰知其操履堅確希志恬淡而得其所養也歟朝服像自贊予之生也承祖宗之餘慶予之出也際國家之太平忝登科第叨沐恩榮荷寵眷之益隆顧譾陋之奚勝揆其外固乏㳙埃之補求其中敢忘葵藿之誠盖將鞠躬盡力願效忠貞以報稱於聖明者也行樂圖自賛澹然以居怡然自適當玉署之燕閒正金鑾之退直光風霽月慕前哲之襟懐翠竹碧梧仰昔賢之標格惟意態之雍容乃斯圖之彷彿至於策勵駑鈍勤勞夙夜以感聖主之眷遇樂盛世之治平者抑豈丹青之所能窺測哉七十歲自贊荷先世積徳之厚叨列聖眷遇之隆久侍禁近兾效愚忠當齒力之既衰尚責任之愈崇自愧乎進無所補退不我從徒存心之競競而懐憂之忡忡惟古人堯舜其君民者素景仰其髙風思勉焉而不懈期一致於初終者也宋進士袁鏞小像贊徳祐忠臣咸淳進士誓憂國以忘家遂舍生而取義顧大厦之將傾非一木所能支而耻食周粟視夷齊復何愧以匹夫之勇足冠乎三軍慨合門之死實同乎一志幸天道福善之有常凜一髮千鈞以存乎袁祀繄祚𦙍顯融之莫京抑隂靈有以黙相於九地史而失書得非遺事何當時直筆乏董狐之良使再世睢陽黯罵賊之氣白日孤忠英風百禩吁睨夫世之賣友事讐忍心害理以茍活者譬之夫彘烏乎其少異也四皓子陵淵明謝安四贊紫芝煜煜商山峩峩爰居爰處其樂孔多束帛戔戔公廼一出漢本以正留侯之績炎祚中興羣賢滿朝懐哉故人寜不可招煌煌客星有光天府羊裘釣絲清風千古解印彭澤浩然賦歸三逕未荒松菊依依漉酒有巾熈然如春逸節髙風羲皇上人髙卧東山漠若無情幡然一起足慰蒼生淮淝之㨗喜折屐齒盛業榮名輝映青史伯牙張良子猷李白四贊虞皷南薫孔操猗蘭往聖既邈古調孰彈流水髙山知者能幾卓哉子期妙契斯理韓祀未復義激于中圯橋之㑹天啓其逢取履惟恭忍耻折節功成名髙千古卓絶有美山隂幽趣誰同瞻彼緑竹翛然清風乘興命輿徑造其所於焉嘯歌孰為賓主匡廬之山神秀所鍾瀑布千尺宛然飛虹偉哉謫仙銀河在目咳唾天風粲然珠玉事實萬木圖事實昔先大父達卿公天性純孝樂善好義凡先世墳墓所在必令子孫分居以供祭祀龍津大􅀈山者先塋所在公居其旁山延袤數十里其下沃壤每嵗東作公率子弟躬耕以備粢盛旦暮服勤不懈暨歛穫比它壤倍登常祀外以其贏貯之復置機舂二賃者隨意出直積數年廩庾充牣值嵗大歉鄉人乏食公欲發廩賑之恐為人所忌乃託言某山將募人種樹有能植杉木一株者償粟一斗於是貧者畢至至則飯之給粟而去亦不録其姓名粟既盡公乃閉闗晝寢忽夢老人素衣䇿杖自山而來曰汝所種樹成矣盍往觀之公異其夢然亦不以為意逾數載山木茂盛望之蔚然隂翳扶踈井然布列公乃追感前夢慨然歎曰此雖晝夜之所息雨露之所濡未必遽能均齊也豈山之神靈有助於我耶因戒子弟曰吾初非有意種樹特託此以濟貧耳其種與否亦未嘗較今暢茂若此殆非偶然汝等當遵吾言此山之木誓不售人惟作橋梁學舍寺觀神祠及貧無室廬死無棺槨者則與之有不如吾言者非賢子孫當元之季阮徳柔以左丞分省于建聞公名遣人邀致公與語大恱館之于家公旦夕為開陳禍福勸其務善徳柔益加禮敬屢強授以官不就乃令善畫者繪萬木圖装潢成巻命李宗文先生為記一時名儒皆為詩歌以榮之今鄉先生趙公光實蘇公明逺章公子玉鄭公子中皆所目擊能道公之事甚悉公既沒子孫率遵公命無敢違者榮幼聞遺訓謹識之弗忘數年以來舊木殆盡而萌蘖之生又復繁宻發榮滋長葢不可數計人咸謂公有活人之徳故斯木生意沛然而公之子孫繁衍實克似之是皆公遺澤所及榮叨沐聖明忝列侍從承恩眷之隆罔克上報追念所由實我祖宗積徳深厚所以致此瞻慕丘壠仰惟公之志氣神明彷彿如在欷歔流涕哀感何窮於是請中書舍人王孟端作萬木圖以表先志以繫予小子無窮之思謹述其事以求賢大夫士發揮之用垂不朽庶先公之徳不泯而子孫亦永有賴焉榮謹述先妣行實嗚呼榮不肖不孝罪罰深重禍延先考永棄諸孤號天呼地哀痛無所曽不數月先妣奄復遐棄悲慟摧割如何可言惟先考妣令徳賢行徴於家聞於鄉泯而不傳不孝益深先考幽堂之紀幸載名筆惟先妣墓文有待敢忍哀叙次以干於先生君子庶幾不泯先妣諱順姓劉氏考諱均助母徐氏皆閩之望族先妣生而温淑十嵗通曹氏女誡及孝經父母篤愛之十六相攸歸我先考事舅姑謹於禮祭祀必誠必敬勤於蠶織紡績之務鷄鳴而起夜分而寐雖隆寒暑不懈綜治家務皆有條理舅姑甚愛之先妣雖為次介婦而凡閨壼庶事悉受委焉舅姑有疾躬調藥食未嘗暫違舅早歿諸娣姒相繼卒先妣事姑益勤時家居子姪益衆先考以龍津舊宅狹隘乃卜居于雲際經營締構先妣實恊成之諸子日長家頗豐裕而凡衣服飲食之事猶親任之不勌性慈厚宗族鄉黨有貧乏必言於先君周濟之無依者收養之姑姪子婦孀居者厚存恤之相先君洽比鄉鄰藹如也嵗歉米貴令子弟出粟平價以糶不能糴者貸之度不能償者予之良家遇貧困鬻子女為臧獲必厚其價買之已而還其子女不索其價或無所歸則具資装為嫁娶焉平居自奉淡薄有珍羞必蔵以待賓客姑歿哀毁踰節蔬食終喪父兄俱早世姊妹亦早寡唯母獨存迎致于家終養之母卒棺歛𦵏祭咸如儀悲哀思慕終身不衰平居篤於教子榮㓜時親教讀孝經論語稍長數言於先君俾就明師學後榮既領鄉薦宗戚悉以為榮先妣未嘗色喜語榮曰顧吾兒所立何如焉将上春官又語之曰汝䝉朝廷教育不食于家十年矣汝曷可忘所自且吾觀汝祖宗積徳深厚今始發于汝汝往必食其報惟當正心操節勤勵不息庻不負朝廷作養之恩暨爾父母期望之心榮既叨職翰林又數言于先君遺書誡諭榮時受文彩上尊之賜遣人馳歸獻焉先妣進諸婦諭之曰此吾教子之效若等奈何不務此哉榮嘗謁告歸省諄諄諭之曰汝自念何克以臻今日豈非汝祖宗累徳積善之所敷遺者乎汝惟端肅劼毖以前聞人自期待用上報國家光顯爾祖寧爾父母之心家事非汝所恤也且汝來歸吾雖無離别之思而心未嘗寜汝出而事上克黽勉奉職循理而吾樂焉汝惟勉之葢自榮始入小學以來諄諄誨誡惟以進學為事自榮叨列仕版以來諄諄誨誡惟以忠君為務嗚呼遺訓具在尚忍言耶永樂戊子先考即世先妣居喪如禮而䂓置喪事井井不紊後三月榮始克聞訃奔歸既𦵏先考未幾上遣使召榮赴闕先妣雪涕親治衣服促榮行曰兒惟勉力以報國恩榮泣拜辭又嘆曰吾亦惟今與汝訣汝惟盡臣職以不負君親恩吾無憾焉榮去家甫旬先妣得疾先未有疾親製衣服又命諸子具棺歛及凡周身之具家人莫測也疾數日悉召諸子諸婦諸孫訓飭之翛然而逝永樂戊子十月二十日也嗚呼痛哉先妣生元至正甲午二月二十七日享年五十有五歸先考垂四十年閨門整肅内外恊和婦道母儀具可師法子男五長即榮次富先一年卒次恵早夭次信次貞女四長適建安吳夀次適歐寜劉溥二在室孫男六曰恭曰譲曰夀曰徳曰錫曰保女三將以是年十二月十一日甲申從先考𦵏于杭隴山之原其槩如此惟先生君子哀而賜之銘以貽諸永久云孤哀子榮泣血百拜謹述傳古樸子傳陳遜字必恭建之浦城錦江里人也自幼端重不好嬉戱既長任性質直不事矯飾人以古樸子稱之因取自號云髙祖諱辛曽祖榮祖用父希文累世有隠徳弗仕紫陽朱夫子嘗至其鄉見山花盛開下映溪水紅碧蕩漾爛若濯錦書錦江二大字刻之崖石里由是得名焉然以先賢過化之地故其人多知力學至于今弗衰古樸子少失怙母蔣氏訓育底于成立年弱冠為邑庠弟子員以書經中永樂乙酉鄉舉卒業太學其為人行堅志勤常以古人自期待不少混流俗以選同監察御史甄庸行部廣西清理案牘靈川有豪民朱普秀者以争田謀殺鄉人廖昌子賂有司得不論死謫役平樂州古樸子閲其牘疑之秉燭夜坐閲之再四聞忩外若有寃訴聲翌旦直其事竟論普秀于法人咸驚異未幾丁内艱歸哀毁骨立喪祭盡禮鄉黨以孝稱之壬辰登進士第試于大理暨兵部皆有能聲明年擢監察御史其在職彈劾糾舉無所畏忌而執法毅然無所阿徇同輩盡推譲焉嵗乙未朝廷以天下鹽塲積弊滋甚分命御史給事中按莅之古樸子蒞北京河間運司具官吏奸弊事奏之逮捕運使梅應魁以下數十人先是各塲鹽俱露積風雨漂損無幾遂教以苫葢之法由是嵗額不虧民咸徳之所治為諸道最丙申巡按陜西首劾左㕘政王晏按察使劉迪等玩法貪濁罷軟不堪悉抵罪久之復劾布政使楊恭按察副使韓春罔上虐下春恐懼懐奏誣古樸子以他事遂自經死事聞太宗皇帝知其誣置不問竟籍春家或謂其太過古樸子舉范文正公所謂一家哭何如一路哭事答之聞者歎服已亥坐累輸作房山行槖罄然無所資其友人居南京者為貨俸得銀幣若干付嘉興通判同郡陳原祐以遺之至東昌夜遇盜舟中所有嚢括殆盡原祐暨同載者俱被害獨一小僮赴水獲免黎明還舟視之惟一小箧存携以至京告予為啓視之封題皆古樸子姓字亟遣人報之則所付銀幣一無所失衆咸謂其清白神明所佑云逾年蒙恩得復其職壬寅巡按吳中上海民有濮宗文者聚亡賴子弟數十人行刼官軍不能制衆頗患之古樸子得其狀宻以計授守禦千户李凱詐令人若商賈棹舟載物而伏兵其中賊望見皆争趨之及舟舟中兵出遂皆就擒無一得免者復捕逮蘓松諸郡縣黠吏唐全等為民害者千八百人寘諸法民賴以安呼為陳掃箒以奸弊為之掃除一空也松江民顧阿虎者為豪右陳昇殺其母臠肉以飼犬阿虎訴于郡昇厚賂官吏反誣阿虎舊嘗為强冦闔室九人皆伏重法俟决古樸子亷知其寃為訊鞫盡釋之執昇父子械送京師磔于市其他平反獄訟祛除奸蠧多類此甲辰巡按北直𨽻其聲不減吳中洪熈乙已以久任膺勑命褒嘉且獲推恩贈父如其職母及妻皆為孺人今上皇帝即位以秩滿超拜雲南布政司右參政今報政來京年已五十有六間謁予曰遜生平於家寡諧遇事任情不暇顧忌禍福一聴于天人以古樸子見稱遜以為固當遂不敢辭惟先生素知遜幸為著之于篇庶得朝夕警飭以保其終焉予固樂道人之善者遂録其大槩如此賛曰世嘗謂今之人不若古豈信然哉惟能以古人之心為心斯即古之人矣今之人或有言及于古者必誚其質野且以為迂曽何足以知古道之可尚耶陳必恭性雖質直而夷考其行事表表愈偉不讓古人以古樸名世可無媿哉可無媿哉寜川周先生傳先生諱斌字質夫姓周氏閩之寧川望族也在宋有曰導者仕至金紫光禄大夫皋户部侍郎繼至寳文學士嘗從晦菴講學牧通議大夫經畧廣西先生之髙祖諱鳯知廣之髙州曽祖憲典教曲江祖應為寜化尉考昇有隠徳不仕先生端重閒雅襟度夷曠得失毁譽不置忻戚于中性嗜儉素於聲色貨利與凡非禮之事一不以經意家居孝于親友于兄弟交㳺稱其信鄉閭感其惠僮僕懐其慈雖造次紛擾之頃未嘗有疾言厲色自少務學經史百家之言靡不該貫洪武壬子以禮經領鄉薦癸丑授建郡儒學教授時兵革甫息學制粗舉先生修廢起弊嚴立教條作新士習每旦五皷升堂飭勵諸生誘引開導終日弗倦郡縣長貳非公事弗造其室與之語必皆政教大端弗及私事諸生承式問學日底于成嵗大比郡士當什之四三壬戌雲南平譔賀表稱㫖有金幣之賜庚午秋湖廣聘典文衡得士為盛辛未秩滿至京考最太祖皇帝日召至便殿承顧問以質直見重明年拜中都國子司業約度明信諸生悦服又明年召還拜齊府左長史輔翼開陳一以正道王甚加敬禮從王入覲享勞優厚既還以繼母李氏喪去官歸家哀毁骨立明年冬十一月以疾卒年六十有四配林氏有淑行子三長紹先卒次純次繕女一人洪武戊寅某月某日葬于鄉之某山其門人工部尚書鄭公賜為名其里曰國子先生里予少從先生㳺先生以予為可教日親授經條析難疑旁喻曲譬至明白而後已間語予曰子之器識可嘉宜益自勉他日之進惜予老弗及見也先生歿四十餘年門生故知日已衰少今其子繕不逺數千里而來以前郡學訓導趙友士所撰墓碑示予請言予見之愴然不覺涕下永惟舊學之恩懼無以報又奚敢以老髦辭哉是用為傳以著先生之徳之行俾後之人得以考覽焉賛曰先生學博而正行修以潔仕雖未大顯而功效實著其教授郡庠則胡安定之蘇湖也司業成均則陽城之於唐也傳相王國則董仲舒之於漢也使先生端委立於朝事業奚止於是而已哉文敏集巻十六
