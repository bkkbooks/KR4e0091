body:
  text: 文敏集卷十八明楊榮撰神道碑銘故資善大夫兵部尚書兼太子賓客張公神道碑銘宣德辛亥正月癸酉兵部尚書張公以疾卒于北京之官舍訃聞上為之嗟悼遣中官即其家賜賻鈔三萬緡親為文命禮部胡濙祭之勑工部治墳塋户部復其家是嵗某月某日其孤璘奉柩葬所居東阿之王村祔於先塋之次乃奉通政徐琦所述公行狀詣豫泣拜請銘將以刻石于墓道豫弗獲辭按狀公諱本字致中姓張氏其先世居琅琊自其髙祖景瞻徙居東阿今為東阿人曽祖欽祖誠父從善皆隱德弗仕至是以公貴祖父皆得推恩贈資善大夫兵部尚書祖母李氏母丘氏皆贈夫人公自少穎敏好學洪武中自邑庠生以明經貢禮部補太學生其才識超邁長於應變始仕為江都令卓卓有治聲百姓愛之太宗皇帝靖難兵次揚州率耆老詣軍門謁見遂升揚州府知府繼升江西參政其在職備悉民艱不憚繁勞夙夜孜孜以祛除積弊剗剔奸蠧為務民甚安之未幾召為工部左侍郎以事謫交址雖間關萬里觸犯瘴癘處之怡然未嘗有戚戚之色方是時仁宗皇帝居儲副素知公名奏召還以為刑部右侍郎其治獄平恕而於奸慝必窮核弗少貸然皆出于至公輿論歸焉洪熙改元之初進秩兵部尚書兼掌都察院事無何召至北京留行在兵部今上皇帝嗣位以公克任大事益見親信凡軍政之闕失廢墜者力舉行之井然皆有條緒於是䝉恩降勑褒奬命兼太子賔客有白金文綺鞍馬之賜且以户部政務隳圮命公兼領之既蒞事鋭然以為己任除弊建利經慮百方必至當而後行而遽至大故惜哉享年六十有五卒之日公卿大夫奔走相吊者騶呼相屬於路配王氏封夫人子男二人璘環女二人盧春祁慶其壻也孫男三繼祖繼宗如意保公賦性剛直居官亷介凡事以身任之是是非非不為茍且不事阿徇其論議侃侃有古大臣之風是宜為銘蓋昭公之遺德於弗朽且以示其後之人焉銘曰猗歟張公易直而通始宰江都乘時奮庸繼參藩政旬宣是職入佐司空在位正直南交召還式副憲部體上欽恤用法平恕既任司馬兼掌地官兵政聿修國賦用完凡厥猷為竭心殫慮羣言或殊公毅弗顧從容廟堂正笏垂紳執德秉義如古大臣天胡弗仁奪公何速吊者雲赴巷悲路哭賜賻暨祭治其墓墳仍復其家澤施子孫東阿之原鬱鬱窀穸公藏在茲過者必式故資善大夫兵部尚書許公神道碑銘汴之許州即古之潁川郡其士風端慤尚志節由是出者莫不著名於世若今之大司馬許公其一焉公諱廓字文超姓許氏世居許之襄城曽大父居敬大父守誠父忠信皆隱德弗仕母王氏公生而岐嶷賦性惇厚齠齔之年即知務學其父遣入邑庠受經遂領洪武已卯河南鄉薦明年試禮部弗偶入太學永樂丙戌擢錦衣衛經歷未幾超授工科給事中復升鴻臚寺左寺丞皆能舉其職嵗壬辰拜工部右侍郎時職務叢脞公悉心殫慮以佐其長凡可惠工而利國者皆奏行之事多就緒輿論歸焉甲午太宗皇帝親率將士往征北敵命公督運糧餉隨軍往返六閲月而士馬給足人無暴擾乙未將營建北京命公提督神木厰事工繁而役重公益持謹慎始終弗渝巳亥以交址人户田賦未有定規命公往理之公至察人心事宜與總戎豐城侯李彬掌交址布政司事尚書黃福等議其可否遂還朝條奏其利害數事上皆嘉納之仁宗皇帝即位念公勤勞中外政績有稱遷工部左侍郎授正議大夫資治尹賜誥命推恩贈其父祖皆如公官祖妣閻氏母王氏皆為淑人皇上嗣位知公惇實可任益隆眷待宣德庚戌秋河南民饑流離者衆上以公大臣素為鄉邦所重命往撫輯之至則旌亷黜貪勸善懲惡㮄示有司弗得復有科擾禁豪右毋索取私錢凡夫匠雜役及諸採辦與積逋稅糧諸物悉奏免焉於是民皆趨走復業戴公若父母還朝上慰勞甚至辛亥春正月降勑奬諭升公為行在兵部尚書復賜誥命授資善大夫并加贈厥祖若父皆尚書祖妣及母皆夫人公荷國厚恩方夙夜經慮以圖報而遽以疾聞皇上賜藥命醫視療竟不能起實宣德壬子六月十二日距生洪武丁巳三月辛巳得年五十有六訃聞上深悼惜遣官賜祭命有司治墳塋給舟車歸其喪公卿大夫皆走哭吊致奠祭焉配王氏封夫人子男四長曰麟獸早卒王氏出也次繼廣繼文繼武側室張氏陳氏劉氏出也女三長適盛全次適蔚善次適建平伯髙逺亦皆王氏出也卜以某年某月某日葬公于其鄉首山之陽其宗姪國子生昌率其幼子奉監察御史羅亨信所狀事行詣豫請銘豫昔與公有同官之好弗可辭惟公姿貌豐偉襟度夷曠具寬厚之德有通敏之才歷事三聖荐沐寵恩詳慎縝密不驕不矜凡受委任靡不竭盡心力是以官無廢事民庶樂康蓋卓然有大臣之風是以樹碑墓道以垂不朽豫既為次序之而復系以詩曰猗歟許公中土之英少克務學遭世太平發跡戎幕尋陟機要復升鴻臚益臻榮耀二卿之任佐理式勤益國利民譽日以振督運糧餉從征殘虜將士給足歡聲載路于彼南交版賦未清具陳可否深協聖情仁皇嗣位益隆眷顧錫命推恩光昭宗祖聖皇繼統篤任弗渝命撫河南民用昭蘇逮進司馬璽書奬諭機務孔繁實深倚注惟公砥礪理國如家經慮多方茂著才華尚未耋期遽爾遐棄帝用嗟悼賜葬及祭恩命載臨哀榮始終勒石墓道垂耀無窮故資善大夫都察院右都御史熊公神道碑銘國朝統一天下稽古為治既命六卿分掌庶務復設臺憲之臣以振風紀法制精密蔑以加矣然居是職者非才識通敏亷正詳慎不足以當之若都察院右都御史熊公始克當其任焉公諱槩字元節自幼聰慧務學其父授以春秋業大進領永樂戊子鄉薦辛卯㑹試登進士第擢監察御史容貌豐偉仁宗在東宫時器愛之命署刑部事未幾被薦拜廣西按察使調廣東俱著能聲今皇帝嗣位召拜大理卿命治水于蘇松經畫得宜民不知勞而水患息所至輒勸率郡縣修葺學舍督勵師生講習新胡安定范文正魏了翁三陸祠復文正了翁義田墳地禮諸賢之後聲譽赫然時吳浙諸郡軍民有豪橫者繼承命撫視威風凜凜察其素為民蠧者數十人械至京師置于法扶植寡弱俱令得所於是奸頑斂迹閭里獲安間有誣訴公贓弊者上不之聽益隆信任特降勑奬勵有潔己奉公為國為民之語逮還特升今職命蒞南京公益勤慎務辨誣理枉既而母歿哀毁過情奉命歸葬即起復視事宣德癸丑北京都御史顧公感疾上命驛召公來任其事至則一循舊規用法益平恕凡有所陳上皆容納是以憲紀肅然上嘗幸近郊命侯伯都督尚書同公居守益克小心祗慎今年秋車駕巡邊復令居守兼掌刑部事以勞感疾逾數日上還朝公猶勉强進見退而疾劇語家人曰吾其殆乎越六日上賜諸大臣鹿臘及內醖公獨拜受於家曰臣愧無以為報明日遂不起實宣德九年冬十月十一日也訃聞上命官賜祭給舟歸其喪為造墳塋其孤端將奉公柩歸葬于吉之山乃以左春坊左庶子兼翰林侍讀周君崇述所狀公行詣豫徴文勒石墓道豫辭不獲按狀公先世居南昌之豐城祖達夫仕元福州録事卒于官父敬芳幼弱隨其母依吉水胡氏因冒其姓遂占籍吉水敬芳既長自邑庠升為國子生有學行逮公貴始復舊姓䝉賜誥進階資善大夫得以推恩贈祖考皆如公職祖母楊氏贈夫人母郭氏封太夫人配劉氏繼璩氏皆封夫人子男五煜壬子貢士焯安端盛女五長適王德賢餘在室孫男二曰文曰昌女一曰癸貞昆仲四人甚相敬愛嘗作雍睦堂以敦友于之情詞林諸公咸美之以詩公能詩文所著有芝山藁公餘藁藏于家尤善草書凡求者輒書與之不吝其為人大率類此嗚呼公賦性淳實內剛而外和居家則孝友篤至蒞官則寬猛適宜及總憲紀益存寬厚不事苛刻至於論議施設待人接物綽有大臣之體是宜勒碑神道以昭後世銘曰猗歟熊氏肇邇南昌繼遷吉水家聲益張維公之生天資挺秀夙擢巍科才華實茂一服豸冠克振憲風用法惟平式協宸𠂻出掌藩臬益勤益慎召拜大理聲譽益振蘇松之郡洪水湯湯命公拯之夙夜不遑疏捍得宜水患用息民庶載欣利我稼穡吳浙阜殷豪猾肆强既除既治閭閻獲康有譎其徒誣公贓弊惟上聖明委任不替降勑奬諭玉音諄諄特召回朝益隆益恩命總憲臺綱紀秩秩南北二京並樹勳績公尚未耄遽爾云亡帝用嗟悼復錫寵光命官賜祭為營葬事恩榮始終人罕能儷新阡矗矗神道有碑刻兹銘詩千載永垂故榮祿大夫少師兼吏部尚書贈特進光祿大夫太師諡忠定蹇公神道碑銘天眷我皇明誕啓文明之運必篤生彌綸參贊之臣相與協恭和𠂻用臻於至治揆之西蜀蹇公槩見之矣公世家重慶之巴邑曽祖繼祖祖均夀考源斌以公貴纍贈封至榮祿大夫少師兼吏部尚書曽祖妣牟祖妣雍妣胡繼羅俱一品夫人公生而穎異首骨隆起風鑑者咸稱為國器及就學日記數百言郡守二竒之選補郡庠生學業大進尋領鄉舉登洪武乙丑進士第授中書舍人初名瑢字宜之聞繼母喪請守制太祖髙皇帝因問曰得非蹇叔之後乎公叩首不敢對帝嘉其篤實因更名曰義御書義字賜之建文時擢吏部右侍郎太宗文皇帝入正大統轉左侍郎尋升尚書永樂甲申兼詹事府詹事戊子命兼輔皇太孫巳丑大駕巡幸北京留輔皇太子監國適秩滿九載賜璽書宴勞之公為宫僚長皇太子禮遇尤厚少有疾輒遣人慰問嘗以公所居頗隘特命有司增建㕔事每遇節日必賜宴飲賦詩寵異之已亥聞父喪上及皇太子皆遣祭復賜教寬慰賻以白金襄事畢即命起復辛丑皇太子赴北京留公輔導皇太孫尋侍從至北京奉命巡撫畿內明年還京甲辰秋仁宗昭皇帝踐祚升榮祿大夫少保兼吏部尚書食二俸踰月升少傅兼官如故賜冠服象笏玉帶尋升少師嘗賜繩愆糾繆銀章俾其有所匡正則封進之復賜銀印一文曰蹇忠貞印并璽書備言公忠勤之實以示褒崇宣宗皇帝嗣統命監修兩朝實録宣德紀元扈駕征武定州賜人口寶帶金銀文綺丁未扈從巡邊還上以公春秋既髙且師保職惟寅亮詔輟公吏部之務庚戌春兩朝實録成賜鞍馬白金文綺時先朝舊臣惟公為首上深眷顧之嘗賜銀圖書文曰忠厚寬𢎞賜甲第于文明門之西北落成之日復賜宴器鈔幣凡節日遣中官宴賜于家秩滿賜宴禮部降詔褒諭及公誕辰賜廏馬鈔幣今皇帝即位賜賚特厚公舊有心疾至是復作上屢遣中官及太醫院名醫往視之復賜羊酒及鈔以慰勉之明日疾劇公泣謂太監范安曰義起自布衣荷列聖擢用無所補報今皇帝新承大統又不獲效忠沒有遺恨第自今願率由太祖皇帝舊章庶幾天下生民受福復諭諸子孫和順孝敬恪遵法度遂卒實乙卯正月丁亥也訃聞上為悼念命有司治喪葬贈特進光祿大夫太師尚書如舊諡忠定官其長子英尚寶司丞屬以國有大事停祭百日後命禮部尚書胡濙諭祭之給舟車歸其喪公生元至正癸卯十二月乙卯至是享年七十有三配劉氏加贈至一品夫人繼張氏封一品夫人側室孔氏子男四長即英次芳藝荃女二適馬俊李誠英芳二女皆劉出藝孔出荃張出洪熙時授尚寶司丞早卒孫男四霖震霑露孫女一英奉柩將以某年某月某日祔葬鄉之先塋乃列附三代并公歷履之詳徴豫銘其墓道之碑惟公稟含𢎞和厚之資出當重熙纍洽之運逮事列聖荐膺重託獻納匡翼功在國家天錫之夀褒然為時元老蓋蜀之山川清淑之氣鍾之哲人者自尹吉甫佐周宣致中興之盛曠世鮮有其儔若公之遭際事業聞望足以繼休聲於千載之下於乎盛哉豫與公相知既久故於英之請不辭謹托其概俾勒之石用垂不朽銘曰天眷國家篤生才賢光輔至治夫豈偶然維公之生實鍾間氣時焉斯出遭遇盛世起自巍科寓跡鳯池擢二天官銓衡攸司紀元永樂為天官卿繼兼宫僚荐荷寵榮洪熙更化倚注尤厚進秩三孤厥績斯茂逮及宣德寵優舊臣不煩以政左右日親嘉謀嘉猷夙夕入告務底禆益孰曰言耄玉帶廄馬白金綵幣寵賚自天惟德之惠祗承聖皇嗣位之初惟恪惟勤一致是圖惟公在廷五十餘年恩榮始終孰與比肩蜀山蒼蒼川流洋洋公所存者山川之光故榮祿大夫太子太保兼禮部尚書吕公神道碑銘國家當文明熙洽之運海內乂安四方無事則必有英偉魁傑之臣協心輔治以底垂拱無為之化誠非偶然也故榮祿大夫太子太保兼禮部尚書吕公蓋其人焉公諱震字克聲陜西臨潼人曽祖仲良祖敬甫父子節以公貴推恩贈官皆如公之秩曽祖妣蔚氏祖妣張氏皆贈夫人妣盍氏封太夫人公生至正乙巳某月某日自幼穎悟日誦萬言輒記憶終身不忘里中稱為神童年十五選補縣學生二十以明經領鄉薦入太學益以聰敏聞方是時朝廷欲稽郡邑壤地之廣狹貢賦之多寡命有司具圖以進使賦役適均姦弊無隱公承檄往兩浙督之民不勞而事集既還京師遂拜山西按察司僉事繼入為户部主事尋復出為北平按察司僉事所歷皆有治聲太宗文皇帝在潜邸將舉兵靖難公知天命有在夙夜匪懈竭效勞勩內難既平召為大理少卿尋升大理卿遂拜刑部尚書皆克盡厥職繼遷禮部垂二十年凡禮樂制度郊廟祠祭燕享錫賚朝覲㑹同之事莫不參酌古今以時舉行時論稱之太夫人家居年耄每形於憂念於是得承命歸省者三皆有白金文綺之賜朝野榮之公之歸也凡兩值關中飢即命所司出粟以賑之暨還條列以聞上是之人咸以為得大臣體仁宗皇帝即位優遇隆渥恩禮有加嘗從容上言百司庶政具有成法第悉遵祖訓行之勿有所更則永世有賴仁宗嘉其誠懇降勑褒勉賜以綵幣鈔錠初命掌太常卿事未幾加太子少師尋復進太子太保仍兼禮部尚書配夫人謝氏卒朝廷遣祭給葬儀物并賜鈔米既而奉旨祀古皇帝王陵寢于關西復加厚賜俾訖事便道祀先省母恩榮之盛振古罕倫比還值今天子登極念公舊勞愈益寵信凡冊立拜封及宴勞之事一任於公而不疑可謂得行其所志矣公為人沉實寡言笑善善惡惡無所阿徇是是非非不為茍容凡有聞見莫不指陳於上以明其曲直人惟德之而無怨焉尤善薦士士之由公出者率為顯官蓋其孝弟著於鄉閭信義厚於朋友天性也宣德元年四月三日以疾卒享年六十有二上惻然悼念賜以棺槨楮幣遣官諭祭復勑有司護送其喪以歸為營葬焉子男五熊禎燾杰然熊為兵科給事中女三人薊州衛指揮劉源户部主事張鶴橫海衛指揮王貴其壻也孫男二人斆敷熊奉柩將行乃以今禮部尚書毗陵胡公源潔所述公之行來謁豫泣拜請銘惟公以頴敏之資宏博之器歷官纍朝荐躋顯融聲光振于當代事業垂於來葉榮名厚祿克保令終誠可謂盛世之賢輔矣自非負英偉魁傑之材曷克際兹寵遇哉是宜為之銘銘曰公在齓髫既悟而聰關右視公如古神童年甫弱冠蜚聲場屋遨遊辟雍學成行篤始僉外臺三晉是依入掌國賦出納允釐佐憲北平克振風軌赫赫太宗龍潜于邸公受知遇眷顧實隆逮于龍飛偉矣其逢既職士師遂升司冦再遷春官恩寵彌厚仁廟繼統篤念舊臣進秩師保益信而親恩命維新被及先代榮歸其鄉獨擅風裁今上嗣位謨協宸𠂻知無不言眷待維豐謂公顯融宜膺盛福二豎見侵竟以弗祿乘化歸盡捐世若遺公復何憾遐邇是思返葬家山妥靈窀穸銘以昭之永世無斁故資政大夫都察院右都御史王公神道碑銘國朝稽古為治用人之法惟舊是圖列聖相承率由兹道於是耆德宿望之臣揚歷中外荐躋顯要以至持衡秉鈞先後數十年榮名始終者往往有其人焉何其盛也乃宣德二年夏四月朔日都察院右都御史王公以疾卒明日上賜之棺且命禮部遣官祭之兵部給舟車歸其喪有司為治墳塋越月其孤瑾奉監察御史羅汝敬所述公之行狀詣豫泣拜請曰先公既歿將祔葬鄭之城西南先塋之次然無文刻于墓石恐遺德弗傳敢請一言以示于後庶幾永有賴焉豫與公同官于朝交久且厚誼弗可辭按狀公諱彰字文昭其先世家太原代有顯人其後散居四方皆為巨族公之髙祖諱資元至元中以明經為河南鹿邑學官因家焉曽祖良祖賜父汝能皆樂善好義居鄉有聞母郭氏元季汝能挈家避兵汾晉之間海內既平將歸其鄉過鄭樂其風土遂占籍焉公生元至正丙午九月十八日幼穎悟好學稍長有司選為州學生益自刻苦學日進洪武丁卯領河南鄉薦明年㑹試禮部弗利補太學生嘗使山東平糴以實軍儲同列納賄縱逋負者公毅然責之弗聽比還其人果得罪公遂以亷幹聞明年擢吏科給事中典封駁之任夙夜在公出納惟允歷左右給事中益慎益䖍聲譽尤著遂進都給事中未幾升刑部福建司員外郎時有豪橫往往搆訟根株連結至數嵗不能斷决有司率為所誣害公曰法貴平恕然亦豈宜寬縱以長惡哉於是正之以法而為所誣者皆得釋人咸悅服既而擢山西布政使司左參政居藩七年吏弗忍欺民懷其惠永樂初召拜禮部右侍郎階嘉議大夫時四方萬國奉玉帛重九譯以朝覲賓貢者肩背相望于京師賞賚燕享無虛日公與尚書鄭公賜同德協恭奉職惟謹明年以父喪去官哀毁踰節鄉䣊稱焉服除遷户部嘗祀華嶽過陜州之新安聞民鬻男女償逋租既還奏之詔悉蠲其租且官給楮幣以贖其所鬻之男女人皆德之永樂壬辰改都察院右副都御史論事嚴毅持法公正人不敢干以私嘗以母夫人年髙欲歸省侍而難於請適䝉恩命按河南許其過家且賜母夫人冠服仍給白金楮幣以歸為夀時人莫不歆羡嵗庚子升右都御史秩資善大夫仍按河南待諸鄉舊一如平生至於公法雖親不貸時諸郡連嵗水患民多流亡而有司復加重斂民益以困公悉奏之於是詔停不急之徴十餘事凡官吏以貪暴罷免者九百餘人招流民復業者幾五萬家發官廩以賑之賴全活者甚衆先是強賊張大聚亡命嵳峩山行劫啇賈為之不通女僧宋繼善與其徒數百人為妖言撼衆奸人李人美以左道惑人公悉捕斬之平生嫉惡甚然獄有所疑者必反覆訊鞫然後决有鄭旺者罪當辟公閲其辭疑焉命御史為辨之果得不死公性至孝以父早世事母夫人尤謹在京師所得四方珍味必遣人馳獻然後敢食嵗時薦先竟日悲哀不樂所得俸祿必分族人及濟貧乏嚴於家法訓飭子弟其有違禮度者必痛責之俟其悔悟乃已洪熙改元進資政大夫得推恩封贈其祖考皆如公官母封太夫人咸以為榮公卒之日士論嗟惜之配郝氏有賢行封夫人子男二長即瑾次瑜先卒女四長適太原衛指揮孔勝次適楊祥次適李逺幼許嫁鄒敏公為人簡靜待人以誠率下以正平居言若不出口至臨事論辨詞氣侃侃弗少置自為侍從之職荐躋顯要歷事纍朝廉介自將恪勤夙夜垂四十年毅然有古大臣之風若公者庶幾無愧於其職也歟遂為序次其平生行能之槩而系之以銘其辭曰王出太原世有聞人繼遷鹿邑閥閲嶙峋逮于髙曽家聲益振元季兵興避地汾晉幸際聖明桑梓是思爰樂鄭鄉占籍于兹公承厥後早悟而通發迹場屋逰歌辟雍列職內庭實典封駁優遊禁近荐膺顯擢既遷秋官持法惟平出佐山西藩方實寧公來自藩乃二宗伯繼贊司徒厥聲籍籍秉憲內臺風軌肅清白髮蒼顔翼然在廷弗規弗隨正色率下從容廟堂贊輔聖化惟公克忠廉謹自持惟公克孝祗奉母慈荐沐國恩膺此褒典光于三世無間幽顯公宜夀考寵眷是承云胡逝矣溘爾遺榮公則無憾世乃嗟惜邦失重臣人懷舊德蒼山峩峩為公之墳百世之下尚徴斯文故資政大夫刑部尚書趙公神道碑銘天之生才將以資於世用然必國家有以教養之於未用之先歷試之於方用之際及其練達既久而後大用之以盡其才故能建功立業進退協道足以震今而耀後焉若故資政大夫刑部尚書河南趙公蓋其人也公諱􅀈字雲翰其先為邢臺鮮于社人元季擾攘公之父携家避兵於平陽夏縣而公始生時冦出四掠公在襁褓母嘗抱匿林莽間迫於虎置公于地虎熟視而去聞者異焉世靖將歸邢臺道經于汴閲其風土而樂之因家于汴遂為汴人公自幼穎敏嗜學進退動止屹如老成既長遊學郡庠已卓然于儕輩中洪武丁卯由鄉薦補太學生嘗被命董事山東以克亷謹受襲衣楮幣之賜嵗庚午授兵部職方主事命核天下兵馬暨諸路屯戍補其缺而增所宜置公得其實且圖以進太祖皇帝以為能乙亥升武庫員外郎慎密小心尤為當道者所重戊寅升浙江右參政剸繁治劇事無凝滯時海冦出沒劫取人財公以計捕之境內獲安尋丁外艱吏民慕之如離父母太宗皇帝嗣臨大寶以公能専對命使南交至則誕宣德音恩威兼布夷長欵服既歸郤其金寶之餽太宗聞而嘉之錫賚優渥擢刑部右侍郎未幾轉工部再轉禮部受命往封西寧侯宋晟歸拜禮部尚書賜宴于華蓋殿并徹御筵饌羞遺其母以榮之戊子仁孝皇后崩逝勑公詣北京卜山陵告成膺楮幣之賜壬辰督創隆慶保安永寧諸郡治撫輯有方而新集之民悉安其業而不知勞丁酉改兵部尚書明年以內艱去己而起復専理塞外兵政疾作太宗遣中官偕名醫往視疾巳入謝復令調攝于家既康復命詣塞北訪牧地遂具順川等處以聞於是出廄馬牧之孳畜蕃息壬寅大駕北征命公督軍餉措理有方兵食充給仁宗皇帝嗣位改刑部尚書居職六年式敬由獄宣德庚戌力以疾辭宣宗皇帝矜其賢勞特賜致仕既歸汴構一室於東郊名曰石泉茅屋日與親友為歡以樂暮年正統丙辰七月十有五日以疾卒于正寢享年七十有二訃聞上遣官諭祭仍命有司塋葬公生乙巳某月某日曽祖諱某有隱德祖諱和之父諱得以公貴俱贈資政大夫刑部尚書祖母張氏母侯氏俱贈夫人配胡氏封夫人子男四長曰愚舉賢良方正授路州襄垣縣丞娶假氏次曰魯娶劉氏又其次曰鈍曰朴俱先公卒女二人長蕙卿適刑科給事中王鐸之子礪次蓀卿適兵部尚書李慶之子震孫男五人瑄琰玘琮珍孫女五人以是嵗八月二十有三日葬公于祥符南百畝岡之原愚奉都御史顧公佐所述狀來京謁豫泣拜請銘惟公儀度英偉倜儻多才善屬文喜歌詠有傖父集二卷藏于家嗚呼士君子出處進退求合乎道而巳觀公之仕于朝也攄誠效勞知無不言每有獻納多契上意雅性節儉雖貴列六卿而自奉淡泊及退居也幅巾藜杖蕭散自如不以外物經心公之進退協于道者如此是宜有銘銘曰於皇太祖建學育才士習丕變人文聿開嶷嶷趙公遭值明世肄業泮宮用成大器學優而博識敏而明列職內外式殫厥誠明明太宗惇信崇德擢任亞卿旋拜宗伯直清寅畏夙夜惟勤和厥上下治兹神人乃遷司馬克詰戎政兵食之充畜牧之盛伊誰致之實公之為中外咸曰任公其宜邦禁之司仁廟之命昭哉五刑惟恤惟敬國有六卿公歷其三僚屬具瞻泰山巖巖公仕四朝終始一節既老而休允矣明哲維公之賢生榮死安作此銘詩以永後觀故驃騎將軍左軍都督府都督僉事許公神道碑銘惟勳舊重臣任連率之職克以清慎自持公勤事國寬厚御下榮名夀考底于令終者吾於驃騎將軍左軍都督僉事許公見焉公諱亨字士通世家鳯陽定逺父得從太祖髙皇帝起淮甸以功纍遷都指揮僉事洪武丙子公以父䕃為燕山右護衛指揮僉事已卯調開平備禦巳而還京調廣武太宗文皇帝舉義靖難兵至維揚公即來見上嘉勞之遂拜都指揮僉事賜之綵幣鞍馬命守和州未幾俾蒞北平都司事撫馭有方士民安之嵗庚寅受命董治長陵經畫措理得宜人樂趨事而忘其勞上嘉其能進都指揮同知是冬調掌金吾右衛事尋仍董前役先後凡八年勞績為多丁酉進都指揮使出鎮浙江浙東南巨鎮海冦時或竊發公至擇人守屯堡時訓練冦遂屏迹居民以寧嵗調兵士漕運給京師分畨更代具立成規私不容髮以是勞逸均而餽餉及期至於繕治城郭堅利甲兵戒飭軍士毋為民擾尤悉其心故兵民相安而市井晏如也今上皇帝嗣位以公歷事纍朝克效忠勤特遣使賜以勑書白金文綺拜左軍都督僉事仍掌浙江都司事公益感上恩務殫厥職比纍陳年老乞致仕上以公耆舊且精力未衰不俞所請正統戊午六月二十有九日以疾卒於官享年七十有四訃聞上悼惜不己遣官諭祭仍勑有司治塋事今年公長子夀來京奉狀謁豫請銘其墓道之碑余聞公鎮浙二十餘年視事率以昧爽雖隆寒盛暑無間指命羣下言簡而要其能者稱奬之不置違令者罰不少貸性節儉出入布袍革帶從者數人量入為出未嘗妄費長幼衣食必均一男女婚嫁必及時臧獲過十嵗者必令異處子孫有過者必杖之雖素親厚者亦不敢為之丐免家庭之內肅如也退居常閉户端坐終日不聞謦咳之聲晚慕養生之術侍妾悉遣令他適故平生所為尤為卿士大夫所推奬先娶殷氏繼駱氏子男六人夀殷氏出也今襲杭州右衛指揮使霖復富駱氏出也貴出於側室張氏端出於陳氏女三人盧清張成蔡勝其壻也孫男三人曰永安曰俊曰佛聚嗚呼世之武辨之裔席祖父之䕃享有祿位者固多矣而能懋樹勞績躬躋顯庸以光厥先以大厥後率履不違終始無愧若公者豈可多得哉是宜銘于墓道之碑俾觀者有所考見銘曰昔在太祖龍興泗濱豪傑景從智力畢陳維時與勞公之先臣肆有顯爵以遺後人孰當其慶曰維公賢公其承之總戎于燕皇皇太宗龍潜于淵爰靖內難公時别遷義旗一麾天應人歸謁見維揚公不後時帝曰舊臣是用不遺公既見用腹心攸期清勤忠慎誓委厥躬帝命式嘉顯爵日崇出鎮浙藩德望益隆士悅民安維公之功公事五朝眷寵有加玉帶錦袍身章以華咸曰老成福夀未涯兹既逝矣疇不悼嗟赫赫偉績祖考之光悠悠慶澤嗣續之昌公具有之雖亡弗亡刻此銘詩以永厥揚故驃騎將軍左軍都督府都督僉事衛公神道碑銘自昔帝王之興必有竒偉瓌傑之士感㑹風雲應期而起相與奮勇效謀摧鋒破敵以共濟大業及其成也躋崇階享厚祿安富尊榮既有于躬而豐功茂績又足以炳耀後世垂諸無窮者夫豈偶然哉蓋天生明主將以開一代之業非有熊羆勇敢者為之股肱心膂則不能以自成光武中興漢室而有二十八將之輔唐太宗撥亂反正而有英衛輩之功君臣相遇天實定之豈人之所能為哉粵若我朝太宗文皇帝當奉天靖難之初而故驃騎將軍左軍都督府都督僉事衛公與有勞績視漢唐諸將蓋不多讓公諱青字明德世為松江華亭人曽大父貴大父某俱不仕父諱文武有勇略元季兵興𨽻戎籍暨歸聖朝屢從征伐每有功率以讓同列以是弗克有祿既老而公代役洪武丁丑授蘇州衛百户太宗皇帝舉兵南向公以敢勇遷𨽻前鋒大小十餘戰以功纍升指揮同知還守蘇州以計破走遼東兵解薊州圍受楮幣之賜既而攻濟寧獲其隊將進克東河升指揮使又以肥河小河齊眉山泗州金川門捷功命世襲前職太宗皇帝正大位升中都留守司都指揮僉事特留宿衛永樂庚寅扈駕征漠北拜輕車將軍師還命鎮山東未幾召赴行在掌神機營事尋又出備倭海上嵗庚子即墨髙密妖盜倡亂衆慮其勢盛公獨以賊衆烏合急擊之即成擒遂晝夜倍道敗之於安丘俘其黨與以獻太宗皇帝大悅以勑勞之有運謀奮勇以寡擊衆可謂真將軍之褒遂升山東都司都指揮使錫賚有加仁宗宣宗二聖臨御益隆委寄皇上嗣位以公宿勳老臣特升都督僉事賜白金綵幣嵗蝗旱公冒暑率官屬齊戒禱祈疽發髭間乃不暇顧既而病劇疏于朝懇以受國委任弗克效報為言上遣醫視疾未至二日而公卒矣實正統元年丙辰六月三日也訃聞上為之惻然遣官諭祭賻恤其家仍勑有司塋葬公生洪武丙辰十二月一日享年六十有一先配夫人沈氏繼配周氏李氏咸有賢德子男十一人頥穎𩕳預顆顔皓俯顯𩕄順頥娶趙氏顔娶何氏餘未有室女九人長閨秀適寧海衛指揮董善次閨德適寧海衛百户楊宗閨賢適靖海衛指揮國昶閨善適成山衛指揮鄭某閨慶適登州衛指揮許某閨明適登州衛指揮舍人韓福其三尚幼孫女一以是嵗十二月二十四日葬公于濟南歷城土山鵲華鄉之原夫人周氏諱智通瞿塘衛千户福之女也世家鳯陽定逺生洪武癸亥六月二十二日自歸公勤內助孝于姑善訓其子頥穎顔皓顯夫人所出也夫人居公喪哀戚成疾丁巳三月十二日卒享年五十有五至是將合葬于公之墓頥奉大理少卿沈君民望述公行實及夫人懿德之槩泣拜請銘嗚呼公為人倜儻有氣槩沈毅有謀善騎射撫士卒如子弟家居則寬衣博帶動有禮容尤孝于親嘗痛先公弗及終養奉母李氏夫人飲食湯藥必嘗而進既卒哀毁骨立語周夫人曰吾以職守義不得離爾携諸子奉吾母柩歸葬松江先公之兆是能慰吾志矣夫人受命歸葬如禮鄉邦賢之夫以公之忠孝夫人之淑德著於人者如此是皆不可以不銘銘曰烈烈衛公昔佐太宗龍興而雲虎嘯而風義旌一張天兵奮舉公時在陳克殫心膂敵旅若林披靡劻勷摧枯拉朽鋒孰敢當內難既平公有顯爵宿衛之留方面之託妖冦肆興公實殄之帝命之嘉疇曰不宜列聖任公始終一致崇階方躋奄忽捐世維公之生忠孝兩全矧兹內助允矣其賢歷城之原山水佳麗刻辭貞珉用告來裔文敏集卷十八
