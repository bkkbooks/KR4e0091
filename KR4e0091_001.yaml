body:
  text: 文敏集卷一明楊榮撰應制瑞應騶虞詩有序欽惟皇上涖阼以來天清地寧五行順序仁覆四海澤洞幽冥曩者永樂二年秋騶虞見于河南之鈞州白質黑章虎軀猊首尾長于身性則仁厚不食生物不踐生芻旻旻穆穆姿態異常臣下得之以進于朝羣臣萬姓歡呼踴躍上表稱頌以為希世之瑞今兹永樂十一年大駕巡狩北京而騶虞復見于青兖之間司獸者以獻皇上命置闕門之外臣庶聚觀莫不歡欣抃躍咸謂皇上至誠之德洞逹無間乃克臻兹臣榮謹按瑞應圖云騶虞義獸也帝王德至鳥獸澤洞幽𡨕則見然斯獸之瑞皆徒傳聞于載籍豈若今之親覩而屢見哉此蓋皇上好生之德通乎天地霈乎生靈故兹仁瑞之出以表天地之至和以彰皇上之至仁以兆聖子神孫億萬年太平之慶臣榮叨職詞林不可無詩歌以紀盛美謹拜手稽首而獻詩曰於維聖皇德被八垠神武不殺恢乎至仁恩信誕敷膏澤旁及九族雍睦萬邦寧輯蠻貊戎夷罔不來庭飛潜動植以遂以生治化重熙海宇同春雨暘時若禎祥駢臻黃犀白象集于靈囿馴雉祥麟見于郊藪景星慶雲煜煜氲氲甘露醴泉如酎如餳嘉禾瑞麥芃芃其茂赤草靈芝煜煜其秀黃河載清海不揚波靈龜表孝神人協和天地自位萬物並育瑞應之來以迓景福癸巳之嵗仲夏初吉坤祇效靈騶虞再出維此曹邑瑶光降靈義獸在野草木光榮匪兕匪虎匪熊匪貙白質黑章猊首虎軀尾長於身是曰騶虞其內仁厚其外舒舒不食生物不踐生芻神馳靈邁一日千里周旋中規其儀可喜驅之不迫撫之不驚虞人致之進獻神京士庶駿奔歡聲沸騰僉曰噫嘻徒聞往古今乃得之瑞物斯覩於維聖皇乃文乃武維武不用諸福畢聚吁嗟騶虞實為上瑞昭我皇仁以彰信義庖羲立極龍圖是呈堯舜繼作鳯凰和鳴夏符洛龜殷降𤣥鳥赤雀興周八百斯兆維兹仁獸應時而來皇繼往聖澤洞九垓孰云漢唐文禽青兕赤騠白象曷足倫擬維皇聖神異物不寶所寶維賢豐年是禱端拱無為以成至治瑞應斯蕃匪約而至皇不自聖皇仁如天光昭鴻業傳序萬年臣愧謏聞欣逢盛美作為詩歌以繼麟趾甘露詩有序皇上紹承天位統臨萬方德化洋溢庶績咸熙雨暘順序九有寧謐無有逺邇熙然泰和由是嘉祥疊臻諸福畢至皇上方勵精圖治夙夜孳孳敬戒不怠數命皇太孫率衛士演武于近郊以示安不忘危之意將以福生民奠宗社建億萬年太平之業乃永樂十年十月甲子甘露降于方山皇上復獵于武岡山之陽獲獸彌多宴饗從官如前儀臣竊惟古者天子嵗三田蓋以奉郊廟御賔客充庖厨也故春搜夏苗秋獮冬狩各以其時名雖不同而所以為田除害之義則一以是而觀誠非娛耳目心志之樂誇畋遊甲兵之盛實所以順天道協人心乃車駕所次天休震動嘉祥滋至斯乃聖德格天感應之機捷於影響是豈偶然而已哉臣聞鶡冠子曰聖人之德上及太清下及太寧中及萬靈則甘露降今兹甘露之祥駢臻疊見是皆皇上至仁之德涵煦宇內聖子神孫重熙纍洽以開太平之鴻業以流慶澤於悠久何其盛哉臣榮叨列侍從躬逢盛美歡抃不勝不可無歌詩以示後世謹拜手稽首而獻詩曰聖皇車駕出九重狩獵屢駐鍾山東龍旗黃幄照晴空羽林猛士氣如虹經丘越壑上巃嵸是時霜清十月中木葉脫落鳴天風黃金羈絡玉花驄萬騎雜遝紛紜從錦袍羽箭控雕弓戈甲照日晴光融豪鷹健鶻筋骨雄徑翮直上摩蒼穹斫豜殪兕射麋熊妖狐狡兔無遺蹤駕鵝􅒗鶬勢蹙窮墮羽灑血相橫縱歡呼得雋意氣濃乃知聖主致治隆不以既治忘武功因時順動習兵戎為苗驅害慰三農四郊自此樂年豐上天降祥福聖躬瀼瀼甘露凝柏松飴甘肪白醴酪醲珠璣駢聮綴芳藂粲粲不受杲日烘靈氛煜煜氣沖融呈祥現瑞何所鍾衮衣垂拱蓬萊宫梯航玉帛俱來同小臣叨祿愧才庸但願萬嵗歌時雍瑞應麒麟詩有序欽惟聖天子以不世出之資膺受天命主宰神人即位以來華夷效順海宇寧謐五緯不愆雨暘時若由是民安物阜和氣充溢育為禎祥先後十餘年間駢臻沓至雖古昔傳聞所未見者今皆畢集兹非神化周浹聖德感通曷克臻是乃永樂十二年秋榜葛刺國以麒麟來獻踰年麻林國復來獻今年秋阿丹國又來獻吁何其盛哉且四靈以麒麟為首王者至仁則出又云中國有聖人在位則至蓋非世之所恆有者今數嵗之中凡三至焉豈無所自而然哉實由聖天子至仁大德上合天心下被四海故川嶽效靈百神協應之所致誠國家萬萬年太平悠久之徵不惟天下臣民仰賴無窮之福抑亦聖子神孫萬萬世無窮之慶也臣榮忝職文翰屢覩嘉禎每遇祥瑞之來必有詠歌以播揚盛美况此上瑞所應非常奚可無述作以傳之於後世乎故不揣蕪陋謹為詩一篇以獻其辭曰於維聖皇受命自天仁及庶類恩周八􅓨禮義興行無有逺邇日照月臨化成俗美九夷八蠻悉妾悉臣罔敢踰越聿來獻珍鯨波洋洋望之無際島夷所居動數萬里玉音所至莫不尊親淪肌浹髓被于皇仁僉曰陋邦服此聲教海波晏然聖德之效乃梯乃航惟恐或後乃奉麒麟歸于靈囿惟兹麒麟𤣥枵育精非時不出非世不生其産應期祥光上燭五彩繽紛卿雲煜煜天無沴氣地息妖氛山川草木發秀揚芬既育既長益竒益異萬靈撝訶百神擁衛魁然其質昻然其形龍顱鳯臆肉角麕身牛尾馬蹄折旋規矩生物不傷音協律呂爰用入貢涉歷海洋祕怪屏迹蛟鱷遁藏龜龍導從鸞鳯羽翼載馳載驅遂逹京國進之􅊮墀得覲天顔重瞳屢顧百僚聳觀嵩呼雷動再拜稽首吾皇聖神永膺萬夀皇帝曰吁瑞不在兹惟慎厥德乃為禎符爾公爾卿百僚士庶恪修厥職勿滋逸豫三光昭宣五緯弗虧品物咸亨惟瑞在兹仰惟聖皇體道謙虛竒瑞屢臻抑而弗居戒慎滿盈奉天法祖度越百王卓冠千古洛龜呈夏𤣥鳥降殷赤雀興周式昭前聞維兹麒麟實天所授聖德格天永承天祐於維聖德廣大難名巍巍蕩蕩堯舜莫京恩霈八紘澤覃四裔如雲之行如雨之施天錫多福集于聖躬惟皇萬夀百祿是崇雨順風調民安國泰海晏河清萬世永賴臣拜稽首寶祚綿綿聖子神孫傳序萬年神龜詩有序欽惟皇上䖍恭仁孝一德格天自御宇以來深思太祖聖神文武欽明啓運俊德成功統天大孝髙皇帝功德兼隆而孝陵之碑未建無以垂示將來乃命儒臣紀其事實之詳繼命工伐石得于幕府山之陽其材孔良爰求厥趺于龍潭山之麓發土得石龜長尺許廣半之文𤣥蒼不假雕琢宛然若生衆工咸喜又下得貞石長袤適稱為趺董工者以龜來獻勑置于奉天門命公卿百僚咸觀之莫不稽首贊歎以為皇上至仁至孝感通于上下神祇故皇天后土用是以表著焉翌日羣臣奉表稱賀皇上率百僚躬獻孝陵以彰顯太祖神功聖德萬世無窮之休臣以菲材叨侍禁近幸逢盛事不勝欣躍謹拜手稽首為詩以獻於昭皇祖聖神文武德合乾剛功超前古肇基江左虎踞龍蟠鴻圖鞏固宗社奠安際天極地罔不臣服朝貢以時獻琛執玉卉裳椎髻接踵梯航南金大貝厥篚相望猗歟我皇紹繼大統一遵成憲天錫智勇念形羮牆永言孝思陵廟奕奕未樹穹碑聖德神功紀于史氏載勒貞珉以詔後世貞石既獲厥趺是求爰啓爰斸龍潭之丘有昂者龜若瞻若顧忽焉以呈神物斯護其傍璀璨果得巨石相趺是宜弗爽毫尺惟皇孝誠孚于神明有感斯應神祇效靈濯以溫泉瑩如紫玉陳之丹陛韞之寶櫝窿然其分間錯以文匪雕匪琢氣凝絪緼臣庶聚觀宛然天成歡呼踴躍幸覩嘉禎帝曰嘻哉匪豫之力神瑞之應皇考之德載蠲吉日獻于孝陵陳之閟宮紀之金縢昔聞神龜負書出洛夏后取則洪範是作今逢聖明文命誕敷獲此竒瑞異世同符頌聲洋溢洽乎四海福祚綿綿億千萬載瑞應麒麟詩有序祥麟昭聖德也麟為四靈之首希世之祥必有聖人在位則應時而見仰惟皇上以聰明睿智之資具聖神文武之德深仁厚澤覆育天下是以和氣薰蒸而靈物斯至兹實國家萬萬年太平之徵也臣榮生際盛時躬覩上瑞宜有詠歌以楊聖化謹拜手稽首而獻詩曰猗歟祥麟其祥曷徵維皇繼統萬邦咸寧誕敷德澤丕昭文明至和旁逹海嶽效靈曰惟盛時兆此嘉禎維麟昭昭四靈之首精孕𤣥枵世不恆有羲軒以降成康其後爰暨我皇斯乃云覯何以致之聖德之厚麟之為麟具此衆體有麕其身有牛其尾既龍其顱亦馬其趾彼獸之凡莫之與比春秋所書周詩攸美維麟之德厥具匪常懷仁之慈抱義之剛步中規圓亦協矩方生物不食生草弗傷有暢厥音協宮諧商維麟之生于彼海島和氣所鍾逢世熙皥莫髙匪天弗愛其道莫厚匪地弗愛其寶式昭皇仁如天覆幬維麟之來獻于丹陛百辟交歡同覩上瑞咸曰兹麟聖德所致天育禎祥以隆至治聖夀齊天寶祚萬世右祥麟六章章十句白雉憶昔成周時德化何昭彰萬國悉賔貢白雉來越裳至今千載下簡册尚流芳我朝際昌運至治躋虞唐列聖啓鴻業恩澤覃八荒我皇御寶厯繼統握乾綱于時民物豐和氣為禎祥白雉出西陲竒異非尋常迢迢數千里持以獻明堂肌膚瑩凝雪毛羽淨涵霜皓鶴忽避彩素鷴亦韜光禀兹金氣純上應聖德昌百辟皆欣抃拜舞簉鵷行微臣忝朝列詠歌遂成章願效封人祝聖夀同天長𤣥聖皇撫寰宇盛德致雍熙雨暘既時若民物遂蕃滋隂陽孕至和充塞溢兩儀西夏産靈黝然呈瑞姿守臣重驚異此何珍竒豈非我聖皇盛德斯致之載以雕綺籠獻之白玉墀宛若負蒼璧有如錫𤣥圭炅炅碧曈開毶毶黑雲垂初疑育𤣥圃又想咽墨池乃知造化神生此誠所宜大哉天德純感召良在兹置之靈囿間麟鳯相追隨天階同率舞實若唐虞時願言著青史萬載流光輝神應泉詩有序欽惟皇上御極以來海宇寧謐祥瑞屢臻華夏蠻夷罔不率俾四海內外皥皥熙熙薰然泰和惟朔漠遺裔倔强梗化拘戮信使冦攘邉埸皇上赫怒躬率六師往征之三月丙子駐師于凌霄峰厥地髙燥泉水歉乏是夜忽天雨雪彌布于地士馬充足莫不歡騰鼓舞以為皇上至誠格天之所致也遂踰錦水磧厯壓虜川陟金剛阜所經之處平沙曠漠鹻水悉化為甘泉丙申駐蹕于清水源地鹹水涸忽涌泉上出滔滔汨汨瑩徹清潔斯須滂洋將士環覩驚駭嗟異咸以為除滅殘寇之徵也皇上召中官汲取嘗之味甚甘美仍賜將士皆飲乃命之曰神應泉臣以菲才承恩扈從日近天顔親覩靈異莫效涓埃之報願為歌詩以頌功德於無窮謹拜手稽首以獻其詞曰猗歟我聖皇統承太祖業巍巍唐虞聖赫赫湯武烈六合皆同風蠻貊罔不從筐篚日相望熙皥樂時雍蠢兹蕞殘裔悖逆何昏嚚拘戮我信使毒痡我邉氓天皇忽震怒六師遂親征桓桓熊虎士燀熖若雷霆戈矛相照耀旌幟何鮮明神謨展雄略廟算由天成龍旗出居庸雄師抵萬全綿延錦水磧雜遝清水源跋涉極沙漠鹻苦地乏泉皇天彰聖德瑞雪何翩翩山川爭效靈甘泉涌平川味若醴餳甘清比氷壺鮮滔滔流不窮斯須即成淵將士皆歡躍汲負相後先龍顔為之喜命兹神應泉僉言協休徴渠魁當就孿微臣忝扈從載筆隨天營鞠躬覩靈異賜飲沾恩榮行看清朔漠一掃欃槍蹤神功昭萬世炳煥垂無窮元夕賜觀燈聖皇撫昌運肇基營北京駿奔來萬方小大罔不承上天錫靈貺異瑞繽紛呈維時届上元樂與臣庶并巨鼇戴神山嶻􅑖出滄溟屹然向雙闕飛翠相回縈瑞氣發華彩五色含精英凝輝燭霄漢吐耀亘天庭羣仙駕鸞鶴縹眇凌紫清簫韶合舜樂九奏鏘和鳴龍旗拂層霄鳯輦敞雲屏星毬百寶麗火樹千花明魚龍陳雜戲羅綺疊晶熒華夷總歡慶宴樂沾恩榮聖情重悅懌朝野騰歌聲微臣忝侍從何以輸忠誠願言頌帝德萬嵗樂升平白烏慈烏復慈烏姿態何瑰竒由來能反哺厥性仁且兹心既育亦既長飛息相追隨靈異匪凡匹鳴止適所宜况此鍾素質皎潔純不緇霜毛正璀璨雪羽何陸離馴狎出天性回翔動光儀昨日産京兆呈祥應明時今復來南交致身白玉墀振翮發華彩瑤臺皓同輝瑞物不易致嘉禎協昌期聖皇有至德大孝感穹祇宗廟既昭格于焉錫蕃禧經始方在兹都邑煥巍巍竒祥日駢集寶祚綿鴻基百辟總歡抃恩波洽華夷治化超前古端拱自無為願同鵲巢什萬世歌雍熙靈犀聖皇臨大寶萬國悉來庭竒獸方交獻文犀忽逺呈肉騣何磊磈獨角更崢嶸挺特應無比安馴自不驚辟寒知有異照水詫通靈長向軒墀立寧隨耒耜耕騶虞堪共處𤣥豹許肩行盛世多靈瑞長歌頌太平白鸚鵡上林風日美佳氣鬱葱葱花木競妍媚珍禽亦云充有鳥曰鸚鵡態度莫與同質稟金精秀性含火德豐聰慧復能言清音徹九重翠色變為素造化施神功霜毛既皎潔雪羽何璁瓏翺翔青瑣闥出入蓬萊宫繫以紅錦絛盛以黃金籠常時沐恩寵眷顧回重瞳素鷴不可並白鷺焉敢從飲啄既得所飛止何雍容適逢太平日昌運方興隆願言在靈囿祝夀頻呼嵩嘉禾聖皇御寶厯萬國際升平海宇既寧謐民物自生成和氣遂充溢竒祥日來呈史冊莫殫述歌頌揚歡聲及兹關陜間百榖嵗屢登嘉禾忽獻瑞數穗同一莖金稃既璀璨玉粒何晶瑩盈筐進丹陛芳氣藹天庭百辟盡瞻覩聖心乃弗矜顧此兆豐稔農事勤有徴所期雨暘順九有俱安寧微臣亦何幸侍從霑恩榮永言紀帝德萬世昭皇明獅子聖朝統六合威德被遐荒鳥獸既咸若萬物霑恩光獅子産西極雄猛非尋常鋸牙自銛利銅首何軒昻雙耳正上聳兩目耀星芒巨尾搖錦茸長毛絢金黃顧盼雄風生哮噉百獸藏及兹來闕下俯首隨鵷行帖然自馴服感此仁化彰玉階齊率舞靈囿恣翺翔仰惟聖明世物類皆蹌蹌永言樂熙皥天地同悠長題賜上尊封識小帖有跋聖皇昔御西內時萬機多暇樂雍熙傳宣廷臣近玉陛賜坐轉覺天顔怡親調異饌出金鼎八珍之味和羮糜上尊九酲出天府瓊漿玉酪甘如飴內園朱櫻新薦後粲若驪珠光陸離銀罌翠釡遞傳送闔室均得霑恩私當時感激荷榮寵銘心鏤骨無窮期黃封題識最嚴密洞庭春色何珍竒墨花如雲注霜璽龍香繞甕猶淋漓恍疑晴霞隱𤣥霧朱文小篆蟠蛟螭尚書寶此弗敢置錦箋玉軸加裝池虹光熒煌動四壁坐覺雨露添華滋摩挲此卷倍增感何幸深䝉聖主知恩波浩蕩比滄海聊寫悃幅成歌詩願公什襲同拱璧盛德榮名萬古垂永樂庚子夏四月丙辰上在西內圓殿特召都督臣薛祿尚書臣吕震臣李慶暨臣榮臣金幼孜至殿外命坐賜食其羮糜蓋出於御前調和珍異非常且復有上尊熟食酪漿櫻桃之賜厚德深恩難以云喻然所賜上尊封識皆有墨印洞庭春色四字復用朱印篆書御用二字以蓋其上思惟古昔聖帝明王解衣推食之意不是過也恩眷之隆何其至哉今臣震謹以上尊題識封號裝潢成軸以彰聖上之恩賜且欲傳之子孫以為珍玩復徴豫言榮追惟當時恩實同霑則今拜觀於此又奚容自默哉既為歌詩以昭盛美復紀其實于後以識希世之遇云元夕賜觀燈四首綵山髙接九重天珠樹銀花炫紫烟雲擁羣仙朝玉闕星垂大地簇金蓮峯巒疊翠回蓬島羅綺搖光映御筵宴樂自知同在鎬聖皇端拱萬斯年節臨三五雪初融百尺峯巒接碧空十二樓臺春浩浩九重宮闕月溶溶鳳笙龍管祥光外珠樹銀花紫霧中再拜嵩呼祈聖夀年年慶賞萬方同六鼇擁翠出蓬瀛火樹星毬綵結成萬燭光連金闕逈千花影絢玉階明雲邉鸞鶴來仙馭天上簫韶度曲聲此夕內庭逢令節小臣何幸沐恩榮和氣氤氲四海春金爐玉漏夜初分烟霞影炫浮丹闕星斗光搖動彩雲月照錦粧干隊出風飄仙樂萬家聞兩京樂事真難遇願竭丹𠂻答聖君賜見東宮謝恩天眷皇明萬世隆儲君育德在春宮祥雲曉接龍樓上佳氣晴開鶴禁中恭覩堯眉呈八彩仰瞻舜目炯重瞳微臣拜賜天恩厚補報深期竭寸𠂻元夕賜觀燈詩五首海宇升平日元宵令節時綵雲飄鳳闕瑞靄繞龍旗歌管春聲動星河夜色遲萬方同樂事千載際昌期閶闔疏魚鑰瑶空結綵樓千花攢火樹百寶燦星毬良夜承恩宴清時樂豫逰內筵稱萬夀嵗嵗奉宸旒禁苑東風暖青霄月正中魚龍干隊戲羅綺萬花叢雲嶠祥光麗星橋寶炬紅太平多樂事此夕萬方同玉漏傳清禁華燈徹夜明貝宮珠綴絡綵隊錦粧成雲霧浮香氣簫韶合樂聲願歌天保什萬嵗頌升平象緯臨天闕瑤空集萬靈雲霞紛掩映星斗疊晶熒寶地春應滿金門夜不扄千官陪宴樂拜舞在明庭隨駕幸南海子天開形勢壯都城鳯翥龍蟠拱帝京萬古山河鍾王氣九霄日月煥文明祥光掩映浮金殿瑞靄縈回繞翠旌聖主經營基業逺千秋萬嵗頌升平恭侍御逰萬嵗山四首萬嵗山翠巘巃嵸接上台黃金為殿玉為臺葳蕤寶樹含空秀縹眇煙霞照日開金露玉虹雲外聳方壺瀛島海邉來聖皇嵗嵗宸逰樂百辟森森喜得陪太液池太液池深碧似苔溶溶漾漾自西來魚翻翠藻噓輕浪鳥下青蒲絶㸃埃影浸綵舟輕蕩揚光涵星斗自縈回願將一滴天瓢㵼散作甘霖遍九垓小山瑤空湧出秀芙蓉寶樹參差近九重波泛羽觴來玉澗泉垂珠箔噴金龍四時佳氣浮丹闕八表晴嵐露碧峯喜遇太平無事日共霑雨露沐恩濃白金門曙日正瞳曨白呈祥逈不同逺帶霜華依鳯闕遙含月影出蟾宫清標好傍瑤臺上素色偏宜玉殿中自是太平多瑞應願祈聖夀效呼嵩五色鸚鵡隴西有鳥名鸚鵡文彩輝煌快先覩九苞鳴鳯真可方五色鵷鸞安足數翠羽紅襟何陸離錦膺繡臆尤瑰竒回翔自是多態度顧盼轉覺生光儀天賦美質獨含慧巧舌能言世所貴相唤相呼多好音雙雙顧影真姸媚上林日暖祥風輕啄食永得沾恩榮願效嵩呼祝聖夀日日長聞萬嵗聲元夕賜觀燈宣德三年聖皇御極海宇清民安物阜天下平九重端拱敷化理竒祥上瑞爭來呈是時佳節届元夕思與臣民共歡懌特勑張燈萬嵗山錦綵輝煌臨太液層巒復嶂髙崔嵬祥雲瑞靄相縈回懸知不借巨鼇力自是瀛島環蓬萊重重疊疊因山勢繡谷丹崖何綺麗千樹銀花炫碧空萬斛金蓮照平地星毬百寶巧粧成滉漾月華浮水晶魚龍雜遝分綵隊笙歌迭進諧新聲聖皇垂衣臨黼扆百辟趨陪瞻玉几暖風微裊御爐烟環珮鏘鏘彩雲裏仙韶九奏音韻調和鸞駐驆天香飄皇情悅豫龍顔喜萬國嵩呼祝帝堯微臣素懷葵藿志何幸遭逢盛明世但願海晏黃河清聖夀齊天萬萬嵗嘉菊內園植物真竒特一種秋花開五色瑪瑙葳蕤琥珀黃胭脂隱映鉛華白由來託根得所宜造化生成雨露滋喜見幽芳出上苑何須佳色羡東籬今晨拜舞承恩渥詔命中官送館閣穠艷偏含曉日明貞姿獨傲秋霜薄對此感激懷深恩嘗聞餐菊可延年願祈聖夀齊天地嵗嵗花開向御筵賜逰萬嵗山詩十首有序宣德三年三月庚辰上命尚書臣蹇義等十有八人同逰萬嵗山頃之中官傳㫖許乘馬及將從者二人既入東上北門乘馬及乾寧門下馬步出度橋中官導引登山周覽復賜登御舟泛太液池賜茶及素羞十餘品而凡蕩槳持楫者皆中使唱和合律既而抵新建圓殿地勢竒勝金碧照耀恍若身在蓬萊宫闕有間上乘馬至慰勞甚周臣等皆叩首稱萬嵗上大喜徘徊久之特召臣士竒臣榮諭以天下無事雖不可流于安逸而政務之暇命卿等至此以開豁心目庶幾古人逰豫之樂不在拘檢也臣士竒臣榮叩首稱謝而退傳諭羣臣方慿檻觀中官拏舟網魚復有㫖人賜御釀玉醅一甌飲復命乘馬逰小山行一里許上乘馬繼至羣臣匆促將下馬迎特㫖勿下諭中官人賜鈔三千貫從者人三錠且令中官陪至小山飲饌盡醉而歸駕遂回未半里遇池中水鳥羣飛上親發一矢中一鳥墜馬前諸臣方入小山門遙見中官持鳥至傳命賜義等炙食之羣臣望闕叩首謝遂遍逰小山觀二獅子衮毬并覩金龍噴水水簾及曲水流觴之處皆雕琢竒異布置神巧莫不稱讚良久乃退坐松柏間享酒饌皆珍竒之品中官相與勸酬甚歡酒未䦨人賜鸚鵡一將徹復賜從者酒食皆醉飽而歸及出西安門天已暝抵家更初鼓作羣臣莫不感恩懷德以為萬世之竒逢翌旦臣義等方相率詣御前稱謝而中官傳㫖免謝羣臣不勝惶恐感戴天恩之至臣榮竊以為君臣相遇自古為難昔唐太宗之世房𤣥齡輩十八人得承寵眷時以為登瀛洲至今相傳以為盛事臣榮何幸遭際聖明夙夜兢惕深以弗克報稱為愧伏蒙聖上不以臣榮不肖為嫌屢錫寵恩奬諭甚至今復得預斯列恩榮之盛無以復加敢不勉盡心力以圖報效於萬一乎因不揆蕪陋謹賦五言律詩十首以述皇上眷待臣下恩禮之隆以紀羣臣遭際之盛且使後之為臣者有所勸勉焉瓊島宸逰日隨逰切九重天恩許乘騎仙仗從飛龍迤邐雲霄近汪洋雨露濃詞臣何慶幸千載得遭逢太液春波暖承恩泛綵舟輕盈蘭棹發蕩漾玉虹流簾影移宮樹茶香出御甌此中多勝景况是從宸逰翠巘開新殿團花簇玉䦨醇醪天上賜仙境御前看浩蕩恩波濶光榮禮數寬微臣沾聖澤何幸侍金鑾奉詔隨鸞馭遨逰遍小山風光連禁籞花影覆清灣路繞金宮轉雲隨綵仗還紫騮如掣電倐已度仙關猛獸來西極低徊御苑中爪牙真猛捷毛骨獨竒雄寶樹橫金鎖珠毬結綵茸從容看率舞還想有虞風玉澗通泉脈金龍噴雪花崢嶸山骨潤滉漾水簾斜暝色凝飛雨清聲隔綵霞此中塵不到應即是仙家水鳥多馴狎偏隨綵仗飛六龍回御輦一箭落毛衣珍味同霑賜儒冠倍有輝獨慙無寸補遭遇古來稀松柏清隂滿林間列宴時玉階分御賜仙醴泛金巵翠釡駝峰異雕盤鱠縷竒恩同天地濶思報永無涯珍禽來異域分賜出雕籠禀質生尤異能言類莫同宴逰逢盛世恩眷自宸衷感激應無極懷思意不窮四海同熙皥宸逰樂太平綵雲隨御輦瑞日照霓旌賜賚何稠疊霑承感聖明永言歌帝德千載播鴻名賜逰東苑詩有序洪惟皇上恭膺天命嗣承大統宵旰孜孜以圖至治萬幾之暇每御便殿延見儒臣講論古今移時乃罷此與古先聖帝明王同一揆也何其盛哉乃宣德三年戊申秋七月十有一日召尚書臣蹇義臣夏原吉臣楊士竒臣榮同逰東苑夾路嘉植榮茂芬敷前至一殿棟宇宏壯金碧相輝其後瑤臺玉砌竒石森聳環植花卉清香素豔穠郁可愛又有方池引泉其中玉龍吐水其髙盈丈噴激下注入于石渠直透殿內兩旁石溝溝之首圓轉各有二竅並列其一水貫其中委曲縈回復流至第二竅乃入于池直通殿外石池池之中竒石屹立不假雕琢宛若升龍之狀上有四竅以通泉脈而常閉之啓其竅則水皆湧出直上盈丈與殿後石龍吐水相應池之南又有臺髙數尺森列異石植以花卉紛披掩映殿陛之前復有二石左如龍翔右如鳯舞天然竒巧宛若生成初上御殿中召臣等與語政務良久乃曰此旁復有草舍一區乃朕致齊之所非敢比古人茅茨不剪之意然庶幾不忘乎儉矣卿等可遍觀于是中官引臣等先至一小殿梁棟椽桷皆以山木為之而覆之以草四面䦨楯亦然不加斫削小大渾然林木參差蔚然可愛稍西有路紆回荆扉蔽護既入則有石甃之河南有小橋覆以草亭左右復有二草亭各枕橋而度東西去遙望宛若台星其下皆水逰魚沈浮各適其所中為小殿其後有廊以通後堂東西有齊有軒以為彈琴讀書之所悉以草覆之四圍編竹為籬籬下皆蔬茹匏瓜之類觀畢上臨河命舉網取魚連得數尾令中官具酒饌以此魚作湯賜食既而召臣等至前賜以金幣絛環玉鈎等物遂賜宴于東廡珍羞異味不可勝計復被㫖令各盡醉而歸既歸已暝恍如造蓬萊方壺之上瑶池弱水之間也何其幸哉臣仰惟皇上之德如天地之大滄海之深顧以臣之謭陋叨居禁密之地寵眷實隆曷能補報於萬一夙夜祗懼惟恐弗勝今屢䝉恩遇之厚賜觀內苑有同逰之樂相得之美以臣之愚何以臻此是用不揆蕪陋謹為五言古詩一首凡四十韻拜手稽首以獻其詩曰聖皇嗣寶厯日表龍鳯姿典章率由舊制度仰成規萬方囿神化四海樂雍熙維時屬秋序暑退生凉颸萬幾既餘閒行樂適在兹從容召儒臣內苑同逰嬉峩峩黃金殿璀璨白玉墀廊廡欎周回金碧光陸離岧嶤珊瑚石瑶草間瓊枝玉虹出西山泉脈何逶迤引流入東苑滉漾涵方池蒼龍忽蜿蜒吐水一何竒飛流濺碧空爪甲何淋漓形態本天成雕琢寧用施異石既磊落竒葩自葳蕤蓬島非可擬天宮信能移少前造幽境似與林壑期草徑自森邃蔬畦亦紛披殿宇靡華飾儉朴同茅茨伐材為曲檻編竹成疏籬小橋橫碧流短亭瞰清漪遊魚時出躍花木向朝曦致齊誠得所燕息允相宜翠華此臨幸鳯蓋簇鸞旗聖情歡未極錫宴荷恩私雕盤列珍饌內醖浮金巵既醉增感激愈覺心神怡賜賚何駢蕃交錯粲相輝金幣雜香環玉鈎繫青絲愚臣本微陋忝遭聖主知顧兹益懷懼于國何所裨經邦乏嘉猷輔理寧有為叨陪鼎鼐間詎免竊祿譏夙夜弗遑暇竭力效驅馳傾心嚮太陽如彼藿與葵海嶽髙且深㳙埃豈能資但當祝聖夀垂拱朝四夷嵗嵗悉豐稔民物益蕃滋此生亦何幸際兹堯舜時拜稽頌皇仁願繼南薰詩白鹿古稱瑞鹿真竒特千載為蒼始為白只今牝牡自天成并育小麑皆雪色斯實吾皇聖德純四方八表俱回春産兹素質表神異胚胎便覺超凡羣金精降靈天所錫百獸珍竒孰能匹貢來玉陛殊未知立近瑶臺恍難覔乃知造化之所為欲與彩鳯同來儀小臣作歌獻丹扆願續文王靈囿詩神功聖德詩有序宣德三年秋八月戊申皇上以農事之暇躬率六師巡歷邊疆嚴固守備九月辛亥師駐石門遽得邊報云北兵南侵已迫近境天威震怒即召將帥諭之曰蕞爾殘兵輒敢侵逼適朕在斯誠上天之佑助事與機㑹不即勦滅終遺後患爾等率領大軍隨後以進至關而止朕躬率鐵騎三千倍道兼行以勦平之待有敕召爾等即來臨發復召諸將示以神算且謂我軍必勝敵人必滅理勢昭然在此一舉衆皆稽首呼萬嵗而退越四日乙卯度喜峯口風日和明藹然如春士馬騰躍行將七十里間敵人與前鋒接戰上不以路之險峻河之間阻徑率鐵騎馳赴之士率協心勇氣奮發如電驅雷擊望敵疾馳若有神助遂衝賊陳手射死强冦十餘人麾左右翼禽其酋長百餘并射殺斬馘賊黨無算餘衆披靡奔潰即下令軍中搜捕山林直搗牙帳乃盡收其人口兵器馬匹牛羊輜重倒載而歸烽烟無警邉境以寧臣榮自惟一介草茅素無寸補伏蒙皇上寵任屢厪眷顧當出關勦賊之際扈從文臣武將多弗得與特命臣榮侍駕前驅日在左右時時慰勞以酒食天語丁寧誨諭諄切臣榮雖粉骨糜身何能補報及今隨侍回京夙夜思念聖恩深重不能自己矧惟皇上以神武之資英明果斷威德所及無逺弗服今兹獨以三千之衆橫行塞外剪滅強敵數萬神功聖德足以光昭祖宗震服天下巍巍乎萬世太平之功業豈特為一時之盛美而已哉遂不揆淺陋謹以耳目所聞見者立題追述當時歷履共賦七言律詩一十五首拜手稽首上獻顧不足以鋪張皇上神功聖德于萬一抑可以少紀其實以示夫後之人焉巡邉天子時巡遂出京桓桓貔虎擁邊城風雲動色隨行帳日月回光繞御營萬里戈矛橫殺氣六軍鼙鼓震天聲懸知朔漠烽烟靖願頌神功答聖明閲武聖主戎衣振武功六軍意氣總驍雄帳前戈甲飛騰處塞上風雲指顧中赫赫天威臨御扆稜稜殺氣亘晴虹枯摧朽拉應無敵四海謳歌樂嵗豐得邉報聖心慮逺飭邉陲正值農功休暇時塞外風烟朝乍警帳前羽檄夜交馳神謀誕布由先定睿算應知不少遺鐵騎驍騰真勇敢兹行破敵更無疑駕渡灤河虹橋雙架輦初過天意潛孚氣候和飛騎豈知河有石遊魚偏愛水無波微飈不動兵威肅化日才舒士氣多此去定知旋奏凱六軍行處聽鐃歌出喜峯口崔嵬絶壁勢爭雄破敵機謀出聖衷雉堞逺橫千嶂外鸞旗遙度五雲中飛騰鐵騎兼程進散漫穹廬掃地空仰荷天威清朔漠凱歌歡動六軍同踰偏嶺天邉絶嶺勢岧嶤玉削芙蓉入望遙風動鸞旗迎瑞日雲隨鳯駕度晴霄石林曉霽千峯秀塞草秋深萬馬驕此處登髙成壯覽華夷共仰聖明朝度萬塔黃崖怪石巉岩聳碧空浮圗髙出勢穹窿邉城百草經霜白御帳千旗絢日紅天氣喜逢晴不雨曙光偏覺靜無風侍臣幾度承恩厚顧問時時到幄中度駱駝嶺山勢巃嵸類駱駝危峯嶮峻少平坡上浮暝靄侵層漢下俯寒流近小河佳氣葱葱隨御帳兵威赫赫擁天戈宸謀指日殱殘寇佇聽旋師奏凱歌次㑹州樓堞連雲地勢平昔年曽此築髙城平蕪渺渺當時路古木蒼蒼舊日營笳鼓聲中涼吹發旌旗影裡夕陽明殘兵假息應無地一掃欃槍大漠清破敵三千鐵騎氣如虹勍敵紛披計已窮邊塞杰魁俱就縛窮荒巢穴悉為空仰知聖慮恢神算自是天威振武功大駕回鑾歌奏凱歡聲喜氣萬方同重九關塞秋深灝氣清正逢佳節駐行營天回玉帳三軍肅地接龍沙萬里平白草帶霜經物候黃封賜酒荷恩榮聖王駐馬功成處百萬旌旗耀日明諸將繼至是夕微雪即晴黠寇憑陵逼塞城天兵擒滅祲氛清六花獻瑞寒光薄孤月流輝夜色明萬里旌旗回御輦千官劍佩集行營時巡已喜安邉境定挽銀河洗甲兵賜觀獵戎衣躬御武功成百萬熊羆訓練精馬上鷹鸇思奮擊林間豺虎敢橫行天威霽曉三軍肅霜氣澄秋四野平倐見平原狐盡鐃歌載路喜歸營賜觀射虎渺渺平川百草空於菟出沒勢偏雄氣凌猛騎應難搏身斃雕弓計已窮日色蒼涼沙磧外天威炫赫塞垣中臣民共仰龍顔喜神武由來孰與同班師邉城巡幸駐天兵鐵騎如雲勢莫嬰一鼓即成除暴績六軍俱奏凱歌聲逺頒鳯詔初回馭遙奉鑾輿喜入京聖主實同天地德萬年一統樂升平早朝禁城初聽曉鐘聲天仗森嚴簇繡楹風引御爐香霧逺雲開仙掌日華明班聨冠佩瞻龍衮樂奏簫韶叶鳯鳴聖主正當垂拱日萬方鼓舞樂升平題御賜黃封積雪凝暉繞建章黃封敕賜有輝光醅浮寶甕雲霞色醉濕宮袍雨露香周室治平開宴樂虞廷歌詠協明良鼎湖悵望龍逰逺追想深恩淚滿裳賜觀擊毬射栁禁苑薰風皓氣清天間龍馬玉蹄輕花邉逺近星毬落栁外參差綵仗橫演武正期防逸樂詰兵端欲保升平微臣侍從慙無補願效賡歌頌聖明雲移仙仗簇龍旗正是京華五月時駐蹕近依丹鳳闕彎弓遙剪緑楊枝萬年仰祝齊天夀百步欣看中的竒神武聖文超往古微臣何幸際昌期賜扇及綵縷海宇熙熙景運昌君臣千載慶明良遭逢喜際風雲㑹賚錫常沾雨露香寶扇半規凝瑞色綵絛百結帶恩光皇仁似海真難報願捧宮筵萬夀觴郊祀分獻宿神樂觀駕次南郊展祀時千官扈從肅朝儀瑶臺露下天花散玉宇春回斗柄移大樂佇看來彩鳯齊宮乂見産靈芝微臣何幸陪禋祀恭拜彤庭一獻詩瑞應騶虞詩有序宣德四年春正月初吉騶虞二見于南京畿內之來安縣守臣得之以獻白質黑章虎軀猊首尾參于身穆穆旻旻內仁外威信治世之瑞獸也謹按瑞應圖曰騶虞義獸也王者德至鳥獸澤洞幽冥則見又云騶虞白虎黑文不食生物不履生芻人君有至信之德則見欽惟皇上紹承大統主宰神人仁恩被于庶類信義孚于四海是以萬方底寧率服嘉祥異瑞層見疊出騶虞二同獻于朝實國家莫大之瑞稽之史籍曠古所無自非皇上至誠之德洞徹幽顯天地神明協相有以廣彰聖化曷克致之臣忝職冬官躬逢上瑞是用播之詠歌以昭國家萬萬年太平隆盛之慶謹百拜稽首而獻詩曰聖皇御宇天下寧玉衡維貞泰階平雨暘時序百榖登泰和氤氲育嘉禎粵産瑞獸仁且靈素質黑章粲精英起伏馴擾行不驚白雪被體𤣥雲凝性仁不折生草莖步武所至祥風生嶽祇撝呵肅林坰靈光和氣相回縈群獸導引紛前行丹壑吐媚泉流瓊草木茁秀山增榮卿雲下垂煜熒熒文軒載之獻帝京臣民縱觀溢都城嘉氣滿路騰歡聲聖主端拱坐天庭駿奔百辟公與卿上章揄揚古是徴揆厥所由咸頌稱華夷萬方仰聖明奉天法祖篤孝誠皇仁如天育黎氓好生之德覃八紘下及萬靈上太清四民安居品物亨女勤蠶織男力耕父父子子弟與兄比屋禮讓崇忠貞普天率土瞻儀刑上帝監觀歆德馨嘉祥竒瑞來相仍聖心乾乾戒滿盈臣下遵職惟弗矜維此瑞獸逺來呈實表聖德洞幽冥愚臣感恩懷戰兢歡呼抃舞倍恆情上祝聖夀萬萬齡如川之增日初升皇圖鞏固永世承喜雨聖皇嗣統登九五和氣周流遍寰宇忽因兹嵗氣候乖自春徂夏天少雨四郊農人念西疇亢旱何由望有秋九重孜孜重民食宵旰弗暇心為憂由來一誠能感格上天覽觀昭聖德百靈叶順同駿奔揮叱雨師走風伯空中殷殷雷發聲飛電歘翕騰光晶神龍一夜捲滄海化作甘霖沛若傾炎埃洗盡見行潦萬物焦蘇免枯槁朝來四野沸謳歌旱魃消除迅如掃仰惟聖德格昊天遂令四海為豐年微臣作詩頌聖德願和康衢擊壤篇賜逰西苑詩有序宣德八年夏四月二十有六日皇上以時清氣和特命中官導引成國公臣朱勇等十五人逰西苑臣榮叨與其列遂得周覽竒勝首至新搆圓殿殿臨太液池池之中多嘉魚殿之左右多名花東去數十步又有嘉蔬竒果皇上每躬自採摘以奉聖母皇太后甘㫖繼至清暑殿此亦奉聖母逰覽之所規制宏敞巧妙天然花木森鬱實非世間所有既而登萬嵗山池水環之如璧磴道逶迤竒石森列千形萬狀莫可備述山之中有三殿正曰仁智左曰介福右曰延和稍上則有玉虹金露方壺瀛洲四亭而廣寒殿在其頂瑶臺玉砌畫棟雕甍蒼松翠柏盤欎垂䕃恍然如在蓬萊仙境也良久退坐山下敕賜內庖酒饌皆珍竒之品臣勇等莫不醉飽而歸臣榮伏思皇上之恩天髙地厚曠古以來所未嘗有而臣以一介草茅幸際聖明屢沐恩遇夙夜兢惕深以弗克盡職為愧兹復得預斯列敢不竭盡心力以圖報稱用是不揣蕪陋謹撰古詩一首上進伏惟聖覽南薰淡蕩微雨晴時當首夏天氣清苑中風景最佳麗喜見萬物皆敷榮詔賜公卿暫行樂乘馬肩輿各恭恪入門步履不敢馳遙望瓊峰翠如削須㬰中貴傳宣來先向池上看崔巍長橋如虹跨碧水波光蕩漾無纎埃寶殿玲瓏聳金碧盤龍舞鳯何輝赫近階古柏凌雪霜夾道蒼松翠千尺池有逰魚圃有蔬絳桃丹杏如珊瑚常時採摘奉聖母青春幾度來鑾輿細栁新蒲滿洲渚輦路逶迤到清暑雕䦨玉檻勝蓬萊芝草琅玕似𤣥圃中有寶閣環金扉聖慈暇逸時逰兹干花冥濛溢香露瑞日照耀生光輝相將優逰陟華巘磴道盤空應百轉巉岩怪石虎豹蹲嵗久含滋多碧蘚方壺瀛洲峙兩亭玉虹金露何崢嶸空中忽聽玉笙響萬壑遙度松風聲躋攀絶頂意忘倦忽到丹霄廣寒殿恍覺臺髙爽氣多更看天近祥雲見壯哉此景天下竒此身何幸親見之天恩曠蕩錫宴樂玉酒滿酌黃金巵聖皇仁明盡誠孝四海生民安德教微臣欣得預兹逰際遇升平何以報瞻依日月拜九天寸心感激惟惓惓永歌天保厪祝頌聖夀皇圖萬萬年隨駕謁長陵獻陵韶光融融麗晴昊萬彚昭蘇春正好聖皇孝敬出宸衷恭奉慈輿謁陵廟方今六合皆同春聖皇大德霑被均誠由聖母秉至仁天心悅鑒人歡欣翠華晨發隨鳯輦香飄藹藹祥雲絢平原廣路淨纎埃夾道嵩呼紛舞抃引望二陵松柏路霧斂雲開待皇輅粢盛豐備禮有儀對越之誠存永慕陵前旋駕仍徐徐陵旁蔀屋多民居洪恩錫賚何稠疊山童野叟皆歡娛孝誠上格神靈喜甘雨應時霑逺邇聖母怡愈感帝心臣庶䝉恩均拜賜我皇聖德協天機聖母洪福與天齊小臣何幸扈清蹕願祝萬夀歌雍熙上元賜觀燈鑾輿臨御九門開耿耿星河繞玉臺百辟陪班天表近六鼇擁翠月華來簫韶樂奏更籌靜寶篆香飄淑氣回影動翠雲連罕罼光浮玉殿映罘罳千枝火樹霞凝彩百寶星毬錦作堆銀燭夜光仍燦爛瓊花春發孰栽培謳歌迭奏清平調詞賦爭呈白雪才紫陌已令嚴禁弭銅壺莫遣漏聲催龍顔有喜頻頒宴鵷序承恩得共陪霑沐小臣無補報只將歌頌獻蓬萊恭和御賜春山圖詩有跋畫裏雲山宛逼真紫宸揮灑墨花新微臣願效封人祝聖夀如山萬嵗春臣榮欽蒙賜春山圖一幅并御製詩題于上伏惟春者四時之首山則仁者之所好也人之仁即時之春天以春生萬物皇上以仁育萬物其德一也詩曰維其有之是以似之由此而觀斯圖豈虛作哉臣榮不勝感激謹拜手稽首恭和聖製而謹識于其後庶幾子子孫孫永世弗忘所自也恭和御製竹石圖詩有跋植物紛紛著兩間雲根新長碧琅玕聖恩發育同天地願秉堅剛獨耐寒臣榮伏蒙恩賜竹石圖一幅并題詩其上臣竊惟物之徑直而堅剛者莫竹與石若也人能秉徑直之操堅剛之質則撓而不屈磨而弗磷然則臣蒙是賜者豈非叨受知遇而欲其嫓美於是乎臣榮其敢不加勉以副聖意之萬一哉輒不自揆僣賡睿作并贅數語于左方以彰恩德於無窮焉歌行喜雪歌聖皇御天敷化理民安物阜天心喜九重垂拱萬方寧唐虞熙皥真堪擬維時隆冬臘日後同雲隂隂遍遐邇一夕天風吹雪花漏徹更䦨還未巳初疑巽二先驅來呼號奮發如奔雷忽然夜深萬籟寂六花片片空中開朝來碧空澄霽色寒光恍映瑤階白瓊樓玉宇粲相輝積素晶瑩連四壁趍朝矚目縱遐觀蓬萊宫闕凝清寒由來三白為佳瑞自是隂陽叶和氣方今何幸際明時謳歌擊壤無休期嘗聞治世已歆慕况乃于今親見之我皇登三仍邁五聖德歸功在匡輔賡詩願奉萬年歡永享天心符聖祖白象歌聖皇聲教被八荒乾坤和氣儲嘉祥逺人效職貢方物萬里厥篚來梯航南邦白象生特異粲然逺自占城至殿頭旭日眩雙牙階下微風生兩耳特超羣隊毛質純月下渾疑霜滿身不由林邑渡滄海却趂千官拜玉宸周章跪舞見天子重瞳屢顧龍顔喜晴霄遙晃雪花明拂曙銀光靜如洗食以瑤草飲醴泉赤麟朱鳯參後先惠養欣登上林苑馳逐不記天南壖從兹出入近金殿仙仗徐行乘御輦太平聖祚億萬年載詠歌詩播悠逺神鹿歌神鹿來從番國符盛治呈逺物神鹿來經萬里涉波濤超峻峗神鹿來色𤣥素光濯濯氣嘔嘔神鹿來膚充盈飲玉泉嚼翠英神鹿來獻天庭沐光榮駕龍軿神鹿來仰皇明昭至仁協嘉禎瑞雪歌聖皇御統天眷隆四方萬國皆來同祖宗敷佑靈貺錫雨暘順序民物豐維時嚴冬氣凛冽同雲布空隂靄結天教三白應竒祥一夕都城飄瑞雪沈沈萬籟寂無聲片片銀河剪水成凝華逈接瓊樓近積素恍與瑤階平乾坤萬里纎塵息四望氷壺同一色沙鷗羣泛黯藏輝林鶴孤飛杳無迹由來瑞雪兆豐年况此呈祥當臘前聖心夙夜念民瘼自有精神格昊天微臣淺薄遭明主調燮無功愧何補幸兹六出應期至拜舞龍墀欣快覩聖情謙抑恆戒盈仰承天意惟兢兢作詩惓惓飭臣下賜以華宴當彤庭羣臣感恩咸稽首際遇明時古無有賡歌願效有虞風上祝齊天萬嵗夀來逺人討不庭二章有序伏惟聖朝恩威廣被遐邇歸心滿刺加國王效順率其眷屬全國來朝錫蘭山國王梗化遂致生擒獻俘闕下此皆古所未有臣等欣覩盛事不勝欣懌敬作歌詩二章上進亦續風雅之微忱也皇施仁浩無垠普天率土皆王臣島夷卉服咸尊親如彼葵藿迎朝暾滿刺加處海濵道里遼絶世罕聞使者過之忽咨詢老稚稽首怖且欣挈妻孥徔臣鄰逺涉巨海趨天津不憚險逺謁楓宸方物上陳兼異珍琛貝絢爛雜寶薰服食器用羅繽紛吾皇慎德期日新豈在玩好勞晨昕萬邦黎庶歸陶甄嘉此島夷忠且勤萬里效順輸瑶琨聖皇懷柔道彌敦大官宴之酌以醇錫以內帑綺與纁逺人屛營望天門喜瞻中國明聖君仰聆天語何諄諄感兹蒼穹雨露均小臣何幸沾洪恩稱聖夀億萬春右來逺人天威所加海宇清皇華四牡擁旗旌樓船穩駕天風輕洪濤巨浪寂不興蛟龍遁跡海若驚錫蘭夷敢自矜蕞爾小島聚飛蠅依山環海為垣城使節經沮弗行狼貪虎視驕且盈恣逞悖逆勢縱橫悉驅其衆將奮兵王師桓桓勇足勝以一敵百氣莫嬰直搗巢穴破其營虜其全國歸神京妻孥族屬靡有贏汛掃凶孽如控莖揚大舲笳鼓鳴錦帆髙掛開滄溟馮夷拱衛河伯迎獻俘闕下衆目瞪微軀萬死惟戰兢孰知天意覆八紘不以小醜干天刑神武不殺全其生以首叩地聲傖儜感聖德歌皇明右討不庭詞西江月端午賜觀擊毬射栁五闋芳樹海榴吐艷碧池荷葉鋪錢端陽佳節太平年百辟咸沾恩宴仙仗遙迎瑞日爐香細裊祥烟香蒲泛酒艾旗懸拜舞金鑾前殿御座正臨仙苑禁林大敞瓊筵臂間長命綵絲纒何必靈符丹篆處處龍舟競渡家家簫鼓喧闐萬方無事樂豐年仰荷聖明恩眷內苑場開紫禁瑶臺佩列羣仙兩朋駿馬總騰騫玉勒金羈光炫左右分曹決勝毬飛仗擊爭先流星一㸃影回旋揮霍紛紜萬變簫鼓教坊間奏錦袍玉佩聨翩綵毬擊罷聽傳宣競挽雕弓飛箭栁外爭誇中的花前捷報飛傳香塵起處正回鞭萬嵗嵩呼舞抃令節新頒寶扇嘉言揮灑雲箋香羅細葛疊相鮮劍佩趨陪金殿臣庶欣逢舜世華夷共祝堯年皇圖鞏固福綿綿磐石尊安永奠瑞鶴仙元宵詞五闋三山浮海上忽六鼇移來髙聳萬丈祥雲護仙掌看峰巒幾疊洞天相向烟霞滉漾勢凌空竒姿異狀見丹霄翠色崔嵬特起十分雄壯凝望瓊裝萬樹繡簇千花倚天屛障羣仙慶㑹三島上共歡賞有飈輪鸞鶴飄飄天際羽蓋繽紛綵仗向金門宴樂良宵太平氣象滿庭芳玉殿傳宣金吾弛禁皇都春意爭妍暝烟初斂華月吐嬋娟紫陌香塵冉冉六街上車馬駢闐爭來看鼇山燈火滉漾九重天聖皇端拱處千官鵠立玉笋班聨有歌喉宛轉舞袖蹁躚清漏遲遲夜永不妨對綺席瓊筵嵩呼願齊天萬夀同樂太平年應天歌星馳一線寶炬騰空千花一時開遍萬斛金蓮恍似紅粧映波面香風轉雲半捲見舞袖翩翻輕旋想勝景即是仙宮蓬萊閬苑歡樂意留戀嵗嵗年年長沐賜宴五色紅雲瑞氣祥氛互葱蒨移鑾輅開雉扇仙仗擁九華春殿向黼扆更祝南山夀觴頻勸醉蓬萊近天階咫尺雲擁千官動搖環珮仙樂聲髙似飄颻天外羅綺香穠珠㙨光粲看紅粧千隊銀漢低徊月臨仙掌星垂華蓋覩此繁華古今應最禁苑中此夕同歡㑹海上三山與金莖相對寶馬香車九街馳逐遍五城欣快聖夀齊天年年嵗嵗嵩呼羅拜畫堂春春空雲盡月華明雪消才放新晴元宵逰賞遍都城處處歡聲丹禁九重宮闕綵鼇三島蓬瀛萬方玉帛㑹瑶京同樂升平文敏集卷一
