body:
  text: 文敏集卷二明楊榮撰四言古詩雙松堂鬱鬱雙松植于堂傍誰其植之維邑之氓維侯在官佐理有方桃李滿城春日載陽侯善愛民不擾不攘俾之樹藝禴祀蒸嘗民亦愛侯植材孔良俾侯之夀既堅且剛匪兹嵗寒傲睨風霜碩大蕃衍為棟為梁樹之斯今維侯翺翔何以比之召伯甘棠廣夀堂有序前太醫院使韓氏公茂居姑蘇時嘗名其堂曰廣夀蓋取其醫術以濟人之意也及事今上于潜邸謹厚小心甚見知遇由是名益著而術益顯永樂初遂擢前職嘗慨然以為人之夀雖稟于天然而不知戒謹或為七情之所感六氣之所傷往往致疾以夭閼其天年者不可勝數惟吾醫之道可以濟之而使皆得以臻其夀又嘗恐其所施者狹而世之抱疾疢者多不能以廣愛而兼濟之乃於南京復築堂仍揭其舊扁思有以溥其惠澤焉嗚呼公之心亦仁矣哉公既殁其子伯永承先䕃為御醫與豫同以扈從留北京謁豫言以題其卷子曩與公同朝交逰往還於兩京之間有年矣公之所以推仁濟物而惓惓於廣夀者皆豫之所聞見而知之之審者然則於伯永之請又烏可以無言乎遂為序次其概而系之以詩曰翼翼髙堂有華其構匪堂之華惟以廣夀夀之修短實出於天何以廣之惟醫之全六氣所干七情所觸沈痾危亡厥夀斯促念兹短折曷由濟之聖神立教莫切於醫猗歟韓氏忠獻之裔世居姑蘇民受其惠惟公承之荷國寵恩典職從容出入金門惟公之心憫此抱疢活人孔多曽莫之靳公既逝矣髙堂猶存匪公廣之有子有孫子孫繩繩夀者益廣積此隂功厥報斯享求公之德實在斯堂播之詠歌永世其光五言古詩溪山清曉晴波何瀰漫碧嶂自深窈晨光發遙岑爽氣動林杪雲際落飛泉谷口聞啼鳥怪底風露清微茫楚天曉辭劒圖楚人購亡命伍生亟奔吳蒼黃及江涘欲渡乏䑳􅰡江流漫浩浩千里豈易逾形勢轉危迫惻惻重躊蹰漁父識其情毋乃為子胥拏舟以濟之倉忙有追逋開樊縱羈禽汲水活涸魚急難古所然矧彼非凡夫悠然遂安涉出險登夷塗感佩意氣厚報贈良難圖聊解百金劒以謝重生軀所志哀公子圭爵吾奚需殷勤辭弗受臨分立斯須願言慎自保毋使他人狙髙風邈千載俯仰隘八區撫卷懷其人伊豈尋常徒望雲思親悠悠天際雲卷舒無定跡懷哉遊子心引睇增歎息慈親在髙堂鶴髮已垂白春暉寸草微暮景桑榆迫祿養豈不豐何由奉顔色冉冉時序遷迢迢關河隔瞻彼孤雲飛親舍在其側徘徊騁遐盼欲往焉可即眷兹名位崇夙夜盡所職庶以為親榮孝思永無斁承恩堂為少師吏部尚書蹇公賦聖皇撫泰運世道登隆平孜孜求化理期與唐虞并仁恩及臣下勉其效忠誠協恭勤贊翊恢化于八紘錫禮日優渥羣賢萃盈庭惟公國元老先朝著徽聲經綸資碩德寅亮推耆英九重獨眷注百辟皆儀刑恩賚出異數特以表清貞乃命相吉地治宅當南城陶堅與掄良所司為經營百役欣奏技刻日工有程突然成甲第重門樹干旌華采承日耀輪奐規制宏錫宴集朝貴遂以承恩名煌煌揭斯扁匪徒誇世榮公心循古道不愧邦家禎惟昔伊摯氏佐商任阿衡致君比堯舜推澤及庶氓一夫有不獲惕然疚在膺又思杜陵老所念在蒼生常欲得廣厦列置千萬楹大庇諸寒士使遂歡樂情惟公遇明主翊運當嘉亨祿崇績彌茂自視如弗勝方今海內外生齒何蒸蒸博施以濟衆往聖病未能周文奠區夏惠愛先孤惸重華保至治稷契同兢兢聖德超古昔賢哲為股肱千載一遭際六合清以寧尚思廣聖澤仁化盛流行遐邇悉霑被謳歌頌皇明始終惇此念鴻恩世永承夀萱堂為鍾指揮題羡子文武才出身事明主乘時際風雲臨戎擁貔虎偉哉樹竒勳榮華耀簮組嚴親既云徂致力養慈母髙堂種萱花緑葉何湑湑朝日畫簾深春風綵衣舞承歡介眉夀華觴泛清醑天倫有真樂和氣藹庭宇紫誥錫榮封聖恩自𢎞溥分閫肅江漢移節鎮荆楚桓桓仗天威韜略足禦侮丹心秉忠義報國誓相許願言慎始終芳名播千古洪崖山房為胡祭酒題豫章古名郡洪崖出西山雲霞紛照耀鸞鶴相往還長松倚絶壁垂蘿不可攀聞昔有仙人于兹煉神丹功成蛻汙濁逍遙白雲端君家住城市卜築思岩巒翠林延朝光靈籟生夜寒石田不播榖所産皆琅玕自從領鄉薦振衣遂彈冠鳴琴宰花縣載筆登金鑾英才樂教育討論孔與顔朅來寄遐想緬彼洪崖間蕭然絶塵俗景物幽且閒陽崖被春華隂壑含風湍何時返初服于焉賦考槃我欲覽竒勝相從以盤桓幽期倘可遂膏車扣柴關題楊諭德東臯春雨圖春至時雨降駕言向東臯驅牛種嘉苗稂莠亦以薅所期斂獲豐詎辭筋力勞時復事簡編或以酌醴醪熙然隴畝間此樂一何髙掛冠未有期南望徒鬱陶託此寓幽意毋使心忉忉貞夀堂為陳侍講賦髙堂有慈母早嵗失所天煢煢撫遺孤辛苦人共憐孤年既以長篤志勤簡編蜚聲列科目接武瀛洲仙沾此祿養榮綵服何翩躚芝蘭與玉樹滿眼羅曽𤣥愛日有餘歡絲竹喧綺筵悠哉桑榆景永矣樂長年題劉教諭兩山書堂左峯儼飛蓋右峯如聚轂兩峯並髙寒對峙氣清淑羡爾志沖淡於焉構書屋中藏萬卷餘琅琅時誦讀素燈深夜雨瀟瀟響梧竹豈無青藜翁殷勤訪天祿白雲東西飛蒼翠宛在目于兹移教鐸逺度松溪曲靜對湛盧清難忘故山麓寫此寓髙情尚慕紫陽躅題童傑所藏登瀛圖亡隋亂天紀生此龍鳯姿賢豪從如雲英聲紛四馳啓祚邁前古致治恢𢎞規巍巍文學館冠蓋肅光儀謀猷過元凱匡輔猶臯䕫才華夙所重魚水樂無涯從容進忠讜遇合真有為更畨直丙夜討論集良時房杜乃其最姚虞亦稱竒或以付託寄或以諌諍推餘子並竒偉恩眷政在兹飄飄偓佺輩登瀛信如斯遂令千載下浩然動遐思畫圖風采振史冊名譽垂念子久珍襲披玩日愈怡持之索題詠苦乏瓊琚辭濡毫一揮灑允矣同襟期自牧齊達人尚謙德德盛心愈卑崇髙不自居驕矜竟奚為君子安此道處之不復疑遵彼聖賢訓戰兢恆自持自卑人益尊自晦道愈輝恪守以存位至樂良在兹嗟彼競伐者邈與此相違北征鑾輿北巡狩垂拱敷至理拒車螳臂微烟塵起邉鄙皇怒赫徂征天討詎容已六師素驍勇韜略古莫比衛霍皆偏禆揚威荷天子義聲自無敵直搗單于壘一掃朔方平沙場淨如洗行將奏凱還龍旗復東指巍巍神聖功特筆紀青史題孔寺丞魯林懷思孔林何鬱鬱聖逺道益尊洙泗衍遺澤苗裔今尚蕃迢迢浙水東奕葉有賢孫松楸日在念霜露寒更繁披圖重懷想水木求本源金石若在耳廟貌宛猶存羮牆寄遐思誠義情所敦偉哉千載下簮紱耀華軒願言崇令德永世期弗諼薊門送别詩有序吾友張鳴玉由進士擢為行人幾十年銜命走四方皇華之光榮映海內由是聲譽益振其為人寬和樂易不事表襮與人交必以誠而操行彌謹又能恪恭所職未嘗以勤勞介意今年夏以秩滿謁選吏部遂升知江西之贑州府豫與鳴玉同里閈昔嘗同逰鄉校且與其授業師楊君夀夫素所相知而交好篤密故于鳴玉之别也既巳欣然喜其超擢之榮而又不能不為之愴然于懷也遂託中書舍人陳宗淵作送别之圖且賦詩以寓意焉張君吾鄉彥夙有聲譽馳俊秀出庠序拜官當盛時皇華歷四方所至動光儀今晨忽告别出守西江湄五馬何輝煌皂蓋翼雙旗握手向都門臨岐薦芳巵丈夫志經濟早嵗當有為章貢古名郡風俗亦清夷願揚天子恩撫字安黔黎桑麻蔽田野雞豚日蕃滋老幼自生息嵗時樂雍熙朂哉古循吏龔黃以為期螺山村人峩峩金螺山下有田與廬日出雞犬喧蓐食事犁鋤白髮不到城柴扉俯江墟鄰翁時來往濁酒聊與娛賣卜或開肆屢回長者車一朝承薦剡忽捧五色書朅來往都市門巷恆晏如淳朴本真性寧謂禮法疏緬彼螺山側悵然懷故居願言崇令德允矣揚芳譽朴齊為畫士郭文通題鴻荒肇開闢民俗淳以熙太朴日云散風氣遂澆漓結繩既已代巧僞紛日滋金罍鄙抔飲雕房易茅茨珠玉交璀璨錦繡互彰施人心競浮靡古道何乖暌郭生獨超邁質直由天資純然無表襮胸次良坦夷幽齊匪華飾沖襟淡無為繪事益精到天機造神竒渾然辭刻畫興至無不宜持此慕淳龎仰彼農與羲永言慎始終素履以為期樂琴書處為沈學士題君子有至樂乃寓琴與書外務絶紛擾方寸恆清虛簡編日披閲宴坐窺唐虞潜玩弗自釋意適忘其劬悠然千載心希彼賢聖徒有時鳴朱絃興至聊以娛泠泠太古音逈與淫哇殊清風拂瑤軫明月照綺疏一彈曲未終懷抱湛氷壺顧兹愜幽趣四體長安舒翛然一室間此樂真有餘况兹荷寵恩出入承明廬風采動當世卓犖誰能如退食得清暇徜徉遂幽居沖襟益瀟灑陶情自怡愈永言崇令德庶以揚芳譽題王侍講山水木落霜氣清秋山淨如洗天空萬籟寂地逈孤雲起深溪湛寒緑對此清心耳安得掃蒼苔橫琴寫流水送弟仲宜歸鄉吾宗出關西夙昔清白門後裔日云盛派衍流益分建安遂占籍瓜瓞綿以蕃我祖懷隱德積善開慶源峩峩大􅀈山佳木森雲屯芳名重當世遺澤傳子孫伯父抱才器聲價比璵璠一官處中都戎幕稱賢賔我父逺相從同氣情實敦粲粲華萼輝嗈嗈鴻雁羣清望屬明時懿範垂後昆淪謝嵗云久音容杳難聞嗟我承先緒遺訓心所遵窮經忝科第志願幸已伸優遊詞垣職出入叨寵恩及兹二十載曷以攄忠勤譬彼海與嶽安能效㳙塵終期竭駑鈍庶用答君親豈無桑梓懷迢迢隔晴雲骨肉久乖違感慨難具陳吾弟忽逺至義重情乃真提㩦我仲子跋涉良苦辛相見若夢寐悲傷雜歡欣從容問故舊婉娩及鄉園枌榆幸無恙松菊今尚存顧此萬里心罄兹終夕言連床聽夜雨秉燭對芳尊良晤能幾何别意遽忍論秋風吹征衣灝氣拂髙旻執手向都門顧此停車輪殷勤在長道善保千金身悠悠離别恨託之圖畫新烟樹既綿邈雲山復嶙峋時或一披覽慰此懷思頻友恭堂為吳氏題孝友出天性同氣古所敦自從降衷後此道今尚存東浙有佳士夙昔重彛倫怡怡伯仲間玉季同金昆清芬比華萼雅奏諧篪塤嗈嗈鴻雁行接武當晨暾和氣溢華堂相歡對芳尊嗟哉䦧牆者鄙薄寧足論願言保終始令譽垂乾坤聽松軒雅志尚林壑軒居絶塵囂喬松當前楹柯條入雲霄清風颯然至流響何瀟瀟初如振波濤倐若鏘鈞韶泠泠拂几席飄飄度山椒憑䦨試靜聽逈覺形神超緬惟嵗寒姿節操長後凋朂哉慎所持永矣懷髙標養拙齊為石彥誠作世俗尚智巧惟拙衆所嗤緬彼機警徒致用隨厥施浮華競誇靡宛轉無不宜巧言乃如簧聽者皆忘疲紛紛若此流意氣髙當時卓哉徐聞令獨恥事瓌竒守拙心自甘安分以養之齊居揭華扁淳朴志不移涖官思盡職寧計崇與卑政化尚豈弟襟度亦坦夷乃知一寸心上與古人期朂兹崇令德允矣芳譽垂題韓滉田家移居圖唐家多宰輔卓犖韓太沖煌煌六道間節鉞何其雄平生稱善畫筆法真能工值兹多難餘出鎮觀民風公退展毫素天機發心胸偶為田家圖情態誰能同策蹇仍跨牛前行忽匆匆蕭然村野姿有此媪與翁小兒亦何知短髮如飛蓬移家向何處寧能辨西東想當風塵際流竄無定踪惻然廊廟懷寓兹圖畫中方今聖明世四海樂年豐黎庶皆按堵田里歡融融念此自興歎所貴在遭逢鼓舞歌帝德萬古垂無窮玉笥白雲為胡祭酒題江南多勝地玉笥古名山扶輿孕靈秀疊嶂森層巒洞天何泬寥羽駕不可攀琅玕相蔽虧芝草良足餐君家在其麓華屋依林間石田墾膏腴金川瀉潺湲緬昔風塵際避亂去鄉關占籍豫章城東湖幽且閒惟君富文學聲華播人寰諸生仰模範象笏聨清班兩京日遨逰撫時覺衰顔先塋在故鄉迢迢隔雲端松楸覆泉臺霜露凄以寒沈思不得往託此圖畫看摩挲發遐想日夕增長歎顧兹純孝心展轉弗遑安攄辭迪後昆貽謀垂不刋松柏軒為陳御史題松柏本孤直豈與凡木同深根蟠厚地危柯拂層穹後凋知嵗寒偃蹇氷雪中所以異羣植棟梁真足充髙軒峙華構手種由乃翁年深遂培養枝葉何籠葱清隂覆窗户黛色蔽簾櫳遺芳及賢嗣慶澤逺益隆豸冠聳峩峩衣繡兼乘驄于焉仰餘䕃景德思無窮節操日以堅祿秩日云豐五栁竟蕭索三槐委榛叢何如兹軒上青蓋鬱童童願言慎封殖永世流清風雅集圖汴京富戚里王氏乃其賢雍容重文學瀟灑樂林泉名園足勝概景物俱清姸嘉時愜幽賞休暇適所便一時英俊流冠蓋來翩翩坡翁絶世資揮灑筆如椽偉哉丹陽公據几方凝然主家兩名姬並立何嬋娟珠翠盛容飾雲鬟下垂肩雙松髙崔嵬上有凌霄纒石床清且潔古器相駢聨玉巵發光潤瑤琴縆徽絃伊誰寫兹圖云是李龍眠頴濵暨山谷傍觀志何専淮海自知音側耳碧虛前飄飄米南宫灑翰飛雲烟王郎獨仰觀但覺蛟龍騫亦有蒲團僧趺坐語空圓劉君諦聽之無乃好逃禪隂森古檜茂暗靄芭蕉連清風灑修竹芳氣出蘭荃怪石倚幽壑泉聲落潺湲佳景已如此况復開賔筵諒匪塵中人不異瀛洲仙良㑹雖一時英聲振八埏蘭亭付陳迹蓮社徒荒阡竒哉西園集圖畫今流傳嗟我懷昔人景仰心惓惓摩挲想風采歌詠聨詩篇斐然愧續貂願以厠末編送太子少保金公歸省憶昔領鄉薦挾藝來京師濟濟文儒士煌煌金玉姿衆中獨挺出傾蓋即相知叨陪大廷對日晏出彤闈清名列虎榜令譽騰四陲聨鑣上林苑攀折璚瑤枝天門既蕩蕩雲路豈逶迤君居青瑣重子忝詞垣推含香立螭陛簮筆趨龍墀胥為侍近地密邇清光垂內制須才賢遷轉秩允宜館閣久同登旦暮恆追隨趨朝戴星入退直乘月歸輔相乃宥密知者固云稀偉哉地清嚴霈焉恩渥滋先皇數巡幸寧復辭驅馳宫袍每同賜廏馬亦偕騎付託何深重顧盼增光輝天驕和未靖鳴鏑臨邊維赫然斯震怒撻伐蘇瘡痍相與扈清蹕直窮瀚海涯獻替在帷幄草檄粲雲霓龍庭斾既返鼎湖龍亦飛悽然抱弓劒匍匐還京畿至尊嗣寶厯恩澤遂旁施三孤責既重八座任豈微宣公議常奏宗伯禮攸司不忘忠國志還切倚門思聖朝崇孝理推恩誠匪私錫號太夫人歸省當此時旭日明征騎春風吹綵衣朝列盡出餞輿馬擁郊圻清歌白雪調緑酒黃金巵觀者誰不羡榮華有如斯悠悠薊門道迢遞金川湄林深笋堪斸水暖魚正肥稱觴祝遐夀拜舞慈顔怡伊我竟無似椿萱久已摧因君念罔極茫然心獨悲臨分無以贈感歎伸此辭退思齊為蹇少師題人心妙虛靈不能以無思所思得其正酬酢隨所施惟公出西蜀德望衆所推龍飛際景運位重今少師雍容處廊廟輔治安黔黎退食有餘暇齊居思濟時秉心思至公律已思自治進思罄忠言退思補闕遺庶政思佐理庶績思咸熙賢才思簡拔禮義思維持治化思有成舉措思得宜我皇正垂拱至德協無為惟公實啓沃四海將倚毗生民永安逸鼓舞同邊陲願言慎所思令譽千載垂送沈學士民則還鄉省祭聖代重儒術賢才悉登庸搜羅極四海鶚剡橫髙空雍容居廟堂雜遝趨九重吾友雲間彥湖海蟠心胸揮灑出烟雲意氣吐晴虹一官列詞林名譽日以隆薦歷遂升遷循序階顯融華萼既聨輝椿桂亦籠葱出入金馬門日覲明光宫兩朝承寵渥雨露何其濃一朝奉絲綸克展桑梓恭恩命既云下畫鷁乘輕風祖帳臨薊門芳筵爼豆崇相勸須盡觴握手心忡忡豈無故舊懷停雲在江東蓴鱸鄉味佳蘋蘩孝祀同晝錦耀里閭賔友紛相從嗟我久辭家閩山逺巃嵸因君獨惆悵繾綣情無窮立馬黃金臺目送孤征鴻送胡祭酒致政還鄉昔在太宗時賢俊方彚征與君初識面遂結金石盟一見得披豁聨袂登蓬瀛儤直居館閣顧問趨承明君獨負才學胄監遂榮升危坐擁皋比六館來諸生菁莪沐時雨芹藻藹生成車駕臨辟雍峩冠講遺經寵眷自天啓四海騰休聲優逰職史事驅馳歷兩京逮兹龍飛運海宇躋升平庶政已咸熙恩澤九有盈百辟總歡抃盡職攄衷誠鸞誥重褒美存沒被光榮而君六袠年衰病久相嬰聖情為悽惻賜歸豫章城璽書重嘉奬晝錦何足矜祖帳出都門執手難為情西山鬱嵯峨南浦春濤驚桑梓日在眼東風拂行旌嗟我今獨留念别心怦怦矯首萬里天鴻飛正冥冥薊門别意送程汝器赴饒州教授秋髙薊門路灝氣肅以清念子將逺别相送出都城祖筵集冠蓋緑酒且頻傾臨岐欲分手繾綣難為情嗟我子所契夙誼如弟兄麗澤藉資益硯席恆相并衣冠立孔庭燈火親韓檠羡子先著鞭科目振英聲金馬待明詔萬里皇華行我亦忝後塵翰苑蚤登名與子聨鵷班出入在承明中道子暫蹶一旦復超升繡衣立霄漢驄馬耀神京俄然返初服振袂謝恩榮閉門卧空山塵俗淡無營及兹承薦剡簮紱喜重膺耄疾終懇辭職教任匪輕西江盛文物師道貴老成子行方自重泮水日橫經立雪長在門祖武真能繩他年想模範帳下蜚羣英豈徒儒道崇宦蹟亦有榮而我慨離居執手思回縈申章道逺意矯首秋鴻征上林春色圖上林一何好芳樹何葳蕤繁花紛煜煜碧幹共低垂豈無幽曠原亦有清漣漪修竹獨含秀枝柯忽紛披羣鳥恣遊泳回翔各適宜和鳴馴錦雉間關語黃鸝王睢自有匹鈎輈亦知時白鷴潔勝雪素鷺明頂絲鴛鴦有定偶鸂鶒恆並棲物性亦各異于人竟奚為展圖一披玩歎息生歔欷願爾衆禽類髙舉毋自疑長隨雙鳯凰舜廷共來儀題邵憲使凝秀樓草木有靈異三秀乃為芝至和資發育造化孕珍竒邵君魁傑士家住浙水湄早登黃甲名聲譽即逺馳繡衣動光彩白簡振霜威一朝掌外臺風裁善自持慈親既云逝棄官遂東歸泣血屢欲絶哀慟無已時孝誠動天地致祥亦其宜棲居何幽深礎石發光輝靈芝光後出吐艷方葳蕤膚理益豐潤金彩耀陸離豈伊純孝忱感召良在兹父老重嗟嘆流傳世所知勝事古未有歌詠宜聲詩永言播清芬令名千載垂送楊學士省親春風三月時花栁正明媚偉哉玉堂仙拜命辭丹陛青綾疏禁直紫誥承恩意歸舟一何輕千里行已至升堂慰慈親珠冠耀霞帔稱觴介眉夀綵服日嬉戲眷言罄深歡祿養豐且備顯揚方在兹志願亦已遂嗟豫忝同年夙昔托深契兹晨忽告别握手忍分袂相看念睽離况乃篤交誼娛親雖云樂聖心懷輔治歸朝勿後期促裝戒留滯新秋氣候凉紫陌需來騎題唯心卷人心妙虛靈本體自澄徹唯為私欲蔽善惡由此别所以古賢達操存恆切切如苗去稂莠如稼去蟊賊一朝復其初方寸遂昭晰伊人慕心學勇往企前哲兢兢戒放逸孜孜務修潔願言斯勉旃庶幾踵先烈送少保黃先生還鄉憶昔事太宗從容侍帷幄時時被顧問密邇居館閣維公我最厚交契得所託丰標獨清竒襟度自恢廓獻納效忠勤論思攄謇諤青綾每同直彩毫時間作出入二十年親愛宛如昨龍輿忽上賔銜哀淚俱落仁皇嗣寶位任舊多寵渥公時特承恩不日登峻擢三孤位隆重兼秩祿非薄寧期望鼎湖弓劒隔𡨕寞今皇紹大統眷遇恩禮數公乃久嬰疾懇辭返丘壑聖情念老臣錫賚何輝霍歸帆指東浙養親以為樂榮名動宇宙英聲振南朔到家懷逺音好寄雲間鶴恆齊為順德王通判題大運固不息嵗運成四時惟人斯有常秉心貴不移所志在弗易所存當善持允矣先聖言孜孜戒巫醫賢哉三槐裔佐郡際明時齊居揭華扁賢哲以為規勉循自毋怠矯激諒非宜惟能慎終始一節斯弗虧悅琴軒為趙光英題衆樂人所悅惟琴悅者稀古聲一何淡古調一何微華哉此髙軒几席涵清曦所悅獨在琴興至時一揮泠泠朱絲絃粲粲黃金徽初彈别鶴操再彈威鳯儀悠然契冲襟恬淡中自怡眷兹山水音雅趣疇能知送陳旺司訓之毗陵年少負才志力學勤書詩振鐸大江右聲譽已四馳朅來始相見羡子美令儀皎然玉樹姿煜煜含清輝操觚為文章雅正且出竒復此拜恩寵鳴佩辭禁闈分教向毗陵與我叙别離子行且慰意守職為儒師以道淑多士勿謂官秩卑當今聖明王功髙德巍巍崇儒重賢俊致治昭雍熙勉旃益勵志敦默慎自持喻如荆山玉終不爾棄遺申章以贈行莫訝相針規雲山圖為東里楊公作雲山何岧嶤林木鬱而秀烟嵐絢晴光嵐際峙層構繞庭芳草深清禽哢春晝有書可覽適有田可耕耨展圖念初服淹留嬰組綬因援嶧陽桐一寫丘中奏送檢討陳嗣初還姑蘇雨過晚色淨退直下西清涼颸起木末颯颯來秋聲故人過我别明發有逺行撫景慕良覿睽離鬱中情握手子不留尊酒聊為傾意厚未忍辭酒盡還獨醒長歌寫衷曲為子叙平生憶昔未荆識林居養幽貞每于士論中往往聞蜚英以兹用推轂奪爾鷗鷺盟尚希擅制作庸以贊治平欣然解蘿薜遂赴求賢徵峩章謁明主秉筆登蓬瀛端操景先哲邃學傳前經豫亦得益友晨夕資討評㑹晤益云密詎意疾所嬰浩然有歸志上疏思遺榮漢庭多寵渥不能留長卿達士貴知止豈必功業成守道茍不惑足以傳其名理棹向吳㑹驅車出都城江雲引歸興朔雁隨行旌故園指日到親舊欣相迎于于遂初願漠漠無外營金石宜善攝琴書益研精鄉黨得師範後學式儀刑永矣保令聞當與前賢并題梅贈御史張楷雅韻不媚俗孤標絶塵姿皎如屑氷玉㸃在虬龍枝窮冬寒氣盛草木無華滋寥寥溪谷間春意先自知霜雪雖云厲清貞詎能欺所以古君子往往愛咏之廣平素徑正亦吐幽婉辭愛物愛其德豈以顔色為念子柏臺彥修潔無瑕疵寫芳以相贈比德良在兹陋彼春陽花嫵媚為世嗤勉哉樹髙節嵗晏以為期題晚節秋香圖送羅閏副使之廣東夭桃饒春姿所媚在青陽舜華足朝玩日日無容光何如東籬下粲粲寒菊芳圓華凖天極正色侔坤裳繁露濯秀葉涼颸振幽香孤特謝時態可與君子方昔人取自况晚節終名揚寥寥北門什繼美維賢良羅君七閩彥文采何煌煌柱下著清績志操凌秋霜進階二臺憲持節按炎荒臨别寫兹圖贈子意何長匪以資玩好我志在激昻行哉懋晚節媺譽當彌彰題楊應春梅竹圖𤣥冥閟重隂凄其北風涼江天正搖落草木同凋傷云何梅爛開孤根獨回陽伶俜傲氷雪豈比挑李場亦有碧琅玕秀色摩青蒼貞姿與徑節相對殊羣芳君子有逺操儷美實所望畫圖供玩餘自覺幽興長緬懷西湖詠載歌淇澳章夀少傳西昌楊公皇天開泰運帝德光羲軒匡翊賴臣佐乃生名世賢道脈有所託文風由兹宣廬陵士淵藪歐陽啓其先昔人雖已逺勳業今猶傳先生踵其武氣稟光嶽全文章與德行當時罕與肩文皇安國本羽翼惟咨焉隨龍遊少海捧日升虞淵鞠躬盡臣力所知無不言忠嘉納宸牖惠利蘇民顛進階二台輔領䄂詞林仙保釐參周畢纂述追談遷大名垂宇宙茂績光後前位髙心愈小任久操彌堅優遊綏福履濵兹古稀年嵗運倐云往春陽聿來還堯蓂餘七葉夀星煥台躔左孤屬初度秩秩敷賔筵盈門來賀客車馬何駢闐堂開塵外境酒醉壺中天獻酬禮有加登降容無偏仁者固宜夀願比椿八千祝頌匪豫私衆心所同然長言播歌詠用繼嵩髙篇送徐太守仲敬致仕聖皇御寶厯圖治臻雍熙守令慎選舉務使安羣黎大守姑熟來循良時所推方書龔黃政力以印綬辭自陳七袠多志耄精神疲有母百餘嵗康强尚未衰乞身遂歸養庶得盡其私寵恩倐涣頒五馬不可羈長揖别交友矧子為故知憶昔永樂中宫僚並命時一朝餞出守㑹少多睽違兹焉謝事去把袂驚分攜黃鵠逝翩翩遙望清江湄重結紫霞想不負青山期樂哉戲彩服眉夀應同躋文敏集卷二
