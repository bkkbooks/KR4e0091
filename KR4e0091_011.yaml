body:
  text: 文敏集卷十一明楊榮撰序大祀宿齋壇倡和詩序正統己未春正月十有五日甲午昧爽皇上以明日乙未大祀天地乘法駕從百官恭詣南郊省觀犧牲品物已乃御齋殿凝神端穆預嚴對越左右侍衛與臣工執事者亦皆秉寅清之忱思以駿奔自效罔敢或怠夜三鼓上具衮冕登壇升降祼獻天宇澄霽月星明潤大樂迭奏聲歌協和神祇洋洋來享來格禮成和風飄揚香靄芬馥聖心恱懌凡與祭者莫不歡欣以為皇上誠敬純孝之至昭孚感格以至於此神之儲祥降福於國家者豈有窮哉豫以衰邁猥承恩命以相大禮深竊慶幸乃賦二詩以紀其實而詞林諸君子屬和者甚衆得詩凡若干首夫以豫之謭才固不能詩而國之祀禮莫大於郊穹祇百靈於是乎饗聖祖神宗於是乎配皇上至誠大孝於是乎盡而臣子助祭精白之心亦於是乎見非常祀之比也詩之作其可已哉矧諸公才思振發其言和平蓋盛世之音有足傳者豫奚容閟乃輯為一卷敘述其概俾觀者有所考焉登正陽門樓倡和詩序皇上嗣登大寶以來仰祖宗之成規隆繼述之大志凡事之有利於天下國家則必為之與夫為之而未及成者皆以次修舉民不知勞而功克就易曰説以先民詩曰庶民子來信有徵也正統己未夏四月正陽門月城成是月望日朝退之暇少保江陵楊公與余暨禮部侍郎臨川泰和二王公學士文江錢公往觀焉時雨新霽天氣清和微風輕揚埃壒不生既抵城門適與都督沈公遇公董城之役者也遂導豫五人者登城樓觀新制作躡梯三層至最髙處極目四望內則宫闕之麗崔巍輝煥太液金溝之水混涵蜿蜒萬歲之山雲霞繚繞佳木鬱蔥外則潞河之流東入于海沃壤之廣南去無際西北則連山層巒逶迤聳伏若虎踞龍蟠環城四靣皆居民凡數百萬家櫛比鱗次望之莫極遂循城西下出城門觀橋橋分三道皆疊石為之中則輦路也徘徊者久之沈公具果茗欵客辭去豫顧謂諸公曰古所謂天府之國帝王之都莫過於此太宗文皇帝肇啓宏規仁皇宣考纘承丕緒宅是形勝以朝萬國惟外城及樓未就上篤念先志作而新之以成萬世太平之業何其盛哉少保公曰然吾輩叨逢盛時得從容登覽勝概以舒其心目可無紀述乎公遂賦二詩豫與諸公和之詩成之明日侍郎公又屬豫為之引遂僣書此于首俾觀者知詩之作所以頌上之大功也其和章曰明明文祖肇丕圖遂卜堯封奠帝都千古厚坤鍾王氣萬年景運應乾符經營自昔勞宸慮繼述于今仰聖謨同上層樓望宫闕卿雲五采正紛敷天開形勢壯神京山似蟠龍護禁城樓接上台雲影近河通太液水波平岸花冉冉春長在煙栁隂隂鳥自鳴治化純和民物盛載歌行葦頌皇明小瀛洲詩序禮部侍郎兼翰林侍讀學士西昌王君行儉官于朝者幾四十年清修力行於凡天下瓌竒珍麗工妙可喜之物人所甚好而寶重之者一無所欲而獨積經史圖籍古今百家之書多至數千百卷於居後創一軒以藏之軒靜深閎廓絶喧囂而脫埃氛君於公退則峩冠正襟焚香端坐其間欲其有所披閲研究隨取而得無一不具焉嘗言漢時學者稱東觀為老氏藏室道家蓬萊山者以幽經祕籙無不在故也斯軒雖小而所藏之書幾於東觀因名之曰小瀛洲學士大夫聞者咸發諸賦詠間屬豫序諸卷端或謂豫曰世言瀛洲三神山在海中弱水環之非飈車羽輪不能至斯乃荒唐不經之説君子所不取者也王君為世偉儒讀周孔之書欲行周孔之道而反取此以名其軒不幾於希慕神仙之為者乎豫曰不然名同而實異者不害其為異也君登永樂甲申進士選在二十八人之列績學中祕世所未讀未見之書君皆得見而讀之咀嚼英華以為巳有殆所謂行祕書者矣猶以館閣之藏弗得旦暮取旁購羣書萃于此軒非學之正好之篤能如是乎矧君自任史職纍升至今官所與遊處者莫非正人發為文章黼黻國家傳諸天下者莫非正言其非希慕神仙者之為固己較然矣今取瀛洲以名藏書之軒蓋同其名而異其實者於君何損哉若謂希慕神仙之術而有取乎此非知君者也言者無以對因書以復君之請且以諗焉忠義堂序自昔英特智略之士立功邉陲著名竹帛使天下後世仰之而不置者要其中之必有所本而致然也茍無所本而欲樹績當時流聲後世豈不難哉若今鎮朔參將萬全都指揮使楊宗道名其堂曰忠義可謂知所本者矣宗道名洪世家揚州六合少以祖父功襲為漢中衛百户永樂中調開平時四方靖謐薄海內外悉皆臣順來享來王惟朔漠遺兵間嘗竊發為邉境患宗道在開平也善撫士伍甘苦是同猝爾敵至輒應機決策操戈奮進為諸將校先尤善騎射矢發則敵應弦而墜百無一失由是氊裘震驚望風逺遁莫敢撓邊厥功茂著朝廷嘉之不數年間纍升至今官比者遣其子俊來京請豫序其名堂之意蓋人之大倫有五而君臣其一也人臣於事君之道知無不為為必盡諸己者忠也心有所裁制而動適其宜者義也忠而或不由義未必能發已而自盡忠且義焉則其忠也大矣古之君子知有其君而不知有其身得失利害一不以動其中而惟其職之盡者由其審于忠義之理有素也宗道遭際聖明祗受委託而當一方捍禦之重鞠躬效勞夙夜靡懈位髙而不矜功成而不衒非以忠義存其心能若是哉雖然人臣之事上固莫大於忠義而國家所以褒寵之者亦莫先於是焉宗道自是而往益殫乃心懋乃功俾勳烈煌煌足以追蹤古人而傳之天下後世者尤可必而致也宗道尚其朂哉一樂堂詩序天之賦命於人厚矣而恆吝畀其全也父吾所怙母吾所恃具焉者人之至願既罕得焉父母具而兄弟鮮則又無與共怡愈相友恭以遂親之歡心亦非人子之所樂也幸而父母俱存兄弟具在矣然祿養為榮優於負米之難競爽為美異乎常棣之怨古之賢如仲由聖如周公所未能必得誠非天賦之全無以盡其樂也孟氏所謂三樂而以是為首雖富貴之至不與存焉豈非至論哉豫觀翰林修撰莆田林文行簡之家有以知其得於天之厚而異夫人人也林為閩中巨族髙科顯宦踵武而起行簡經術行義又其族之翹楚者自列職禁林與纂修先朝實録侍今上于經筵去其家十年其尊翁彥璣甫純孝溫文樂善好施壽今八十有一母孺人趙有賢德俱膺封秩享備五福亦七十有六昆季六人奉親好學均著令譽蓋處者以為親養出者以為親榮親安其子之多賢而夀愈增子幸其親之偕夀而孝弟益勉若林氏之于斯樂誠兼全而極至者也其得於天亦何厚哉行簡以省視久曠言其情于上許以暫歸其同官諸君子慶幸之因取孟氏之所云者名其家居之堂曰一樂相率賦詩為贈以申祝頌之情而求豫序其端吾想行簡錦衣稱慶蒼顔華髮齊夀同榮芝蘭玉樹森立相照復取諸君子之詩歌之以侑觴鄉閭父老驚喜而嘆羡其樂詎可涯哉海天南際太史占之有德星聚者必斯堂之所在也是為序重遊東郭草亭詩序正統紀元三月望日余與諸君子遊集于鴻臚卿楊君思敬東郭之草亭其宴樂之盛皆形諸詞章思敬亦甚以為難得願相與為嗣歲之期少傅廬陵楊公著其語於序矣去年以公務弗果行乃以今年茲日尋舊約其景物暄妍園林幽勝俯仰如昨而酬唱欵洽詠歌雍熙文明之化有加而無替惟朋簪之盍視初會少二人焉因相與慨嘆以為斯須之樂有不偶然得也詩既成屬余序首簡洪惟聖天子在上治道日隆輔弼侍從之臣仰峻德承宏休得以優遊暇豫登臨玩賞而歲復歲誠可謂幸矣意之所適言之不足而詠歌之皆發乎性情之正足以使後之人識盛世之氣象者顧不在是歟昔王右軍修褉事風流瀟灑然當典午偏安之際文潞公耆英會志趣髙邁又多出於衣冠謝事之餘今余與諸君子慶遇難而聲氣同使東郭草亭不減蘭亭洛社之勝是又可嘉也雖然斯一日之歡爾而尚拳拳思有以纘之則夫所以續其聲光於百世不朽者當何如也余又願與諸君子加勉焉贈遊擊將軍楊宗道升都指揮同知序自古為中國患莫甚于北敵雖周宣王漢武帝之盛而其將帥有若申甫衛霍之智勇然內侵至于太原不能免夫六月之出師外追窮乎瀚海不足懲其連歲之犯塞迄于近代遂乘時蹈虛震驚邊鄙其趫徑強悍弗可盡述我國家受天明命奄有宇宙仁風化雨蕩滌氛祲效誠者荷綏柔頑悖者遭殄滅由是邉塵不驚海內晏安非夫德大威隆委寄得人曷臻是哉時則有若遊擊將軍楊洪宗道常總鋭旅巡掠朔野宗道精間韜略雄勇傑立平居與士卒同甘苦不自擇便利遇敵輒鷹揚虎闞身先部曲由是旗幟所向罔不克捷非但同時守邉陲者多所弗及誠凛然有古名將之風者也乃正統二年冬烽火發綏延諸邉郡宗道時守獨石有敕俾為之備宗道即遣邏卒先偵之繼以精騎疾馳二百里邀其歸路戰數合敵不能支追斬蹀血窮荒漠而還盡取其所俘人畜事聞朝廷嘉奬升都指揮同知而寵賚尤厚於是其姻友翰林修撰周功敘徵豫文以為贈豫觀人臣取功名莫易於為將患在不得盡其材耳使得盡其材矣患在富貴足則自怠而不復求進今宗道才力卓邁忠激而志強遭逢聖主計必用功必報尚圖效弗止異時紀功燕然畫像雲臺而茅土疏封河山帶礪與大明相為無窮豈直若周漢君臣之事而已乎雅頌之作將亦隨之耳書之以俟贈羅侍郎致政還鄉詩序士當太平有道之世奮自儒科致位通顯有猷有為而無負國家之所屬任固君子所共與其或徘徊耽戀溺於寵榮聲利至衰老而不知止足者亦君子之所共恥也若夫進退有道而皆不失其宜者於今工部侍郎羅君汝敬見之君世家吉之文江以永樂初科進士選列二十八人績學翰林巳而擢修撰升侍講仁廟嗣位遂膺御史之命宣宗皇帝擇使南交廷臣咸以君為宜遂超拜今官至則宣德音揚國體大有以懾服逺人之心還朝未幾奉命巡撫關陜久而多著勞績茲以老疾承恩致政而歸翰林學士王君時彥王君行儉李君時勉暨太僕少卿沈君志行與君為同年且同績學於其别也有不能釋然者咸賦詩以贈而屬豫為序豫惟進退迹也而所以進退者心也迹有同而心則異焉蓋壯而進用於朝思所以致君澤民老而退歸其鄉以遂其優遊間散之適者君子也進為利祿之計退為子孫之謀者衆人也故善觀人之進退者不於其迹而必於其心焉君自擢進士入翰林歷憲臺咸克舉其官既陟亞卿出使能不辱命膺巡撫而餽餉給兵民安其進固無愧矣茲以年及古稀乃浩然而歸曽無纎芥耽戀之意觀君之心非偉然大丈夫深明進退之幾者疇克爾耶宜乎諸君子不能巳於言而形諸歌咏也豫與君相知深且久於其歸又惡能已於言乎故不辭而為之送鍾司訓之任姑蘇序永豐鍾鼎公鉉前少詹事兼翰林侍讀學士曽君子棨壻也往以明經舉至京師因翰林修撰鍾𢎞彰謁豫豫察其謹厚惇實禮之西孰以為子弟師者期年始以所業進試內廷名在選列受命分教蘇之郡庠濱行告曰鼎世家永豐之閬溪族大以繁代以儒顯國朝由科目登仕籍者幾十人鼎少從學士錢先生受書經將資以取科名因循至今年已四十德不加修學不加進雖忝膺一命恐不足以為人師惟先生垂教之庶知所修省而克有成也豫聞其言而嘉之曰公鉉以衣纓之胄能從師力學以不墜其家聲志可尚矣而又謙退不滿惴惴焉若不克堪一命者是尤可尚也雖不有請吾將勉以言况其請之勤而可以無言邪夫士之出為時用莫難於為人師理之未明資以質也疑之未釋資以析也文有未工資以潤色也進退疾徐之節資以表儀也非蘊諸中者有素修諸己者有常其能稱是名而為人所恱服者寡矣子之力學久而自修勤今去為一郡弟子師能明其未明之理析其未釋之疑潤色其未工之文節其未中之節使師道尊而賢士多則庶乎不負其所學而為人所恱服也况姑蘇為東南大郡昔安定胡先生遺教具在今之太守况公復賢且明能力興學校者公鉉之行逺景仰於安定近取正於太守豈非幸哉倘勤於未仕而怠於既得欲望終之有成難矣書曰功崇惟志業廣惟勤公鉉知書者也故用是以為朂送黃尚書復任詩序吏部尚書劍江黃公宗載來自南京以年老懇乞致政皇上圖任舊人弗俞其請仍命還涖部事行在禮部侍郎兼翰林侍讀學士臨川王君時彥暨詞垣諸君相與賦詩贈之而以序屬豫惟自古帝王君臨天下必資耆德宿望相與共政者豈偶然哉蓋以其練事多而知識明深沉重厚𢎞裕有容不矜已之長不忽人之不足懷永圖而不求近效重成憲而不作聰明德望尊隆人自服之視彼輕儇浮薄察察以為明瑣瑣以為功皎皎以隆譽者蓋不可同日而語也書曰人惟求舊又曰亦惟商耉成人宅心知訓意蓋如此公自洪武中筮仕迄今四十餘年歷事列聖纍遷至今官誠所謂老成人矣其為國家眷重宜矣哉雖然崇任舊人不聽其去者國家之厚恩而鞠躬盡瘁老而不忘者亦人臣事君之大節也公雖老而康強知力益精進尚足有為今之往也仰思聖眷而罄厥忠誠俾天下後世知國家克任舊人而舊人無負乎國家豈不韙歟豫與公相知深且久故因其别書此以辨珠玉之首以寓勸留之意云送福建布政使吳君致仕詩序仕者七十聽致其事三代聖王之制也國家循而行之所以體羣臣而全始終之誼者至矣然世之仕有去歸其鄉者不少而引年致政去而無愧為士君子之所嘉羡者亦不多見此余於布政使吳君好德之去有不能已於言也好德世家浙東歲庚辰登進士第初擢禮科給事中出使琉球預修永樂大典巳而奉命撫輯西蜀軍民還升江西按察僉事尋改禮部儀制員外郎預修性理五經大全諸書用薦升陜西右參政考最賜誥封贈二代秩滿升右布政使于福建福建統郡凡八賦稅機務之重繁任是者猛則下有不堪縱則事有不舉君至措理有方事舉而民不擾蓋亦今之賢方伯也比以上計朝會來京皇上敷曠蕩之恩悉俾復任而君獨懇以老疾辭躬拜誥命致事以去聞者莫不羡其去就得宜而樂為詩以贈之余惟君之登科則同年也旬宣則吾鄉也以同年而有惠于鄉其去不可以無言夫君子之仕行其義也退則適其志也仕而得推其惠于人退而得遂其樂於巳此出處之大節而無愧怍於兩間也君自筮仕于今凡四十年而得請歸休于吳越之間將見幅巾藜杖以極登臨觀覽之樂其於君子之道信得之無違者矣雖然君之退休遂所樂矣而忠君愛國之心夙夜奚忘吾知其燕居之暇必能察時政得失民情休戚上聞庶家居不忘朝廷之義不獨專美於昔人也君行因序于詩之首且以寓余意云送副都御史吳敏德致政還鄉序都察院副都御史吳君敏德考績至行在以老疾乞致政因得請歸鄉朝之卿大夫士咸賦詩贈之都御史陳公特以首簡屬豫於乎當太平有道之世荐膺顯仕者遭遇之盛也審出處之宜仕止不失其正者學識之美也既得所遇而學識足稱要必君子而後能之吳君學邃而識明始以經明行修薦任監察御史凡所舉措務存大體不以苛察為明不以毛舉細故為能君子多之暨擢僉都御史拜今職益以清慎率厥屬正羣僚用是憲紀彌張知所避而不敢犯朝廷嘉其賢委任日專君之遭遇可謂盛矣今之歸也或濳心著述或訓迪鄉人子弟出為時用皆君之素志也其於幅巾藜杖尋壑經丘以極優遊間散之適暇則鋪張國美歌頌太平以倣佛乎康衢華人之風俾四方林谷之遺逸見而聞者咸知國家優禮臣下得遂暮年之樂如此翻然感激而願進則於治化之補豈云小哉雖然君子之進退惟適乎義而巳君之進以廷臣之所薦聞天子之所親擢退以老疾告而不違乎國典之常蓋亦何往而非義哉問學之邃識見之卓其為君子也審矣豫日就衰老於君之去不能不為之欣慕因序以識别且亦自期於後云送郡守王處善復任序國家任賢致理尤重牧民之職皇上嗣位以來屢詔大臣慎舉才賢以任守令及其政績茂著則又不次進用以示勸賞恩至渥也為守令者宜亦知所勸矣建寧郡守王溥處善越之新昌人也永樂初由太學上舍釋褐擢山西行都司經歷坐事謫遼東丘市易馬尋以內艱去服闋轉江寧知縣未幾復遣佐平江伯理漕運以有勞績遷刑部廣東司郎中督漕如故九載秩滿升知吾郡事郡當閩之上流要衝有福建行都司在焉所部七縣土廣民夥儲需賦役案牘旁午非有剸煩治劇之才者莫宜居之處善才既優長敏於集事而又治以簡靜故吾郡之民熙然而樂其治愛戴之不啻若赤子之於父母而惟恐其去也今年秋處善以三載奏績入覲因以老疾懇乞歸休執銓衡者知其賢奏令復任濱行過豫請言豫惟士君子之學而仕也其志固將以利國家而乂生民初不以任之大小事之劇易為計也故能安於所遇而始終一致以盡其職業若吾郡守蓋有見於斯矣觀其為幕僚為縣令為郎官為郡守舉盡其職且歷陟憂患而不挫其操可不謂賢哉豫每聞天下郡縣守令之賢者未嘗不為之喜而重其人矧吾郡而有賢守若處善者乎故特敘其歷官行事之美以表著于世焉雖然處善之才非但稱郡守之職而巳也朝廷之用處善亦不止如是而巳也尚其勉之益隆厥績以圖報稱皇上之德意而成其平生之志可也於是乎書送同知方以正之贑郡序溫之永嘉方以正初以進士授吏部考功主事出判閩之建寧九年秩滿考最今擢為贑州府同知濱行禮部郎中黃養正率素所交遊者賦詩贈之請豫文以冠篇端惟國家外設藩臬郡縣之職皆所以為民也而與民相親者莫切於郡縣然郡所以統縣自令以下其賢與否及政事之得失皆得以勸董之故縣之令佐得其人其惠止於一縣郡之長二皆賢則令與佐有所表率而凡屬邑之民皆得以受其惠焉其所及者不亦廣乎贑據江右上遊統縣凡十民生之夥賦稅之供視他郡為最而其地與嶺南相接海外諸蕃國歲時貢獻使軺往來必經于贑任郡寄者當送迎慰勞之茍不得其人則政務棼如督責旁午不足以綏逺人而民且不能以無損焉故守二之職尤貴於得人也以正清慎明敏揚歷中外政績煒然有足嘉者其往治于贑也若駕輕車就熟路惠政之施必大有以被其民矣雖然居官必在於正巳為政莫大於得民能正已則政事益善能得民則聲譽益隆國家所以寵榮光大之者尚未止於斯也以正其勉之贈吏部驗封司員外郎李士澄序自昔縉紳大家子弟多溺於燕安富貴鮮克振奮以世厥家其能去紈綺而躬韋布修仁義而業詩書發身儒科列官于朝為士君子所稱者甚不多見也松江華亭李源士澄天台霽峯先生之裔鄜州同知象賢之孫前禮部尚書兼左春坊大學士至剛之子容貌修偉性敏好學平生間雅謙和不以門地自矜從師講學日有所就於輿馬聲色之好淡如也永樂甲辰春登進士第授吏部驗封司主事居官詳慎涖事惟勤五六載間甚為天官卿所愛重用是薦署員外郎事比以九載滿遂實授職進五品祿其同寅文選郎中吳孟寅輩來請豫文以贈之豫因嘆曰士澄誠可謂難能也己人以明經為進士而至顯庸者世非不多也然往往出自布衣韋帶攻苦食淡之士而衣纓富貴子弟不多有者何也蓋衣食足以華其躬飲食足以甘其口輿馬足以供其出入僕從足以備其使令志滿意得以為終身不事他求其能刻志詩書以紹祖父之美者非惟今不多見在古亦罕有焉惟士澄不然既克自懋勵研究經史登名髙科及任部屬又克舉厥職為卿佐所嘉得不賢於他人也哉矧其年甚富才識甚優名位之來如日方升如川方至未易以量也自是而往益能不自滿假致其敬慎所以繼其父祖之芳聲偉績者吾尚見之也因序以贈之且為他日之徵云送翰林謝編修歸省序宣德六年春翰林編修清漳謝璉重器以初考秩滿得援例推恩封父如其職母為太孺人茲將奉其勑命歸省詣豫告别因請曰璉少承二親之訓得肆力於學孱弱之質不敢以不敏自期竊有志於科目冀得祿為親養既幸濫竿科第待匱詞林茲復獲承恩典榮及二親雖璉之志巳遂然為幸實多矣今之歸也不得先生一言以教之溫凊之暇且將無以奉恱于親而資之以淑諸身也璉非門下士則不敢以是僭瀆豫曰夫人之為學惟忠與孝而已然孝莫大於養親尤莫大於榮親養親乃人子之常職榮親尤人子之難事世固有食祿萬鍾而不得以養其親者身都穹爵而不得以榮其親者誠以有時期之遇而不可以智力致今重器以一介之士發身科第既得祿以養其親又能致爵命以榮其親蓋雖遭遇之盛要亦世德之懿問學之功有以致也且吾聞重器向嘗兩以乙榜登于春官皆不樂就今而卒底于成蓋其有志於立身以榮親者及茲天章寵賁炫耀於一門之內雙親具慶兄弟咸在簮組相輝塤篪迭奏古之所謂晝錦之榮天倫之樂人所不可得者而子乃兼得之其榮幸為何如哉雖然朝廷制推恩之典所以遂臣子愛親之心勸忠於孝也重器茲行其於榮親之孝固有矣其於思圖報稱以盡乎忠孝之大者盍益加懋勉矣乎矧夫仕途方進親夀未艾茍不以今日之榮親者為已足則將來之光且大者又詎可涯哉慶龔則榮夀七十序余昔居鄉邑與龔君則榮契好甚篤嘗飲食寢處不相離者幾一年善則相勉過則相規惟冀乎古人之心交而非靣朋者之比也暨豫第進士官于朝音問往復殆無虛歲君嘗告豫曰吾不能接羽青霄尚有待豫後人耳乃遣子錡遊邑庠受春秋於夀夫楊先生宣德庚戌錡果進士及第為翰林編修既三載朝廷推恩封君文林郎官如子之職人皆羡其善於教子之所致也今年君屆七􅐆錡惓惓以未得奉觴上夀為歉會詔下減京官剩員以待取用錡乃懇辭歸侍其親將行因請言為其父夀豫惟五福夀為之首有是夀然後能享諸福世常有夀者矣或遭貧窶或有憂患而子孫又弗克振夀雖髙固無足以為樂是皆不得為福之全也君承先世慶澤之餘培之以忠厚維之以詩禮體之以謙和持之以信義懋修其行善之積於巳者可謂深且𢎞矣宜其身康強子顯貴龍章褒封享有祿養以全其福也今錡又歸而稱觴祝夀奉勸膝下一門之內簮紱輝映其樂孰加焉鄉邑為子者莫不願其親如錡之親為親者莫不冀其子如君之子所以激人心而勵風俗者不既多乎豫以衰邁叨竊重祿倘得賜告歸拜松梓尚當舉酒祝君之夀兼慶君父子之樂也姑書以俟送禮部精膳主事林貴璧歸鄉序國家崇儒興賢之日得以奮身科目為時名進士固足以為榮矣而猶未見諸用也及命之以官居其位理其事克堪委任然後為可貴焉夫為士而至於可榮可貴則其於進退之際豈不綽綽乎有餘裕哉浙之黃巖林君貴璧質敏氣充而贍於才自少為學即有志於時用從明師治舉業輩行悉推讓之既而由鄉薦上春官名在前列廷對賜進士出身受命擢主禮部精膳司事清慎恪勤卿佐才之僚寀多之可謂能其官足稱委任無負於其所學者矣比以詔裁諸司多員貴璧得歸以俟召命或謂三歲一大比得為進士者百人貴璧於進士中為傑然精膳居禮部為清職况其在主事中為有聲年當強仕知明才敏足以有為是未可以去也豫惟貴璧績學修業得為進士而官于朝志願遂矣暫歸于鄉覩桑梓而恭敬撫松楸而展拜暇時尤得勉力進學以俟召用其進也既榮其退也夫何不可將見其重來也知益明學益充措諸事業必偉然大有可觀今雖去奚足為惜哉貴璧嘗館豫家孰知之為深故不惜其去而書此以期之云送陳司業詩序宣德六年秋九月國子司業陳敬宗光世以考績來北京上俾之復職凡與光世厚者皆作詩送之而以序屬豫蓋光世初為翰林庶吉士以文行知名縉紳間永樂中修髙廟實録慎擇賢者而任之光世與焉未幾凡庶吉士皆授刑部主事光世復徵入史館書成改翰林侍講及修太宗仁宗實録光世復與其間會國子監缺司業而難其選遂以光世往焉或謂光世誠賢於人然既侍講久矣其名實蒸然有聞于上下今去為司業無乃左乎光世聞之蹴然曰司業天下學者之所取法也誠宜德望優重者為之顧乃命敬宗將夙夜勉焉以圖稱尤恐弗及而何左之敢云既涖職日進諸生講聖人之道而正巳以率之諸生大化服而光世之譽益大顯豫嘗謂國家建學於天下以造士皆使學聖人之道也然其師之所見與弟子之所稟不能皆粹也故其成就有不能盡然者及升之太學譬之集衆材於班郢之門而大加繩削焉使小大長短皆中法度然後以之構厦無不適其宜者茍規矩凖繩有未至而欲羣材皆適於用而不爽焉難矣祭酒司業之任蓋何如其重也光世既優於是矣今歸而復加意焉國家得賢之多致治之盛人將於太學乎頌也豫與光世處三十年矣誼不容辭故為序如此送鄭文著還旴江詩序旴江鄭文著氏吏部侍郎文實之兄也文實之尊府守中蒙朝廷推恩纍封至嘉議大夫吏部右侍郎家居髙年無恙子四人文著為長文實次之守中敦謹清直持已謙約雖處貴盛未嘗自矜喜恆以禮義訓子孫歲必遣子一人至京視文實且戒勉之文實居顯要日近清光受上恩甚厚退而自處未嘗以位髙自驕怠益勤慎退遜若無所能者而兄弟聚處則又怡怡以相樂內外舉無間言當時莫不譽歎其父子兄弟之克盡其道也於乎父子兄弟天倫之重也父慈子孝兄愛弟敬乃其道之當然也盡其道之當然然後為無愧於人世之人能若是者蓋鮮矣而鄭氏一門俱賢若此宜乎人之譽歎也抑豫聞之一家之內有父兄焉敦詩書之教務雍睦之行則人人皆興乎禮讓而行乎孝弟貴富榮盛之福蓋有自然而致者禮曰父子篤兄弟睦家之肥也豫於鄭氏見之矣今年春文著以父命來京師與文實怡集者數月南望白雲悵然有懷遂促裝而歸文實乃設宴會以敘相别之情於是所與遊者以經行山川為題各賦詩贈之而徵豫序其端豫交文實又知守中之賢且能訓諸子故諸子篤於友愛如此曷可無言以贈之豫既述其大槩矣文著之歸也升堂侍奉之餘又必有以為教者茍益敦乎孝友之誼豈不𢎞振厥聲大厥家福慶之來寧有既乎故書以序諸作云省愆集序君子之於詩貴適性情之正而已蓋人生穹壤間喜愈憂鬱安佚困窮其事非一也凡有感於其中往往於詩焉發之茍非出於性情之正其得謂之善於詩者哉觀豫友少保户部尚書兼武英殿大學士黃公宗豫省愆集之作其殆所謂吟咏性情而得其正者歟公洪武間登進士擢中書舍人太宗皇帝入正大統首遷入翰林為編修纍拜春坊大學士以職事被譴居幽十餘年仁宗皇帝嗣位即釋復任又纍升今官公居幽時感時觸事形於賦咏積纍成編名之曰省愆其志可尚也惟國家戡除暴亂而開大一統文明之運人才彚興大音復完自洪武迄今鴻儒碩彥彬彬濟濟相與咏歌太平之盛者後先相望公以髙才懿學夙膺遭遇黼黻皇猷鋪張至化與世之君子頡頏振奮於詞翰之場者多矣此蓋特其一時幽寓之作而愛親忠君之念咎巳自悼之懷藹然溢于言表真和而平溫而厚怨而不傷而得夫性情之正者也於乎韙哉公間出是集屬題其端誼不可辭遂序之如此以俟觀者逸世遺音集序逸世遺音集若干卷豐城黃先生子貞之所著也先生少頴悟從其鄉先正劉安所逰究心古學不事矯飭然終弗偶於時故斂其所有以淑於鄉人而其真趣多於詩焉發之先生沒去今垂三十餘載其子吏部侍郎宗載始出是集以示豫曰先君平日所作惟以自適不欲求知於人不肖孤不敢違先志而亦不敢以示人然慮不得立言君子為序之則無以託不朽敢以請於先生豫發而讀之見其平淡而不華明潔而歸諸理追趨乎風雅浸淫乎騷選一皆出於自然古之所謂有德有言者蓋如是夫嗟夫詩自三百篇之後作者不少要皆以自然醇正為佳世之為詩者務為新巧而風韻愈凡務為髙古而氣格愈下曽不若昔時閭巷小夫女子之為豈非天趣之真與夫摸擬掇拾以為能者固自有髙下哉先生負有為之才而不見用發其所蘊於詩故所作超然有異於人而非稚學小生所能窺測天分之髙涵養之正宜其過人逺矣豫自壯歲與宗載官同朝雅聞先生名今髮巳皤始得見先生詩慨儀範之不作仰髙致於遺音為之於悒者久故為序之如此先生諱堅子貞其字蓋庭堅太史之後故其家學淵源有自云贈大理少卿吕公致仕歸紹興詩序仕者七十而致事古之道也蓋年至七十則筋力微視聽衰雖欲勉於事功有所不能如是而猶委以政非所以安養老者也於是俾致事而去則上下之道皆盡矣其説載於經而治天下者皆著為令未之有改也大理少卿吕公升自洪武中纍仕至今官祗事四聖歷四十年其所樹立卓卓在人耳目今年巳七十請致事上憫其老不欲煩以政許焉吕公喜曰上之仁我也厚矣我何以報哉擊壤鼓腹詠歌德化使千萬世而下有以知聖明待下之仁庶幾以畢吾志或謂吕公七十致事誠古之道也然古之人有吕尚衛武者其年既八九十矣而猶居將相之任今不此之效顧自託於擊壤咏歌無乃非所宜乎吕公曰吾何以效二公為哉二公皆當時之所託重而恃力者觀於大明之八章與抑之四章其精神智力誠有過人者是故有二公之精神智力又為時之所倚則可不然其能免於曠官之譏竊祿之嫌哉世之人固有老病而不去者未必不託二公以自解然吾知其不能免於議矣今吾非忍去朝廷也顧老且病一宜去於今之著令二宜去何敢妄擬二公纍士大夫之清議哉行吾之所宜而巳豫聞而歎曰賢哉吕公其能審於義者耶君子義以為質壯而仕老病而去皆義也義之所宜則行之奚人言之足惜哉吕公可謂審於義矣且吕公之去道雖不施於用而猶可以淑諸人蓋古之君子致事而歸則以其道教鄉人子弟使皆為才且良此吕公之所宜務而亦其所樂也豈止於擊壤咏歌而已哉吕公聞豫言益喜曰命之矣升何敢不勉吕公嘗為江西按察僉事江西士大夫知公者相率賦詩以贈行以公亦嘗僉憲於閩中謂豫亦相知俾序之故序其説於首簡云文敏集卷十一
