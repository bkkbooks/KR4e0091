body:
  text: 文敏集巻二十五明楊榮撰壙誌先祖妣阮氏宜人壙誌祖妣諱嫰姓阮氏考諱縉紳母蔡氏世為漳之大族其上世代有顯者祖妣幼聰慧穎敏為父母鍾愛既擇配以歸吾祖歸時曽祖考妣皆蚤亡祖妣常以弗逮養舅姑為憾每見吾祖哀戚感慕亦為之涕泣不食嵗時薦祭極其誠敬處已謙和治家嚴整勤儉好施予見人之苦若已有之每躬率諸婦紡績至夜分乃寐比冬月乃較諸婦所作多少㑹集分之餘則以散婢僕雖飲食細故務在適均有不及者輒推己之食與之族人有未嫁娶者皆言於祖考具粧奩嫁娶之又有族孫婦年少寡居及孫女出嫁夫亡無依而歸守節者資給之特厚聚㑹之際撫慰之意尤篤於是獲成其志節者多矣存恤下人一於慈愛有疾病者必親視之女適李氏躬送於門李氏家頗富始至即設宴㑹親族器皿皆用金銀其主母有驕矜色諸子婦亦倨傲自若畧不為禮舉酒未半有起更首飾衣服數次者子弟婢僕亦然惟祖妣安坐不動衣服淡素自始至終禮節惟謹李氏深愧服次日再㑹賓客筵中整肅其主母加敬諸子婦皆不敢仰視祖妣歸召諸子諸婦歴言李氏尚浮華禮節且曰若此其能久乎汝輩當以此為戒我家惟酒器首飾許用金銀其餘皆不可僣侈及後女歸寧云李氏主母自一見祖妣後深自悔責起更服飾之風遂絶未幾李氏果凌替女亦早亡遺二甥女曰均曰貞無所依附迎歸撫育洎長擇所宜歸以適在城鄒氏豐樂范氏婢僕年逾二十五三十者即為之嫁娶使自成立或有遇嵗歉遭急難將所愛玩器求贄鬻者卻其所愛貸以錢穀聽其自還不問其息嘗戒諸子孫與人索逋見其貧窶即止若逼迫取人田宅及致人嫁妻賣女者所得恐不償所喪耳宜深誌之嘗見飯顆在地即集諸婦輩皆至然後拾而食之且戒之曰汝知五穀之艱難乎此乃農人之汗珠也安可暴殄或分寸布帛即自收藏積聚多則給與貧家婦女補綴無不感悦諸婦有性資寛慢者必勉進之躁急者必懲戒之務使執守婦道毋敢怠忽惜乎訓育既成而四婦已亡其三所存者惟第三婦劉氏榮之母也先伯父伯祥有司以孝廉舉授鳳陽留守右衛知事先五年卒祖妣為持喪三年日御蔬食遇徭役之事至則督僮孥勉於趨事惟恐或後平居無事遇節序及夀旦慶㑹子孫滿堂人孰不以為樂而祖妣愈加警惕尤慮他日之不如也自祖考卒後治家十有八年内外親族略無間言夀八十三髪如漆齒如貝自少至老剪製紉縫之事皆親為之諸婦多有獻者受而不用生於元延祐甲寅三月十四日嵗洪武丙子十一月五日無病而逝殯斂衣服衾褥皆生時自具不以勞人子男四人長伯祥次伯起俱先卒次伯成伯安女一人適西甌劉子和孫男二十四人孫女十一人曽孫男二十有八人女七人以是年十二月二十九日葬於龍津居宅壠後凡鄉鄰婦女過而望之無不涕泣想慕有徘徊不忍去者其使人感慕如此榮叨承祖妣之訓至於成立夙夜弗忘今兹遺棄大懼懿徳淑範弗暴於世敢摭嘗所聞見鐫勒于石以圖不朽焉㑹昌伯太夫人壙誌太夫人姓丁氏諱善源考諱某母某氏世居山東濟南鄒平縣之醴泉鄉家世長厚以積善稱太夫人生元至正乙酉某月某日自幼聰敏端淑克勤女事父母鍾愛之為之擇婿得同里大姓今追封㑹昌伯孫士英遂歸之既歸孫氏家室攸宜克盡婦道事舅姑以孝相其夫以禮閨門整肅内外雍睦宗黨稱之子四人長曰忠由太學生歴官至中府都督進封推誠宣忠翊運武臣特進榮禄大夫柱國㑹昌伯次蠢兒早卒次魯次智女四人長適王友諒次適髙子昇王士興劉宗禮孫男四人繼宗紹宗俱授昭勇將軍府軍前衛指揮使顯宗續宗俱授懐逺將軍府軍前衛指揮同知孫女四人一為今上皇后聖淑慈仁齊古明哲一適陳禮一適朱璽一適朱能曽孫男五人曰瑄曰琦曰璘曰本祥曰某女一曰鶯哥宣徳六年秋九月庚辰太夫人以疾卒於家享年八十有七時忠隨侍在京師訃聞皇上特命馳驛歸葬遣中官賜祭勑禮部加厚䘏工部為營葬具國家於親親之恩無以加矣卜以某年某月某日葬於本鄉横山東北之原嗚呼太夫人徳行兼備夀福俱全膺受褒封顯榮終始夫復何憾謹述其大槩以誌于壙垂不朽焉謹誌遂安伯陳公壙誌公諱英姓陳氏四川重慶之巴縣人祖諱志昔太祖皇帝龍興之初自武昌歸附屢著武功由宣武衛百戸累陞燕山中䕶衛世襲指揮僉事太宗皇帝平定内難復從征討積勲陞都指揮同知隨侍入京大位既正論功錫爵封奉天翊衛宣力武臣特進榮禄大夫柱國遂安伯食禄一千石父諱春亦以平内難從征有功累陞燕山中䕶衛指揮使既卒公襲職永樂庚寅公之祖卒公以嫡孫特承恩命襲伯爵愼密小心式稱朝廷任使凡三扈從北征沙漠戮力行陣克効勞勤師旋重承賜賚授以誥命仁宗皇帝嗣統命公總兵鎮守薊州永平山海等處施設有方邊堠無警士民懐之復蒙朝廷垂念給授誥命追贈公父春為遂安伯封母徐氏為太夫人恩賚有加皇上即位益隆委任召還命掌前軍都督府事公夙夜盡心罔敢少懈既而領右掖將士扈從東征奮勇前驅殺獲敵衆而還賜以鈔幣仍命副陽武侯薛公往獨石雲州赤城永寧築城既還深沐慰勞比命領兵自通州轉運糧餉至京竣事而疾作上命醫往視之竟不能起時宣徳七年正月己夘也訃聞上為之悼歎遣官諭祭命有司治喪具卜以是年三月庚午葬於某鄉某山之原公生洪武戊辰九月丁丑享年四十有五配朱氏封夫人温柔賢淑克勤内助弟曰廣曰俊皆克成立子男三長順徳早卒次塤次某女一適新建伯李公之嫡孫俊嗚呼公之父子俱以忠勇遭值聖明屢從征伐茂著勲績榮膺封爵公克繼承居家則孝友夙著處外則才勇有聞是以顯被寵眷委任殊深方期永年建勲立名以享太平無窮之慶而乃遽止於斯豈不痛哉然公生有爵位殁承恩禮雖死猶生夫復奚憾兹用述其大槩納諸壙中以貽不朽云封太夫人陳母徐氏壙誌太夫人徐氏諱菩提其先世居常州考諱智昭勇將軍彭城衛指揮使母淑人石氏家世長厚以積善聞太夫人生元至正丙午五月乙酉自幼淑慧言動不茍尤勤於女紅舉族愛之及笄擇配得燕山中䕶衛指揮陳公志之子春遂歸焉陳氏重慶巴縣人以官居北京春為人磊落有大志太夫人既歸陳氏相夫有禮事舅姑奉宗祀盡孝至於處妯娌待姻族禮賓䘏下莫不各恊儀度由是閨門整肅内外雍睦人無少長貴賤咸譽其賢洪武戊寅太宗皇帝平定内難志與春屢從征討積勲志封遂安伯春陞燕山中䕶衛指揮使既而春以疾卒太夫人綜理家政鉅細弗遺又克訓迪其子英有成得襲其夫職嵗庚寅其舅遂安伯以疾卒英以嫡孫得承其伯爵太夫人切切誡以清慎恭勤撫輯士卒竭忠報國為務以是英益知自勵或扈從征伐或出鎮邊方馳驅王事舉稱上意洪熈改元以英推恩贈春如其爵太夫人始進今封方當優㳺以安富貴宣徳壬子正月己夘英亦以疾卒太夫人哭之慟自是思念悲愴益切遂負疾奄奄至今年九月辛巳疾亟儵起端坐召諸子諸婦戒之曰祖宗樹立艱難爾輩宜恊和成家勿生乖忤庶幾永保貴富又曰我平生儉約汝治喪葬不可過厚以違吾夙志言訖瞑目而逝享年六十有八内外婣族莫不傷痛以為無復有斯母矣越二日禮部官以訃聞皇上命官賜祭詔工部為治墳塋卜以卒之明年某月某日祔葬於北京宛平縣玉河鄉先塋之次子男三長即英次廣次俊皆克成立女一適懐逺將軍某衛指揮同知張勝孫男六塤襲伯爵禎祥禮某某女三長適新建伯李玉之孫俊二幼在室嗚呼太夫人生自名門配於令族克相其夫以殖厥家淑徳懿範儀於閨閫又能訓迪其子以底成立顯榮於時享有禄養夀考康寧生膺褒封歿被恩澤顯榮始終夫復何憾是用述其大槩以誌於壙非惟以示其子孫實以昭令徳於不朽焉謹誌平江侯壙誌公諱瑄字彦純姓陳氏世為廬州合肥人曽祖某祖某世積善父諱聞洪武間為四川成都右衛指揮同知茂著勲績既殁公襲其職以勞累陞右軍都督府都督僉事督操舟師於龍江太宗文皇帝舉兵靖内難至江北公知天命有歸即率舟師迎濟論功授奉天翊運宣力武臣特進榮禄大夫柱國平江伯食禄一千石仍兼舊職賜白金鈔幣給誥贈其曽祖祖考俱如公爵曽祖妣某氏祖妣某氏母某氏俱夫人封其妻湯氏夫人永樂元年奉命董海舟運糧百萬石給北京及遼東三年以舟師建百萬倉於直沽遂築天津衛城四年復董海運遼東囘至沙門島值倭冦犯境追𠞰至金州白山島冦敗走屢承命往福建縁海備倭冦聞公至匿不敢出十年復領海運以海道空濶舟行往往眩惑失據奏於太倉海口築土山髙三十餘丈周十餘里為表識以便往來既成賜名寳山詔為立碑十一年築海門捍海堤岸已而朝議以海運艱險濬山東舊河通北京公奉敇於湖廣江西造舟二千餘艘以從河運公建議造平㡳淺舟時甚便之嵗凡運三百餘萬石蓋視海運加二倍焉又建議於淮安城北開清江浦河由管家湖入鴨陳口達清河置四閘以免風濤及掣壩之艱又縁管家湖築堤十餘里畜水且便行者又於河畔置常盈倉五十座以貯江南嵗運之糧徐州臨清通州亦各致倉貯所運糧儀真𤓰州二壩潮港嵗久淤塞咸疏濬之吕梁徐州三洪險峻數壊舟公請於水涸時鑿去傍石導水中流復置三閘蓄水往來便之又於沛縣南刁陽湖口置閘於濟寧北南望湖築堤三十餘里以便挽舟慮舟膠淺則縁堤置鋪夫專指示淺處自濟寧至臨清各置閘以時蓄洩凡所經營具有條理仁宗皇帝嗣位首言經國利民七事協於宸衷降勑奬論賜以鈔幣命其子孫世承伯爵皇上即位以公老成仍命總督漕運兼鎮淮安公益竭心效勞推其謀猷屢賜勑奬勞蓋饟運重事公任之既久積思彌深上益國家下便軍民以是簡在上心去年冬來朝備承嘉勞賜宴於禮部陛辭加賜以鈔至淮安疾作上聞之又賜敇勞諭命其子儀偕名醫往視已而少瘳踰月疾復作自知不可起封所佩漕運印及制勅付其長子佐具奏遂卒宣徳癸丑十月十一日也訃聞上深悼歎輟朝一日追封為平江侯賜謚恭襄遣官賜祭令有司治喪葬以明年某月某日葬於應天府江寧縣大山之原子男五人佐儼儀倫侃女三人長適豐城侯李彬第二子方次適江隂衛指揮同知張瑛一尚幼孫男二豫祼女七皆幼嗚呼公以明敏之識榦濟之才遭遇聖明戮力效勞榮膺封爵光昭先世福及後嗣而身殁之後隆被寵恩加封賜諡昭著史册耿耿不磨夫復何憾用書此納諸壙中以貽不朽云辭楊子將哀辭有序泰和楊公子將為元翰林待制景行之孫泰和州學訓導公榮之子公之所生父公辰母嚴氏早世遂承翰林公之命為叔父公榮後自幼機警好讀書文思敏捷孝事其親雖遭亂流離奔竄㫖甘之奉未嘗少闕葬祭皆克盡禮叔父公武為冦所害公將歸葬之復遇㓂為所執既而察公所以歸葬叔父之意遂義而釋之嘗改葬母孺人胡氏失其一指公號慟求之弗得是夕夢老人告其所在明旦視之果得指焉公之至行大率多類此惜天不假之以年年僅三十有四而終公之沒也其孤士竒甫二嵗及今又五十有三年士竒以明經薦積官至翰林學士兼左春坊左諭徳得以其官推恩贈公於幽壤哀榮至矣然予幸與士竒為同官相知為深故特惜公之才學弗克施於當世而又不得其夀以没遂為辭以哀之其辭曰繄人生之總總兮稟靈秀於兩儀胡修短之弗均兮抑孰宰而孰尸嗟夫子之拔萃兮獨妙齡之英發耀匣劒之鋒鋭兮處囊錐而穎脫孝友本乎天性兮懐愛日之純誠既先意以承顔兮亦下氣以怡聲絢綵衣之五色兮日升堂而拜舞捧華觴以介夀兮薦氷魚於雕俎登詞場以小試兮握鉅筆之如杠爛錦綉之組織兮振金石之鏗鏘維規矩之合度兮領鄉邦之髙薦英聲遹其四馳兮冠當世之英彦值風塵之澒洞兮志壹鬱而未宣信義感於群盜兮出萬死而遂全際大明之麗天兮仰龍飛之景運何數命之遘屯兮竟溘然而逝殞嗟彼蒼之悠悠兮亶福禍之難諶胡為善之弗禄兮乃降祥於慆淫豈天道之幽黙兮秘斯理之莫究顔氏天而稱哲兮蹠雖耄而遺臭矧夫子之有後兮承先緒而弗隳登金門而步玉堂兮儼冠佩之陸離荷眷顧之隆厚兮肆推恩於黄壤宰樹煜其光耀兮發泉臺之輝朗眇予生之既晚兮想遺徳於儀型聊陳辭以寓哀兮泫清淚於交零浙江林參政哀辭有序始予家居時聞吾閩清漳林公子閏以太學生擢五軍斷事有能聲暨予抵京忝進士官翰林則公已出為江西按察僉事能聲益著其後秩滿陞副使再陞浙江參政往來兩京之間始克與公交㳺瞻望風采由是知公之平生以寛仁平恕為心以勤政愛民為務故其所至皆煜然有聲譽而其民率皆愛慕之至於今弗忘然則若公者其可多得哉去年冬以事至京師病卒惟公宦㳺三十餘年徳行聞望足以禆益當時垂耀後世而一旦云亡豈不悲夫迺為辭以哀之且以係予之思焉其辭曰惟公之生兮資稟夙成皷篋太學兮蚤馳俊聲列官府屬兮政舉刑清出佐外臺兮懋著令名繡衣豸冠兮憲節是榮持心仁恕兮治獄寛平列郡是瞻兮善勸惡懲弗苛以威兮弗察而明春陽之温兮玉壺之氷江右之民兮懐徳曷勝甘棠隂隂兮覆彼林坰既去而思兮彼民之情再遷兩浙兮年及暮齡薇垣之重兮參佐是膺方期揣藎兮以效忠誠云胡一疾兮遂殞於京有子彬彬兮先緒克承箕裘弗墜兮文獻足徴公死何憾兮魂其上升歸葬故山兮窀穸是營永世弗泯兮昭兹徳馨嗟予同鄉兮慨想平生申辭寓哀兮以慰泉扃祭文焚黄告先祠文榮荷祖宗積徳叨禄於朝兹者伏蒙皇上大恩特賜誥命褒贈考妣爰及故室恩澤所加幽明咸賴禮應卜日祗奉制書録黄詣墓告焚然恩命既臨謹用牲醴先就祠堂祭告伏惟鑒知尚享焚黄祭告考妣墓文榮荷祖宗積徳垂慶被我後裔獲仕於朝永樂十年三月初一日欽蒙皇上大恩特賜誥命贈先考為奉議大夫右春坊右庶子贈先妣劉氏為宜人爰及故室劉氏亦贈宜人祇承恩命倍萬歡忻永念劬勞彌増哀慕禮應卜日躬詣靈墳祭告而道路遼逺職任所繫弗克自由謹依制命録黄詣墳燎告伏惟恩靈服此休命謹告焚黄告先室墓文恭惟我祖宗積善於躬鬱未章顯施及後嗣予以菲才際遇聖朝叨被教育擢任春坊兼職翰林兹者伏蒙皇上推恩寵頒誥命贈爾劉氏為宜人霈澤所加幽顯咸賴肅對寵光豈勝感激祗奉制書録黄令長子恭詣墓燎告伏惟恩靈服此休命謹告祭告髙曽祖考祝文荷祖宗積徳深厚叨有禄位蒙恩錫誥已表生前晉秩追封載揚䘏典兹者祗奉制命贈曽祖考福三府君祖考福四府君考康八府君皆為榮禄大夫少傅工部尚書兼謹身殿大學士曽祖妣黄氏祖妣謝氏繼祖妣阮氏妣劉氏亡室劉氏皆為一品夫人仰惟聖澤所加幽顯咸賴榮以職事所拘弗克躬詣墓下以伸薄奠瞻望鄉山益増哀感謹用謄黄并製冠服於所奉祠堂祗薦伏惟恩靈如在尚克歆承謹告祭蔣侍郎文嗟嗟良夫聰敏英俊神采煜然春温玉潤惟昔少時自浙來閩予在鄉校實始相親同領薦書並登科第聯仕於朝夙敦契誼玉堂清切出入必偕孤標挺特於俗寡諧歴事列聖荐膺華秩桂坊之選瀛洲之匹簡在宸衷命佐春官公論所屬輿情同歡曽不兩旬旋嬰末疾棄世若遺彼蒼莫詰維兹吉辰靈車戒行予忝故交哀悼曷勝有酒盈樽有肴在俎哭奠此觴永訣千古祭曽學士文嗚呼子棨一世之英昔在學校遹駿有聲永樂初科進士第一韡然其華充然其實列官翰苑多士若林子獨俊茂簡在帝心述作之富河輸海匯天寵所加屢進厥位兩朝實録子在其間執筆賛述千古弗刋我等於子斯文之契久要不忘惟道與義嵗時閒暇詩酒唱酬式驩以敖不競不絿謂相毗輔以迄百嵗詎意於今子乃先逝嗚呼哀哉始子有疾我數往候上命醫藥奔走赴救謂子且起旦夕同朝天不憗遺去莫能招嗚呼哀哉贈官給葬恩禮已至我念疇昔悵何能已哭奠一杯以寫我情惟子有靈想若平生嗚呼哀哉尚享祭外兄劉判官文惟公性資剛果才識罕倫少㳺郡庠洒落丰神自謂文章超軼古昔莫測其端莫窺其室惟予幼弱以友以親切磋講論麗澤惟深曽不數嵗公膺鶚薦藩臬推賢鄉邦稱羨既試春官副榜䇿名遂擢教職嶺海傳經操履惟公惡懲善奬有出其門至今懐仰奈何負氣剛勁自持一蹶弗起積嵗流離迨予入官念公鬱抑薦登鳳池以暇以逸未幾改秩出判横州復當來京謁選淹留豈期一疾溘然長逝凡在交㳺孰不渾涕嗚呼哀哉嗚呼痛哉惟公有子侍公弗離遣歸踰月公乃奄遺五倫之誼父子至親弗克永訣此志曷伸公既無託其責在予亦有同鄉眷念相扶予觀物理有終有始生順死安復何憾矣嗚呼雲山渺渺江海茫茫情則有盡思則不忘薄奠致哀以寫衷腸惟靈不昧來格來享祭黔寧王夫人文惟靈出自勲閥歸於盛族淑徳令儀夙著雍睦曰夫曰子茂著武功惟克相成褒命式隆安富尊榮聯姻戚里夀福兼備孰得而似奚為嬰疾遽爾長終訃音逺聞感動宸衷爰命賜祭且給葬事顯榮始終恩澤𢎞被予與令子同在朝列仰惟懿範孰不嗚咽敢陳薄奠少展寸忱靈其如在尚克鑒歆文敏集巻二十五
