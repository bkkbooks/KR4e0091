body:
  text: 文敏集卷十九明楊榮撰墓碑贈驃騎將軍右軍都督府都督僉事劉公墓碑皇明肇興而四方豪傑之士莫不駿奔景從以乘風雲之會故智者效謀勇者效力皆足以著偉績於當時垂芳聲於不朽誠千載一時之遇也于時若開封密縣劉公諱先字光祖者蓋亦一人焉公自少負大志有膽略既長忠義慷慨才識過人適元末鼎沸之秋即募民兵以圖匡濟義旗所向罔不克捷以功纍升平章政事鄭國公既而元氏國亡公知天命有在洪武初遂率所部來歸從鄂國常公信國湯公收河北諸郡洎西戡晉絳以敗王保之兵復從丞相魏國徐公克陜西秦鳳環慶諸州嵗己酉由平涼入覲承恩授驍騎前衛指揮僉事明年復從征迤北調驍騎左衛甲寅調茶陵衛加授廣威將軍辛酉調征雲南所至身先士卒大小五十餘戰俘獲斬馘甚衆雲南平置烏撒衛指揮使司升公為指揮同知以鎮之時治所新設蒞事精勤撫治有方蠻獠信服未幾賜誥進階懷逺將軍并得推恩贈父證如公職母范氏配王氏俱為淑人戊辰八月乙巳以疾卒享年六十有三將歸葬其鄉而道逺弗遂乃浮殯于淺土者十年至戊寅某月某日其子廣始克奉柩葬于張固堡壇頭村之原子男二長即廣既襲公職復能繼承先緒屢立戰功積官至驃騎將軍右軍都督府都督僉事宣德三年戊申復承朝命總戎甘肅領符節佩平羌將軍印控制西北諸番大著威望明年已酉授誥贈公及先代皆如廣職公之母洎配皆進夫人繼室張氏封夫人次曰德女二人長適甘州右衛指揮于翬次適西寧衛千户鮑玉孫男七曰傑曰偃曰信曰佑曰偉曰俶曰儼嗚呼元運既終而中外跋扈之臣外託興復內懷僭叛因而紛擾者不可勝數其中能知幾識變歸順真主以共成事功者幾何人哉若公乘時自奮既弗克遂其匡濟之志乃能識逹天命際會風雲樹功業于生前福子孫于身後可不謂之豪傑之士哉豫叨祿于朝職專史筆忠臣良將固所樂書既為之序其槩而又系以銘曰天啓皇明元運告終羣豪紛紛莫知適從惟公賢逹灼知天命效義來歸志堅氣徑勇冠萬夫為國虎臣北伐南征奮不顧身勳業既隆位陟三品沒四十年聲威凛凛篤生英嗣實克紹承屢從車駕掃蕩朔庭受命總戎秉符仗節覃布德音邊人以悅惟公才猷弗獲盡施敷佑于後天報未涯錫命頒恩榮膺嘉奬龍章絢爛光賁泉壤繩繩繼繼嗣續繁昌將業罔替令聞益彰維斯丘墓秋霜春露勒兹貞珉永世無斁楊氏先塋之碑維我大父逹卿公其先系出關西唐末有官于閩者因家浦城後子孫益盛散居建陽崇安崇安之𣲖有萬大府君者嘗遇異人示以葬地由是始遷甌寧之楊墩楊墩之後有三十府君者復遷建安之龍津公其裔也祖諱文德父諱伯遜皆隱德弗耀母黃氏公之生手有駢指平生敦厚質實不事浮靡公平正大無所阿徇事親敬長而孝弟之行篤待人接物而忠厚之意隆宗黨有喪不能舉者為殯葬之孤貧子女無所依者為收養之重先祖之祀而躬致其誠命諸子攻醫以濟人之疾嵗凶則推衣食以賑飢寒牛疫則出資廣市以助耕者率族人以惇睦化姦盜為善良嘗募人植木於山戒子孫勿鬻惟施為學舍寺觀舟梁及與人養生送死之用每嵗首則設酒食會鄉人戒毋燬山林恐傷昆蟲草木之生有截流毒魚探巢取雛者皆豫之錢穀深勸其勿為有鬪爭忿鬩貪妬狼戾者悉諭以福禍皆樂然感悔于時左丞阮公受命守閩聞公名禮公為之師故政無苛虐而人賴以安非惟公之行誼著於鄉而仁愛及乎物者如此凡公所以見於日用云為之間者一出於天性之自然未嘗有纎毫矯激而為之也以是人無少長貴賤咸知公為長者至于今仰慕之弗忘娶謝氏繼阮氏俱有賢德子男五女三公以洪武戊午十一月二十二日終享年七十有四以乙丑十一月二十六日葬建寧城東白鶴山之麓公卒時滎甫八嵗思惟公之訓誨諄切拳拳服膺而弗忘及今忝以文學受知聖天子歷官詞林春坊遂兼拜文淵閣大學士之命恩榮寵眷二十餘年矣距公之歿又幾五十年遺澤既敷而胤嗣益蕃音容雖遐而訓言在耳公之行實其詳巳載於銘志兹不具述第敘其槩以見公之所以錫佑于後者如此用勒諸墓石俾來者有所徵焉敬為之銘曰維我楊氏關西肇基繼官于閩益衍其支轉徙龍津粵由顯祖積行纍仁暨于大父大父之生孝友是敦捐資發粟急難周貧知無不為惟義所在雖物之微弗忍戕害病者豫醫死者為葬姦盜革心惠及鄉黨閩有守帥禮公為師厥政弗苛民所庇依先塋之山募植材木用以廣施弗私弗鬻公雖云亡遺愛在兹矧我後裔寧不懷思閩山峩峩惟公之德閩海汪汪惟公之澤爰作銘詩以示後昆慶源所鍾永世其傳故翰林侍讀學士朝列大夫張公墓碑故翰林侍讀學士張公志道閩之先輩君子也其德義學識為當時尊尚豫恆以生晚不及親炙為恨公之孫隆以前刑部主事劉子欽所述行狀來請銘豫讀之慨嘆先輩之不可及尚敢銘公墓乎然以隆之請堅確弗可得而辭也按狀公諱以寧志道其字也元贈禮部尚書諱留孫之孫中奉大夫福建江西行省參知政事諱一清之子其先有光祿大夫諱睦者自光之固始從王審知入閩始居古田之梅溪至公曽大父世延再遷邑之雲津坊一清先娶廖氏生三子頥興野俱幼而廖卒繼娶陳氏有賢德訓育廖所生如巳出陳既有娠一夕夢小兒擎荷葉向月而拜覺而公生賦質清粹神采煜煜襁褓中即嗜讀誦甫六嵗日記千言嘗與羣兒逰寺中僧人難之以對公隨口酬應意甚超卓聞者歆羡八嵗時人訟其伯父逮于獄公忿不能平詣邑伸理令異其言有條序命賦琴堂詩立就且出語新竒伯父由是得釋年十五承父命往寧德受學于韓古遺越五年方歸學業大進鄉之學者莫不推許之登元泰定丁卯進士第初任黃岩州判官不踰年以計擒捕海冦殆盡民賴以安繼升真州六合縣尹有惠政及民以丁內艱去官服闋將上京師為兵所阻教授淮南者十年王鈍石光霽皆其門人也後復徵至國子助教纍官至翰林侍講學士中奉大夫知制誥兼修國史祖考皆贈官祖母賴氏母廖氏陳氏妻宋氏皆清河郡夫人既入國朝拜翰林侍讀學士朝列大夫知制誥兼修國史每承顧問多所禆益賜誥褒諭恩賚特厚焉洪武己酉夏六月奉命賫詔印使安南封其國王未至而王卒國人請授其世子公不聼遣人請命于朝且教其世子服三年喪并令其國人效中國行頓首稽首禮朝廷嘉之賜以敕書比之陸賈馬援并御製詩八篇以奬諭之未幾得疾卒實庚戌五月四日也公生於元大德辛丑四月十有五日至是春秋七十其在安南八閲月著書不少倦臨終自為挽詩意豁然也訃聞敕禮部遣官歸其柩所過有司設祭仍給在任三嵗祿以贍其家以某年某月某日葬邑之極樂山初娶太原宋氏生子四人烜燧煒煜繼娶大名宋氏生子炬烜燧煒早世煜以明經舉湖廣蒲圻知縣炬以茂才薦任江西新淦知縣官至刑部員外郎並著政績孫男七垣圻埴坦埏塤壇埏任南雄保昌儒學訓導更名隆煜之子也公所著文有翠屏藁淮南藁南歸紀行安南紀行集春秋春王正月考故翰林學士金華宋景濓瀏陽劉三吾皆稱公之文章瑰傑逈出流輩而非後學所及其尊敬仰慕于公者甚至豫以末學又安能稱頌公之遺德哉因不揆蕪陋而為之銘銘曰世德相傳厥為名族固始徙閩肇于光祿積善流慶楙育文儒鬱如喬松溫若美瑜富有才華早登科第揚厯中外英聲歘起際我皇明奉職詞林用𢎞禆益恩眷彌深使節煌煌逺臨交址夷俗丕變龍顔以喜寵命方降訃音逺來天語興嗟失兹良材爰歸其柩復恤厥家生榮死哀綽有光華墓門有碑以昭厥德維公子孫永世承式故奉直大夫兵部職方員外郎致仕周君墓碑正統三年夏四月五日兵部職方員外郎致仕周君岐鳳以疾卒於家訃聞其子翰林侍讀敘泣而告曰敘於先君子生不得侍左右而致旦夕養疾不得躬侍湯藥歿不得受遺訓而送終不孝之罪大矣先生知先君子為深而辱教於敘者久幸哀而賜之銘俾得樹碑墓道用昭先德於永久庶盡人子之萬一豫重其意不容以老倦辭為之述曰周氏言之大族其居吉水泥田者世以儒顯宋季有諱應龍號磻洲者舉紹定進士為時名儒其子京孫直寶謨閣以言詆賈似道去官直閣之從子厚號亦山者君之曾祖也元以明經領鄉貢薦入館閣預修三史上言以宋為正統不合而去終鰲溪貞文書院山長諱聞孫者君之祖也贈奉直大夫職方員外郎諱觀號彬彬者君之考也君諱鳴字岐鳳性質頴敏而嗜學才識髙邁襟度𢎞逹言論侃侃如也洪武甲戌以經明行修薦為桐城縣學訓導既至嚴立教條勸課啓迪有方諸生自是樂學出而決科取士者相繼後以外艱去服闋擢即墨主簿優於為政藩司因遣同御史僉事往登州讞強盜獄盜七十三人而稱屈者四十五人御史欲不與辨君察其情果濫乃具為御史言四十五人者悉得不死會兵興所司命縣民出鐡資軍需君奏鐡非所産請出府庫積鐡以抵用庶蘇民力又命民輸豆赴軍而凖其嵗賦巳而復征其米俾以鈔償豆君復奏豆米俱徵失信於民也請從初令且連奏便民十餘事朝廷皆納其言民甚德之永樂甲申徵授國子學正明年太宗皇帝幸太學預筵宴襲衣之賜未幾擢漢府紀善初甚見禮待時王府私有壯士三千非兵部籍發者及所為多不法君輒具諌王雖面從而心忌之王嘗開寶賢堂以延問羣臣實欲招匪人為異謀也君心知之因作堂針寓規諷之意王益忌之會大駕北巡王擁重兵出入君言王宜抑兵威守藩臣禮遂激王怒翌日密令衛士詬侮君及君以白王令質於儀衛司巳而獨送于朝欲搆諸重獄時仁宗皇帝監國察知君以諌忤王無他咎遂降長洲儒學教諭一以教於桐城者教其徒三為閩浙鄉試考官所取士多得人秩滿赴行在升國子博士至南京召見于文華殿慰諭甚至且期以大用尋丁繼母憂服除用薦升今官時方清理戎籍而職方事尤劇君至剖析無滯僚寀服其能三載考最賜誥命階奉直大夫贈考妣如制宣德乙卯乞致仕以歸至是終於正寢歷年七十有五娶彭氏贈宜人繼室王氏封宜人俱有懿德子男三人長日勉次即敘以永樂戊戌進士入翰林院纍升侍讀又次曰廣女二人前兵科給事中金昭伯廬州儒學訓導彭塤其壻也孫男七蒙涣復巽同伯咸恆女三人曽孫男二人女二人敘將歸卜是年某月某日合葬於里之錦峯山宜人王氏之兆嗚呼君為人孝友姻睦急於濟人甫十嵗母李氏宜人卒哀毁不自勝見者稱嘆筮仕桐城即迎父就養及卒奉柩歸至小孤舟將為風覆君仰天而號風隨以定教育二弟冠婚盡禮合三從之親為一爨人近千指服用皆有常度著家範十數條以示子孫族子弟性敏者悉令肄經學取祿仕其有歿官不能歸葬者必為經理而歸之嘗遇清江艾時春之官寧海道為冦所傷且掠其資君求藥愈之而復贐之其尚義類如此少從季父子霖族兄仲容受書經旁及他經傳故學有原委為文浩瀚沈實無浮薄之疵晚號退齋有退齋藁六十卷藏于家别著尚書通春秋纂要授學者惟君以衣纓之裔文章事業既足以克紹前美而詩書禮義之澤又足裕後人是可謂賢也巳銘曰吉多右族世繁且昌傳數百年弗墜而彰文江之濵逺矣周氏慶澤之流詩書禮義卓卓磻洲學正而淳抑有賢嗣為宋直臣子孫碩蕃世濟厥美猗歟職方譽望斯偉教嚴道尊學者儀刑謇謇其言藩國用懲言雖弗行我則無愧仁廟之知謂將重寄作屬夏官弗究嘉猷年既耆邁式遄歸休以逸厥躬以樂厥志胡未百齡溘然遐逝錦峯之山有髙其墳銘昭不朽君其永存追封西寧侯宋公墓碑自昔帝王之興必有英賢為之輔翼然後戡定禍亂以成大業我太祖髙皇帝膺受天命龍興濠泗於是虎賁鷹揚之士乘時而出雲合景從不數年間芟夷羣雄蕩平宇內遂正大統何其盛哉方其時鳯陽之定逺宋公隱約田里抱負才器慨然欲自見於當世適元政不綱四方騷動因竊歎曰國事如此將必有真主受命而興乎及聞太祖舉兵逺邇咸附即偕其子國興及晟上謁時得參預謀議是嵗壬辰隨軍克濠州復征賈魯敗之即授管軍萬户甲午從克五河泗洲盱眙等處并子國興俱授總管乙未又從征克復和州渡江下采石太平遂攻溧陽丙申從攻蠻子海牙水寨破陳也先營克復建康授廣德元帥丁酉克宣州遂留守禦改授天寧奕元帥以年老還建康晟纍從征伐有功先以兄國興歿于王事命襲兄職己亥始得代公為元帥公既以耄疾間居每奮曰吾父子幸際聖明以開萬世太平之業惜吾老不能效尺寸然猶有望於吾兒竭盡忠藎耳厥後晟積功纍升至龍虎將軍山西大同都指揮使洪武乙丑公以疾沒上命治墳塋於京都聚寶門外雷家莊葬焉給賜其家甚厚嵗丙寅晟為右軍都督僉事遂得推恩以其職封公階驃騎將軍晟既調中軍纍充總兵征伐迤西及遼東五開諸處臨機決勝茂著勳績太宗皇帝入承大統晟朝京師升後軍都督府左都督是年選晟第四子琥為駙馬都尉尚安成公主繼而兵部臣言晟第二子瑄先任府軍右衛指揮使而戰死於靈璧為請上特命晟之第六子瑛襲瑄職永樂甲申瑛復選為駙馬都尉尚咸寧公主晟既佩平羌將軍印總兵甘肅號令嚴整奠安一方而西北部落相率降附由是進封西寧侯食祿一千一百石丁亥七月晟以疾沒官歸其喪葬南京之祖塋以琥襲爵甲辰仁宗皇帝即位琥以事削奪洪熙元年春正月復命駙馬都尉瑛襲父侯爵并署宗人府事給以原祿子孫世襲公諱朝用今上即位改元宣德始加贈公及公之考一皆為西寧侯妣朱氏配陳氏皆為西寧侯夫人男七人長曰國用早世次國興以功授總管歿於王事次國祥次晟晟纍官至後軍都督府左都督進封西寧侯次昱任山西布政使次曄次旻女若干人孫男七茂瑄瑜琥玘瑛瑾孫女若干人曾孫男若干人曰傑任指揮使曰偉任指揮同知曰俊任指揮僉事曰儼曰佑俱任正千戶曾孫女若干人瑛間嘗告豫曰惟瑛菲薄叨承祖父遺烈得以聫姻戚里享有封爵斯實先德敷佑所致其奚敢忘然夙夜思惟吾祖當草昧之初遭遇太祖髙皇帝興王之運與吾父兩世戮力屢從征伐茂著勳庸而吾祖不幸年邁負疾家居厥功弗顯瑛仰荷餘蔭叨有厚祿雖蒙國家恩榮盛典寵賁九京而墓碑無文何以示後幸賜一言以褒拂之非惟足以彰朝廷之厚恩尤足以昭先德於無窮也豫弗獲辭因為序次其槩而系之以銘曰昔在太祖受命而興天戈所嚮莫之敢嬰賢豪景從雲龍風虎經營四方罔不順附維時宋公默識事機發迹田野真主是依豈惟公能公又有子竭誠效忠折衝禦侮群雄剪除公亦年耄負疾家居辭榮履道子既克肖懋建厥功諸孫實賢爵位益崇九京茫茫不可復作龍光昭回以慰𡨕漠雷莊盤盤有威斯阡銘以昭之永世其傳故明威將軍建寧右衛指揮僉事贈昭勇將軍福建行都司都指揮僉事徐公墓碑洪惟聖明誕膺天命一時豪傑雄勇之士雲合景從相與經營四方遂成大業若故明威將軍建寧右衛指揮僉事徐公諱義者和州人也裔出柏翳歷世以來代有顯官至元之季公之父曰夀才略過人輕財重義賑濟窮乏有若渴飢及兵興逺邇騷動公父子俱處兵間初從平章額森特穆爾後因靖海侯吳公來歸相率渡江克太平定建康授領軍萬户嘗以力戰創甚命公代之撫其背曰繼吾志者汝也蓋公為子弟時嘗慨然有大志不營治産業剛毅正直膂力過人好讀孫吳書意有所合則撫卷而喜平居以騎射擊劍為樂至是代父戍守江隂施設布置人咸異之吳元年從征偽吳張士誠每戰能躍馬揮刀作虎吼突入其陳衆皆披靡決戰之際雖矢石交集血流至踝弗顧也卒成其功繼克明州福城延平還定昌國拔蘭秀二山洪武元年授昭信校尉江隂衛百户三年升武略將軍汝寧衛副千户從信國公克瞿塘進取西蜀五年復從岐陽王北征沙漠公奮勇深入擒獲甚衆然不妄殺掠所至之處人多歸之無不愛戴之若父母焉又能撫恤士卒與同甘苦故得其死力而功能益著十一年授明威將軍建寧右衛指揮僉事號令整肅偹禦有方繕修力役勞逸適均人心悅服二十一年春得疾且劇即却藥曰死生有命豈醫藥所能療耶顧其子信曰汝曹當忠以事上正以率下勇以禦敵仁以撫衆則臣子之道盡矣言訖而逝其生巳卯終於戊辰享年五十明年信弟侃奉柩祔葬祖妣之塋在甌寧城北之煙源山也配李氏有賢行年四十二而歿始封恭人追贈淑人子男三人長即信次侃次儀女一人早世孫男六人禎祤禧祉禕祺信既承父職嵗壬午率兵至汶上從王師入京升懷逺將軍建寧右衛指揮同知永樂丙戌調征交址既還重沐恩賚以旌其功嵗乙未來朝特升福建行都司都指揮僉事授昭勇將軍賜以金幣給以驛傳仍推恩其先世考妣故公有昭勇之贈距今十載信慨念公之墓石無文恐德美不彰以豫家建寧知公為詳因以狀請銘豫不得辭遂敘次其始終而為之銘曰天啓聖明眷命實隆龍飛渡江豪傑雲從桓桓徐公父作子述決機制勝有紀有律奮勇敵愾實為驍雄萬衆一呼孰嬰其鋒閩浙既平旋定西蜀漠北以清降附相屬奏凱論功授官建寧蒞職恪恭號令嚴明知命之年疾乃却藥孰不有死公死無怍後嗣克賢益振武功寵命薦加顯于褒封煙原盤盤土厚山環勒銘貞石永世弗刓先考少傅公墓碑嗚呼我先考少傅公克承世德啓佑後人而小子榮猥以科第發身偹員翰林歷事三聖恩遇日隆褒封之典及先世者咸得如秩先考永樂十年贈奉議大夫右春坊右庶子洪熙元年再贈資善大夫太子少傅兼謹身殿大學士宣德五年加贈榮祿大夫少傅工部尚書大學士如舊嗚呼國家恩禮極甚盛矣豈小子榮能致之是蓋先德不亡者存焉榮謹敘次勒之貞石用昭示永久先考諱伯成字士美漢太尉震之後有官于閩者子孫家焉遂為閩人逺祖萬大府君之季子三十公居甌寧族益盛人因稱所居之地曰楊墩子孫復自楊墩徙建安曾祖文德祖伯遜俱隱終考逹卿積善樂施與家日以大先考承積纍之厚益圖宏逺自少端謹言動若老成人孝於父母生事葬祭無爽於禮處兄弟極友愛兄伯祥蚤逝撫其子女七人咸底成立睦親姻賙貧困意豁如也嘗曰裕後莫如詩書之教庠序英才所出乃遣榮從邑博士學而諭之曰立身顯親此其階也惟勤勵庶克有成復念鄉人子弟貧無所授教乃開義學招師儒聚而教之與人交始終以誠人有過必規正之故所與遊者多善人邑大夫屢欲薦之懇以親老辭後復舉孝廉至京師以榮官于朝賜歸喜謂榮曰豫素無仕進意兹得遂願念聖恩無以報在汝勉之既歸益自晦養雖藩臬官長按臨郡邑亦不接見所居傍近有雲際山作草堂其中布衣韋帶日同親友濯清泉翳茂林賦詩飲酒休休如也復搆樓數楹積書其上曰吾以此遺子孫使無忘世訓常馳書戒榮惟以忠孝大節未嘗一語及家事榮嘗受上尊之賜寓歸為壽至日招親姻會享後三日復召所親酌之曰人生如白駒過隙求無愧怍斯可也衆異其言是夕沐浴具衣冠危坐命取鄉人債劵焚之語家人毋厚葬母泥隂陽家人環侍而泣復諭之曰母泣死生常理言訖而卒實永樂六年四月丙午也享年五十有六是年九月癸酉葬杭隴山之原先母夫人劉氏諱順甌寧世家自幼知書貞靜柔懿相先考起家婦德母儀為閨門矜式享年五十有五先考歿後六月甲午卒又二月甲申祔葬焉初贈宜人再贈夫人加贈一品夫人子男五人長榮次富次惠信貞女四人吳壽劉溥雷鐔童衡其壻也孫男十有二人女十人曾孫男六人嗚呼我先考積德纍善身不食其報而小子榮叨享厚祿曾不終養仰賴聖明薦隆恩典用昭先德足以表著於世光庇我後人嗚呼為德之報良有徵哉墓表故嘉議大夫禮部侍郎蔣君良夫墓表士之生世有所抱負莫不欲見於有為然恆有弗克遂其所欲者及其薦躋融顯方將效用於當時則夀年弗逮齎志而歿可勝悼哉豫友蔣君良夫實其人焉良夫諱驥世居杭之錢塘自少頴悟知讀書年十二選為郡庠生從師受春秋經貫通三傳得筆削之旨弱冠領江浙鄉薦登洪武庚辰進士第釋褐擢官行人嘗奉命出使郡國皇華之光照映道路蓋君姿貌清俊而神氣秀朗所至人皆仰其風采焉永樂初用薦與修太祖髙皇帝實録既成賜白金綵幣襲衣升翰林院檢討自是日居祕閣得盡閲古今天下之書而學識益進聲譽益隆未幾復與修永樂大典承命為副總裁書成忽為人所連逮繫獄十有餘年君處之怡然未嘗有纎芥不足之色人皆以為難能謂非行素之士不至此也洪熙改元蒙恩得釋升左春坊左司直郎事今上於儲宮小心謹慎克盡厥職既受敕命階承務郎且得推恩封父均美如其官母妻皆安人今上即位宮臣咸被恩遷秩遂升翰林院侍講與修太宗仁宗二聖實録既成有白金文綺襲衣之賜進翰林侍講學士不兩月天官奏六部闕二副之職上特命廷臣各舉所知於是得八人焉而良夫其一也遂拜禮部右侍郎命下之日士林稱慶皆以為儒者之榮遇莫此為盛矣君蒞事曾未兼旬而遽以疾卒宣德庚戌七月丙寅也嗚呼惜哉翌旦尚書胡公以訃聞皇上為之嗟悼親為文遣官諭祭命給驛載其柩以歸詔有司為治墳塋恩德之厚蔑以加矣其孤琳痛其父之奄棄懼先德之或泯乃屬監察御史同郡姚起東為述行實來請豫言將鐫石樹於墓道以垂不朽豫與君同年又同官翰林弗可以辭按狀君之髙祖諱某曾祖諱某祖諱秀實皆隱德弗耀父均美篤善好義以長厚稱於鄉母姚氏端重有福氣善持家配金氏有淑德賢於內助子四人長曰㻞次琳次瑛次某女三人長淑清適王衡次淑明適馮昱一在室孫男四人惟君才性通敏胸次坦夷居家庭則克盡孝友處姻族則敦尚和睦待賔朋久而能敬馭僕𨽻嚴而有恩至於蒞官在職公勤亷慎溫雅和平操履堅確信義兼孚是以人無怨惡時稱忠厚焉雖然君履歷之詳已具于少傅西昌楊公藏墓之銘兹不重著故特舉其大槩與其有所藴蓄而未及施為可深惜者俾刻于墓石庶幾後之人得有所考見焉故宜人張母陳氏墓表宗人府經歷張珂母宜人陳氏以宣德三年十月十七日卒於家明年春正月訃始至北京珂哭踊幾絶已乃匍匐奉狀謁豫請文以表宜人之墓拜且泣曰珂不肖罪孽深重禍延吾母奄忽棄養抱痛終天曷其有窮今將歸卜以是年某月某日奉柩葬於某山之原然吾母平昔德善惟先生以姻戚素所知者幸賜一言刻之墓石以垂不朽庶少紓不孝之罪也豫弗獲辭按狀宜人諱妙善某之女也世居建安之璜溪生元至正丁酉六月癸丑賦性溫淑沉靜寡言而尤習於女事甫笄為擇所宜嫁得里中張伯銘遂以配焉既歸事舅姑以孝處宗族以和相其夫以敬時族姻里鄰咸私相謂曰張氏可謂得賢婦矣舅姑亦喜曰興吾家者必此婦也舅姑既沒哀痛號泣殯斂葬祭皆克盡禮嵗時追慕哀痛有加焉伯銘嘗以賦役居外宜人綜核家務皆有條理至於祖宗之祀姻戚之禮賔客之奉無不適宜而敬老撫幼賑貧恤匱又其餘事也鄉里有假貸者隨所有輒應之其償與否不較也治家有禮法御諸婦役婢僕皆有恩意尤篤於教子以珂性識聰敏即勸伯銘遣入邑庠受經遂登永樂丙戌進士第歷官行人至贛州府知府以轉今官珂守贛時即迎以就養既至郡民莫不瞻奉尊敬而宜人深自謙抑服食儉素略無所增每聞公堂有鞭撲聲輒令人覘之潛加戒止俟珂公退即訓飭之曰為民父母宜以寬恕存心若少加鞭箠傷其體膚豈為民父母之道哉珂嘗以俸祿之入製輕暖市肥鮮以奉宜人即鬱鬱不樂曰吾之意豈在口體哉珂自是隨豐儉不敢違聞者莫不稱歎既而歸鄉言動無異平時而執禮逾謹躬服勞勤彌老弗倦至疾篤囑伯銘曰珂至宜訓以竭誠報國無以我為念且丁寧諸子婦以奉法守禮為先勿貽外人笑也遂瞑目而逝享年七十有二子三人長即珂次善早夭次璡女二人長適魏德次適魏碔孫男六人曰吉曰夀曰慶曰安曰寧曰祥孫女五人長適豫次子讓次適同里陳某餘在室曾孫二長文顯次文逹嗚呼女婦之德儀刑閨門之間固弗得大著於外然孝子欲顯其親則又不能不託之於言以垂不朽况宜人於婦德母儀兼盡其美而又樂善好義以夀考終皆非人之所能及而豫於宜人之淑德賢範又耳熟而目擊者烏得不表而出之遂為敘次其槩俾劖諸墓碣以昭示于悠久焉贈奉議大夫兵部郎中田汝楫墓表為善者必獲福理之自然也然世有積善行義而不膺爵命隱約以終至其沒也乃得蒙褒贈之典以為身後之榮者兹豈非德義所施而有以獲報也乎今兵部武庫司郎中田忠之父汝楫卒之後十有九年為洪熙改元之初始得以忠推恩褒贈如其職配王氏為宜人宣德巳酉之秋忠以公務來北京乃述其父行實來請豫文以表諸墓豫與忠交契甚厚素知汝楫之為人故弗獲辭按狀汝楫字仕濟姓田氏其先夀州之下蔡人元之世有諱某者為總轄官仕濟之髙祖懋為淮西亷訪司副使曾祖某仕提舉祖諱盛國朝授太平宣城同知改知州永新後調福建行都司斷事亷謹自持其後以老致仕卒於建寧葬城南之覆船山仕濟因守父墓乃置田築舍家於城中遂為建寧人仕濟資稟惇厚聰敏過人事親克盡孝敬處鄉䣊姻戚克著信義言不妄發發必中理人不濫交交必君子家庭之間自老及幼翕然以和至於應官府處家事皆有條序纎毫罔失平居喜讀書而尤攻性理之學訓誨諸子必諄諄仁義之言外甥午初生而母死無鞠育者即於乳抱中挈歸養之愛如己子竟克成立生物之微必愛惜之每見地上行蟻輒迂迹以避惟恐踐之以傷其生家畜雞豚非祀先奉親待賔不忍輕殺深喜建之山水秀麗時時出逰必吟詠笑傲終日盡醉而歸人皆稱為寬厚長者卒之嵗實永樂丁亥三月己巳也距其生元至正丙戌三月己亥享年六十有二祔葬覆船山先塋之次配即王氏有淑行江西吉安人子男三長即忠次寧次福忠由邑庠生登永樂甲申進士第選入翰林為庶吉士未幾擢兵部主事考滿升今職焯有聲譽寧福及三女皆早逝孫男三曰貞曰恭曰敬貞克務學孫女三曰善曰惠曰喜嗚呼仕濟抱負才器足以有為然卒以隱終誠可謂純篤修潔之君子矣復何憾哉况復有賢嗣若忠者位躋顯融荷蒙恩命褒其先世光被幽壤則仕濟雖死猶不死也烏得不表而出之以示後世庶幾為善者有所勸焉文敏集卷十九
