body:
  text: 文敏集卷六明楊榮撰七言律詩送張大尹之建陽東館編摩近一年清時多士羡才賢書成已荷恩光重命下還聞邑政專匹馬蕭蕭辭北闕雙鳬杳杳向南天建陽此去誰云逺士庶歡迎錦水邊送王太守之肇慶瓊州太守舊推賢此日承恩及暮年五馬行逢淮甸雨雙旌重拂嶺南煙都門莫惜金樽盡故里仍看晝錦還移郡喜聞民事簡好將德意重敷宣送僉憲王彥修之四川幾年青瑣荷光榮今日承恩出帝京玉節遙持霜氣肅繡衣初絢日華明都門酌酒寬離思憲府臨民藹政聲莫道巴川西去逺錦城父老喜相迎圍獵關塞霜清曉色明鑾輿校獵出邊城六龍扶輦旌旗合萬騎連營鼓角鳴逺火依微秋草薄驚沙寂歷暮雲平小臣躬覩三驅樂碩效嵩呼播頌聲送義門鄭御史致仕還鄉柏臺珥筆久推賢喜見辭榮及暮年天語丁寧恩賜厚宸章璀璨墨華鮮幾年守職風霜凛奕世同居孝義全總謂田園歸興好丹心猶戀五雲邊送饒僉憲之陜西聖代掄材擢俊賢喜乘驄馬向秦川繡衣行部臨關內玉斧承恩在日邊隴樹總迎霜氣肅塞雲多與曙光連方期此日宣恩德西土黔黎樂晏然送弟尚文回南京吏部遙持使節自南來闕下相逢喜色開風雨夜床情不盡池塘春草夢初回封章已進天顔恱尊酒頻傾驛騎催惟有新圖將别意雲山千疊倚崔嵬送吕僉憲之福建七閩南去路漫漫又喜承恩戴豸冠驄馬去時逢雪霽繡衣行處帶霜寒遙知攬轡澄清易惟惜臨岐話别難翹首雲霄雕鶚徑草中狐兔豈能安送熊自誠南歸都門楊栁緑如絲相送臨岐惜别離九陌鶯花催淑景一生湖海識襟期白頭就養看賢嗣青眼交遊總故知聞説江南多舊業石榴花發到家時度野狐嶺山頭一望一岧嶤四月寒岩雪未消使節有光南國重征裘無暖北風遙心知聖夀齊三祝目極祥雲麗九霄共荷恩波同覆載只慙無補聖明朝次興和舊城宴别夷人聖主尊居四海寬天教頑梗自相殘山河一視乾坤大日月重熙社稷安中使丁寧宣聖德逺人拜舞罄交歡何須更勒天山石萬古神功自不刋度居庸關居庸峻絶自天成鳳翥龍􅋮壯北京猛士防邊嚴警柝行人駐馬聽泉聲雲連幽薊千峯立地接華夷萬里程聖代車書今一統遐方無事樂升平自宣府至德勝關千岩萬壑擁層雲持節南來日正曛關塞有兵嚴號令屯營無事樂耕耘人家多在城中住流水還從澗裏分共喜華夷今一統萬方咸戴聖明君培山書堂知君華構倚培山泉石清幽几席間插架喜看黃卷積鈎簾應待白雲還廟堂此日陪伊傅燈火當時話孔顔未得投簮詢舊業畫圖空自憶鄉關送魏則誠復任霍丘故人别久動遐思此日重逢話舊時百里編氓勞撫字一壺美酒見襟期花飛客路鶯啼早栁拂官橋馬去遲遙望淮山青一髮臨分還寫送行詩送葉文翰致仕還鄉别去鄉園二十秋喜承優詔賦歸休衡門松菊勞歸夢朔雪關河憶舊逰詩卷已知裁蜀錦客裝寧惜敝貂裘遙知紅樹溪邊路應有諸孫待􅋈舟送王檢討使朝鮮海外諸畨入貢頻懷柔有詔命儒臣俗傳箕子封疆舊人仰皇朝德澤新蜃氣晨消霞散綺鯨波夜度月如銀遙知稽顙歡迎處共祝鴻圖億萬春陽山看碑和胡祭酒韻退朝連騎出嚴關曉霧濛濛拂面寒村落喜從行處見江山如向畫中看岩松凝翠森晴蓋籬菊浮香簇露團皇祖聖靈端有在穹碑萬古樹巑岏題蔣御醫永思堂謦咳茫茫杳莫聞髙堂揮涕幾晨昏蒸嘗敢廢如存禮鞠育難酬罔極恩獨鶴下時風滿樹慈烏啼處月當門幸承遺澤膺天寵秪罄丹衷慰九原駕送總兵官征交址隨侍口號二首大駕宵嚴出近畿兹晨遣將討南夷金鍪耀日朱旗繞綵鷁乘風畫槳齊已見兵威消瘴癘遙聞黎庶望雲霓從征士卒皆歡躍應有詩人賦采薇拜領金符出玉墀風雲絢綵動征旗孤城狐鼠歸神算萬竈貔貅屬指麾獻捷佇聞馳露布誓師先見仗天威凱旋宴饗論功日清廟長歌出牧詩交址進白象萬方入貢列殊珍復見南來白象馴瓔珞淨垂珠露濕寶鞍髙襯錦衣新周岐不必誇丹鳯漢苑寧須羡赤麟聖世屢符祥瑞應會看龍馬出河濵陟屺卷一官監牧久辭家客裏思親鬢欲華逰子寸心憂已切故鄉千里路猶賖白雲天際孤飛處萱草堂前幾度花晝錦何時歸養日夀觴瀲灔泛流霞送李侍書赴廣東僉事揮毫久任紫薇郎此日南遷佐憲綱朝佩正辭天闕曙繡衣猶帶御爐香都門臘酒催行斾水驛雲帆促去航遙想下車炎瘴息梅花滿樹月如霜水竹居髙人結屋枕清流菉竹森森景更幽風戛秋聲來几席月搖波影漾林丘身中道義真堪樂世上功名淡不求早晚鶴書應赴隴未容心迹繼巢由岷山圖岷山遙對錦官城逰子看圖感宦情松樹吟邊滄海近杜鵑啼處白雲生思親客夢三更月聽雨鄉心萬里程佇見政成歸省日庭闈白髮沐光榮敬亭山圖宣州城北敬亭山長日孤雲自往還兩水秀分雙練白九華青鎖一眉彎林間竹韻鸞凰語石上苔紋虎豹斑五馬已知從此出錦衣光彩照親顔城南耕隱縣城南面結茅廬日事田疇樂隱居白髮自甘生計拙青雲無夢世情疏身隨野老同來往意與岩雲共卷舒已喜豐年多稼穡不妨燈火讀遺書題閩嶺春晴送貢生劉景韶之京嶺雪初晴麗景遲送君北上望京師江山幾處留詩卷花竹誰家見酒旗璧水登名良不忝瓊林錫宴更深期顯揚自是平生志何用臨觴歎别離送沙同知赴祿州大江南去路迢迢王事驅馳豈憚遙幾處雕題通象郡千年銅柱過龍標山城雨歇蠻煙淨海市風清蜃氣消莫道荒郊叢竹外思明經古戴皇朝雙桂圖亭亭老桂翠連拳秀對書軒過百年清影轉時隨兔魄好花開處散龍涎栽培欲奈風霜久長養應承雨露偏知子不忘先世澤晨昏攀望思悠然題杏林春曉圖十年種杏已成林知子能存濟物心萬樹綵霞凝艷色滿園晴旭散清隂紅芳浥露鶯啼密丹實垂金虎卧深多少疲癃沾惠澤看圖聊為發長吟和胡學士韻四首玉署岧嶤禁苑西石渠天祿勢相齊雲霞絢綵當忩近奎璧回光照席低天闕喜同聨劒佩仙家何必羡刀圭鶯聲恰似簫韶曲時聽綿蠻隔樹啼休將青鏡惜流年身在瀛洲即是仙視草每教依玉几簮花常得侍瓊筵宫羅疊雪頒時服宣管含雲拂御箋解賦清平須閣老幾畨新調滿城傳兩京長許從和鸞盛世賡歌興豈闌在藻賦餘欣錫宴伐檀誦罷愧徒餐只慚淺薄叨陪久總謂明良際會難葵藿有心終向日蒹葭嵗晚獨禁寒風裊爐煙散水沉隔簾千樹晝隂隂廣寒雲氣通西苑長樂鍾聲出上林瑞日迥浮雙闕近彩雲低覆百花深承恩未效涓塵報碩共寅恭罄夙心送鄒庶子還京長陪鶴駕侍東朝又喜承恩在九霄報國丹心常耿耿逢人白髮已蕭蕭兩京遊覽山河壯匹馬經行道路遙歸到金陵逢故舊為言雲樹思偏饒三秀積善由來慶澤垂名家屢見産靈芝已聞育秀當前代又喜呈祥際盛時金采輝煌承曉露玉文璀璨絢晨曦太平自是多嘉應好掇英蕤獻赤墀送鄭御史致仕還金華并序永樂己亥夏四月致仕監察御史鄭公幹偕其弟致仕蜀府長史楷恭遇萬夀聖節自金華入覲皇上念其出于義門既賢且老復能躬詣闕下以致其誠敬特賜宴于殿廷又賜以楮幣并為善陰隲書慰勞甚至朝之公卿大夫見公兄弟遭遇於聖明之世者如此之盛何其幸歟榮忝有斯文之好於其歸也賦詩以贈之驄馬才名出義門懸車深荷聖君恩朝天共祝南山夀歸日頻傾北海尊驛路飛花隨去斾都亭垂栁拂行軒到家喜得陳恩賜猶有鄉閭故舊存慈節堂為吳母題蒼松古柏伴孀居苦節艱難二十餘寶匣流塵朝鏡掩青燈照影夜忩虛承歡喜見斑衣樂介夀還驚白髮疏遙想髙堂調膳後春風花外度輕車題周侍讀弟崇縉東園别墅聞道林園景物新山光水色繞簷楹落花間趂鈎簾入好鳥時聽隔座鳴一徑緑隂知雨過半忩晴影見雲生雅懷不獨幽棲樂兄弟登朝久擅名贈尚寶丞袁忠徹升少卿兩世承恩寵眷隆地居清禁職兼崇君臣慶會時欣遇父子光榮世莫同長侍龍顔仙仗裏每擎玉璽御筵中鵷行屢得聨珂珮欲贈新詩愧未工送政和傅知縣還任朝天已得遂歸心相送臨岐思不禁潞水早寒氷久合薊門臘盡雪尤深仙人自有王喬舄黎庶重聞宓賤琴想到山城春已半停驂隨處是棠隂皆山堂為南昌李時佐題西山勝處説洪崖應似環滁面面皆丹洞雲深龍氣濕翠屏風暖鳥聲諧忩前拄笏花圍席膝上橫琴月滿懷遙想當年稱夀日萊衣五色炫庭階送錢僉憲之福建百二山河攬轡頻又騎驄馬向南閩都門祖餞聨冠蓋憲節光華動縉紳荔子風清宜却暑桄榔雨細不生塵正當激濁揚清日碩奉皇恩慰逺民題彭士揚慈訓堂楚楚儒冠映綵衣生平教育賴慈闈十年燈下存丸膽萬卷忩前想斷機烏哺深恩時有待鮭珍厚養志無違曳裾已遂娛親樂白髮還看衣錦歸送胡訓導之新淦安定孫枝世業專除書逺下九重天春秋筆法鳴昭代月旦鄉評重壯年芹草池邊新子佩杏花壇下素琴絃席珍莫負斯文重他日蘇湖在淦川題陳新冠山書屋冠山深處擅清幽忩户沉沉黛色浮碧樹白雲千嶂曉青燈黃卷一簾秋絃琴時弄梅花操書字頻將柿葉收好向英年勤學業成名宜與古人儔賀吳子尚母饒氏夀芙蓉華蓋擁臨川寶婺流輝照綺筵夀屆七旬孀節苦養霑三釜二兒賢北堂萱草春如錦西母蟠桃日似年喜有文章昭善頌何須重續柏舟篇題金幼學萬松亭萬松深處結幽亭繞屋蕭森偃蓋青十里秋聲風瑟瑟八忩翠黛晝冥冥雲橫老幹虬鬚奮露滴危巢鶴夢醒幾度慿闌清興足半空竽籟月中聽題胡廉使墨菊誰灑溪邊洗墨痕東籬點染此花繁嵗寒不改氷霜操晚節偏承雨露恩冷蘂開時詩滿卷秋香泛處酒盈尊殷勤持贈烏臺客三徑懸知舊業存送潘民止之溫州玉堂華髮老詞臣鄉郡儒官寵命新相見盡推前輩士從逰總是故鄉人枌榆醉後家林晚芹藻生時泮水春此去應知無限樂四時海味足竒珍送大尹李孔翼之任弋陽一官迢遞大江西把酒都門惜解攜孤棹逺經秋浦驛雙鳬遙向弋陽溪薦章已應丹書詔祖席還分綵筆題好向山城敷惠澤循良應與古人齊送判官陳季和之任安陸十年載筆鳳池頭喜奉天書判一州薊北雨餘尊酒暮江南水落片帆秋山城民朴安耕作澤國官間樂宦逰此去想應多善政他年風采動宸旒和致仕祭酒胡公詩三首江南歸老近何如别墅幽偏勝舊居濟世豈無經國術消間惟有滿床書西山雨歇秋風後南浦雲生夕照餘二十年來同事者退休應羡獨懸車人生宦業似君稀晚節投簮靜掩扉撫景屢驚江燕語緘情空望塞鴻飛關河道逺心相憶牛斗墟明劒有輝訓子有詩仍借重援毫揮灑見襟期平生聲價重相如况有文君慰索居薊北謾嗟千里别江南遙寄數行書籃輿花滿春逰處石鼎茶香午夢餘遙想德星相聚處二難持杖更將車孔殿秋香為蹇舍人題文翁興化重虞庠古桂蕭森覆孔堂地走蛟虬翻晝影壁藏蝌蚪帶秋香枝頭金粟含芳氣葉底銀蟾耿素光黌泮托根應得所年年花發比槐黃京師八景居庸疊翠群山聳列勢崢嶸日照峯巒積翠明髙出煙霞通絶塞低回城闕擁神京休論函谷雙崖險絶勝匡廬九疊橫扈從常時經此處坐看天際白雲生玉泉垂虹一𣲖清泠螮蝀懸涵雲浴霧自年年聲回曉闕鳴清佩影落秋崖濕紫煙石罅轉來幽澗裏瑤池分出御橋前汪洋長比恩波闊萬古東流會百川太液晴波太液清涵一鑑開溶溶漾漾自天來光浮雪練明金闕影帶晴虹繞玉臺蘋藻搖風仍蕩漾龜魚向日共徘徊蓬萊咫尺滄溟上瑞氣絪緼接上台瓊島春雲仙島依微近紫清春風淡蕩暖雲生乍經樹杪和煙濕輕覆花枝過雨晴每日氤氲浮玉殿常時縹眇護金莖從龍處處施甘澤四海謳歌樂治平薊門煙樹薊門春雨散浮埃煙樹溟濛霽欲開十里清隂連紫陌半空翠影接金臺東風葉暗留鶯語落日林深過鳥回記得清明攜酒處碧桃花底坐徘徊西山霽雪西山日上雪初晴素壁銀屏萬疊明髙樹迎風飛玉屑小橋流水澀琴聲恍疑滄海通三島絶勝崑崙見五城但使年年足豐稔桑麻燕雀遂生成盧溝曉月河聲流月漏聲殘咫尺西山霧裏看逺樹依稀雲影淡疏星寥落曙光寒石橋馬迹霜初滑茅屋雞鳴夜欲闌北上已看京闕近五雲深處是金鑾金臺夕照獨攜尊酒上金臺尚想當時國士來落木千章寒日下長空萬里暮雲開春風寂寂飛桃李夜雨蕭蕭瘞草萊却笑當時空買骨只今才駿總龍媒送程大參致仕還閩中紫薇分省大江西參佐如君世所稀拱極正期同北向乞身何事獨南歸關河杳杳孤帆逺江海悠悠一鴈飛遙想到家行樂處白鷗相對兩忘機送吳僉事致仕還閩中外臺分職久知名心似氷壺徹底清攬轡早宣明主德懸車今為故鄉榮秋風薊北征驂去夜雨閩南别思生最是聖君恩寵厚到家還著繡衣行送吏部黃宗載之南京揚歷亨衢際五朝從來德望冠群僚南京獨秉銓衡重北闕新承雨露饒逺道風髙鴻已去長河霜降水初消懸知耿耿丹心在松柏凌寒最後凋送大理卿陳勉之南京佐憲烏臺振百僚又承寵命下青霄鳳鳴朝旭鍾山近鴈度秋空潞渚遙應擬有功傳異日還期無訟答中朝丹心一片知猶在莫道年來白髮饒貞節堂别鶴離鸞世所悲寒窗揮淚撫孤兒衰顔無復臨妝鏡華髮猶聞服惡笄夜雨辛勤熊膽訓秋風惆悵柏舟詩聖朝旌異隆恩典丹詔行看下赤墀送彭琉僉事之廣東翰苑編摩久著名喜承鶚剡出神京外臺共説乘驄好故里爭看衣錦榮不獨秋霜清一道還期時雨化諸生嶺南自此民風厚燈火絃歌處處聲送康政僉事之四川衣帶爐香出禁闈逺持憲節錦城西九霄徑翮橫雕鶚五夜文光動璧奎去路想通秦塞近髙名期與蜀山齊輶車到處東風暖桃李隂隂緑滿蹊送髙超僉事之福建柏臺衣繡舊儒紳此日之官向七閩御勑翔龍騰瑞彩離亭征馬動芳塵泮芹漸逐清霜老壇杏應隨化雨新為想南陲渾不逺即看佳譽到楓宸題竹泉圖青苔白石碧溪灣萬竹橫斜煙雨間雷奮忽驚龍化去風生疑有鳳飛還佳人日暮羅衣薄稚子春深錦服斑遙想家林應若此歸休未遂此身間東郭草亭宴集萬方人樂太平辰朝退郊逰逸興新近郭園林初過雨向陽花卉更宜春蘭亭觴詠殊同調茅舍衣冠自絶倫嵗嵗有期尋勝賞載歌既醉答皇仁為僧題王牧之畫梅牡丹國色桂天香獨有孤梅鐡石腸國色豈如寒色古天香寧似暗香長林逋佳句曽鳴宋何遜髙情亦擅梁嵗晏伊誰是知已只留明月伴昏黃送劉子欽致仕還鄉才名獨步重當時宦路誰知與碩違泮水十年憐逺别關河千里惜重歸江南擬結耆英會天上曽聨列宿輝話舊未能窮往事秋風分手思依依送周式縣丞之東莞除書朝下彩雲間晚嵗承恩鬢已斑緑酒正憐官舍别錦衣應喜故鄉還行經梅嶺青春早吟坐松堂白晝間佐縣想能施惠政頓令黎庶動歡顔送御史方勉巡治兩浙曉持憲節拜金鑾冉冉天香拂豸冠霜氣凝寒明繡斧日華分彩上雕鞍盛時已喜觀風好壯志寧辭攬轡難到日貪殘應屏迹閭閻民物有餘歡正統丁巳臘月望後大雪三日聖情恱懌賜黃封內珍已而楊公𢎞濟賦七言律一首豫勉賡韻用識其事云聖治無為德澤長豐年降福自穰穰臘前密雪昭和暢天際同雲布渺茫玉屑瑤花應作瑞赤麟丹鳳謾稱祥廟堂何幸陪芳躅思竭微忠日贊襄和答少傅東里先生齒德俱尊冠百僚聖恩優寵免趍朝丹心炯炯雲霄上白髮蕭蕭嵗月遙𢎞化已推嘉績著論心長遣鄙懷消明廷倚託今逾重肯許還山訪採樵送陳祭酒復任南京分韻得君字考績新來謁聖君悠悠心事得重論未誇紫綬金章貴且喜丹心素節存仕歷四朝名獨重望髙六館德彌尊東風浩蕩門牆闊桃李咸沾化育恩和真率會詩明時優老聖恩深雅會雍容集禁林列坐七人俱白髮論思一片總丹心中朝文物真逾古東洛衣冠復見今海宇升平民物遂何妨痛飲和新吟每念耆年洛社英合歡此日見髙情生來已幸逢昌運老至還欣際聖明視草金鑾恩獨厚論文玉署興逾清乞歸未遂春將半擬奉鸞輿出省耕喜雨聖主純誠格上穹甘霖一灑萬方同山川流潤昭祥應草木回蘇顯化工已喜三農歌帝力頓令四海慶年豐太平氣象今尤盛贊理深期竭寸衷文敏集卷六
