body:
  text: 文敏集卷七明楊榮撰七言律詩送訓導周進赴襄陽除書朝下九重天南去襄陽路幾千祖席滿斟燕市酒征帆輕揚楚江船彤庭試藝逢昭代絳帳橫經屬妙年已喜難兄居禁密名家伯仲總稱賢題劉副使父寄綿詩後官路思親日似年未寒先寄洛中綿衾溫不用爐煨酒衣暖偏疑座有氊春透繭窩宜早起香生燕寢足安眠詩成猶自憐輕費翻笑何曽食萬錢吉郡劉君士皆僉憲河南時常附綿以奉親其尊甫得之作詩并書以寄惓惓焉戒飭之意溢于言表真賢乎哉士皆以九載考最升廣東按察副使持此請豫和之且題之後嗟夫世之仕者其奉親惟恐弗至為之親者幸其子之居官亦惟恐其奉養不備此固人之常情也若劉氏父子其可敬哉其可敬哉送陳顔太守之惠州平生清節廣文氊鶚剡橫飛上九天晴日且傾燕市酒寒氷已阻潞河船雙旗曉度消殘雪五馬春行息瘴烟料想先賢遺迹在公餘逰覽憶坡仙送謝良翰照磨赴建寧盛世掄材擢有司謝家玉樹共稱宜雪殘鳷鵲辭京日酒罷驪駒上道時逺郡民風多朴厚明時治化自雍熙嗟余未得歸田野坐聽東南善譽馳夀劉翀修撰母九十人生七十已為稀况母年登九十期孝養正當娛暮景恩封何幸際明時錦鱗斫鱠供調膳緑蟻浮香介夀巵有子詞林歸未得南山遙祝繫遐思送浙江按察副使江志堅復任外臺佐憲逺馳聲考績趍朝報政成民在湖山俱樂業人傳江海久澄清彤庭恩命催歸思紫陌離歌悵别情當寧需賢資化理深期盡職竭忠誠題長安歸騎圖二首咸陽山水麗晴暉雲擁征畨萬騎歸奏捷九重嘉茂績分符萬里振兵威栁搖暖色籠油幕花送春香上錦衣未數燕然功獨盛他時汗簡更揚輝元戎玉帳擁貔貅武略文韜壓衆流恢拓封疆當聖代盡收部落入神州歸旌想愜輿情望奏凱親承寵渥優從此烽烟空絶塞邊民樂業日歌謳送侍讀曽鶴齡歸省才髙曽占甲科名官任詞垣獨有聲載筆久看承雨露寧親今喜荷恩榮長河風暖氷初泮故里花開日正晴想見升堂頻拜舞滿傾春酒祝長生賜榮堂為西江潜溟題青春擢第冠賢良華構新成倍有光喜著恩袍明獸錦恭承御勑煥龍章山川總映雲霞麗草樹皆含雨露香自是聖朝多寵數榮名從此重筠陽仰髙樓西山髙聳翠參天傑構平臨出市㕓風月晴分虛檻裏星河暝落曲欄邊地連滕閣懷遺跡望入徐亭仰昔賢最愛羣公多賦咏文光夜夜貫奎躔東皋草堂為湯指揮題草堂新構足幽情半近平湖半近城堤上緑楊含曉色雨中黃鳥送秋聲多因暇日觀書帙總道安居荷聖明莫戀湖山多逸興好思麟閣著勳名竹亭為王行儉令祖題百年清望憶河汾人去亭空見此君素節尚存知耐雪新枝初長已凌雲色侵苔徑紅塵隔光泛芹塘翠影分此日披圖重懷仰無因林下挹餘芬送羅照磨南歸薄宦經年白髮生遙辭嶺外覲神京謝官自擬從元亮抱病誰憐似長卿要路青雲非舊夢閒鷗野水有新盟還聞三徑多松菊相對秋風興轉清和答俊齊鄉先生二首不羡蒲輪迓魯申豈圖黃閣畫麒麟暮雲春樹無窮意鶴髮童顔尚健身行誼己知超俗士才華真足任詞臣山林自得優逰樂八十年踰又幾春夙慕青雲志己申敢期瑞世比祥麟恩榮有幸遭明主效報無能愧此身位重公孤叨宰輔職兼翰苑忝儒臣佳章逺寄逢新嵗鳳厯初頒第五春送廖自廉赴沅江訓導捧檄趍朝鬢已蒼儒官南去入沅湘薊門祖帳逢朝雨漢口征帆度夕陽秋入楚山黃葉落風生魯泮碧芹香宦情莫厭寒氊薄老去清閒興味長送梁本之紀善赴魯府曽從巴蜀輔親藩零落堂萱泣血還喜向孔林懷聖德遙從魯國綴清班曳裾時復臨沂水拄笏多因望泰山老去宦情隨意適優遊文翰樂幽閒題趙尚書致仕致仕還家鬢似銀都門冠蓋送行塵真卿持憲聲華舊廣德懸車寵渥新閭里達尊推雅望耆英髙㑹繼前人殿廷慣識尚書履别後還期覲紫宸寄中書許鳴鶴鳳池昔日獨辭榮未盡都門送别情南國雲橫天萬里西垣月落夜三更身閒尚想丹心在老去寧憂白髮生衰倦只今慚我輩何時洛社㑹耆英題竹送僉事孫欽之江西幾年攬轡大江西十郡山川入馬蹄雅操已為當世重貞心應與此君齊葛陂自昔聞龍化憲府于今有鳯栖暇日臨圖更清玩風霜秋色正堪題題孫僉事山水圖繚繞雲山倚碧空畫圖疑與輞川同何人放棹烟波裏有客攜琴夕照中緑樹清隂迷逺近小橋流水自西東幽偏秪可耽佳興未許門留憲府驄題蘇武忠節圖海上羈窮茹雪氊羝羊不乳竟誰憐十年身受風霜苦一寸心同鐵石堅虜塞獨持龍節在漢家豈料鴈書傳河梁泣别生還闕始信孤臣節誼全宋舒城李龍眠寫漢蘇子卿忠節圖而文正諸公繼以詩厥後文信公天祥又識其首迄今幾四百年而河南左布政使旴江饒君得之攜來京師示余嗚呼忠義在人心萬世如一日也子卿居胸奴十九年卧起持漢節仗義不屈信公當宋運之去蹇蹇匪躬之日一覽此圖慷慨激烈有去國思君之念蓋公之心即子卿之心所謂易地皆然者也第子卿之生還信公之死義有幸不幸焉耳彼甘心降虜忘國背君徼富貴於一時者視二公為何如饒君生長江右文獻之邦出膺方伯之任於忠義之道講之有素又得此而寶之誠可謂知所重者矣因其請故賦詩一首書以歸之送知縣羅永年復任崑山昔承薦剡别鵷班墨綬銀章出九關花縣已聞宣聖德楓宸今喜覲天顔去逢梅雪年華逼歸到琴堂晝景閒隱隱碧霄千里外郎星垂彩照崑山郊祀恭侍大駕宿齊宫有作六合塵清化日熙南郊有事致齊時暖回玉殿春光早漏轉銅壺夜景遲五色雲霞依鳳輦九天星斗映龍旗侍臣肅睦惟瞻仰滿袖天香近紫微虎旅龍驤列兩階翠華今夕駐蓬萊聖心亹亹祈天眷星象森森拱上台已喜祥光調玉燭更看和氣藹春臺禮成明日同稱慶歌頌無能愧謭才送李永年參議致政歸鄉參佐藩維鬢久斑投簮今喜故鄉還身辭北闕紅雲下家住南城碧水間籬菊未荒三徑在沙鷗相對一心閒有時半醉西忩裏簾捲秋風望逺山茂恩堂為熊經歷題烏紗珠翟煥庭闈齊慶年髙白髮稀天上雙龍蟠御勑人間五綵絢斑衣椿林不為風霜老萱草偏資雨露肥自是聖恩深似海此生忠孝碩無違送按察使章聰之廣西象笏朱衣獬豸冠除書榮捧别金鑾九秋鵰鶚凌空舉五嶺風霜動地寒才大已為明主重政行當得逺人歡還持嵗晚松筠操留取髙名異日看送李太守致政歸鄉分符幾載守維揚喜有能聲達帝鄉報國尚思葵向日乞身偏覺鬢成霜五湖天逺鴻初舉三徑秋深菊未荒歸去想應無俗慮閒居猶得頌虞唐題兵部主事鄭厚兩峯白雲圖兩峯峯上何所有來往白雲閒自飛英英不逐海風散冉冉應隨山雨歸身寄宦途長在望心懷親舍久相違好似梁公盡忠孝名垂青史永光輝和少保楊先生退食之作皇仁廣大與天同萬姓咸歸覆幬中任重未能𢎞聖化才疏深擬效愚忠喜逢海宇文明日敬仰中和位育功制治保邦明訓在退朝憂思倍忡忡題竹送按察副使嚴繼先誰將修竹倚雲栽翠色清隂繞憲臺彩鳳羽毛迎瑞日蒼龍頭角起春雷不隨仙仗波間化應感簫韶闕下來向曉好風吹緑玉珊珊珂珮在蓬萊賞菊佳菊栽培近玉堂花開今喜應重陽貞姿肯逐秋光老翠色偏留晚節香久向禁垣承雨露還同栗里傲風霜移來玩賞逢清暇為爾多情數舉觴為爾多情數舉觴七人對此興偏長日臨佳色通青瑣風引清香散玉堂已喜四民皆暇豫更看百辟盡才良自慙老去成疏懶未信餐英力更強挽胡祭酒兄白髮江南老布衣青雲事業與心違平生詩酒人爭羡滿眼芝蘭古亦稀濟世只因收藥物看山長是著荷衣楚鄉千古思遺德馬鬛峨峨映落暉挽王孟端襟懷瀟灑晉人風翰墨流傳羡獨工三峽波濤生筆下千山丘壑出胸中蚤逰鳳沼聲名在久處詞林意氣同今日凄凉歌楚些臨岐揮淚思無窮挽胡景芳盛世才名自昔稀曽看白髮到春闈不教姓字題金榜空遣文章老布衣五夜案頭螢尚在千年海上鶴應歸蕭蕭落木文江路馬鬛寒雲鎖翠微挽主事王洪一夕悲風起夜臺蘭苕秀質倐傾摧九京己作騎鯨夢半世空憐倚馬才蒿里凄凉朝露積錢塘寂寞暮潮回懸知窮達皆由命始信馮唐最可哀挽金鳳儀儒官早遂少年逰繡斧光華繼馬周綵翮孤飛誇鸑鷟霜蹄一蹶惜驊騮薦書方達黃金闕召記先登白玉樓碧嶂清江家萬里西風旅櫬在歸舟挽宋尚書早有聲華著外臺還陪宗伯見多才垂紳已喜登廊廟聽履應宜位鼎台遙望旌麾雲外去俄驚旅櫬峽中回九重紫誥隆褒贈不獨生榮死亦哀挽鄭長史輔導親藩早著聲至今清望重鄉評無人載酒詢竒字有子登朝播令名華表鶴歸秋月冷空山馬鬛暮雲平為公展卷思遺德忍賦招魂倍愴情挽古尚書朴華髮蕭蕭坐廟堂南京政簡足徜徉明時共喜芳名播晚節欣逢泰運昌己荷恩榮頒紫誥寧期夢寐入黃粱司徒清鑒當時重簡册他年定有光挽松齊羡君髙誼與誰倫自昔芳名動縉紳道拾遺珠還故主廪捐積粟賑饑民烏聲雜雨山花落馬鬛封雲墓草新賴有諸孫能繼述豸冠文采映青春七言排律送僉憲王孟堅之江西蕭散鄉園已數秋又承徴詔别林丘詞垣簮筆榮名久憲府乘驄寵渥優衣繡三秋辭北闕觀風十月到南州明時文運昭奎璧御勑龍光貫斗牛興學正期追往古育才端擬繼前修外臺五夜秋霜肅泮水三春化雨周共說松筠清節徑更期桃李緑隂稠西江自昔推文獻料得明珠不暗投送周職方致仕還鄉字水仁山是故鄉先朝簮紱有餘光道宗茂叔家聲逺𣲖接磻州世澤長分職王門多諌諍橫經泮水育才良蒹葭己歷秋霜老桃李曽沾化雨香秩轉成均秦博士名髙粉署漢仙郎握蘭久著金閨籍投老先辭玉笋行天上正期星北拱雲邊驚見鴈南翔五湖歸去舟應逺三徑行吟菊未荒晝聽松風閒偃仰夜看蘿月自徜徉二疏漢代髙風在九老香山俗慮忘此日分攜歌白雪滿頭素髮陋馮唐七言絶句題邊文進花木翎毛翠袖逢春自不寒湘江雲散水漫漫飛來青鳥知何處誤作仙源樹裏看墨菊聞道柴桑景最幽晚凉清興到林丘墨池一夜西風起染出東籬一片秋題扇面小景一川澄練石梁孤隔岸雲林過雨餘松下老翁應有待榖城何處更傳書石橋流水帶斜暉應有人家隔翠微坐久不知明月上露華偏濕薜蘿衣題畫誰家老屋枕溪濆十里青山半是雲此處更無塵跡到秪應啼鳥隔花聞小橋流水漾晴沙杖䇿歸來日未斜昨夜東風花落盡一林髙樹鎖烟霞題四景畫十里晴山景嶂開水邊花木映亭臺此中風景應無限自有蘭舟載酒來溪頭垂栁拂青絲溪水𥻘𥻘漾碧漪想得幽居多勝槩芰荷風細雨凉時萬疊青山隱薜蘿千尋瀑布落銀河白雲冉冉生衣上紅葉離離滿澗阿千仭瑤華擁翠巒深深林密玉光寒輕舟一棹歸何處疑是山隂月夜看題雪梅姑射仙姿不涴塵還教滕六助精神那知一段氷霜態付與時人為寫真題折枝翎毛四首片片紅霞入臉勻粧成穠艷照青春山禽亦有風流意畫得雙蛾八字新右山桃畫眉梔子花開素影低哺雛野雀趂幽棲上林更是春光好莫與鷦鷯飲啄齊右梔子寒雀不肯低飛向野蒿從來棲息愛清髙廣寒無數黃金粟吹得天香入羽毛右木犀鸜鵒翡翠叢深雪霽遲一枝冷蕊鬭瓊肌十年不到羅浮洞又是參橫月落時右梅花翠禽題畫幾樹垂楊覆小亭雙雙白鳥度雲屏飄然一棹來相訪正是山人午睡醒紅白山花相映開山中徑路久無媒老翁不是看花客只泛扁舟載酒來遙看瀑布落寒汀野服烏巾自在行好似匡山讀書處滿林紅葉夜猿聲千林萬壑凍無聲一棹夷猶溪上行興盡歸來卿莫笑多情何似不留情五馬圖霜蹄霧鬛氣騰虹日並天間十二中自是清時無戰伐四郊苜蓿老西風題子昻竹自是吳興筆法竒琅玕隨意墨淋漓幾回猶憶吹簫處正是秋山月落時栗圖山果經霜欲熟時苞如刺蝟碧參差早知戰栗承天意不遣龍沙涕淚垂五馬圖天間五馬最雄竒萬里驍騰識駿姿龍種自應充內廏豈同凡馬謾驅馳題菜淡蕩東風二月初過畦春雨長嘉蔬虀鹽自是先賢事猶有清芬在畫圖題十八學士退直從容出禁林如何託興在瑤琴碩彈解愠南薰曲不待知心識賞音右琴清擬蓬瀛海上洲閒將勝負决紋楸笑談咫尺心千里一似留侯默運籌右棋筆底雲烟落素屏金輝玉潤勢逾清看來定是虞文懿獨擅臨池萬古名右書𢎞文館下論思餘徙倚臨風看畫圖舉目河山今一統經營曽是贊良謨右畫題竹贈教諭胡舟數枝瀟灑翠烟濃玉立亭亭泮水東遙想絳帷開講處諸生應得被清風題竹贈弋陽令誰種扶疏一兩竿晴梢裊裊舞青鸞西風忽送瀟湘雨散作琴堂九夏寒題竹雨過江頭夕照收蒼苔白石自清幽不知昨夜蛟龍起化作瀟湘一片秋海上移來怪石竒緑雲深處竹猗猗雨聲昨夜春雷動應是神龍化葛陂凉雲晴壓緑枝低澗底珊瑚長欲齊愛對繁隂清似洗幾回掃徑獨留題辭思親辭三章為陳長史賦有序唐府長史陳範字文範幼隨父避冦居惠陽父沒時年十五女弟三人俱幼弱值嵗饑賴母謝氏紡績織絍以給衣食且教且育暨歸龍川遣範為邑庠生于時男女婚配各克成立永樂乙酉範領鄉薦明年登乙榜教諭湖廣麻城於是迎母就養嘗述其母子艱苦之由作詩三章名曰戲彩曲遇母夀旦及時序或公退之際輒具酒肴以奉率諸子歌是詩而舞務得母之歡心後教授於衡所以奉其母者一若麻城時母歿服除來京特承天恩授以今職誠不次之擢人皆謂其孝感所致閒來謁豫出其所謂戲彩曲者欲請賡其意豫重其母之賢而嘉範之孝因作歌辭三章以答之名曰思親辭使嵗時伏臘祭享可歌以侑奠不惟有以舒範之孝誠抑亦可慰其母於九泉之下云其辭曰嗟陳母之早寡兮遭家流離避地惠陽兮嵗且薦饑遵夫君之命兮保此孤兒旦不停績兮暮不停機貞心耿耿兮誓天弗違念故居之難舍兮攜子來歸遣之就學兮于彼泮池幸子有立兮祿養逮時母今弗見兮子心傷悲永言孝思兮寧有窮期悲陳君之失怙兮孑立㷀㷀母氏鞠育兮劬勞莫勝䇿名登仕兮母所成迎母就祿兮孝之徴稱夀觴兮㫖酒盈舞膝下兮斑衣熒祈天祐母兮百嵗康寧天不憗遺兮溘然遐征北堂寂兮秋月明想謦咳兮慕容聲水可涸兮山可平悠悠罔極兮人子情資母以生兮人誰不然嗟君有母兮其德孔賢中夀遽止兮胡不百年司造握柄兮匪人能遷遐思往昔兮當夀筵舞且歌兮衣蹁躚幽明杳隔兮相見無緣舊曲徒存兮歌聲靡傳盼東山之梅村兮有髙其阡撫春秋以祭奠兮有淚如泉淚如泉兮目涓涓孝子思親兮永弗喧寄致政修撰張宗海有美一人兮蘇之陽昔嘗鳴珂振珮兮班鵷行遨逰金門兮步玉堂赬雲為衣兮霞為裳餐綺食兮酌天漿鳳凰鳴兮于髙岡振翮一去兮倐逺翔想優遊于里閈兮杖屨徜徉我身弗羽兮徒引領而南望我所思之人兮蘇之濵自我不見兮今幾春意其與雲鶴為侣兮泉石為鄰吟風弄月兮其樂無垠寄我以辭兮祝我誕辰披緘閲視兮如獲兼珍人可想而不可即兮情曷以申維雲有鴻兮維江有鱗送黃大尹之廬江君世家兮江之西聨簮纓兮紹弓箕學有得兮才有為名所傳兮人所知乃膺薦兮官貴池欲與聚兮惡勿施撫鰥獨兮恤孤嫠風禮讓兮絃歌詩徭役均兮耕牧時桑柘茂兮蠶績宜饑得食兮寒得衣吏不見兮犬生氂嗟古之人兮疇與齊召父杜母兮應可期二君今往兮于淮之涯民皆赤子兮地皆王畿官不遷兮心靡移終厥美兮慎所持諒公道之昭兮人莫為爾之是非顧富貴在天兮而顯晦之有時維職弗鰥兮素餐之免譏循吾素分兮奚較乎崇卑淮山青兮淮水流漪朂哉崇德兮毋謂莫我知鄺侍郎父哀辭嗟美人之居兮荆山之陽詩書之林兮禮義之鄉學底于成兮為德孔良氷玉其潔兮椒蘭其芳甘肥遁之優逸兮躬芰衣而荷裳紛鶚表之屢薦兮爰分教于邑庠有如時雨之化兮芳菲菲其彌章繼茂膺於寵命兮宰百里之封疆冽寒泉之澄徹兮湛秋月其流光邈卓魯之已逺兮偉政績之可方撫桑榆之既迫兮樂退休以徜徉羌復徴而效用兮羡教鐸之載揚慨日月之不淹兮奄一疾其云亡喜鳳毛之騰彩兮麗雲霄而髙翔恩光賁于幽壤兮粲龍章之煌煌死而弗朽兮其存者長慶流後嗣兮奕世其昌文敏集卷七
