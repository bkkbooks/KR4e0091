body:
  text: 文敏集卷十明楊榮撰記重修河南程氏三先生墓祠記凡先賢所當祀而祀之禮也立祠於墓以祀者禮從義起者也祠久而僨僨而興者常也常則不書而書者大復故也河洛於天地之中扶輿清淑之所鍾賢哲之生自昔林林而盛矣然莫盛於宋程氏父子三先生者程氏世居嵩之陸渾三先生卒俱葬洛陽縣之府店保遺墓至今具存墓側有祠後人以為享嘗之所歷歲滋久薦罹兵燹向之隆者夷壯者弊茂菅宿莽一視蕩然誠當道者所宜究心也錢塘周鑑自郎署出參藩政歷是邦覩之慨然即有志於興復第縻於職務弗果宣德辛亥春皇上圖𢎞化理重惟古昔聖賢之道乃頒明詔凡天下郡縣有先聖先賢祠墓在者所司宜以時修葺毋就于廢鑑祗承德意樂以斯事自任遂以其秋行郡道經嵩邑抵程氏故居得其十六代孫曰子中者與同詣墓所剃去荒穢辨正方位先捐已俸為倡河南守郯城李驥及屬邑令佐亦以其俸助之遂召工計資凡所需之物則取於近邑所宜産戒以期輸集無敢緩者以是年某月某日之吉興工工能材良需用咸足於某月某日告成垣墉棟宇皆復舊規封築堅厚樹植繁密凡所供祀之器莫不畢具以某月某日立開國公神主於祠之中以明道伊川二先生侑食依故制也復子中家俾守祠事遂率郡屬祗奠焉奠已諗于衆曰惟是三先生之墓自宋至今餘三百載其間廢興者幾漫不可知顧念吾徒誦其遺言服其遺訓用底有位茲得奉明詔以周旋執事於故丘之間幸爾訖事要不可無書雖墓間之石有當時銘表在無庸重述而祠之興作歲月不有志之將何以示後衆皆曰然鑑比以公務來北京屬禮部郎中兼翰林侍書蔣暉請豫記其事豫惟道統之傳自吾夫子繼堯舜禹湯文武周公之後集其大成而不得位以行於天下遂私淑於其徒然在當時惟顔氏曽氏之傳獨得其宗及曽氏之再傳而子思三傳而孟子孟子沒其道無傳寥寥千百載間不絶如線逮宋之興文運斯振而明道伊川二先生出孟氏之傳乃續而其學之所自實本濓溪周元公茂叔方元公司理南安時開國攝通守事知其賢深與友善因遣二先生從學卒能以其道倡天下傳於後世人至於今賴之是二先生之功當不在孟子下也宋季臨卭魏華父氏拳拳以二先生易名為請遂定諡伯曰純公叔曰正公皆得從祀先聖廟廷此天下之通祀也天下通祀則墓祠不立可也而墓又有祠蓋墓祠則猶廟祭一家之私祀也通祀以道統之傳惟二先生得與其列私祀則推其所自出而開國公擇師教子之賢是不可泯也揆之於禮殆亦弗畔矣夫然則祠之廢興歲月其志之也宜嘉鑑之能知所重因其請謹為之記三桂堂記禮部侍郎章君尚文作堂於㑹稽山之隂其鄉士大夫相與名之曰三桂之堂堂之前植桂固多矣而以三云者何自晉郤生對策有桂林一枝之喻歷唐宋來遂以艷科目之得雋者曰折桂章氏繇宋迄今舉進士者凡三人故有取於是也尚文世家於越髙大父諱斌宋景定之間鄉舉第一人值末運仕弗大顯傳三世俱以隱德重鄉邦大父暨父以尚文貴皆贈嘉議大夫禮部右侍郎尚文登永樂甲申進士第入翰林典郎署纍遷至今官子瑾宣德丙午領鄉薦正統紀元遂擢進士髙科此堂之所以名也堂峙湖山之門其北為稱山山枕大海出雲氣而吐光景朝夕不窮南為稷山一名齊臺則越王勾踐祭天之所在焉又其南天姥秦望諸峰凌霄漢而隱烟霏鬱然相向娥江耶溪之水環繞其左右而唐所賜賀知章鑑湖一曲者實相屬焉波光山色竹樹映帶竒舒秀卷不一可名此居之勝而得其地也夫綿世澤而盛者人之賢鍾川嶽而秀者地之靈人以地靈地因人傑章氏之桂不特一世有之傳世逾逺而得之者凡三焉是豈偶然之故哉雖然推厥所由亦惟本諸德而已耳姑以桂譬之玉幹瓊枝植之良也密葉繁隂積之茂也金粟天香華開之盛也傲歷風霜志操之堅也故君子有取於桂者不徒擬其榮又將資以比德焉尚文之髙大父名魁多士大父而下雖未逹而均膺寵贈德可徵矣尚文以髙才碩望顯于朝三十餘年而瑾又克繼志濟美振揚於今雖本世德之遺亦以尚文承藉啓迪之致也繼茲以往因其植之良而積愈茂因其華開之盛而志操愈堅吾見德厚而慶延他日後之人於斯桂髙攀旁折也不可以數計矣然則斯堂之揭得不為之權輿乎是為記蘇州府吳縣儒學重建記蘇為東南望郡吳縣蘇之望邑也儒學為一邑之望而或施教無所瞻仰不稱善為政者得不究於心乎然興學盛事改作大役也舉大役而使勞費一出於民其得無怨嗟之聲而克底完美者乎若夫知所究心事底完美而不動聲色得不難其人乎吳縣學舊在城西南隅賓興坊其地卑隘廟學皆簡陋旁逼軍營喧雜相接春夏水潦四集墻壁傾仆誦習常輟郡縣之長二暨師生往往興慨欲遷改之而未有能當其任者宣德七年工部右侍郎廬陵周君忱奉命撫巡東吳諸郡偕知府豫章况君鍾同謁廟學見其不稱因協謀更造之得隙地于縣治西南視舊學地廣四倍髙爽平曠衆咸謂宜况君具其事得請于朝二君復相與議曰是役不可重費吾民遂計郡之諸倉歲積葦席得五十餘萬鬻米可五千餘石凡材石陶瓦之資匠作力役之需悉於是取給而一毫不干於民復擇耆民王信許均美董其事經始於宣德九年冬十月訖工於明年夏五月以日計之二十三旬有竒成功速而人不知其勞享禮有殿講誦有堂藏書有閣宴休有亭以及門廡齊舍庖湢各以序列通為屋以間計之二百三十有餘材用堅而人不知其費其既成也父老歎曰廟學不稱久矣一旦更新於數百年因循之後而不以病民席之積屢矣昔也不侵盜於吏胥則腐化為埃塵今乃以之成一邑之偉望何其善也既而知縣某教諭李讓等具其始末走書京師求豫記惟學校王政之首教化之源也我國家列聖相承興學育材六七十年于茲矣校庠之盛振古未有是以絃誦之聲郁郁渢渢溢乎遐邇而賢才輩出禆贊鴻化後先相望亦莫不由良有司欽承德意以振作之然其改作有方若吳學之建者亦不易得也二君子信謂善於究心者矣來游於斯者尚知力學求道篤志勵行期不負聖明造就作養之仁將必效用於時垂芳於後以為斯學之光則二君子之用心亦必傳誦於無窮矣是為記凉州儒學記聖朝統一寰宇自國都達于郡邑皆建學立師教育俊秀仁義禮樂之化旁洽海隅徼塞人才之衆風俗之美度越漢唐而比隆虞周猗歟盛哉凉在西陲即古雍州之域在漢為武威郡地利物産視河西諸郡為美國朝洪武中設衛置戍而戍者多南士謫至子弟相承讀書習禮而訓導張子受命教育之儒風為之勃然歲滿還京而未有繼者今皇帝嗣位特命行在兵部右侍郎徐君晞鎮其地覩將校子弟多明秀好學而未設學舍以為講肄之所遂以請于朝得命乃於農隙令軍士取材陶甓而經營之既畢工走書京師告豫曰凉州河西勝地初嘗有學然廢已久矣晞至相地鳩工中為明倫堂左右為存誠進德二齊外建重門後為教官之居續創大成殿於堂之東殿以崇計二丈有九尺深幾倍於崇廣則幾倍於深東西為兩廡前為靈星門中為泮池池之東為文昌祠祠之東池之西俱為門外又為崇教門俾往來出入皆由焉其捐資命工塑先聖以下及文昌神像並繪兩廡者則鎮守甘肅太監王公貴少監李公貴總兵寧逺伯任公禮定西伯蔣公貴㑹川伯趙公安暨都察院僉都御史曹君翼巡按監察御史馬君昻陜西參政郭君堅按察副史于君奎署都指揮使事任君啓與凡士庶共成之其置聖賢以下牌位者則兵部侍郎柴君車始終督視繕作且有所營助者則僉都御史羅君亨信勸勞羣工俾樂於趨事者則監軍行在兵部尚書王公驥自丁巳夏經始至落成幾二載壯偉閎耀為隴右學宫之冠衆咸謂宜記于石庶後之人有所考見敬以請夫學校政化之本賢才之所自出也學校立則禮義興風俗美孟軻氏曰三代之學皆所以明人倫也人倫明於上小民親於下非政化之本歟今徐君乃與諸君子同心協誠建學宫於邉陲之地嚴嚴翼翼巍然煥然使凉之學者升降俯仰於其中誦聖賢之訓言而仰其道德之光㴠養薰陶底于成材居而孝於親仕而忠於君則是宫之作其功豈淺淺哉若徒由此以徼利逹而於臣子之行無所砥礪則不惟負國家教養之意而亦為君子之所共羞嗚呼學于斯者可不知所務哉用是以復徐君之請俾勒諸石庶以為學者勸云翕和堂記余幼時聞先生長者言守建寧千户韋楊二公好文禮士人皆愛慕之謹識之弗忘其後韋有子任汀州衛指揮者歲或見焉獨楊公之嗣轉調他所二十餘年蓋未有能知之者及余兩以扈從來北京而楊信中孚忽偕行部員外郎吳公嘉靜來謁余故詢之則曰信之父嘗仕建寧為先生之鄉乃敢求見余觀其胸懷磊落言動謙恭遂留止宿因命觴引酌笑談甚歡於是中孚乃歷道其父昔日所交遊者皆吾鄉之先逹也酒酣拜且請曰信世家西江之鄱陽昔南土內附吾父以功授武毅將軍建寧右衛千户吾父存時篤好文雅嘗於上西河之寓舍植竹萬竿以竹所自號賓客過從者皆賢士大夫其所唱和詩文至于今翰墨宛然也信兄弟少時亦皆從遊志齊趙先生之門其後以襲職調守大同兄弟奉母以居今復僑寓河間郡城中乃於所居之左構堂扁曰翕和蓋取兄弟既翕和樂且耽之義願先生一言以記之余嘉其志之可尚則謂之曰人生天地間父子之慈孝兄弟之輯睦夫婦之協和斯皆天性之常不待矯飾而為之者然惟其氣禀所拘物欲所蔽而後有以喪其本然之天失其彛倫之正於是爭競之心起焉妬忌之心萌焉雖欲翕和不可得矣今中孚之兄弟事母盡孝友愛彌篤而妻孥藹如一家之內熙熙洽洽翕然如五音之合奏溫然如春陽之發舒和氣冲融貫徹無間孝友之至通于神明則其名堂也不徒誇美於一時將以垂訓於來世其意若曰今日吾兄弟翕和如此吾父母安樂如此自今以往吾之子子孫孫皆如今日堂可不作也茍惟不然則必忿氣相加視為敵仇䦧墻紾臂相繼而作其不至於傷風敗俗者鮮矣安求其能翕和哉昔孔子誦此詩而贊之曰父母其順矣乎誠以人能和於妻子宜於兄弟則父母其安樂之矣中孚宜三復此詩日夕警愓以為明訓凡一毫有動於血氣而傷於和者勿作一毫有乖於禮法而損於和者弗為移孝為忠推和為惠將見德業日新而聲光益著不啻於此而已中孚其益勉之常熟縣重修廟學記宣德癸丑常熟縣重修孔子廟學成吏部稽勳主事錢衡世家斯邑少常遊是學來請於豫曰學在縣治東南其地隆然以髙宏然而敞創始於宋至和重修於開禧端平而再葺於元之皇慶至正其間政教興替靡常未可以槩舉也洪惟國朝文教聿興洪武庚戌教諭朱昞來掌教事時學之制左則殿廡㦸門櫺星之赫奕右則講堂齊舍庖廪之畢具其後則有子游祠及先賢堂蔚然可觀歷歲滋久上雨旁風漫以圯壞未有能振之者近西江羅汝寬典教茲邑慨然欲作新之計其工費浩繁慮有弗給乃先度其力可為者為之若廊廡講堂門垣齊舍及先賢祠宇皆循次修葺惟禮殿未之能也壬子之秋縣丞李子亷主簿郭南暇日視學宫見汝寬用力之勤亦慨然曰修學責在有司吾輩視其頺廢而不加力寧無愧焉乃各捐俸以倡訓導徐萬溢翁玭力贊助之命諸生某等督其事衡適得請于朝歸省墓乃奉白金四百星佐其役仍率邑之好事者某某捐資以助於是聚材鳩工殿之梁棟榱桷瓦甓墻壁之毁者易之帷幕器用之敝者新之聖賢像設章服則繪飾之與汝寬先事所修葺者輪奐華采相為炫耀焉是役也不煩于官不擾于民而卒以時就誠可謂難矣敢求一言以示不朽余嘉佐邑及典教者之得人又嘉衡之能輕財而知所尊也故不辭而為之言曰學校育材之地風化之原為國者之先務也天啓皇明大一統文明之治開萬載太平之業在內則立胄監在外則府州若縣莫不有學而學之教法規制蓋已超軼漢唐宋而娓娓乎唐虞三代之隆矣皇上嗣登寶位尊崇儒道凡一言一動莫不師法孔子以𢎞堯舜之治是以屢詔天下修理廟學然郡縣之吏能奉承者鮮常熟邑佐及典教者咸知所重一新學宫可謂能祗順德意者矣夫常熟乃子游過化之地子游聖門髙弟也自今縣之令佐與夫為師生者優游于茲當何如哉必景仰賢哲修舉學政且務其為己之學盡乎孝弟忠信之道勿徒衒名譽徇利祿以負國家建學立師之盛意則庶乎其可也敢以此復衡之請且告其邑人焉重修文公朱先生祠堂記徽國文公朱先生祠在建安郡城北之紫霞洲蓋宋寶慶三年正月所建以奉先生之祀者也歷元迄今幾二百年棟宇頺圯上雨旁風其弊壞可謂極矣國朝永樂乙未監察御史蔣彥祿給事中陶偉巡部八閩至于建安躬謁祠下相與言曰先生發明聖賢之道羽翼六經折衷羣言以嘉惠學者有功於天下後世甚大建安為先生過化之地其有祠宜矣而歷世滋久廟貌若斯何以稱士民之瞻仰乎盍相與新之於是福建行都指揮使司都指揮師公祐侯公鏞徐公信郡守劉敬議以克合乃命耆儒許𢎞暨先生之七世孫鐵董其事仍率邑之賢者相與捐資出力庀材鳩工凡堂寢門廡以及衆屋撤朽易堅葺弊為完仆者植之欹者正之黝堊丹漆煥然畢具經始於是年春正月竣事于秋八月於是建安縣學教諭楊夀夫具其本末謁豫以記其成豫邑人也奚可以辭惟聖賢之言載之經傳所以發至道之蘊奧者固無不明且備矣然而煨燼於秦火剝蝕於漢儒議論紛紜穿鑿傅㑹學者倀倀焉莫之適從而羣聖人之道幾乎熄矣逮至宋濓洛諸大儒相繼而作闡幽發微以明聖賢之道上續夫千載不傳之緒可謂盛矣而其後又有若先生者傑然特出著書立言擴先聖之未發正諸儒之乖誤剖析折衷無復遺藴然後聖人之道昭然如日之行天先生之功其所謂集大成者歟雖然先生之道德天下後世之所共仰而尊之者豈特吾建安為然而祠宇不稱一旦諸君子作而興之偉然舊觀此不惟一時之瞻望而已有志於聖賢之學者安知不緣此而遂為之興起乎然則是舉也其所關係又豈小也哉豫實有望於建安之士也遂樂為之記焉忠孝堂記臣子欲報於君親其道莫大於忠孝古之人所以勒功彛鼎垂名竹帛與天地相為無窮者豈有他道哉亦惟盡此而已茍於此有歉焉惡能有所樹立以報國家以顯大厥親而著名臣賢子之聞於天下後世哉故必於忠孝胥盡而後可也邳州衛指揮使趙本立世家臨淮其伯大父德勝事太祖髙皇帝有大功贈開國輔運推誠宣力武臣榮祿大夫江西行省平章政事柱國同知都督府事梁國公大父端亦仕至廣東都指揮同知父驎襲為福建興化指揮使兄弟父子竭力效勞以罄人臣之忠者至矣而其顯親之孝亦於是而有徵焉宗立能心先世之心恪勤厥職恆懼其久而或忘也乃揭忠孝二字以名其堂間致書京師請記於豫嗟乎自昔武辨之家相承既久其後人往往溺於富貴鮮克念祖父樹立之艱遂致顛覆爵位者多矣其於忠孝何有哉夫忠孝之推也能追念前人而致謹必能盡誠於國而效力今宗立以世勳之裔而能亷慎以自持仁恕以撫下夙夜在公期以上報朝廷下慰祖考忠孝之實度越常流逺矣其爵位之隆所以匹休先烈者未可涯涘尤且不自滿足揭扁堂楣冀朝夕覽省以致勵於心懋建勞績以有譽於天下後世誠可謂不負於君親而與古之名臣賢子同一轍也是宜為之記榮親堂記人子之於親其所以愛敬奉養無所不極其至而又必欲及見其身之富貴以顯揚之然後以為榮焉此臨川張氏榮親之堂所以作也張氏為郡故家歷宋與元簮纓不替今雲南道監察御史士貞之父思魯與母姚氏積善裕家義方克教俾士貞得游庠序早領鄉薦釋褐辛丑進士而拜今官士貞初登第詔歸其鄉而父母康强具慶兄弟在側一旦以士貞蜚英科第衣錦言還稱觴獻壽荷恩命之光華侍髙堂之宴樂於是族人父老爭持羊酒交相歡慶為題其奉親之堂曰榮親蓋所以嘉美之也間來徵豫言以為記豫惟子之於父母以口體為養者不如順其心以晨昏為禮者不若承其志至於富且貴雖足以為親之顯榮而或不能承順其顔色奉養其志意則雖富貴烜赫亦徒為閭里一時之榮而已士貞讀書績文一舉而擢髙科筮仕之初即任風紀清要之職俾二親及見其顯榮而怡愈無不自足宜乎族人父老以為榮而相與名其堂也雖然士貞不可徒為閭里之榮於一時尚思居得為之地際可為之時知無不言言無不盡清操峻節內外一致使人皆目之曰士當如士貞之才且良出於科目效用當時以能榮其親如此則斯堂豈不益有光耀矣乎姑為之記以俟愛日堂記愛日堂者户部員外郎羅通學古奉親之堂也堂而名之以愛日者何哉蓋學古祿仕二十年而數去其親常以謂日積成歲人之壽隨以加也今父母老矣其方來之日寧能多於已往之日乎人生雖以百歲為期然能百歲者蓋無幾則夫晷運之速豈不誠可惜哉揚子云不可得而久者事親之謂也孝子愛日吾於此有感矣此其名堂之意也夫愛者七情之一性之動也有善焉不善焉動而仁義道德之是尚者善也聲色貨利之是從者不善也學古之愛日其本於仁義道德之動者乎愛日者愛其親也因愛親而愛日焉其為孝可知矣古之論孝若子游之於敬子夏之於色均所難致求能養志而致於道者曽子而已故曽子之孝聖賢之所與也學古充愛日之心其有得於此乎嗟夫孝德之本也推之以為臣而忠故曰孝始於事親終於事君學古以明經取進士為御史多所建明及知交址清化州有愷悌之政城守之績此非孝之推乎今父母偕老在堂尚康强無恙諸昆弟之家居者皆能備物以致養已雖不得朝夕侍左右然居官有善政足為父母榮且不貽其憂所謂養志蓋庶幾矣豫嘗聞古之人以孝著而致夫逺大者不少也學古力强而志鋭今受任行邉凡糗糧芻茭所以供軍旅壯疆場者皆學古事也其任不輕矣盡心於其職而致顯榮膺褒命以為父母之光榮者又奚可量耶學古以堂記請於豫故書其實俾歸置諸壁間非徒以慰學古之意亦以慰其親之心悠逺堂記豫嘗求夫悠逺之義大矣哉天地之覆載日月之照臨四時之運行與夫人之所以充積涵養著於當時傳於無窮者莫不有悠逺之道焉吾鄉童景祥氏先世家廣陵唐季避亂始入閩郡占籍于建寧至宋有諱伯羽者嘗從晦庵先生受學景祥實其裔也景祥讀書好禮鄉䣊賢之嘗慨然曰自吾祖宗至建卜築南山下數百餘年以至于今而詩書文獻之澤弗替自非積纍之厚繼述之美曷克致此乃作堂名之曰悠逺蓋以表先世之德使後之子孫得景仰而興起焉間以豫有姻戚之好因其子文安來北京請文以記之豫惟悠逺即悠久之義夫悠久者天地之道所以成物者也故人生天地間亦莫不有悠久之理養生以寡欲居易以俟命此一身之悠久也積善基於前樹德承於後此一家之悠久也景祥自其上世以衣冠之胄衍慶垂裕於其子孫者固為深厚宜乎後之人益蕃且盛而不至於失墜其先業此豈非深知夫悠久之理而能得夫悠久之道者乎名堂之義蓋不外是矣世固有閥閲地望赫然而興震耀于當時自常情觀之蓋以為非尋常所及然而曽不一再傳則已泯焉寂焉無復有聞於世矣如此者抑安知夫悠久之道哉為人子孫若景祥者可謂賢矣豫他日獲遂南還尚一登景祥之堂挹南山之翠酌玉溪之泉弦琴賦詩相與叙悠久之說豈不樂哉故為之記守泉堂記國朝肇造區夏治教休明既簡賢任能以熙庶績猶懼中外百司之職律已不嚴至有簠簋不飾而喪其所守者乃於大誥首編特舉守俸如井泉為喻聖謨洋洋所以開示飭戒乎臣下者抑何至歟列聖相承甄陶造就逮今五六十年而凡有官守者咸知佩服警勵以保其祿位若今武功左衛指揮同知泉寧白君行素其人歟行素器宇俊偉聰敏過人雖生長武辨而弓馬韜略之餘兼習儒書敦禮義既襲其父爵以掌戎衛之政乃名其所居之堂曰守泉遵聖訓也屬以營繕督工得謁豫於公邸拜請為記惟朝廷設官分職必豐其廪餼使之仰足以事俯足以育者無非欲養其亷恥之行俾得盡心竭力以舉其職故為臣下者嚴恭寅畏夙夜匪懈雖不計其祿俸之入而祿之至者但見與月俱增與歲俱積取之無窮用之不竭譬若井中之泉以資於日用旦而汲焉恆見其有餘夕而汲焉無時而或涸也仕者之有祿亦豈不類於是哉茍居官而公不足以勝私亷不能以節欲侵漁朘剝惟利之是圖掊克聚斂捐軀而不顧是雖資賄充羡盈溢比於常祿固或過之而壞名辱身遂底傾覆則雖常有之祿一旦遂絶矣豈不猶秋霖夏潦驟至而卒來轉盼之間溝澮泛溢然其涸也又豈待旋踵之頃歟行素席祖父餘澤腰金鳴玉安居暇食自常情觀之可以優游逸樂日事奢靡以極夫膏粱紈綺之盛而乃孜孜然惟知佩服聖訓以檢身礪操思有以保其常祿而弗敢有過分之求此豈非賢哉然則登斯堂也覩御誥之遺編聆玉音之在耳不徒侈為楣扁之美觀尚其凛焉而思惕焉而懼兢兢焉以持乎亷潔之行而弗少變則非惟可以保祿位於無窮實足以流芳聲於永世矣斯堂豈不益有光輝焉璜溪書舍記七閩多佳山水而建安璜溪為最溪之流上接武夷下㑹鐔川波光滉漾有聲琮然而其勢委曲若璜焉故曰璜溪清澄瑩徹靈秀之氣鍾于人物自宋元迄今世家大族厦屋鱗次學徒文士聚處其間燈火之夕絃誦之聲相聞故擢科與貢者代出不乏吾友雷氏彥器實居于斯而其先世所築璜溪書舍在居之旁秀峰屹乎其前清流映帶其下修篁嘉木森然成列彥器定省之暇藏修游息誠得其所豫幼時嘗見諸父與雷氏交游或酌酒賦詩于書舍之中或嘯歌游釣於璜溪之上每終日留憩其間樂而不倦豫深識之其後豫入郡庠幸得從策明先生又與雷氏諸賢若尚質原中原鼎祐之彥器有融輩契厚時常往來璜溪以燕休游息於書舍焚香啜茗相與講論經史問難質疑以求麗澤之益如是者不數年豫與尚質原中皆來京師既而祐之亦由進士任監察御史彥器亦升太學擢冬官主事而與璜溪書舍相違有年矣今彥器尤惓惓於此而不釋者得非眷戀於其平昔之所游止乎彥器嘗曰吾幼䝉恩育得以優游于書舍者皆賴父兄之教師友之助有以成其才質今而筮仕于朝叨任繁劇旦夕思惟深愧才有不逮學有未至非有所警飭戒謹於初者或不能要於終今繪為圖誠非玩物愒時之比實於展玩之際儼若父師之在前也豈敢有毫忽自肆乎以公同里敢蘄一言以相朂豫不敢默而為之言曰夫忠君愛國顯親揚名在乎立身立身之要必務於學所謂學者當檢制其情涵養其性窮夫物理以明諸心審夫云為以篤於行雖小而至於飲食起居大而至於修齊治平隨所施為而無不適其宜者斯可謂學之成也茍徒誦陳言以為博摛藻翰以為華從事科目以徼利逹於一時者烏足以語此哉彥器資質粹美篤志於學凡枉已徇人趨時競利之舉一毫弗足以纍其中又幸際遇聖明展其懷抱敦其操履將見聲光益著而升擢顯庸其所進蓋未艾也子夏云仕而優則學學而優則仕彥器有之豫遂不揆蕪陋而為之記他日彥器倘得拜恩南還歸省其以豫言質之鄉先生尚毋以為僣妄也敬軒記自昔世臣大家之後克承先德以綿世祚於永久者豈有他哉在乎謹於其身者有其要也要者何曰敬而已茍弗務此而驕盈縱逸至沉溺聲色貨利蕩然而不知止其不顛覆厥躬以忝厥先者幾希敬之在人所以不可跬步忘也若今右軍都督沐公嗣子可怡庶能審知乎此者矣可怡嘗構一室以為藏修之所朝暮休息其間斂襟端坐披閲經史凝神息慮儼然若與聖賢相對其從父駙馬都尉過而喜之因為大書敬軒二字以寓規勉之意今年致書於豫請記豫嘉可怡能知所務以成厥德又重駙馬公之篤愛其姪而期其進於學是皆可書也夫敬之義大矣哉儒先既嘗以主一無適言之矣又嘗以整齊嚴肅言之焉既有所謂常惺惺法者矣又有所謂其心收斂不容一物者焉之數者克盡用力之方則心有所主而百體悉從令矣由是格物致知誠意正心以修厥身推之以及乎齊家治國殆無難矣故儒先又曰敬者一心之主宰萬事之本根雖聖賢之學亦皆由敬而後有成也然則敬之一言其真聖學始終之要也歟可怡以軒冕之胄而能脫然於外慕從事於斯以篤所學日用動作必由於規矩法度之正而惰慢邪辟不作於身非確然有見者疇克然哉此余所以嘉之也可怡於斯必進進不已益加夫戒懼謹獨之功務得乎操存省察之實而以聖賢自期則不惟不負駙馬公期願之意誠足嗣承徽美無忝厥先而斯軒之名亦將有聞於天下後世矣姑記于軒之壁以俟冰月軒記姑蘇金養正氏以進士擢監察御史嘗扁其宴居之所曰冰月軒而求豫為記豫按易大傳曰乾為冰冰者陽之極而隂氣內凝者也又曰坎為月月者陽之中而隂精外瑩者也之二者世皆以屬之隂而不知其根於陽故雖至寒至隂而其中堅肅而明炳者則屬之陽焉其在於人則心也者府是性而官是形者也寂然不動而感應必照者非坎月之體乎湛然虛明而至剛弗陷者非乾冰之象乎夫人之所以確然而不拔湛然而澄徹者蓋有得乎此也而或外物以梏之私欲以蔽之於是至堅者有時而撓至明者有時而昧焉嘗試觀之炎炎者滅惡知乎乾冰之為象惛惛者溺惡知乎坎月之為體蓋世波漫以逝者何限哉必也肅然警飭而後至堅者存淨然澡瀹而後至明者著則冰也月也將不待外求而皆具於吾之心焉養正績學入官職任風紀蓋思以至堅至明者恢廓於是心而推以為執法之平振憲之綱以無負耳目之寄者乎宜其於冰月而有契焉也已想其兀坐茲軒𤣥冥氣肅澤冰凝沍於是有取於天下之至堅者焉太空無雲桂輪孤照於是有取於天下之至明者焉斯時也至清至明將與吾之靈臺丹府相為流通而凡天下之汚濁昏昧者烏得而凂之哉若夫徒取冰清月白以為耳目之玩宴賞之娛斯乃幽人髙士之所樂非養正名軒之意也因其請姑為記之雲卧山房記兵部主事三山鄭孰學初之養疾而歸也造豫言别且有請曰孰家距郡城一舍許居之東則鼓山巍然屴崱髙入霄漢西則齊坑諸峰錯列屏障其南則方嶠端厚秀整若置几然山之下皆大江奫淪渟滙浩不可窮山川之氣蒸而為雲絪縕鬱勃彌綸紛郁而孰適宅於平曠據清淑之㑹讀書之暇開户而觀之見其出巖扉越澗壑披冒乎林木綿羃乎太虛悠揚往來於簷楹忩牖間朝暮變化其為狀也多矣孰之意蓋甚樂也年三十叨名科第備官郎署今又二十年重惟天地大造之恩思竭駑鈍以效涓塵之報不幸嬰疾滋久膂力不任茲荷優詔豫歸就閒以便醫藥山間之雲當復與之俱而樂矣將扁於舊居曰雲卧山房惟先生賜之記孰歸刻置壁間不惟山林泉石與有光耀而孰得以朝夕諷誦庶幾疾其有瘳乎豫在朝適與學初尋鄉好相往還既久記不可辭乃為之言曰夫觸石而起膚寸而合彌八方而雨下土者雲也然其舒也其卷也曷嘗容心哉學初之仕向登青雲而來者也彼其遭際熙洽之盛履歷康莊之途篤慎勤端操行俾英聲媺譽稱道在人而雲山舊隱光價增重其志固可嘉其宦轍方亨而未艾茲以疾歸抑豈其所得已也哉學初春秋方五十齒髮未衰落山房之卧豈宜與隱者同一怡恱哉釋煩劇就暇豫尚精藥石慎節宣俾將來復于康和而出躋逺大山中白雲將不得於學初而久留也學初姑行哉豫為之記蓋尚有望於異日焉玉峽書房記新淦之上游八十里其西澨曰峽江蓋江之兩旁皆山重巒疊嶂蒼翠之色郁然如削碧玉而江之流實經乎其中玉峽之得名以此曽氏宗沂永豐之望族嘗贅峽江李氏因遂僑居焉今宗沂既捐館舍其子景武嘗慨然自念其先世為詩書簮紱之胄茲雖托寓於斯抑其可遂忘其故業乎乃於所居之旁别築一室以為藏修之所而名之曰玉峽書房取經史百氏置其中日諷誦其言而探索其義孜孜焉弗敢少懈客至或焚香鼓琴或汲泉煮茗或分題賦詩或引觴命酌凡翰墨玩好之適衣冠游宴之娛無往而不自得心甚樂焉間來京謁豫翰林請言以記之夫世家子弟生長華腴往往侈於膏梁紈綺之習以馳騖於聲利之塗其不視禮義為虛文目詩書為常物者鮮矣景武承積善之餘慶襲閥閲之逺緒乃能屏斥紛華耽嗜簡册以涵泳聖賢之遺訓景仰前哲之髙風勉勉循循以求其至此非其才識之超邁者能之乎其與世之追逐時好宴安逸樂以流連於光景而漠然無意於問學者奚啻霄壤哉於是景武之賢於人逺矣景武之叔父子啓今為翰林侍讀學士與豫有同寅之好因其請遂特為之記焉蘭室記鴻臚寺丞鳯陽周君文衡清修剛直之士也嘗於居室之前除地半畝屛去纎穠艷麗之植惟蒔蘭數本於其間緑葉紫莖青青楚楚幽映忩户間於是扁其兩楹之中曰蘭室復得元趙文敏公所寫蘭石圖裝潢成卷請豫記之將以刻於其室豫惟水陸花卉之産千品萬彚其有足以資人之玩好者亦豈以其容色臭味而然哉茍以容色臭味為美而篤意好之此衆人之物於物者之所為也夫何足取哉故陶淵明之於菊周茂叔之於蓮林君復之於梅其冥契妙悟超然獨得蓋有出於容色臭味之外者故其人與物並傳於天地間以至于今弗衰然則文衡蒔蘭於室抑豈徒為玩好哉想夫春雨新霽光風微動異香芬馥浮動几席間方其時退食自公凝然獨處操之於琴則曰此吾夫子之遺音也紉之為佩則曰此楚大夫之憂思也於是千載而下而聖人之道德未逺賢者之忠貞弗忘則于觀物之頃把玩之餘烏得不有以冥契妙悟而思所以希聖希賢者乎矧文衡以儒發身遭際聖明由名進士給事內廷出倅大州擢選部員外郎升福建布政司參議繼改今官揚歷中外垂三十年而修名姱節暢達遐邇則其平日有得於觀物之趣也豈不深哉夫不泥聖賢之迹而能師聖賢之心於容色臭味之間而有超然獨得之妙視世之物於物者奚翅霄壤哉如是而與陶之菊周之蓮林之梅以並聞於時可也若夫觀其秀茁如子弟之在庭挹其芬芳若良朋之同室是皆其餘事耳豫與文衡同年相知為最舊故於其請也樂為之記焉川石記距建安邑城之東有地曰川石其土壤夷曠介乎古田甌寧政和三邑之交山明而水清地幽而境勝其居於此者多豐家巨族有溪焉其灘之名曰書筒崖石壁立髙出霄漢舊有石髙僅三尋其廣四尋有咫形如書筒屹然溪上其後淪沒水濱世傳唐羅隱過之里人不為禮隱因指此石曰書筒落水川石無官以故民之居其間家雖殷阜子弟聰敏咸惑其言不令讀書由是纍世無仕者國朝洪武中里之著姓陳氏伯進有志之士也嘗謂其子懷慎曰諸孫宜擇其資禀秀異者為學諸生以取進仕懷慎舉隱言以對伯進笑曰易云積善之家必有餘慶吾先世多積善吾平生惟務修德未嘗為一毫非義後世必當有興者世俗所傳率多誕妄詎可信哉汝輩宜勉之毋自惑也既而懷慎遵父命遣其子升充邑庠弟子員永樂中陳氏以富民徙實北京升往來廢學者十餘載人復以前言為疑既而升乃入學力於進修遂以明經領永樂癸卯鄉薦今年春㑹試禮闈中乙榜授湖廣武昌嘉魚學官閒謁豫請曰升幸際明時獲膺一命不墜先祖之志追想川石之言思欲解里人之惑以啓後進之心願求文記之庶俾鄉閭知勸也夫積善以裕後讀書以致用其取報也辟之種之必獲而理勢自然也豈以地理之故而有所間哉昔王祐手植三槐于庭曰吾後世必有為三公者後其子旦卒登宰輔豐功偉烈至今人仰慕之是積善獲報之效也桑維翰未仕時纍試有司不得志人有勸其不必舉進士者維翰乃鑄鐵硯以示人曰硯敝則改業卒舉進士至大官是讀書取必之驗也况天之於賢才不擇地而生賢才之致用必勤苦而後得至於地理符䜟之說以誑惑於世者乃庸人方術之流假之以誣民耳曽謂君子而深信之哉曽謂理之所必然者哉且隱唐末舉進士不第晚年錢鏐始辟遷給事中亦致用之士也斯言也豈隱之所肯道而斯石也又豈真足為一鄉仕進者休咎之驗耶今觀伯進之所以勸勉後人與升之所以繼承先志一洗數百年庸謬之論膠固之惑吾見自茲而後居川石之里者文學之士彬彬輩出足以羽儀朝著增輝里閭又豈不自今日有以啓之乎則積善讀書之效益可徵矣升端厚有為將以所業淑人其進未可量也豫鄉人也嘉其志有成而其事足為世勸遂樂書之俾歸而刻諸石以告來者是為記真如禪寺記吾建有十大禪剎真如居其一焉寺在城東白鶴山之麓山水環抱林木森蔚實竒勝之區也元之世為佛菴蓋以嶽廟在右遂名天堂至今人謂真如為天堂者以此也國朝洪武中主僧無涯森公欲拓其舊基大建殿宇而難其材時吾大父逹卿公山有大木數萬株嘗戒子孫不以貨鬻唯求為學舍寺觀杠梁棺槨者與之於是森公袖疏來扣時豫大父已殁祖妣阮氏即諭諸豫紹先志隨其所欲悉資給之並施以齊糧工力無一毫靳吝之色森公遂得撤其卑陋恢廓故址首建大殿次為山門廊廡暨觀音殿伽藍開山二堂裝塑佛像辛酉復建大毗盧閣高八十餘尺閣之後為寢堂堂之東南為方丈以至僧舍庖湢衆屋皆具備極完好于時又得都指揮使施公某千户方某率鄉之善信施財力以協相之於是寺宇壯麗緇流益增辛未詔清理佛教遂並為叢林以改今額鄉郡稱雄剎焉自是又三十年為永樂壬寅寺僧普通以齊事至北京乃以寺之本末來請豫記豫惟真如寺宇實吾家施材所建幼時往來其中見其髙甍巨棟未嘗不仰而望之以懷大父之德今大父窀穸復託寺近春雨霜露不能不興吾追逺之念則某之請又烏可辭耶嗟夫佛氏之教無非使人避禍趨福而皆思有以為善也故世之崇信尊奉之者雖傾資竭力無所愛惜焉今真如為建大剎由大父樂施之德以首倡之而四方好善之流亦皆翕然相繼為之相焉此雖佛氏之所以能使人流嚮如此而森公之流亦豈非能卓然自立而興起其教者歟不然何其若是之盛也因其請故樂為記之蓋不惟有以知佛氏之為盛其徒之能立抑且有以志先大父之遺德焉文敏集卷十
