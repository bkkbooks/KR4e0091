body:
  text: 文敏集卷十七明楊榮撰神道碑銘開國輔運推誠宣力武臣柱國武定侯贈營國公諡威襄郭公神道碑銘洪惟太祖髙皇帝龍飛淮甸應天順人芟刈羣雄戡定海內一時智勇材力之臣感會風雲效其忠勤輔成帝業開千萬載太平之運竒勳偉績鏗鍧振耀勒銘鼎彛垂光竹帛與國家相為無窮猗歟盛哉豫嘗叨職國史竊觀開國勳臣其間能身躋夀考世為貴戚子孫享有顯爵久而益盛者不數人豈非其存心之仁與積纍之厚有間耶若營國威襄公蓋足徴焉公姓郭氏諱英臨淮人生有異徴沉毅多智身長七尺膂力過人尤精騎射年十八從太祖起義兵甚見親信每令直宿帳中取徐泗滁和采石太平建康鎮常寧國諸郡屢立戰功上嘗以郭四呼之上親征偽漢陳友諒大戰鄱陽湖相持連晝夜公時金瘡未瘳力疾鏖戰敗賊於禁江口已而友諒中流矢死有言公之功者上問之公曰天威神算臣何力焉上益重之時友諒子理復立於武昌進軍攻之其將陳僉同者驍捷善槊馳入中軍帳下上方坐胡牀遽呼公曰郭四為吾殺賊公持鎗躍馬奮臂一呼賊應手殞墜上解所御赤戰袍衣之曰唐之尉遲敬德不汝過也授驍騎衛管馬軍千户從征襄陽克淮安鳯陽安豐升宣武將軍驍騎左衛指揮僉事洪武元年戊申從大將軍徐公北定中原下齊魯克汴梁平河南取元都破潼關彰德廣平所至有功初大將軍遣公取通州公距城三十里為營深溝髙壘為持久計衆請速攻之公曰吾師逺來敵以逸待勞攻城非我利也宜出其不意破之翌日大霧公以千人伏道傍率精騎三千直抵城下元將諤斯巴國公帥敢死士萬餘張兩掖而出與戰良久公佯敗彼乘勝來追伏兵中起截其軍為兩道斬首數千級擒元宗室博囉梁王遂克通州元軍乃北遁克永平真定定州生擒守將湯同僉復從平章常公取太原守將王保保軍於城西公慿髙望之謂常公曰彼兵多而不整營大而無備請夜劫之常公深然其計遣五十騎伏城東十里以舉火鳴炮為期至夜公率十餘騎潛入其營舉火鳴炮伏兵亦舉火鳴炮常公引兵繼至鼓譟之聲相接保保軍大潰自相屠戮乃棄城遁下興州大同至沙淨州生擒偽將竹平章渡河取鹿臺西安鳯翔鞏昌追敗賊將賀宗哲於亂山庚戌升本衛指揮副使從征迤西克定西討西夏察罕諾爾撫安呼沁平章沙淨州復叛討平之克登寧州斬首二千級獲牛馬數千升昭勇將軍本衛指揮使賜金龍衣一襲辛亥升驃騎將軍河南都指揮使將赴鎮皇寧妃公之女弟也上遣至公第餞之且謂公素清儉賜白金二十罌廄馬二十二匹時河洛新罹兵燹邑井蕭條居民艱食盜賊充斥公宣布威德綏輯流亡申寬條明賞罰逺邇來歸者日以千計未期年户口倍增境內大治丙辰移鎮北平河南士女不忍其去遮公馬數十里不得行甚至泣下既去為立生祠北平初定所在反側不寧公開示誠欵諭以理亂禍福人心遂安元左丞何允中等聞公之德來降者凡九千餘人上遣使勞以上尊羊馬授龍虎將軍北平都指揮使賜誥命逾四年召還京進大都督府僉事更定官制改前軍都督府僉事灰山賊反承命討平之賜馬七匹辛酉從潁川侯傅公征雲南既至公及都督陳桓胡海分道進討道多險隘諸將欲深入公曰破敵貴先聲攻取必自近始舍近趨逺豈策之上耶遂先攻赤水河路距河二十里為營時久雨河水暴漲公曰賊恃水漲不意吾濟下令諸軍斫木造筏夜半濟河比曉賊始覺遂大潰生擒烏撒并阿容諸蠻由是雲南諸賊破膽進攻曲靖六梁州關索嶺及偽石元帥山寨皆克之至江川椅子寨寨依山公先遣騎兵五千攻其前賊空寨迎戰復以精騎數百搗其後斬門而入火炮連發烈熖漲天賊乃亂悉破滅之進攻大理金齒降其偽官假平章攻安寧州賊將布哈特穆爾棄城走破富民縣山寨攻靖寧州蠻七寨一日夜破之攻牢撞山寨取仁德府破哨店山寨圍姚安敗賊將李自久平蒙化州鄧川州破三營復光寨過金沙江攻北勝府生擒賊將髙生平麗江府平津等州前後斬首一萬三千餘級生擒二千餘人收精兵人馬數萬船千餘艘蠻民降者數十萬户雲南諸路平論公功進爵開國輔運推誠宣力武臣柱國武定侯賜誥劵食祿二千五百石子孫世世承襲乙丑加靖海將軍鎮守遼東丁卯同大將軍宋國公馮公討北敵納克出降之師旋敵將追襲之公與戰創傷左脅箭復中右脅公佯呼敵傷吾甲我衆益奮連戰數十合冦遂却已而進征邊右副將軍仍鎮遼東戊辰出討北冦至捕魚兒海邏騎偵敵營不逺公乃令諸軍少憩飲馬銜枚卷甲倍道而馳直抵敵營敵人覺乃率十餘騎潰圍出其將曼濟太尉來拒我師公手刃之獲兩營所積金寶珍玩圖書降其衆五萬餘人生擒敵將約約司徒納木囊嘉卜太尉繅固達勒袞布達拉王子等四萬餘人馬駝萬五千匹牛羊輜重無算師還賜白金千兩鈔八百錠綵幣四十匹已已上以天下無事且憫諸將老欲保全之厚加賜賚遣歸其鄉公亦就遣庚午獨召還京上賜坐與語歡甚命統禁兵及在京諸軍蓋上春秋髙知公忠謹特倚重焉辛未以敵酋阿扎克實哩冦邉命公討之獲其人口孳畜逐北至雅寒山而還丁丑川陜冦發勢張甚上顧曰非卿無能勝其任者授征西將軍印討之至沔之後河生擒賊首髙福興及黨四千餘人公疏其同謀者請誅之脅從者乞勿治且言有司不恤民宜正其罪上可之永樂元年癸未二月十七日卒于家享年六十有九訃聞太宗文皇帝為之震悼輟朝二日遣官致祭賻恤有加贈營國公諡威襄賜葬京師聚寶山之原公孝友仁恕恭儉誠實出於天性母夫人嘗疾篤懸身燈告天求以身代疾遂愈人皆謂公孝感所致後母夫人卒公廬墓側晝夜號泣不絶聲卧寢於地毁瘠日甚一夕夢母夫人告曰地濕則致疾致疾則傷生汝固純孝惟竭忠報國為父母光墓不必廬也公感悟而歸家三年之中哀痛如一日平居兄弟怡怡克盡友愛御軍行師動有紀律推心任人甘苦同之其攻克州郡必禁虜掠戒殺降封府庫收簿籍一錢尺帛不敢私嘗北征軍法夜必令親軍更直荷戈環帳立一夕風雪大作公悉罷遣歸營其愛恤軍士多類此家居簡靜好讀書天文地理百家之説靡不通曉教訓子孫以儉素力學為務事太祖髙皇帝三十餘年小心謹慎未嘗有過眷遇雖隆而自處益謙上嘗御便殿賜坐適有奏事者公趨避之上曰卿第坐朕自理事不汝關也其見敬愛如此時公卿多置田産公獨不治上問之對曰臣一布衣荷陛下寵靈叨有封爵子孫衣食餘饒安敢增益俾生侈心上善之嗟歎良久公大小百餘戰金瘡遍體每隂雨痛甚及聞征討之命即日就道未始以老疾辭其事上竭忠蓋如此曽祖參祖聚父山甫纍贈營國公曽祖妣何氏祖妣趙氏母單氏贈營國夫人配馬氏封營國夫人公兄弟四人長早卒次興以軍功封鞏昌侯贈陜國公諡宣武次某福建都指揮使次即公也子男十二人鎮銘鏞鑑鑰銓錡鈺鈁鑌鋼錀鎮駙馬都尉尚永嘉公主銘遼王府典寶追封武定侯鏞中軍都督府右都督鑑中都留守司副留守鑰散騎舍人錡早卒鈺贈承德郎尚寶司丞鈁旗手衛指揮使女九人長適府軍衛指揮僉事藺瑜次適濟寧衛指揮使弋某次遼王妃次適府軍衛指揮僉事趙斌次郢王妃次適金吾右衛指揮同知范聚餘早卒孫男二十有八琮玹璧瑭瑄瑾碔瑀璒璟玘瑋璦璡璨璝琬琰餘尚幼琮府軍衛指揮僉事玹襲武定侯瑾早卒碔尚寶司丞瑀梁王府典寶璒璟皆勳衛孫女十六人長仁宗昭皇帝貴妃次適留守左衛指揮陳鑑餘在室曽孫男五人聰耽餘尚幼聰散騎舍人豫觀前史稱郭汾陽功蓋天下而主不疑位極人臣而衆不嫉富貴夀考始終令節七子八壻諸孫數十人俱膺顯仕唐世榮之若公勳業之隆子孫之盛方之汾陽夫豈多讓皆由公存心一本於仁故積纍之厚愈逺愈隆焉嗚呼偉哉玹以神道之石未立無以昭示永久來請文豫閲其家傳考定其大者次第之而系之銘曰天啓皇明淮甸龍飛乘時應運風雲一機太祖受命汛掃餘孽羣力桓桓鼓勇就列東征西伐北南以平斷出神聖功協衆能展也郭公有文有武翊輔真主實天畀付鄱陽之戰衆論偉公公仰廟略不有其功既捷通州再捷太原河南北平黎庶懷恩南詔之征武功尤大誅叛全生蜀民是賴維彼敵人遠徙漠北卷甲擒之邊塵蕩滌皇有嘉錫錫爵褒功金書鐵券武定啓封錦袍御馬白金文綺赫赫髙門煌煌戟棨世聫國戚代有顯融匪幸所致惟公之忠忠在朝廷載之信史亦有孝思永錫爾類在昔汾陽著勳有唐公實似之于今益彰我作銘詞勒功墓道百世斯承有赫其耀故奉天靖難推誠宣力武臣特進榮祿大夫柱國中軍都督府左都督武安侯追封漳國公諡忠毅鄭公神道碑銘宣德甲寅二月乙丑奉天靖難推誠宣力武臣特進榮祿大夫柱國中軍都督府左都督武安侯鄭公薨于大同訃聞上嗟悼輟視朝二日遣官致祭賜棺及賻命有司營葬追封漳國公諡忠毅某年某月某日歸葬北京之西山婺里其子能既襲侯爵遂具公平生之槩來求神道碑銘豫嘗叨總史職不獲辭乃為序次之曰公諱亨世家廬州合肥曽祖五乙祖大几父用以公貴俱追封武安侯曽祖母劉氏祖母張氏母英氏俱追封夫人昔我太祖髙皇帝龍興淮甸公之先君子自和州率先應募積軍功授平陽右衛百户升大興衛副千户嵗癸亥公始襲父職公天資剛毅純篤壬申出使漠北至鄂諾河撫輯韃靼還以勞升密雲衛指揮僉事乙卯秋太宗文皇帝舉兵靖難命公攻薊州時都指揮馬宣城守不下公百計破克之遂生擒宣歸旋攻雄縣討真定俱大克捷升指揮使及遼東軍圍永平上親率諸將援之公賈勇奮進敵遂披靡旋師收大寧升北平都指揮僉事未幾戰鄭村埧克紫荆關復廣昌所向無前明年庚辰取蔚州下大同大戰白溝河乘勝逐北直抵濟南升都指揮同知滄州之役公軍北門北門芻糧所聚兩軍必爭之地公力戰破之又明年辛已敗順德軍於深州夾河決戰勦戮尤盛藁城西水寨連戰俱捷遂耀兵廣平略地彰德所至皆下是冬升中軍都督僉事嵗壬午從上南嚮歷取諸縣及東平汶上等堡對敵小河鏖鋒靈壁搗泗州取鎮淮渡江克金川門內難既平上正大統䇿勳頒爵封公武安侯階勳如前白金文綺襲衣前後賜賚不可勝計永樂癸已夏奉命出關巡視山川險易撫輯軍士時關外軍衛統攝無紀遇有邊警猝難制敵公因奏調大同前衛帶管東勝等衛措置得宜自是各衛皆從所𨽻以聽調用尋奉勑領士卒築長安嶺城規畫有方人不知勞未逾月而城成嵗庚寅以來上屢親征朔漠公扈從每著勞績仁宗皇帝嗣位念公舊德特賜佩征西前將軍印充總兵官鎮守大同嚴斥堠固屯守敵人逺遁不敢窺邊居常以清介自將服食之奉泊如也用是下人毋擾邊境輯寧宣宗皇帝倚任尤重屢降璽書褒異之公生元至正丙申至是享年七十有九配夫人張氏子男三人長即能次熙次嘉女二人長適王友賢次尚幼孫男一孫女一於戲自古帝王之興必有才雄智勇之臣為之左右以戡靖大難垂不刋之功故其子孫亦世有爵邑與國咸休永無窮之聞若公遭遇太宗竭誠效力奮不顧身﨑嶇戰陳以佐助翊戴奠安宗社逮扈從北征鎮安邊陲其竒能偉績輝映後先者何其盛哉是宜勒銘豐碑昭示後世焉銘曰於皇太宗有臣忠毅克殫心膂助順舉義﨑嶇戰陳奮不顧身祗奉神謀用成大勳皇帝曰吁有臣如是惟天所生皇考所遺從征漠北屢效驅馳出鎮邊陲敵不敢窺長安之嶺其城萬堵營之築之士不知苦盛福遐齡逮事四朝功成不有位髙不驕天不憗遺殞傷元老時論興嗟聖情悲悼聖情悲悼慨念元功式昭褒典賜諡追封婺里之原西山之麓鬱鬱松楸佳城是卜紀行有史銘功有詞後百千祀視此豐碑故奉天翊衛宣力武臣特進榮祿大夫柱國廣寧伯追封廣寧侯諡忠武劉公神道碑銘昔我太宗文皇帝舉義靖難一時英傑智勇之臣乘運奮興竭忠宣力共成大功若故廣寧伯劉公其一焉公在行伍中姿貌豐偉智識過人上察知之屢有委任以功授密雲衛百户未半嵗復以功四遷至指揮僉事庚辰春從克蔚州攻大同大戰白溝河升指揮同知是冬與驍將朱榮等統邏兵哨滑口籌算協機功最諸將辛已春加授都指揮僉事是後上益知公材勇可専任用特命領兵制敵若滹沱河之奪浮橋館陶曹州之擒敗戍卒平村之交戰永平之解圍與夫懷家莊之俘獲遼東鐵騎前後所獲功居多再遷都指揮使內難既平上正大統第功行賞升中軍都督府都督僉事優賜白金文綺永樂改元升都督同知戊子升右都督庚寅春扈從大駕征北至靜虜鎮公先入賊陳敗阿嚕台軍升左都督甲午復扈從至和林公率前鋒追奔敵酋瑪哈穆特王沙漠為之肅清是固太宗謨烈之盛而亦公效力所致也尋勑公鎮守遼東備倭冦至即相地形勢請於金線島西北之望海堝築城堡立煙墩一日瞭者言東南海島夜舉火光公計冦將至亟遣馬步軍赴堝上小堡備之翌日倭船三十餘艘泊馬雄島冦相屬登岸徑奔堝上公親督諸將伏兵堡外山下預遣一禆將領馬隊要其歸路一禆將領步隊與之逆戰公舉炮伏發冦大敗奔入櫻桃園空堡中合軍圍之自辰至酉擒戮無遺生獲百餘人斬首千餘級事聞賜璽書褒諭徴公至京面慰勞之公對曰受任禦冦分所當為此皆奉行陛下成算及諸將士效力所致臣不敢當其功上嘉其謙抑既而封公為奉天翊衛宣力武臣特進榮祿大夫柱國廣寧伯食祿千二百石子孫世世承襲仍遣赴鎮公疏將士有功者升賚有差先是倭冦出沒海上焚民居掠財貨殺虜生口北自遼東山東南抵閩浙海濱州郡無嵗不被其害官軍猝不能制往往有坐失機罪死者至是冦害屏息傍海千餘里兵民安生樂業以至於今受封之明年是為永樂庚子四月辛酉薨于鎮享年六十有一訃至上深嗟悼輟視朝三日遣官諭祭追封廣寧侯諡忠武官為營葬賻恤甚厚復給舟車歸其喪令所經州郡皆致祭以某年某月某日葬金口御河鄉公諱榮世居邳州宿遷曽祖諱二公祖諱小大父諱江俱追封廣寧伯曽祖妣余氏祖妣張氏母張氏繼母馬氏俱贈夫人配馬氏子湍襲伯爵早卒繼室金氏封夫人子淮早卒安繼襲伯爵側室髙氏子麟陳氏子正通四人女一人在室孫若干人嗚呼自古英傑之士逢時奮興身躋顯榮者固多有之然求其功施國家澤被生民又克始終保全者良鮮矣公遭際聖明茂建勳迹荐膺封爵誠千載一時之幸也然其芳譽慶澤與國咸休亦自處有其道哉公沒之十有六年其子安乃奉武進伯朱冕所狀事行來求碑銘以昭永世豫素知公者不敢辭遂掇其大者次第而銘之曰龍飛在天六合雲從聖作物覩千載竒逢赫赫文皇靖難舉義桓桓武臣爭效才智有偉劉公既勇且雄摧堅衄鋭孰當其鋒宗社既安海宇寧謐惟彼敵人惡盈罪溢屢從天討沙漠肅清維帝之謨維公之能倭醜肆害公往鎮禦設竒殄殱茂績益著金書鐵劵廣寧錫封匪惟侈榮以勵有功海邦無警户不夜閉維帝之威維公之惠琅琅厥勳濯濯厥聲鼎彛有紀信史足徴益嚴益慎保全終始生榮死哀同儕鮮比御河之鄉有封其崇樹兹石刻垂耀無窮故應城伯追封翼城侯孫公神道碑銘世之瓌傑英偉之士遭遇聖明屢建勳績致有名爵老而復能感激思奮竭忠賈勇力效勞勩𢎞濟艱難其光烈著于當時聲華及于後世者吾於故應城伯孫公見之公諱巖字某世家鳯陽之於皇里曽大父某大父某父重四三世皆務本力穡周貧恤患鄉以善人長者稱母周氏有懿德公生元至正巳卯十一月十有一日幼時有術者異其狀謂其親曰是兒不凡宜善視之既長性豪爽膂力絶人輕財好義為族里愛重元季兵興仗劍歸太祖髙皇帝于淮甸在軍中以驍勇聞乙未從渡江克采石定金陵收兩浙自是南取江廣北定中原咸與有功擢金吾左衛百户調守鳯陽巳而升武德將軍燕山中護衛正千户洪武庚申從太宗皇帝之國于燕公誠直不欺甚見親信藩國之事多委任焉乙亥公引年致政而以子亨代己卯太宗舉義靖難以公宿將知兵特起守通州是嵗南兵大至城圍數周起土山臨城攻西門燬樓堞公率衆極力捍禦城賴以完未幾兩軍合戰公操戈身先士卒大呼陷陳士氣爭奮追奔逐北斬馘不可勝紀得饋運船三百餘艘資糧無算以功升明威將軍指揮僉事仍鎮通州辛已兵復至攻城益急公勵將士登城力戰矢石交下敵乃退走論功升都指揮僉事壬午春南帥平安督遼東兵十餘萬逼城公語將佐曰彼衆我寡若城守不出自示弱也不若及其始至而擊之彼必敗亡乃率敢死士數百犯其鋒而城上亦合勢大呼安衆大潰自是畏公無敢復來攻者是嵗夏六月太宗入正大位以通城屏蔽冀方使六師南進而無北顧之憂者皆公之功於是進封奉天翊衛宣力武臣特進榮祿大夫柱國應城伯嵗食祿千石給誥券子孫世繼自曽祖考而下勳號階爵皆如公封曽祖妣而下悉如夫人永樂戊戌六月二十日以疾卒于正寢享年八十訃聞太宗悼念不巳命有司給棺斂治墳塋纍遣官致祭贈翼城侯諡威武嵗十月葬通州東馮家村之原配劉氏封夫人先公卒子男六曰亨曰忠曰旺曰喜曰泰曰榮亨由都指揮僉事襲公爵女二長適武德將軍正千户徐亨次適昭勇將軍指揮使房斌孫男十五人英傑敬玘貴瑀琳勉斌建禮智綱雲綸英襲父爵早世傑今嗣為應城伯孫女十四人一適太師英國公男忠一適金吾衛指揮桑華餘幼在室曽孫五人公歿葬二十有二年傑奉公之事行謁豫告曰傑賴先祖餘休嗣膺封爵顧墓道之碑未立無以昭功烈垂不朽乞不靳而畀以文庶後世子孫知先世成立之難兢慎自持不敢廢墜厥家豫昔獲侍太宗左右備悉公之勳迹有可書者今傑又具述公始終之詳謁請益堅誼不容辭乃敘次如右而系之辭曰明明太祖順天應人奮自淮甸汛掃風塵公於是時仗劍來附從殄羣雄克用其武功成位升弗究厥施武德之階養鋭蓄威太宗龍潛天鑒明德內難搆興皇怒斯赫乃張義旗乃舉義師起公于家知公有為言言通城實國屏蔽命公鎮之邦域之計維公桓桓振我師干士勇民和戰克守完東兵之來其勢十倍薄而擊之一鼓而潰京師既寧四方既平皇命報功顯爵是膺礪山帶河金書鐵劵子孫繩繩碩大蕃衍惟公之功惟皇之德世其承之有永無斁馮村之原峩峩穹碑用詔後人刻此銘詩贈湯隂伯諡忠襄郭公神道碑銘天眷國家誕啓中興之運必有英傑為之股肱運謀效力於其間而後勳業克成故榮祿大夫太子太師郭公實其人也公諱資字存性姓郭氏河南武安人曽祖諱溫祖某父禮皆以公貴贈榮祿大夫太子太師曽祖妣淨氏贈夫人祖妣馮氏妣王氏皆加贈一品夫人公生而穎敏志氣超羣兒弱冠入邑庠從師受春秋有所造就洪武辛酉入太學甲子領應天府鄉薦明年會試禮部對策大廷賜同進士出身初為户科庶吉士擢户部總部試主事丁外艱服闋實授本部湖廣清吏司主事改陜西清吏司吏無容姦聲譽頓起升都察院左僉都御史無何尚書郁新以才薦之授前北平布政司左參議涖事之初即以本司弊政為言太祖髙帝嘉其忠直升本司右參政公悉心殫慮贊佐有方不數月升左布政使精勤詳慎紀綱大振豪猾斂迹良善獲安時太宗皇帝在藩邸尤愛重之公有所言無不聽納及起義靖難命公城守撫輯兵民供給糧餉百費所需未嘗乏誤嘗以漢蕭何擬之太宗皇帝即位論功召升户部尚書賜白金文綺楮幣視諸伯未閲月以北平重地命乘傳掌布政司事未幾詔建北京設行部拜公行部尚書公以北地軍民初安生業始遂而官司所費冗濫當撙節以恤下乃惓惓以祛弊舉廢為務或有不悅而謗公者太宗聞之降勑慰諭益以心腹任之滿考賜宴內廷頒勑奬諭錫以誥命贈公祖若考皆資政大夫北京行部尚書祖母及母皆夫人嵗辛丑太宗皇帝都北京革行部調公户部職務叢脞公勤以率下事有條序仁宗皇帝嗣位念公舊德以尚書兼太子賓客巳而復念公抱疾艱於步履不忍煩以政事特升太子太師俾致仕歸鄉既加賜賚又令户部給公半俸蠲其稅糧差徭特賜璽書慰勞甚至公歸杜門教子孫讀書屏絶外纍皇上嗣登大寶眷求老成念公祗事列聖勞績居多詔起復掌户部事免其趨朝賜鈔二萬貫公愈感激效忠雖祁寒盛暑必坐公署視事不暫廢僚屬胥吏莫不敬憚焉滿考賜宴于禮部奬以勑書譬公如嵗寒松柏愈老愈徑其優待隆厚如此宣德癸丑十一月疾劇屢言蒙被朝廷重任無以效報為愧切切訓諸子及孫當感恩思報不及家事十二月癸丑卒上深悼惜為公罷朝遣禮部尚書胡濙賜祭勑工部製棺營喪葬贈特進光祿大夫柱國湯隂伯諡忠襄官其子佑為户部廣東清吏司主事公生元至正辛丑十一月己巳享年七十有三卒之日家無餘資公卿大夫皆往哭吊致奠祭配陳氏賢而勤儉纍封一品夫人子男五長儀先卒次即佑又其次曰儼曰倫曰俊女二季榮髙讓其壻也孫男十七人孫女十二人惟公亷介勤慎剛果有為自始仕至老視國事如家事凡所施為毅然自任不畏強禦雖怨有弗避害有弗辭與人辨論嚴厲之氣見於詞色而推之於政略無害人蠧物之心誠國家忠謹直亮輔弼之臣也佑奉柩歸以某年某月某甲子葬某山之原乃以郎中黃璿所狀事行來請文勒之墓道以垂永久余與公交好三十餘年不可以辭既序其槩而復系以詩曰川嶽降靈篤生賢哲乘時奮庸以樹勳烈惟公之生早負俊才列職郎署超僉憲臺風猷宏振綱紀斯秩出參大藩政興弊息凡所設施算無遺策顯命荐臨特拜方伯赫赫太宗仗義而興命公居守撫民餉兵既正大位嘉公勞績進位尚書厚其賚錫公愈飭勵經國如家謗怨弗恤恩寵屢加仁宗嗣位眷顧尤重兼秩宫僚式隆任用念公抱疾進位師臣俾休于家疊施以恩皇上繼統眷公耆舊詔復任事寵待加厚維公忠實衆所共知維公勳業顯著于時筋力雖衰寸心猶赤奄忽長逝帝用悼惜贈爵賜諡喪葬是營官其後嗣存歿光榮維茲光榮從古罕致公具有之其誰克似武平有山鬱鬱其崇勒文墓道垂耀無窮故資善大夫太子少保禮部尚書兼武英殿大學士贈榮祿大夫少保諡文靖金公神道碑銘國家當太平熙洽之時必有忠謹淳實之臣論思獻納於其間而後克臻乎至治之盛故資善大夫太子少保禮部尚書兼武英殿大學士金公實其人焉公諱善字幼孜世居臨江新淦之厚聚宋時有諱清者遷洪坑至十五祖諱某者復自洪坑徙培山遂家焉曽祖德明祖仲卿皆以儒傳家父諱守正學問該博洪武初辟為郡學訓導嚴毅剛方人稱為雪崖先生公生而秀拔不羣幼克勵志於學雪崖竒而教之及長遣從前進士聶鉉受春秋業成為邑庠生領鄉薦登洪武庚辰進士第擢户科給事中太宗皇帝即位首以文學薦入翰林改檢討命與解公縉胡公廣黃公淮胡公儼楊公士竒與榮凡七人同直內閣參掌機密不數月皆升職公為侍講階承直郎明年蒙賜象笏幞頭公服尋賜二品織金衣寵任甚専仁宗皇帝在春宫侍臣進講經史公獨説春秋詞嚴而理正遂承命作春秋要旨既進深協睿衷公嘗病遣中官偕御醫往視及痊入朝慰勞甚至丁亥升右春坊右諭德乃兼侍講階奉訓大夫今上皇帝為皇長孫命宫僚兼職輔導賜勑奬諭公亦與焉巳丑扈從來北京庚寅從征出塞冬還南京辛卯詔重修太祖髙皇帝實録公與纂修壬辰命典文衡考試天下貢士號稱得人既而余五人者蒙賜誥命公得推恩贈其父如公職封母羅氏為太宜人贈妻孔氏為宜人癸巳復扈從來北京甲午從征西虜既還命儒臣纂修五經四書及性理大全書學士胡公與公及余實總其事書成重沐恩賚丙申升翰林學士仍兼諭德階奉議大夫是冬還南京明年復護駕來北京戊戌實録上進錫宴于禮部有金織紗衣鈔幣之賜庚子升文淵閣大學士仍兼翰林學士壬寅扈從北征軍行乏食偵知賊營尚逺公與余密疏軍中利病言之遂詔頒師癸卯隨駕巡邊獲其名王額森圖罕以歸特蒙厚賚甲辰復從北征師還駐榆木川太宗晏駕凡沐浴含斂及道路措置之儀公與余實與焉仁宗皇帝嗣位深加寵眷進户部右侍郎仍兼前二職今上正位東宫拜資善大夫太子少保兼武英殿大學士禮遇益厚凡法司論決重刑必命楊公與余及公同審録其中伸雪蓋多時賜大臣五人銀圖書其文曰繩愆糾繆以為政務或有闕失許用此密疏以聞公亦與焉當時榮之是冬奉命持節册趙王妃及封梁王明年洪熙改元命兼禮部尚書三俸俱支賜誥命贈公父祖皆太子少保武英殿大學士祖妣為夫人加封母太夫人贈故妻劉封繼室屠皆夫人明年春公以母老首奏歸省仁宗可之命給驛以往賜賚甚厚皇上嗣位公丁內艱特詔起復命為總裁官纂修兩朝實録已酉命持節往寧夏册封安化真寧二王妃所過閲兵民休戚還奏上嘉納之庚戌兩朝實録成賜鞍馬白金文綺金織襲衣錫宴于中府是冬扈從巡邊至宣府而還明年秋疾作上命醫診視賜藥物至冬疾劇少傅楊公與余往候問公言死無足惜但愧無以報朝廷益生民家人有請祈恩於子者公曰此君子所耻言及再有問竟不答卒之日實宣德辛亥十二月丁未也享年六十有四訃聞上為之嗟悼贈榮祿大夫少保諡文靖命有司製棺遣禮部尚書胡濙祭之給舟車歸其喪為造墳塋恩至厚矣其子昭伯將以某年某日葬公于某里某山之原而以碑銘為請余與公同年同官處禁林三十餘年出則聫鑣入則同席雖親兄弟不過是也自公之殁痛傷于懷弗能自釋銘奚可辭惟公孝友謙恭沉實和易樂善泛愛出乎天性其學問淹貫文章豐暢為人所愛重凡三扈從往來兩京五從北征沙漠執筆從事於行陳之間乘危涉險未嘗以勞勩為言其在朝廷動作進止皆有常度論思獻納多所禆益是以歷事纍朝荐膺寵任眷遇雖隆而自處益謙名其燕休之所曰退菴可謂得大臣之體矣是宜樹碑墓道以垂不朽銘曰天啓皇明文運昭宣輔贊至理必多俊賢顯顯金氏世業以儒善積有源慶澤乃敷惟公之生天資挺秀羣經子史靡不博究既擢巍科給事廷陛太宗右文寵渥荐至擢置禁林從容宥密克副淵𠂻屢進華秩于狩于征公罔不從恪勤夙夜不有其躬仁宗嗣位簡賢任舊爵位日崇寵眷彌厚文敏集卷十七
