body:
  text: 文敏集卷四明楊榮撰歌行夀少師蹇公岷峨鬱蒼蒼巴江浩洋洋隂陽二氣互流蕩精英翕聚生賢良憶昔元祚衰天造正冥昧公生癸卯冬適際真元會賦此英偉資天意豈無待一朝發軔登巍科鳯凰池上承恩波彩毫彤管日簪侍禁密優遊榮寵多先皇首擢為冡宰天下人物歸權衡綱維百職肅儀表調劑四海臻和平偉哉金石操挺矣松柏貞聲名滿夷夏事業垂汗青四朝歷仕荷深眷兩扶紅日升霄漢經綸邦國運嘉謨耿耿忠勤不知倦從容職寅亮秉軸居廟堂元化屬參贊斟酌隨低昻皇穹錫佑在元老年踰七帙愈康強禁城梅玉清香吐綺席𢎞開具尊爼蔥蔥瑞氣滿華堂煜煜斑衣膝前舞稱觴獻夀來羣仙錦袍玉帶光相連共誇天地産良佐柱石邦家非偶然嵩嶽昔降神生彼甫與申詩人發歌詠簡册猶昭陳况今聖皇位宸極不比周宣更化新盛世光嶽氣完厚鶴髮龎眉多縉紳仰止岷峨峯崔嵬彩雲裏盼彼巴江流悠悠去無已為公歌此度遐齡坐閲升平介繁祉題竹石泉坡贈南京劉給事中天孫織錦機邉石粲若雲霞成五色乘槎仙人攜之歸騰入滄溟深莫測波濤蝕囓千載餘上産百尺青珊瑚馮夷捧來為我獻文彩照耀扶桑烏君不見石家小兒肆行暴競巧誇竒真可笑髙枝大葉似此稀不待搜羅能自到堯舜在上來逺人貢獻盡卻竒與珍我今有此不自惜持以贈子何殷勤嵗寒别我金臺下春滿南都到官舍此行樹業當何如須與珊瑚比光價送孝亷童景和還鄉我家雲際峯子居玉溪側溪雲相望百里間共聽溪流看山色我忝逰京國别家凡幾霜丘園子晦迹林泉足徜徉今秋忽領鄉書薦邂逅都門欣會面為言堂上有慈親白髮如絲身尚健今晨奏疏陳衷情詔許還家晝錦榮人生何如奉親樂婦進甘腝兒調羮君恩如天尤罔極欲報涓埃那可得抒忠盡孝臣子分重係綱常諒須識我别庭闈音問疏綵服亦欲相追趨若過閩山到鄉曲為我先寄平安書題張判府恆山書屋恆之山相疊峙幽燕以南亘萬里蒼崖髙出幾千仭古稱北嶽中天起但見日月來東西蒼藤古木啼青兕張公築室讀書舍其下閉户不出識者寡左圖右史日相親下筆文詞襲班馬胸中更有治安書披腹琅玕欲傾寫一朝選入逰上庠文彩燦爛雲錦章許身報國竭忠藎佐治聖世如陶唐秉心精白恆自守髙誼如公世罕有朅來輔政居建邦化民已見風俗厚生平節操如秋霜禮法雍容睦僚友春風夜坐政事堂思看舊書那能忘白雲縹眇在眉睫緑樹暗靄遙相望君親兩立不可置惟願夀考如天長恆之山渺何許南閩逺望青天髙更有幽人時仰止氷蘗堂為龎明敘作萬物誰獨清惟有玉壺氷羣卉難悉數蘗心良最苦人生髙潔勵貞操可使芳名照今古鹿門逺孫居吉文鳯凰池上超凡羣堂上令母年七十孀居自昔揚清芬辛勤撫孤習詩禮遣贄從師脫簪珥熊丸有訓屢資勞膏沐無心寧復理只今三釡荷恩榮萱花雨露逢升平帨闈華扁署氷蘗煌煌史筆昭懿情豈不見昔王素所至亷名馳仕路不獨當時氷蘗聲千載髙風爭景慕而家令母何其賢淑德早向鄉邦傳再歌一曲勵民俗以兹願續柏舟篇金臺别意圖贈宋士德照磨復任松江東吳名郡雲間最山水鍾靈此其會九峯􅍶崒秀凌空三􅍩春流互縈帶就中宦績相後先只今郡屬惟子賢灑如清風立翠竹炯若緑水開紅蓮昔年初捧除書至父老欣欣總懷惠閭閻雞犬寂無驚田野桑麻藹交翠公庭晝間案牘清終嵗不聞敲撲聲家家院落絃管溢處處寒燈機杼鳴政成回首逾三載考績京華見風采故鄉姻好情逾深宦路交逰心不改盍簪道舊能幾時承恩南去催還期臨岐握手興不盡悵望雲山傷别離雲山微茫渺何許為託幽懷向毫楮一段間情入畫圖千里相思若親覩子今磊落非尋常政化覃敷名譽彰東吳民庶重懷仰滿眼煙樹皆甘棠殷勤祖帳送行色逺大相期須努力需看萬里自飛騰雲霄好展扶搖翼崆山逺思圖贈章貢太守張鳴玉庾嶺西來知幾里其下蜿蜒走章水章水盤回到郡城南有崆山相對峙層巒疊嶂通杳冥儲珍育秀多空青造化生成挺竒異氣勢磅礴鍾神靈兹山屹立何髙壯翠壁丹崖鬱相向黛色蒼蒼望不窮嶻􅑖凌空幾千丈黃堂太守方盛年讀書掇科才且賢皇華光彩照海內玉節時時下九天昨來拜官守章貢五馬恩榮世所重皂蓋風雲自繞旋丹霄日月長瞻捧去嵗雙旌朝帝京金臺相見不勝情征驂初指龍沙路歸鞍已向虎頭城分攜去住心何苦幾度相思未由睹謾憑毫素染崆山想像天涯渺何許懸知從容退食時獨對兹山覽秀竒晴煙暝靄相恍惚瑤林琪樹紛葳蕤我因斯圖寄遐想引睇南天神獨往髙名期與此山齊令德應知人共仰小畫為韓院判題君家畫品世無匹昨者滄桑忽相失題詠空傳名士詩揮灑猶存伯兄筆知君繼志真才賢故物忍令終棄捐遂教好手巧為此拂拭毫素生雲煙春山如黛春水緑芳樹重重繞華屋杏花日暖卧貍奴蒲葉風輕飛屬玉我亦平生林野情忽見新圖心目清何時訪君向幽處一棹煙波江月明題松鶴青田之姿真不羣玄裳縞毳何繽紛有時清唳向寥廓一聲直上橫秋雲孤松亭亭髙百尺松梢盤拿倚石壁翛然來此立多時軒昻欲展雲霄翼何當結巢松樹間朝來飛去暮飛還間隨坡仙度赤壁不逐子晉逰緱山伊誰寫此最竒絶髙堂忽見心神悅安得蒼崖置一雙舞影秋空弄明月一片秋意為史院判題昨夜西風起蘋末長林蕭蕭葉初脫夕陽流水淡無波玻璃沈浸青冥闊斷堤古岸遙相連倣佛疑是鑑湖邉黃花未發含清露白鳥欲度橫蒼煙人間此景何瀟灑獨對新圖意間雅安得扁舟泛緑漪坐看翩翩海鷗下題韓御醫山水圖幽人襟度何瀟灑時來踞坐長松下天邉翠壁髙嵯峨石上垂蘿已堪把興來看山不厭山仰視浮雲不可攀流泉隱隱出巖谷長疑激石鳴潺湲只今作官居顯職日日承恩登禁掖還山未得但看圖一段間情付秋碧題王知事蒼梧親舍蒼梧之山髙崔嵬蒼梧之水青于苔朝雲捲雨凝不散化為五采天邉來知君攬結入肺腑綺語藻詞生筆下一從泮水樂優遊聲名早已登天府朅來閩藩今幾年元戎幕下開紅蓮庭闈道逺不可見披圖展玩心悠然蒼梧遙遙幾千里引睇沅湘隔煙水慈親鶴髮雙鬢皤倚門日日長如此忠孝由來難兩全嗟君心事誰能憐丈夫有才誓許國要令事業垂簡編我時趨京赴西掖因君此圖情轉劇相思應在玉堂中明月滿簾天咫尺西山精舍西山疊翠峭且竒山前流水清漣漪美人築室得幽勝獨攬秀色褰書帷紅塵不到柴關靜緑樹隂濃晝日遲書聲伊吾出林杪時有好鳥鳴髙枝花雨飄香入醽醁松濤送響來琴絲以兹逰息信得所况有童冠相追隨每于大化探至理登山臨水應忘疲邇來有籍通仙府别却舊業趨京師匆匆相見長干道命我為題精舍詩秪今去典常山教尚有西山猿鶴思題張真人鴣峯清暑圖鴣峯嵯峨幾千尺屹立江南半空碧仙家正在龍虎深林壑翛然絶塵迹茅屋俯瞰峯之阿石泉飛灑浸垂蘿向來六月不知暑空翠滿襟涼氣多道人時把瑤琴理流水髙山少知已問誰載酒泛中流來聽清商間宫徵我生性嗜山水幽忽見此圖清興留何當從子問真訣周覽八極尋丹丘題方尚書蘆雁黃蘆蕭蕭波渺渺六花飛入江天杳逺渚長林落葉空平沙斷迹行人少嗈嗈鴻雁自隨陽飲啄飛鳴古岸傍幾點遙橫關塞逺數聲逈隔雲山長乃知良工妙無敵筆攬造化留真迹摩挲此畫賦新題崔氏已無空嘆息題吳尚書山水圖青山嵳峩半空立萬疊芙蓉紫煙濕峯前昨夜春雨深繞澗飛花水流急隔嶼人煙凡幾家一徑蒼苔石磴斜溪回路細長芳草月落幽林歸早鴉山深洞口行人少白雲飛墮青山杪恍見滄洲樹色微如聞古寺鍾聲杳茅簷日出雞犬喧十里煙光連逺村依稀乍疑篔簹谷倣佛自是桃花源乃知畫者通玄理點染天機筆鋒裏尚書愛此欣得之素壁髙堂見山水人間美景不易尋此圖直比雙南金玉堂展卷慕清絶爽氣蕭蕭風滿林賦西山送教諭周公明赴長洲西山屹立何雄哉倚天盤地髙崔嵬壯氣崢嶸逼太華秀色縹眇連蓬萊蓬萊咫尺臨天闕遙對兹山最竒絶龍樓鳯閣接飛雲玉殿瑤階照晴雪周君文采儒林英蕭蕭白髮沾恩榮宦程初赴天官考教鐸還為吳郡行今晨告别何草草祖帳離筵薊門道回望西山疊翠屏萬古青青應自好長洲花發春日初緑水蕩漾青芙蕖臯比坐講有餘暇還念西山相憶無夀萱堂為王都御史題髙堂有母今垂老鶴髮慈顔喜長好愛日惟存慰母心階前多種忘憂草願將此草喻慈親一度春風一度新日傍花邉呈彩服時依叢畔膾金鱗公從早嵗承恩眷時向烏臺掌邦憲祿飬深期志不違宦情但祝親常健雲冠霞帔簾幕深慈親夀考多歡心華觴纍進浮香氣輕輿幾度來花隂慈親安樂萱長茂九天雨露栽培厚有待他年晝錦還拜舞花前慶親夀題夏尚書橫披山水青山綿亘何盤盤空翠杳靄連岡巒千尋黛色雲中出萬疊芙蓉天際看懸崖峭壁真竒絶百尺飛泉灑晴雪石磴髙低入渺茫嵐光逺近相明滅其中茅屋臨水開野橋曲澗紛縈回抱琴客向誰家去鼓棹人從何處來百花爛漫爭妍媚逺樹參差帶新霽初疑盤谷隔風煙忽訝桃源在塵世人間此景那可逢嗟哉畫史何其工摩挲展玩不忍釋為寫清興思無窮溪隱為章氏題幽人昔隱清溪濵溪中流水光粼粼常時濯足風湍曉幾度蕩槳煙波春髙懷對此真淡泊嘯詠滄浪心獨樂竹寒沙淨小窗幽酒醒夢回月初落幽人乘化知幾年溪邉勝景還依然臨流有客想芳躅况復胤嗣多才賢當時品題遺翰墨展卷悠然仰先德誰云杖履迹已陳文采風流照溪側我亦平生慕勝逰武夷曽回九曲舟何當為掃溪頭石坐看一片氷壺秋孝友堂為吕尚書題名家本出藍田裔積善生公廟廊器堂中列鼎奉慈親膝下聨芳見諸弟公昔家居侍母傍朝朝暮暮在髙堂清觴瀲灧蟻浮蠟綵服連翩雁作行自從致身事明主一片丹心誓相許晨趨雙闕列朝班夕望孤雲憶慈母昨者承恩晝錦還擁蓋持麾西入關咨詢到處盡臣職拜舞喜得瞻親顔春暉煜煜聨華萼鶴髮龎眉宛如昨塤篪迭奏承親歡自古天倫有真樂知公祿養榮且豐夀富康寧誰與同作詩願頌君陳美芳聲永世垂無窮野橋春霽圖東風吹花新雨晴微茫山影開雲屏泉聲有無隔幽竇嵐光逺近排空青小橋橫枕西溪側過客何由分野色日華瀲瀲因物榮芳草萋萋為誰碧五更朝下承明廬天香滿袖登逰車十年未著謝公屐似與岡巒識面初歸來摩挲醉吟目不唱商顔紫芝曲何處有山如此圖移近蓬萊剪濃緑林泉清趣圖有序凡處富貴功名炫赫而能安乎素履不以浮靡纍其中者此其為人必有瑰竒磊落之資清敻絶塵之想卓然超乎庸衆者也今右軍都督府都督同知沐公世本元勳承閥閲之舊襲簪紱之華蓋未嘗以富貴名爵有所矜衒居常退然自下歉焉若弗勝此其志趣豈不賢于人逺哉豫世家建寧公之先人黔寧昭靖王在國初時駐節建寧撫鎮七閩號令嚴肅政行惠施士民懷慕豫少時蓋已熟聞其德量之宏才識之偉矣及豫以科目登朝又幸與公之兄今太傅黔國公暨公與公之弟駙馬都尉胥晤于是知公之伯仲皆以勳勞才望受知當時策名藩方聨姻戚里實皆先世積纍之厚非偶然也公自滇南入朝京師其將歸也屢索豫詩以識别豫惟公能超然物表無所繫纍雖在貴富顯榮之中而懷蕭散恬淡之志乃令善畫者作林泉清趣圖以贈且為歌詩以系之嗟夫謝安以晉宰輔為四海之望而懷别墅之樂裴度以身為唐安危而慕緑野之勝則是圖也亦豈非公之志也哉詩曰公家先世國元勳舊有威名海內聞至今功烈尚如昨三鳯文采皆超羣公為仲氏尤瑰傑自少藩方持節鉞標格渾如玉樹清丰􅐾逈若氷壺潔平生不受塵俗牽時時髙興在林泉間來與客縱歡賞碧雞金馬民安然昨者來朝雙闕下九重眷顧增光價萬里欣逢入覲初幾度從容退朝暇兹乘驛騎賦旋歸贈以斯圖慰逺思長林欎欎淨塵俗石泉泠泠洗襟期如公風度今能幾况復勳名世無比不徒惠澤被遐荒要遣聲光照青史紅亭酒酣日向曛三疊驪歌未忍分揚鞭上馬重回首還見蓬萊五彩雲題李參議轅門清暇圖李君磊落英妙年萬里青雲先著鞭致身早振成均譽列職曽推宦路賢自從佐郡蜚聲久田野熙熙真罕有千樹煙火藹桑麻萬落人家蔭榆栁只今參贊在轅門防秋猛士如雲屯詔書晝下笳鼓靜羽檄夜發風雷奔有時調兵奉天討瘴雨蠻煙淨如掃帷幄爭推籌䇿良官僚共説謀謨好以兹身間心亦樂時時談笑青油幕秋空斥堠絶烽煙夜月邉城息枹柝况今大將有山公持麾擁節收成功幕中從容煩寄語勉旃報國垂無窮賀許編修父夀日名家自是簪纓裔種德綿延今幾世遐齡可比竇家椿賢嗣宜方鄧林桂朅來初度屬昌辰鶴算今逾七十春遙想瓊筵開盛宴衣冠滿座來嘉賔玉堂令子尤歡慶緘寄詩詞逺伸敬紫誥曽頒已賜官綵衣新製還相稱伊豫千里仰芳聲未及登堂舉夀觥尚期黃髮膺嘉祉更沐天朝雨露榮劒池書館為鳯陽熊知府題豐城寶劒天下聞紫氣曄煜光照昏一朝劒去蛟龍合池水深碧今猶存熊君書堂在池側倣佛當年子雲宅紅簾緑幕對髙秋細雨青燈坐終夕翩然振翮起朝端青瑣闈中列上班功成又轉二千石坐取功名如等間有時夢入鄉園樹還憶臨池讀書處早晚承恩晝錦還劒池魚鳥寧相負題陳德遜青山白雲圖若有人兮尚貞獨為愛青山寄髙躅青山盤盤江水涯白雲英英滿空谷昨日攜書逰帝畿白雲縹眇紛相隨中宵乍覩從龍處故里猶懷伴鶴時東風三月春正好白雲有意還山早多情更賦還山吟願與山人樂熙皥寄翰林編修龔良器我憶初年在閭里于爾嚴君重交誼坐論夜雨碧窗前醉舞春風落花裏盟心托好真忘年往來出入相後先情深直擬金蘭契意厚寧如膠漆堅一從辭家上天闕平步雲衢依日月只今已是三十春兩地相看鬢成雪自慚碌碌衰懶餘君恩未報將何如故山迢遞隔江海飛雁不帶南來書玉堂退直重相憶幾度逢人問消息光榮已喜沐恩封老大偏憐少筋力翻思昔日辭家時爾生數月方孩提滄波東去白日逝門牆桃李皆成蹊向來大比屬庚戌喜爾翩然應時出䇿名飛步冠羣英餘子紛紛孰能匹詞垣三載承寵光御敕恩頒增焜煌銀章紫綬貴尊甫霞帔珠冠榮北堂人生際遇有如此莫遣光隂枉拋棄尋常晝錦不足誇逺大勳名且須冀由來學問無終窮好將經史精磨礲促裝更囑來京早摩挲老眼看騰沖題馮敏山水圖鳯池仙客天機精筆端點染真天成想當適意自盤礴呼吸造化含元英欣然寫此得佳趣雲水微茫帶煙樹左拏右攫森相樛恍若蛟龍飛不去懸崖峭壁不可攀岧嶤直入霄漢間幽亭卜築在深處塵氛不到清晝間是誰瀟散事逰賞短棹輕舟自來往晚風不動碧波平瀲灧寒光映蘭槳斯人偉矣真罕儔飄飄儼若坡仙流披圖一覽發清興倣佛萬里江南秋送建陽何二尹景春復任建溪佳致著南土文物衣冠近鄒魯考亭夫子接洙源道德輝煌照千古哲人一去三百年流風餘韻今依然桑麻蔽野藹春晝絃歌比屋聲相連賢丞自是俊髦士佐政琴堂勤撫字令克同心足有為女織農耕日無事朅來考績上帝京銓曺書最揚芳聲曉辭雙闕瞻龍衮晚唱驪駒傷别情南風吹雨灑行路酌酒都亭話心素隱隱征輪日下歸瀟瀟匹馬河橋度朂君此去休遲遲到官正值新秋時道傍棠樹多翠色堂下雙松森四圍更從父老詢民瘼撫慰貞淳袪詐惡公庭事簡訟不聞犬卧緑茵花滿郭方今聖主旌循良屏除貪墨投逺方好堅清操保終始他日行看膺顯揚重慶堂為御史崔仲玉賦君家積善肇慶源雲礽奕葉森相傳一門四世總無恙自是五福能兼全人間具慶亦云樂况有重闈齊矍鑠桑榆入暮駐流輝黃菊逢秋粲竒萼堂中大父八帙餘更聞祖母夀福俱朱顔曄煜見神彩白髮飄蕭霜滿梳過庭詩禮重嚴父清夜和熊賴慈母庭前椿樹傲清霜堂北萱花沐時雨羡君卓犖方壯年由來孝友自天然禮闈擢秀並多士憲府乘驄推獨賢昔曽衣錦歸故里鳯敕恩頒重褒美銀章白簡相焜煌霞帔珠冠絢文綺一堂和氣春融融子拜雙親孫拜翁雕盤品食備甘旨斑斕五綵迎東風嗟哉重慶世罕有偉矣君家德深厚勉旃忠孝兩無虧嵗嵗髙堂介眉夀送翰林修撰連景賢歸建寧省墓長空淡淡秋氣涼金臺紅葉飄清霜詞林有士荷恩寵衣錦翩翩歸故鄉故鄉迢遞在何處雲水微茫隔煙霧一尊酒盡情更賖三疊歌殘留不住繡鞍金勒王花驄洋洋意氣如晴虹官河初泛過瀛海眼前景物應無窮岱宗磅礴亘鄒魯人物衣冠自今古梁山奕奕神禹功千載竒蹤在西楚錢塘月落潮正平吳歌越語相間聲買魚沽酒且為樂吊古興懷無限情蘭橈桂棹疾如矢風正波平日千里望中閩嶠白雲邉笑指鄉關在伊邇維時溪上梅花開花間喜迓扁舟回綺筵交錯列華饌紫霞瀲灧浮金杯錦衣絢耀已如此光被松楸及桑梓焚黃既畢早趨朝忠孝兼全孰堪比嗟豫衰老白髮多濫叨厚祿居鑾坡三朝自幸沐優渥涓埃未效將如何今晨送子轉悽惻聊寫長歌壯行色到家故舊若相過為道年來重相憶送江副使志堅復任浙江都門朝下日方燠嘉樹蒼蒼藹新緑紅亭送子復之官頓有離情千萬斛憶昔初逰鄉校中書窗夜讀清晝同共期情誼託膠漆肯教蹤迹分西東我慚列職近丹陛子繼登科擢髙第鶚剡橫飛出九重纂修共處清華地金閨通籍承寵光丹墀簉羽連鵷行朝回傾倒足為樂幾見庭樹飛秋霜書成峻擢天顔喜繡服輝煌燦霞綺十年風采動朝端富有聲名滿人耳外臺六載非偶然平生志節久愈堅浙水東西數千里咨詢多道使君賢朅來考績上京國書最榮歸動行色暫時酌酒須盡歡明日雲山杳相隔朂哉此去毋躊蹰浙中黎庶望回車願言氷蘗保終始平安時寄南來書送廣東惠州陳太守還任京華三月春欲老栁嚲花明覺春好故人五馬促行裝清晨取别何草草為言昨日朝明廷三年考績承寵榮九重才覩蓬萊曉萬里復向龍川行念昔先皇選民牧愛子才華美如玉一時被命同幾人五色龍章絢人目平生力學頗自珍試推豈弟懷斯民羅浮山髙豐水濶草木盡得霑皇仁兹行還領魚符去須信閭閻久延佇桄榔葉暗荔枝紅竹馬紛紛滿行處文敏集卷四
