body:
  text: 文敏集附録少師工部尚書兼謹身殿大學士贈特進光禄大夫左柱國太師諡文敏楊公行實公名榮字勉仁姓楊氏先世家關右系出漢太尉震唐末有仕於閩者始居浦城其後子孫復遷崇安建陽轉徙建安今為建安人衣冠相承為郡望族考士美妣劉氏洪武辛亥十二月戊子公生焉先夕士美夢一道士眉髪蒼然扣門假宿翊旦生公因名曰道應祖達卿聞公啼聲竊自喜曰是子必榮顯吾家為更名子榮祖母阮尤鍾愛之常抱置膝上教以詩書六嵗遣從里中師不數月能誦孝經啓蒙論孟諸篇達卿益喜間與賓客嬉㳺必携公往時誦古人詩令公解說皆通其意達卿嘗曰異日其無忝太尉矣惜吾老不及見之達卿沒公纔八嵗哭泣盡哀弔者異之自是日侍祖母阮弗暫離士美嘗以賦役居外公年十二三承順母志綜理家事纎悉皆有條緒年十五適歲亢旱請命於父致齋三日率鄉人犯烈日徒跣走數十里詣龍岩請禱儵爾大雨隨㴻公之居近有溪流絶行道舊為梁其上山水暴溢輒衝決之涉者病焉男女或相牽輓公見而歎曰此甚非所宜也古者男女授受不親此何為哉乃率鄉人採木編筏固以鐵􅍻水弗能害行者安之時妖人有依鬼物混擾邑中者以公正直不敢過公之鄉年十七鄉里大疫死者過半無何公亦染疾沉困極甚湯藥弗能進人皆以為不可治公父母為具棺衾忽夜半公起呼家僮索水飲頃之遂甦人皆竊謂公危殆若此而復生不偶然也是冬有司選充郡庠生從教授周質夫訓導趙友士學易二先生見公穎悟敦實甚器重之深加訓誨公益勵志於學嘗與同門論古之名相彼或謂不可及公徐言曰臯䕫伊周或不可及如其他未有不可學而至也知者謂公器識不凡矣公在學舍自奉甚薄毎月分廩米市甘鮮之味歸以奉親年二十四西甌仲穆一見公喜曰此國士也遂以女歸之是為劉夫人温柔貞淑而尤聰慧自幼已通曹氏女誡諸篇夙夜敬謹克相其徳公在諸生列凡十年於經史百氏靡不該洽其為文皆根據義理不事浮靡儔輩罕及深為郡守禮敬時戸部侍郎夏原吉及諸朝使按臨者莫不待公殊禮達卿葬建寧城東白鶴山麓去郡庠可五里許公築室墓下扁曰白鶴山房常與賓朋㳺息講貫其中嵗己卯福建鄉試中第一明年禮部㑹試中第三入對大廷中第二甲第三賜進士出身除翰林編修公益注意聖賢仁義道徳之懿不屑屑文辭凡有求者輒辭不獲已則隨已意以應之不為雕斵組織以徇俗好而理致閎逺有非人所可及故凡得片文隻字者莫不寳而重之壬午六月己巳太宗文皇帝入正大統為更名榮陞脩撰階承務郎命直内閣㕘掌機密賜香藥及金織羅衣冬十一月庚辰朔進翰林侍講階承直郎永樂元年癸未秋九月丁亥配劉夫人卒於京冬十月丙辰命馳傳歸葬仍諭其速來明年春二月庚寅還京先是奉勅修古今列女傳至是書成賜紵絲襲衣鈔幣夏四月甲戌立皇太子陞奉訓大夫右春坊右諭徳仍兼侍講皆極一時之選也秋九月庚申太宗皇帝顧謂之曰朕即位以來爾朝夕在左右敬慎弗懈然恒情保初易保終難朕固常思保全之道爾亦宜益謹厥終庶兩盡其美公對曰陛下不以臣愚陋特加委任敢不勉圖報稱太宗皇帝大恱賜象笏幞頭公服尋賜二品金織紵絲衣公入謝且言恩禮太過太宗皇帝曰卿在朕左右機務所屬賛翼之功不在尚書下故特賜二品服以示旌異豈為過哉是冬仲穆復以季女妻公乙酉春正月至秋九月時召公評議諸司事宜以奏對稱㫖賜二品金織紗羅衣及鈔幣丙戌春二月公得寒疾不能造朝太宗皇帝聞之亟命中官偕御醫蔣用文視之還奏賜藥物且命用文通夕守視時時奏報至痊乃已及公入謝重承慰賚仍令休息旬餘乃出丁亥夏五月庚申奉命往甘肅規畫軍務所過覽山川形勢察軍民休戚閱城堡虚實秋七月甲寅囘京奏對武英殿太宗皇帝大悦時盛暑命取𤓰親剖賜公且遣中官賜以羊酒勅命休息八月建安糧長魏子中來京師公之家以白金夏布等物共一篋附之舟次嚴之七里灘夜遇强冦舟人皆竄匿所載為之罄盡翊旦子中返舟次遥見一篋在水涯視之則公家所寄者抵京奉還因訴被刼事公愕然曰此亦幸耳即分半付子中冬十一月辛亥朔陞奉議大夫右庶子仍兼侍講戊子春正月戊寅賜綵幣白金鈔米夏四月丙午父喪六月庚辰聞訃告歸賜以鈔幣命馳傳以往既襄事乃料檢鄉黨平日有假貸錢穀弗能償者悉焚其券族人有喪不能舉者悉為葬之孤弱不能自存者悉收養嫁娶之有因産業致爭者割已業畀之詔奪情起復宗戚鄉鄰送行者咸垂涕去抵京未閱月命公等輔導皇長孫賜勅曰朕惟令徳所成本乎天賦養正之學實𢎞聖功故有聰明純一之資必有詩書禮樂之教所以充其徳性而廣其器識也朕嫡長孫天章日表玉質龍姿孝友英明寛仁大度年未一紀體具志寧動必中規言必合道好道之篤夙夜孜孜日誦萬言心領要義朕嘗試之以事輒能裁決得中斯實宗社之靈上天錫慶篤生異質以福佑天下而基命於無窮然宏材之建必由匠石之功圭瓉之成必假琢磨之力卿等皆茂簡徳藝職輔東宫東宫之子必資兼弼宜協心同志輔導於成推廣仁義道徳之源開陳二帝三王之治與太祖髙皇帝之大經太法凡創業守成之難生民稼穡之事朝夕講論以涵養本源恢𢎞智量充其盛大之器以為宗社生民之福國家有無窮之休卿等亦有無窮之聞欽哉冬十月甲午母喪乙丑春正月公聞訃當去職時車駕將幸北京特留扈從賜綿衣狐裘鞍馬三月抵北京賜宴公辭以母憂弗與特命中官以珍饌送至家嘗命從遊萬歲山亦辭弗與特召之行復蒙賜賚秋七月甘肅總兵官都督何福言韃靼托克托布哈王等各率部落來歸命公往甘肅與福經畫還奏稱㫖賜以米鈔九月復命持節詣亦集乃封何福為寧逺侯俾經寧夏與寧陽伯陳懋規畫邊務既抵亦集乃封福還至甘州福盛陳餽遺公一無所取冬十一月還京復命及陳邊境便宜十事太宗皇帝嘉納之賜以襲衣鈔幣庚寅二月丙午從征朔漠賜衣被鞍馬途次命光禄給酒饌壬戌太宗皇帝度野狐嶺至山巔召學士胡廣及公指示山川形勢與語良久奉制各於馬上賦親征詩公有聖主尊居四海安天教戎敵自相殘之句太宗皇帝甚嘉之未幾諜知敵酋布尼雅實哩與其下阿嚕台讎殺東西奔遁亟召公諭曰此賊果自相殘滅汝前日之詩安知不為䜟乎公下馬叩首且言曰陛下徳威廣布賊若不散旋當殄滅安敢拒天兵太宗皇帝喜命賜羊酒三月壬午車駕早發凌霄峰公與學士胡廣諭徳金幼孜刑部侍郎金純四人失道太宗皇帝命中官二人及傳令者追尋得之時已昏黒中官疾馳去公等復迷入窮谷中幼孜墜馬胡學士金侍郎不顧而去公下馬為整鞍轡不數步幼孜復墜馬鞍盡裂公即以所乘馬讓之自乘驏馬從夜至旦登髙涉險不勝疲勞翊日出山望見左掖乃趨赴之至午方詣中軍太宗皇帝大喜慰問良久嘉公之義復笑語幼孜曰此中多狼汝非楊榮詎能免乎公謝曰僚友之分誼所當然太宗皇帝曰胡廣豈非僚友耶何不顧而去也三月乙未車駕次清水源其地有鹽海旁近水皆苦鹻不可飲人馬皆渇明日營西北二三里許忽有泉湧出清澈可愛命公同胡學士往觀遣中官以銀瓶汲取太宗皇帝親嘗之味甚甘美復賜公等飲士馬爭趨之皆給足命之曰神應泉又明日公等應制譔神應泉詩銘太宗皇帝覽而嘉之是日寒甚特賜上尊以勞之五月丁夘車駕至驢駒河賜名飲馬河至是稍迫賊境駐蹕河上親選勇士三百人專令衛䕶不以𨽻諸將特命公掌之迨冦平班師軍士乏食公力言之即日召乏糧者赴中軍以御膳所儲糧炒散與之且下令軍中凡糧炒多者許假貸回京倍酬其直由是獲全者衆秋七月丙寅至開平中途召公還行在計事至京皇太子賜鈔幣金織麒麟衣銀相鏤花香帶及石刻蘭亭兩賜宴於翰林命隆平侯張信尚書蹇義欵待且命諸儒臣陪之及還北京挈長子恭偕行八月庚子申刻舟至大江中流暴風卒起同時濟者多傾覆公之舟危險尤甚衆料不可救至晚乃遇順風儵至儀真垻下次徳州有巨艦順流而下觸驛舟破碎墮水死者四人公父子及二僕皆無恙衆謂神明相之不偶然也八月己未抵北京蒙賜綵幣鈔米羊酒等物冬十月扈駕南旋賜鞍馬綿衣褲襪及路費途中屢賜珍饌嘉果抵京復有鈔幣之賜辛夘春正月甲申乞奔母喪賜白金鈔幣遣中官宋成送至家且勅速來抵家服已闋拜謁墓下如初喪儀族人有間公弟妹匿母存時所蓄金帛甚富盍追究之公從容言曰昔人云楚弓楚得况弟妹吾同胞也悉置不問創祠堂二十餘楹搆所居之堂扁曰清白又作軒竹林之下名之曰雲際山房為弟貞娶宋宗室之裔趙友忠女厚具資裝嫁二妹一適西鄉童文貞之子衡一適璜溪雷仕學之子鐔皆士族也族中有孤貧子女皆資給之令以時婚嫁六月癸丑還京師太宗皇帝召問閩中民情暨歲豐儉公條對詳實命光禄賜酒饌勅户部優免其家徭役八月命為應天府鄉試考官取舍公當士衆恱服九月皇太子命公侍諸皇孫讀書文華後殿且諭諸皇孫曰此皇祖近臣汝輩當禮敬公講授有程度諸皇孫多所進益皇太子召公奬諭切至且曰他日學成即汝訓迪之功也公在春坊每進講罷必從容以正心務徳親賢去邪尚儉戒逸之言進深見嘉納或訪以政務必陳其切要及先後緩急施行之序皆懇切無少避忌皇太子每稱公忠直而兩坊僚屬亦莫不推服焉十月重修太祖髙皇帝實録命公為總裁壬辰二月丙辰賜誥命并封贈父母及妻冬十一月甘肅守將駙馬都尉西寧侯宋琥言叛冦婁達罕等逃去主齊勤蒙古衛指揮塔爾尼將為邊患勅守陜西豐城侯李彬率師討之仍命公往經畧十二月戊辰公還具言敵人性無常叛服常態不足以勤大軍遂勅彬旋師未幾叛者皆附癸巳二月乙丑復扈駕幸北京賜衣幣鈔米等物甲午三月庚寅扈征衛喇特時皇太孫侍行太宗皇帝謂公曰朕長孫聰明英鋭勇智過人今令從行俾知用兵之法且使躬歴行陣知將士勞苦然文事武備不可偏廢營中稍閒爾等即以經史講說庶知古今成敗得失之迹可以鑒戒也公每遇駐營伺間進講皇太孫甚嘉重之夏四月丁未駐蹕興和以尚寳司乏人命公兼掌其事凡出號令與宣傳之事勅㫖旗牌不得公奏允不敢發乙夘師次大石鎮晚凉太宗皇帝坐御幄中召問足食足兵之䇿公對宜擇將帥力屯田將得人則軍士弗擾軍士既安則耕不違時何患兵食之不足哉太宗皇帝是其言秋八月還北京賜鈔幣等物冬十一月甲寅太宗皇帝諭公曰五經四書皆聖賢精義要道傳註之外諸儒論議有發明者爾等宜采附於下周程張朱諸君子性理之言如太極通書西銘正蒙之類皆六經羽翼然各自為書未有統㑹卿等宜類聚成編務極精備用垂永久命公總其事仍命舉朝臣及在外教官有文學者同修開館東華門外命光禄寺給朝夕饌甚豐乙未三月庚申工部建進士題名碑於太學命公為記五月辛丑端午駕幸東苑觀擊毬射栁賜文武羣臣鈔有差公進詩文加賜上尊束帛鈔衣九月己酉所修書成賜名性理大全命宴於禮部并賜鈔幣丙申夏四月乙亥陞翰林院學士仍兼春坊庶子冬十月扈駕南還賜綿衣鞍馬鈔幣丁酉三月壬子駕復幸北京屢召問民情公悉以實對賜白金鈔幣金織紗羅紵絲衣帶等物戊戌五月庚戌朔進太祖髙皇帝實録太宗皇帝御奉天殿受之披閱良久嘉奨再四曰庶幾少副朕心辛亥賜宴并鈔幣紗衣丁巳學士胡公殁公掌翰林院事太宗皇帝注意益隆而公在衆中詞色嚴厲諸大臣往往忌嫉隂欲疎之屬北京國子監乏師因薦公可為祭酒太宗皇帝曰吾固知其可汝但求可以代之者於是羣意銷沮六月乙酉詔修天下郡邑志命公總之己亥夏五月公從弟義與公仲子讓自閩來省與嘉興通判陳原祐同舟行次山東時天氣暄熱舟小難居適同鄉翁良興以湖廣黔陽縣丞考滿入京其舟稍寛因力邀義與讓共載是夜盜殺原祐盡掠舟中物義與讓得無恙人咸謂公厚徳所致十二月己丑進言十事皆指斥五府六部三法司積弊太宗皇帝覽而嘉之密諭公曰實切時病但汝為心腹之臣若進此言恐羣臣益相猜疑不若使慎密御史言之於是得監察御史鄧真畀入奏衆皆股栗免冠請罪詔諸司即日悛改怙終者不赦凡所改多益國利民之事庚子春正月甲寅元宵節太宗皇帝御午門觀燈賜百官宴并示御製詩公奉和以進太宗皇帝覽而悦之賜以羊酒鈔幣閏正月丙子陞文淵閣大學士兼翰林院學士階奉政大夫特賜宴於禮部先是太宗皇帝以四夷諸畨字中國宜解其義因選太學生聰俊年少者習之諸生多不欲輒生謗議太宗皇帝怒將罪之公力救解得免遂命公掌之公訓勵得宜自是帖服不敢妄有所言率皆有成官至五六品者莫不感公之徳是冬連賜鈔米柴炭并織金紵絲表裏建庠教授何𤣥渭等時寓公家公輒分與之辛丑正月北京宫殿成初御朝賀太宗皇帝念公日侍左右竭効心力時密加賞賚他人弗與焉二月寧夏報邊冦犯境亟召問公公對以城堡堅實士卒精悍賊必不能持久料今已去矣無勞聖慮既而得報果然是月望夜暴風大作其隣居千戸焦夀家遭火并延十餘家公屋與之連火至輒反風滅之見者皆歎羨公行善之所致也夏四月庚子夜奉天華蓋謹身三殿災火勢猛烈而奉天門東廡切近秘閣公奮身直入麾衛士三百人將御書圖籍并積歲制勅文書舁致東華門河次明日太宗皇帝召諭之曰昨夜火發在目前者幾人卿能收拾圖籍不避艱危可謂歲寒松栢也公謝曰職分當然太宗皇帝嘉之賜銀酒鍾古銅器各一事鈔千錠壬寅降勅訪求民隠公首陳利國便民十餘事太宗皇帝嘉納命悉入詔條頒行之時翰林侍讀李時勉等十餘人為飛言所中太宗皇帝怒欲罪之公力救解得免是冬兵部尚書方賓得罪死逮及戸部尚書夏原吉工部尚書吳中等皆下獄時禮部尚書吕震侍左右屢言中等憸邪誣罔太宗皇帝益怒一日御鷹坊司特召公問原吉等平昔所為公極言其無他二三人者惟以數征北敵乏餽運為憂論才力或不及憸邪未之見也由是太宗皇帝怒稍釋遂寘而不問壬寅三月戊寅從征沙漠賜米鈔鞍馬每軍中命公侯大臣議機務密令公參决無不稱㫖特召公於御幄中同公侯大臣坐飲凡有賜賚公與之俱其特賜公者公侯或不與俱而諸扈從文臣亦皆弗與秋八月還京師九月己巳宴隨征將士命公坐前列食上肴賜鈔幣并二品金織襲衣靴襪閏十二月甲子詔復西征方以士馬糧餉為艱有以建文間江西垜集民兵與餽運丁夫十餘萬可徴用為言太宗皇帝以其奏示公公對曰此兵夫昔有詔令復業今復徴之是失信也太宗皇帝笑語公曰卿言正合朕意遂寢其奏癸夘秋七月戊戌扈從西征賜羊酒帳房等物八月庚申駐師萬全一應軍務悉命公掌之自晝至夜或三接五接宣召每以楊學士稱之而不名冬十月甲子次天成寧陽侯陳懋奏畨王額森圖罕納欵命公詣大同議納降之禮癸酉公囘營奏對稱㫖賜以御饌慰勞甚至冬十一月甲申旋師賜鈔一萬貫米十石紵絲金織衣二襲靴韈二雙甲辰三月復從征北敵五月甲申公言軍士勞苦宜遣使諭彼并釋其不順之罪且請班師太宗皇帝曰卿言深合朕意遂勅中官伯勒格及所獲諜者往彼中諭其部落來歸遂班師乙未巡按浙江監察御史王復奏處州之麗水建寧之政和山冦周叔光等聚二千餘人往來行刼漸致滋蔓請發兵捕之命兵部尚書李慶等議調防倭都指揮張翥所領勁兵三千并閩浙兩都司各調五千總於翥而捕之公從容進言以為彼皆愚民或為有司所苦或為衣食所窘不得已逃入山林茍活朝暮耳何敢為亂若寛而撫之當遂散矣急則堅其為盜之心况兵戈所加不免枉及良善願更思處置之宜太宗皇帝曰卿言是也可勅閩浙三司招撫若復頑梗弗服用兵𠞰滅未晚也既而果悉順服七月庚辰次清水源道傍有石崖髙數十丈命公紀年月日刻於上丁亥次翠㣲岡太宗皇帝御武帳中憑几而坐顧内侍海夀曰計程何日可至北京對曰八月中可至已乃諭公曰東宫歴嵗滋久政務已熟吾還京之後悉以軍國之事委之朕惟優㳺暮年以享安和之福何如公對曰殿下孝友仁厚天下屬心允稱皇上付託太宗皇帝喜命太監馬雲以羊酒賜之辛夘次榆木川太宗皇帝不豫召公等受遺命傳位皇太子遂崩衆倉卒莫知所措公一遵古禮歛含如度謂太監馬雲等曰六師去京尚逺不宜發喪所至宜上食如常儀衆是之復條畫軍中事益嚴號令人皆莫測時議者有欲假他事作勅用寳馳報者公曰先帝在稱勅今而稱勅是詐也罪孰當之壬辰次雙筆峰奉遺命馳訃皇太子八月甲辰至北京致大行皇帝遺命退而復以軍中所宜施行者陳之皇太子嘉歎賜以白金鈔幣召吏部尚書蹇義謂曰卿其識之他日吾將大用焉翊旦復承命同義等議即位事宜公首條民間不便二十餘事上進皆嘉納之命入詔條頒布丁巳仁宗皇帝即位賜公白金二錠鈔二萬綵幣二十表裏及胡椒諸物己未陞嘉議大夫太常卿仍兼前二職九月丁酉進太子少傅兼謹身殿大學士階資善大夫戊戌賜銀印一其文曰繩愆糾繆且諭公曰卿國家舊臣秪事先帝二十餘年又輔朕於東宫練達老成朕今嗣位須卿等協心匡輔或政務闕失朕弗聽言則用此印密疏以聞至於再三慎毋憚煩朕將采納君臣之間兩盡其道庶幾不負祖宗付託之重公頓首受命而退遇事屢有所陳仁宗皇帝皆嘉納之十月己酉奉命持節册立淑妃暨滕王賜以白金鈔幣是日皇太子正位東宫公以師傅之重朝夕侍側悉心匡輔丁巳大理寺奏决重罪仁宗皇帝特召少傅楊士竒及公至御榻前諭曰比嵗法司濫刑往往出於煅煉先帝嘗切戒之故死刑至四五覆奏而後決自今審録卿與士竒同之由是寃抑者多伸理十一月丁亥仁宗皇帝御西角門閱廷臣誥詞顧謂公等曰卿三人暨蹇夏二尚書皆先帝親任舊臣朕方倚卿等自輔凡朕所行卿等共知其有未善皆當盡言朕觀前代人主一履尊位輒惡聞直言雖素所親信亦皆畏威順㫖䛕恱取容或有忠良時進一言一再不納則退而杜口以圖自全致令人主因循肆志卒至覆敗今朕與卿等當以此為戒君臣一體終始協心庶幾可以共圖永久因取五人者誥詞親御宸翰増二語云勿謂崇髙而難入勿以有所從違而或怠曰此朕實心卿等勉之公對曰皇上聖徳之至臣等其敢不勉十二月甲寅加公工部尚書仍兼二職勅曰兹為敵人梗化累犯邊疆我皇考太宗皇帝為宗社子孫天下臣民長久之計不得已躬擐甲胄親率六師往行天討豈期敵人畏威逺遁班師之日不幸中道皇考上賓六軍在外朕又逺違膝下及其崩殂兒孫亦莫能知惟卿盡忠為國報先皇帝恩徳獨為果斷致有今日家國寧謐宗社奠安今辰奏告忽思至此實感不已卿當重賚曩者哀悼倉皇之際報卿甚㣲今追前愆加賜卿白金五十兩綵幣十表裏寳鈔二萬貫白米二十石特陞卿為工部尚書前官如故三俸俱支全支尚書本色卿當領服以慰朕懐初公扈從北征太宗皇帝委以軍務及上賓之日所行喪禮并軍中處置事宜仁宗皇帝聞訃之時不及訪問至是有以為言者遂降勅奬諭丁巳梓宫葬長陵命公䕶喪事賜白金鈔幣洪熈元年正月壬申朔仁宗皇帝御奉天門朝羣臣徹樂止行五拜禮先是禮部尚書吕震請曰皇上新即位天下文武之臣以暨海外諸國悉來朝賀宜設鹵簿作樂如大朝之儀以稱瞻仰弗聽既而震固請仁宗皇帝曰山陵甫畢忍遽即吉明旦朕亦不欲臨羣臣震復進曰四方萬國逺朝新君皆願一覩天顔雖聖孝有所弗忍然宜勉徇輿情仁宗皇帝顧公等曰禮過矣奈何公對曰誠如聖諭必欲受朝不宜備禮從之翊旦諭公等曰為君以納言為賢為臣以直諫為忠如朝㑹一事若從震請追悔何及頼卿等直言幸免斯咎自今朕有弗逮卿毋惜言之各賜鈔幣丁丑公懇辭尚書俸仁宗皇帝曰卿居侍從之職勤勞多矣矧皇考賔天逺在塞外卿獨在側盡力綱維每瞻奉几筵念兹弗忘今與三俸亦豈為過卿其勿辭公復曰臣等秪奉先帝職分當為過受厚禄實所未安終弗允丙戌頒賜誥命并推恩封贈其祖考皆如公官祖妣及母妻皆為夫人三月辛未命魏國公徐顯宗讀書國子監召公諭曰爾宜往諭司業此開國元勲之裔欲其家與國同久必教之讀書知道理乃可以長保富貴顯宗孤子其篤意訓之五月庚午朔勅修太宗皇帝實録命公為總裁每朝退仁宗皇帝還宫遇有機務須計議者必親御翰墨書公姓名識以御寳或用御押封出規畫公條對詳悉皆如聖意辛巳仁宗皇帝升遐時皇太子守南京中外恟恟奉皇太后懿㫖馳往以迎至徳州謁見公進言曰中外臣民翹首以俟遂兼程而進既至人心大定六月庚戌宣宗皇帝即位益推心委任公承事尤謹屢沐白金綵幣之賜閏七月甲辰勅修仁宗昭皇帝實録復命公為總裁宣徳元年丙午春正月乙夘勅修歴代臣鑒外戚事鑒皆命總之且諭公書館中編纂及繕冩官有不遵約束者悉聽稽督責罰敢有違越者具聞黜之公處之適當人皆恱服八月辛未漢王叛公勸上親征旬月間事平囘京蒙賜鞍馬白金鈔幣及樂安州男婦五十餘人丁未二月戊寅賜範銀圖書五其文曰方直剛正忠孝流芳關西後裔建安楊榮楊氏勉仁且面致訓戒以表眷待之隆宣宗皇帝嘗親御翰墨作春山竹石牧牛三圖題詩其上装潢成巻賜公并賜端硯御用筆墨及白磁酒器茶鍾瓶罐香爐之類十月庚申命持節册鄭王妃賜紵絲表裏十一月乙未皇太子生宣宗皇帝親酌酒賜公飲并賜白金鈔幣鈒金酒器十二月召至東苑詢訪政務賜酒饌銀相椰盃臘日賜繡衣二襲戊申春正月戊戌元宵節賜文武大臣觀燈於萬歲山命中官侍宴公進元宵賦賞鈔三千貫二月庚申命公同少師蹇義等十八人從遊萬歲山詔許乘馬從東北門入各攜從者二人至乾明門下馬登山繼命乘舟泛太液池賜茶及蜜漬珍果然後至新圓殿俄頃宣宗皇帝乘黒騮馬至召士竒與公詢問民情甚悉賜以潑醅酒人各令盡一甌復命遊小山看西域所貢二獅復遍閱諸景日將西令中官待宴松林之下各賜鈔三千貫鸚鵡一連從者賜鈔三錠并給酒肴皆醉飽而歸且傳㫖免謝明旦入見復各賜椰子慰勞甚至三月癸未奉命持節册中宫禮成賜白金綵幣秋七月辛酉賜遊内苑賜以金銀綵幣玉杯酒饌等物未幾賜玉帶瑪瑙鶴頂龜筒琥珀花犀合香諸帶及龍骨等繫腰皮裘黒貂銀鼠㡌八月戊申扈駕巡邊九月癸丑給以内廏良馬命公先從出塞日賜御厨酒饌乙夘師次寛河遇敵衆將入冦宣宗皇帝親率師𠞰平之丁巳駐蹕㑹州甲子班師既還京公進七言詩凡十篇各立題意宣宗皇帝覽之喜屢沐白金鈔幣之賜十月乙酉不欲煩公以有司之務乃賜勅奨諭曰卿秪事祖宗多歴年所忠謨讜議積效勤誠朕嗣統以來尤資賛輔夙夜在念圖善始終蓋以卿春秋髙尚預繁劇優老待賢禮非攸當况傅保之重寅亮為職不煩庶政乃副倚毗可輟翰林之務朝夕在朕左右相與討論至理共寧邦家職名俸禄悉如舊卿其專精神審思慮益致嘉猷用稱朕眷注老成之意欽哉十二月兩遊南海子賜羊酒及鈔己酉正月丁巳陪祀南郊賜金銀鮮果等物五月端午節賜扇及五色長命縷繫腰等物七月以建議鈔法宣宗皇帝以公有益國利民之心賜紗羅羊酒果物八月賜枸杞湯且令中官吳誠諭㫖曰服此可以延年益夀可以祛諸疾九月甲辰朔賜白金珍珠鈔幣白磁器蘇合香丸等物重陽節賜宴及御製詩一章丙寅給賜河南男婦六人十月癸未駕兩至文淵閣賜詩及鈔并酒饌十二月辛巳賜白金綵幣羊酒等物庚戌春正月丙辰元夕奉命觀燈於萬嵗山賜宴公以詩進賞鈔六十錠凡遇時節必賜以詩章及内珍羞異果壬戌兩朝實録成賜白金綵幣羅衣鞍馬宴於中府尋賜鈔一萬貫并猪羊海魚等物二月乙未宣宗皇帝侍皇太后謁長陵獻陵庚子宣宗皇帝以皇太后命召見公等五人於行殿諭之曰皇帝數言卿等忠勤今天下清寧民生無事是固祖宗福祐家國亦惟卿等贊翼之功賜以酒肴及白金紵絲表裏辛丑進詩謝恩三月己酉囘京賜青紅氁子駝褐四月丁巳皇太后千秋節賜鈔三千貫甲申陞少傅仍兼前二職階榮禄大夫三俸俱支乙酉固辭大學士俸詔許之丙申賜宴文華殿宣宗皇帝親待焉賜鈔一萬貫秋八月癸巳賜從一品誥命并封贈三代考妣及妻六年辛亥春二月甲辰聖節賜宴恩賚甚厚乙巳復賜宴内廷特賜詩一章褒嘉公昔有賜賚必以奉親及親歿而朝廷恩眷日隆公位望益顯至給三俸恒以親不逮養為歉乃請以少傅俸於鄉邑給受以供祭祀及賙䘏親族故舊朋友之貧乏者七年壬子春正月乙亥元宵節賜觀燈於内苑仍賜白金綵幣遣中官送於其第秋七月屢賜御製祖徳詩招隠歌猗蘭操重陽節賜宴及内醖珍羞十一月丙寅皇太子千秋節賜綵繡麒麟襲衣八年癸丑秋七月丁丑吏部奏少傅滿三載賜宴禮部降勅奬諭曰卿以博通之學明敏之識練達之材歴事皇祖皇考踰三十年多效勤誠以樹勞績朕承祖宗大統亦惟資先朝舊臣以匡以輔共圖康濟蓋自朕即位以來卿秉誠心躬勤夙夜攄其嘉謀嘉猷賛助不逮整飭武事綏懐逺方而軍旅之政四裔之情明習周知莫踰卿者忠言讜議禆益為多肆特陞𢎞化之職今滿三歲嘉念良深特宴勞於禮部仍賜勅奨諭於戲自古有言人惟求舊惟朕以至誠任卿惟卿以至誠事朕同務戒儆以令始終庶幾允釐天工用光祖考欽哉九年甲寅秋九月扈駕巡邊給以天閑名馬光禄寺日供酒饌比還恩賚甚厚十一月甲戌朔賜詩褒嘉詩曰武夷巍峩清挿天丹山碧水相連延扶輿旁礴之所産往昔奮起多名賢只今繼續揚華芬漢清白吏有逺孫明經䇿第登詞垣皇祖承天御天下竭職論思靡餘暇懐忠秉誠履堅貞臨事果達智識明禁中頗牧材卓犖風雲驥足千里輕顧予菲徳嗣天位旰食宵衣急圖治普天之下率土之濱安危休戚繫予一人大厦之興藉梁柱為邦必資輔弼臣卿事文祖兼仁考歴年固多身未老方兹倚重傅與保士有大抱負堯舜其君民勗哉弼違補闕輔吾仁齊芳昔賢耀千春十年乙夘春正月甲戌宣宗皇帝晏駕公與少師蹇義等僉議即政事宜舉惬群情壬午今上即大位累賜白金綵幣鈔錠丁亥往相視山陵還奏稱㫖復有白金鈔幣之賜夏六月戊申命䕶梓宫葬景陵賜白金二百兩文綺十表裏鈔二千錠山陵畢復賜白金鈔幣秋九月庚午勅修宣宗皇帝實録命公充總裁賜宴禮部冬十月辛亥命監立天夀山碑賜白金五十兩紵絲羅四表裏及上尊珍饌十一月丁丑以聖節賜綵繡雲鶴襲衣寳帶明年丙辰改元正統公與太師英國公等二三大臣建議開經筵以緝熈聖學詔可其奏且命精選儒臣充講官降勅勉諭曰朕秖奉天命嗣承祖宗大寳統御天下用主神人而即位以來弗遑夙夜永惟厥道必學乃明今以初九日御經筵命爾翰林春坊等衙門儒臣㑹同進講夫大道原於天堯舜禹湯文武以隆政教而周公孔子闡明之我祖宗世所師法以安天下卿等宜安心竭誠相與討論務歸至當毋隠而弗彰毋曲以徇好庶明之於心誠之於行以興治化以福蒼生用不忝天與祖宗之命欽哉故諭三月丁卯朔上臨軒策試進士公讀巻殿中勞以羊酒庚午宴禮部甲戌上御文華殿開講公講堯典克明俊徳章敷析明暢音吐鴻亮文武大臣之在廷者莫不竦然傾聽聖心恱豫賜白金五十兩綵幣四表裏鈔二百錠即宴於禮部尋復賜金織紗羅襲衣金相􅀈瑁香帶各一公以累朝舊臣親受顧命被皇上眷寵優異慨然以身任天下之重精力瀕老而不衰遇事雖煩劇應之常若簡而有餘凡大論建動恊人心夏五月甲申奏少傅滿六載勞以羊酒鈔幣冬十一月庚子以聖節賜綵繡襲衣二年丁巳夏六月己巳賜綵繡雲鶴紗衣冬十一月辛巳賜金織紵絲襲衣金相文犀帶三年戊午春二月戊辰陞授光禄大夫柱國夏四月己巳宣宗實録成上御奉天門慰勞再三陞少師賜白金一百兩綵幣六表裏鞍轡名馬宴於禮部辛未復賜玉帶金織麒麟羅衣四年己未春正月戊戌賜金織麒麟襲衣金帶冬十一月庚戌聖節賜如舊五年庚申春二月丙戌從耕籍田禮成即上章請告展先墓詔賜允許降勅書諭遣曰卿以宏材碩學事我祖宗居密勿之地者四十年小心恭謹簡在惟深朕嗣承大統仰惟負荷之重倚任老成用圖康濟講學以明治道而克啓沃之崇敬以監成憲而克欽承之脩政以安黎庶而克相成之肆海内寧一庶幾小康卿以先壠久違請告展省朕惟孝思名教所關特從所請於戲古之大臣君子體國如家令聞長世卿其念先朝寵眷之隆及期而來永諧寅亮之功以副朕之倚望賜白金紵絲鈔幣上尊羊豕凡諸饌具稱之且命内侍阮江伴行水陸給驛公卿大臣出祖都門外觀者填道朝野榮之至家省先壠饋奠惟謹大散賜金内帛遺諸宗親故舊無不及者賓客過門宴洽累月先是得㣲疾卜六月己夘還京力疾就道次杭州而劇七月壬寅卒於武林驛享年七十時長孫泰侍側歛含如禮己未内侍阮江以訃聞上為之慟輟視朝一日贈特進光禄大夫左柱國太師諡文敏遣禮部尚書胡濙等諭祭仍命江䕶喪歸其里工部遣官督所在有司營墳以葬朝士大夫霣涕相弔逺近聞者莫不嗟悼公在郡庠時外祖家自母兄子和歿後貲産日替公養其遺孤俾有成立春秋親奠墳下閭里有困於賦役而流竄者公竭心力為之營䕶招其復業俾父母妻子咸得聚處無離散之憂或有忿爭者輒求判正無不恱服時公之行誼已卓然矣及來京師鄉人有囚繫輸作謫戍者皆隠憫資給之不令失所其有疾病死喪者或給以醫藥或給以棺衾蓋所濟為益廣焉其在朝廷遇事有關於治體者知無不言言無不盡涖職以勤御衆以公薦舉惟賢無間親疎人有因事詿誤而囚繫者則從容為之解釋上知公忠直罔不聽從而隂受公之惠者多矣三四十年間日侍四聖左右㕘賛機務惠澤及人不可勝計人莫能知公亦未嘗言至其往還兩京辛勤勞悴從征朔漠乘危蹈險人所弗堪公亦未嘗告勞朝廷有大慶㑹分獻南郊遣祭孔子持節封拜宴待逺人無有弗預公進退起居皆有常度凡所存所履務恊理道絶不為戲狎之言䙝玩之事論事上前詞氣温厚委曲至與僚友分别淑慝審辨邪正則凜然不可犯暇時接見朝士大夫及方岳牧守從容咨訪時政人才以備顧問凡有餽送纎芥弗受嘗於所居東偏搆屋若干楹環植花木扁曰靜軒退朝之暇衣冠正坐焚香煑茗與所知談論經史每至夜分又於朝門之東南築室十餘楹樹以槐栁退食則燕息其中或邀翰林諸公宴㑹為樂少傅西昌楊公名其堂曰聚奎并為文記之長子曰恭次曰讓曰錫曰賜曰貴芳曰貴通女七兵部主事雷潛詹鑌陳順徳蘇潤其婿也餘在室孫男十二泰儼俊倫儉佶儆佐倧偉倜儀孫女七曽孫女二諸子每嵗更迭來京省侍於其歸也公皆有詩訓飭之詞意激切并纂集古人訓子之言為書名之曰訓子編各授一帙國子祭酒豫章胡公若思學士西昌楊公士竒臨江金公幼孜永嘉黄公宗豫俱有題識賛公篤於教子也閩浙之間有見其書者莫不爭相傳冩而寳藏之所著詩文有兩京類藁玉堂遺藁訓子編北征記若干巻藏於家人皆謂公有文武才略詩文特其餘事公自立朝迨今四十餘年海内之士莫不仰餘光而承下風誠可謂徳被生民功施社稷者矣若公者非所謂積善之慶天祐之吉國之蓍龜時之柱石者乎銕謭陋在昔同處郡庠至為親密及入仕復託寓舍館知公之歴履頗為詳悉故不揆僣踰謹述其大槩如右庶以備他日史氏之録云正統元年歲次庚申秋七月甲子中順大夫浙江提刑按察司副使同邑江銕謹述故少師工部尚書兼謹身殿大學士贈特進光禄大夫左柱國太師諡文敏楊公墓誌銘正統五年二月十八日少師工部尚書兼謹身殿大學士建安楊公奉勅歸展先墓既畢事卜日啓行病作衆曰曷俟少間公曰君命不敢稽也挾醫以行至臨安武林驛病加遂不起是年七月二日也守臣治棺殮既馳奏皇上嗟悼輟視朝一日贈特進光禄大夫左柱國太師賜諡文敏遣禮部尚書胡濙涖祭遣中官使䕶喪還葬其鄉命有司治墳公先世見余撰其大父墓碑曽大父伯遜大父達卿父伯成皆贈榮禄大夫少傅工部尚書兼謹身殿大學士曽大母黄大母謝繼阮母劉皆贈夫人公初名子榮自學諸生鄉試選第一㑹試第三廷對擢第二甲賜進士出身入翰林為編脩太宗皇帝入正大統更其名榮初建内閣簡翰林之臣七人其中專典密務七人者解縉胡廣黄淮胡儼金幼孜公及士竒也公齒最少最警敏一日晚上出右順門召内閣諸臣獨公一人在出江西三司奏章示之言吉安鄉民之嘯聚者已悉復業蓋朝廷初有聞即遣行人許子謨齎勅撫諭子謨行將一月又遣都督韓觀率兵繼之如撫諭不下即加兵及是奏至上諭公曰觀不至不下其降勅褒觀公讀奏訖對曰計發奏之日觀尚在中道未足褒從之自是益重公時四方之事方殷七人者旦夕侍左右承顧問受㫖退治職務且兼稽古纂述之事不虚寸晷上時步至閣中親閱其勞且視其所治咸稱㫖時公尤勤勵遂皆進官公進修撰數月復進侍講明年改元永樂秋公請告歸省又明年春七人皆賜二品金織衣且勞之曰天下事咸朕與若等同計非若六卿之分理也無幾簡翰林之臣十數人兼春坊官任輔導公兼右春坊諭徳授奉訓大夫日分直進講經史四年春公得寒疾命中官以御醫來視賜藥物五年奉命往甘肅同總兵議邊務察視守備還奏稱㫖六年夏喪父給傳歸既葬遂命起復是年冬喪母公奏歸守制時已下詔巡狩北京不許七年春内閣胡公及公金公奉命扈從北京甘肅總兵何福奏降虜托克托布哈等率部落來歸命公往同福處置還奏上恱遂奉命持節往亦集乃之地封福為寧逺侯八年春車駕北征布尼雅錫哩公三人仍扈從至驢駒河命公先齎勅還報皇太子復還北京冬扈從還南京九年春奏奔母喪遣中使䕶送既還皇太子命公侍諸皇孫學且命公曰嚴則有成公盡心不怠重脩髙皇帝實録命胡廣胡儼黄淮及公為緫裁十年二月賜誥命并追贈父母妻冬甘肅守帥西寧侯宋琥奏叛冦婁達衮逃居齊勤蒙古衛將為邊患時豐城侯李彬鎮陜西遂勅彬率師𠞰之且命公往與彬計度十二月還奏餉道險阻今天寒人疲馬瘠不可行且小醜不足以煩王師遂勅彬旋師無幾叛者復歸十一年春從狩北京十二年三月從征衛拉特時皇長孫侍行上命胡金及公三人凡行營有暇即與講析理義開其聰明尚寳司官闕命公兼之既還勅翰林脩性理五經四書大全公三人皆為總裁十四年陞翰林學士仍兼庶子扈從南歸十五年春復扈從巡北京十六年夏進髙廟實録賜宴賚胡公歿公掌翰林院事益見親密一時廷臣狎恩多縱忌公伉直發其私適太學闕祭酒衆共舉公實欲疎之上不聽公遂密言十弊指斥五府六部都察院章留中不下十七年進文淵閣大學士仍兼翰林學士授奉政大夫十八年扈從北征秋還京冬將西征親藩奏建文中江西所垜集民兵可徴用出奏示公公對云陛下命復民業二十年矣今復徴非信上曰朕意固如此遂寢三殿災公偕金公陳便宜十數事皆見施行重賢愛人或陷非辜必援之尚書夏原吉以兵饟不給坐繫吕震言其柔姦侍讀李時勉嘗論事亦有言其賣直者皆激上怒悉委曲為之辨解二十一年秋復扈從西征駐驆萬全一切軍務悉付公掌寧陽侯陳懋奏畨王額森托噶來歸命公往議受降歸奏稱㫖二十二年復從北征中道軍餉不繼上聞之命公與金公總計其數遂如二公言遣使諭彼釋其不臣之罪下令班師浙江三司奏處州之麗水福建之政和山冦刼掠請勅兩都司合兵討之公言愚民為有司所苦出不得已兵出即良民先被害願遣一勅使撫諭之不足煩兵上從之卒如公言無事一日上從容坐帳殿諭公二人曰東宫監國久熟政務此歸悉付以天下事吾惟優㳺暮年二公共對曰皇太子孝友仁厚天下屬心允稱陛下付託上恱師次榆木川上不豫既上賓凡沐浴襲奠飯含棺殮一切之禮悉出二公衆遂推公先馳歸報既至同尚書蹇公等議喪禮遂議即位禮仁宗皇帝嗣位進公太常寺卿授嘉議大夫仍兼兩職學士逾月進太子少傅授資善大夫兼謹身殿大學士山陵事殷太監孟繼極言公盡心喪事上嘉歎即陞公工部尚書仍兼前二職賜勅褒諭三俸俱支尚書一俸全給米洪熈元年賜誥贈二代考妣無幾上命範白金為方寸印四枚其文曰繩愆糾繆以賜師傅公與金公同受其一皆期之直言匡輔脩文皇帝實録公預總裁仁廟上賓時皇太子監國南京遺詔嗣位公往迎於徳州既還命公同有司相陵地宣宗皇帝嗣位修仁廟實録仍預總裁髙煦反在廷多懐貳心惟文臣三四人勸上親征公其首也遂扈從討平之師還特受駢蕃之賜馬騏激變交阯黎利聚衆抗王師總帥孱弱不支輒與利和且為利奏請立陳氏後遂以師還奏至上以示文武大臣皆勸發兵擊利上不聽竟偃兵息民公預力焉是年八月車駕巡邊至遵化聞敵逼塞下以道陿師難並進上率鐵騎數千先馳擊之文臣獨公從既還陞少傅進榮禄大夫仍兼尚書大學士三俸俱支辭大學士俸進兩朝實録賜宴賚又範白金為圖書刻方直剛正四字以賜公數月上念先朝老臣蹇義等四人皆春秋髙並賜勅褒諭命輟職務朝夕左右侍論議公與焉賜玉帶加有御製詩畫之賜公滿三載吏部以聞賜勅有忠言讜論禆益為多之褒賜宴禮部遂賜少傅誥進封三代後兩扈從巡邊皆至洗馬林而還宣廟上賓公復偕有司相陵地皇上嗣位公與同官三人協志合力以效禆益賜賚特厚修宣廟實録皆為總裁書成進公光禄大夫柱國少師兼尚書大學士如故賜玉帶時上日勤聖學命公同知經筵事五年謁告省墓賜勅褒諭加厚賚給傳遣中官䕶送既還京道薨春秋七十公仕於朝四十年皆居清密考郷試者一讀廷試巻者九為人闓疏果毅遇事當為奮前不疑於論古人必欲出新見不肯茍同議辟率歸寛恕勤職事盛寒暑及小疾未嘗少怠於四裔及邊徼事及邊將勇怯智愚靡不通知故忖量事勢率豫中内篤孝友睦婣之行家故豐裕且有厚禄能濟窮恤患無間疎戚喜賓客善交際雖貴盛無崖岸貴賤小大皆歸心焉故聞其殁也咸有咨嗟悼惜之意所著文章有兩京類藁玉堂遺藁訓子編北征記藏於家元配劉贈夫人繼劉封夫人皆里處士仲穆之女子男六恭讓錫賜貴芳貴通女七兵部主事雷潛詹鑌陳順徳蘇潤其婿也餘在室孫男十二泰儼倫俊儉佶儆佐倧偉倜儀女七曽孫女二皆在室士竒與公同僚三十有九年同事四聖今内閣舊臣惟吾兩人未能退公又溘先余逝公之葬其子屬少保楊公書墓上之石余銘諸幽嗚呼凡今能文士大夫感公之徳述公之行雖有之矣若交之久知之深言之信者余兩人其庶幾可無愧也銘曰桓桓文敏通才博識遭際聖明光奮於績承明延閣著作之庭以翺以翔舒華振英北裔西陲從狩萬里職典者文亦兼知武羗虜胸臆帥垣弱强重瞳屢顧敷奏惟明晚陟三孤貳公𢎞化恪恭昕夕敢或遑暇帝懐敷仁鞠躬承之民懐被福黽勉成之志存寛惠行在果斷嘉謀讜議褒書有煥予告南旋曽幾何時上下延竚而訃奄來越昔内閣七人同事荏苒三紀我銘其四公夀考終哀榮寵光嗚呼文敏殁也不亡光禄大夫柱國少師兵部尚書兼華蓋殿大學士國史總裁同知經筵事廬陵楊士竒撰少師工部尚書兼謹身殿大學士贈特進光禄大夫左柱國太師諡文敏建安楊公神道碑銘士君子遭際明時為國大臣偉績榮名流芳永世豈偶然哉蓋其生也有所本出也有所為故其終也克全其美少師光禄大夫柱國工部尚書兼謹身殿大學士建安楊公本漢太尉震之後繼世以宦㳺遷閩至其祖達卿家鉅富積善樂施嘗置近居山林栽萬木以資鄉人貧者衣食屋室棺槨之用津渡為橋梁舟楫嵗久滋茂遺訓子孫無專以利家厥考士美克承先志益廣厥施公生而不凡自少力學以科第發身入翰林為編修太宗皇帝入正大統脩舉成憲開内閣擇儒臣六七人掌機密公尤為精敏周緻不踰年屢遷至侍講及建皇太子授諭徳尋陞右庶子皆兼翰林職事論思而退則進講東朝趨事惟謹未嘗知倦又嘗受命輔皇太孫未幾陞翰林學士上巡幸北京營建都邑親征朔漠制勅條畫公偕同事二三人秖順賛襄罔不盡心至若將帥賢否軍機調度邊務緩急逺人叛服必詢之公公亦以身任之陞文淵閣大學士兼舊職征北班師軍食不繼亟言於上以御膳餘糧給之西羗叛命往經理公言敵人叛服不常招撫之便不必勤兵未幾叛者皆歸寧夏報西冦犯邊召公計之公以城堡堅固士卒精銳賊必不能持久料今已去矣無勞聖慮既而得報如所料方西征有言建文時所募江西民兵可十餘萬宜徴用公言嘗有詔令復業不可失信於民再征北敵公言軍士久勞請釋其前罪班師麗水政和山冦聚衆有司請發兵捕之公曰愚民窘於衣食重為有司所苦求活朝暮耳少緩之必散用兵則害及良善撫之不從用兵未晚上皆嘉納之再從北征上升遐奉歛如禮傳遺命仁宗昭皇帝即位預議喪禮悉遵古制詔汰冗費蠲逋負舉困窮省刑罰出官錢贖民間所鬻子女用圖惟新不踰年仁義忠厚之政舉行無遺公與力焉陞太常卿兼舊職尋陞太子少傅兼謹身殿大學士賜銀印文曰繩愆糾繆未幾以經畫喪事勞賜勅奬勞特陞工部尚書仍兼二職支三俸復命䕶梓宫葬長陵宣宗皇帝上賓迎皇太子嗣位益見信用庶人髙煦叛從駕東征不旬日平之公有參賛之功交阯叛請寛其伐以䘏我師未幾陞少傅仍兼前二職今上即位議即政事宜及開經筵以廣聖學命公同知經筵事日侍講學退而綜理庶事進少師兼官如舊以久違先壠請告詔許之賜璽書褒諭優加恩賚乘傳南還遣中官相行事竣力疾就道至杭州卒於武林驛訃聞上深悼之輟視朝一日遣禮部尚書胡濙祭於其第復命中官䕶其柩歸勅有司營葬追贈特進光禄大夫左柱國太師諡文敏官其子恭尚寳司丞公事列聖四十餘年自右庶子至少傅三受誥推恩追封三代考妣凡朝廷大制作若四朝實録性理大全歴代臣鑒外戚事鑑皆為總裁大册封大祭享恒命行禮所賜御製詩文圖書及金帛衣服乘馬寳帶珠玉金銀器皿諸物嵗無虚月寵任益隆勤慎益至凡所理事可集辦者未嘗踰宿公素孝友自家食至大官於宗族師友鄉黨及所知識困苦婚喪必賙䘏患難必救援卒之日聞者莫不傷之所著有兩京類藁玉堂遺藁訓子編北征記配繼皆劉氏贈封如制側室葉氏武氏張氏子六人長曰恭次曰讓曰錫曰賜曰貴芳曰貴通女七人長適兵部主事雷潛次適詹鑌次適大理寺評事陳順徳次適蘇潤皆士人餘在室孫男十二人曰泰儼俊倫儉佶儆佐倧偉倜儀孫女七人曽孫女二人公卒以正統五年七月壬寅是年十二月丁酉葬於甌寧縣豐樂里山之原溥與公同年同事知公為悉因恭晜弟之請纂其大㮣俾書之神道銘曰天眷國家實以賢惟才之生匪徒然用輔厥世福黎元公事列聖四十年從容館閣佛仔肩天戈屢出清塞垣謀協廟算皇威宣三扶紅日升青天公孤特進昭台躔位日益顯心益䖍服勤夙夜罔有愆恩榮終始福百全用振厥後光厥前武夷秀氣凌雲烟建溪之水清且漣髙岸深谷有變遷我銘昭昭其永傳榮禄大夫少保禮部尚書兼武英殿大學士國史總裁同知經筵事南郡楊溥譔少師楊公傳公姓楊氏初名子榮字勉仁太宗皇帝更名榮遂以聞於天下漢太尉震之後唐末有仕於閩者因家浦城三遷遂為建安人祖達卿父士美皆不仕而皆為善人長者以公貴累贈至榮禄大夫少傅工部尚書兼謹身殿大學士公幼聰悟絶倫喜讀書善講說當時大竒之事大父母父母盡孝敬處内外屬皆有禮弱冠已有濟物之施公輔之志朝之公卿大夫道建安者皆重之由郡庠生領鄉薦第一遂取進士入翰林為編脩太宗即位選儒臣六七人置内閣典辭命而公在焉陞修撰尋陞侍講修古今列女傳仁宗皇帝正儲位公為諭徳兼侍講太宗嘉其勤謂曰卿朝夕左右敬慎不懈恒情保初易保終難朕常思保全之道卿亦宜謹厥終賜二品服上恢𢎞逺略經營四方公獨以警敏勤於外嘗命往甘肅視師及還規畫皆稱㫖且言其山川形勢軍民休戚城堡虚實上恱陞右庶子侍講如故父卒賜鈔三千貫俾馳傳歸葬詔奪情起復皇長孫英睿夙成篤志學問命公兼職輔導永樂七年當巡幸北京適聞母喪又奪情以行時何福守甘肅言虜酋布哈等率衆來歸詔公與福議所以處之者既還又命持節至亦集乃封福為寧逺侯且命過寧夏與寧陽侯陳懋飭邊務歸奏便宜十事上嘉納之從征北敵師至驢駒河而還軍士乏食公以為言上命供御之贏盡給之令軍中有餘者貸不足歸而倍償衆賴以濟公在軍事既繁劇以親喪不飲酒食肉時哭泣不自勝因以羸悴上憐之既還乞歸終制不許許奔喪遣中官宋成䕶往來既而仁宗命與諸皇孫講學學益進深見奬重甘肅守將西寧侯宋琥言叛冦婁達衮等依齊勤塔爾尼將為邊患勅豐城侯李彬率師討之命公往經略時草枯氷凍士馬不可動彬不敢言公歸奏之且言小醜無能為不足以勤大軍乃止而叛者已復歸附師征衛拉特皇太孫侍行上既訓以武事命學士胡廣及公稍閒即以經史進講又嘗問足食足兵之要公曰慎擇將帥力屯田訓練有方耕穫以時食足而兵精矣及還上以五經四書傳註之外先儒多所發明且性理書及諸議論皆未有統㑹詔集儒臣類次成編又命廣與公總其事書成賜名五經四書性理大全陞翰林學士兼庶子益見親任朝臣有傾巧迎合為公所抑者議欲間之㑹北京缺祭酒衆請以公任焉上不許公又指言五府六部三法司積弊有十上命以授御史揚言於廷中衆皆請罪詔原之而使釐正陞文淵閣大學士兼翰林學士寧夏報虜入冦上以問公公對曰寧夏士勇邊實冦不能持乆今去矣已而果然浙之麗水閩之政和有冦合二千餘兵部請發兵𠞰之公奏曰愚民窘於衣食剽掠求活耳急之則益生變臣以為莫若招撫便從之果順服太宗屢北征公必在行軍中密務多命公掌之決機發䇿亦使參與眷待與公侯等上嘗語公曰東宫歴事久閑於政務朕歸悉以軍國事委之得優㳺暮景公對曰殿下孝友仁厚天下屬心允稱皇上付託車駕還至榆木川疾甚召公等受遺命傳位皇太子上崩公與左右中貴人奉歛如禮以去京尚逺慮不虞戒勿發喪整軍旅嚴號令而與中官海夀馳還報仁宗宣大行遺命仁宗即位禮儀詔赦命公與二三大臣計議條奏行之賜公白金二百兩鈔二萬貫綵幣二十表裏陞嘉議大夫太常卿仍兼前二職尋陞資善大夫太子少傅兼謹身殿大學士賜銀印文曰繩愆糾繆且諭公曰朕於政務有缺則用此密疏以聞至於再三慎毋憚煩公奉命惟謹又慮法司濫刑命公與諸大臣同審録獄以不寃上嘗閱翰林所作公等誥辭謂曰朕倚卿自輔朕若有失皆當盡言親御翰墨増二語云勿謂崇髙而難入勿以有所從違而或怠曰此朕實心公拜曰陛下聖徳之至臣豈敢不勉既而有言太宗升遐時事多公為主之上嘉歎降勅奬諭加賜白金綵幣諸物特陞工部尚書前官如故三俸俱支公辭尚書不允仁宗崩宣宗為皇太子在南京遺命徴還嗣位公往迎於徳州由是益任公公亦益盡力髙煦反公力賛親征及累出巡邊公皆從久之念公等大臣且老不欲煩以事命輟翰林之務惟朝夕在左右討論至理共寧邦家陞少傅階榮禄大夫又陞少師勲柱國階光禄大夫今上即位待公益重而公謀國益盡心有大事衆取決焉累朝眷遇宴賜之隆前後不可計雖元勲世戚不過也然以久去墳墓常欲一歸省而縻於職務㑹有事西陲及西南夷不敢求去至是西師解嚴西南夷亦納貢乃請行上命中官與偕往且命公速來事畢戒行已有疾或勸且止公曰君命不可緩也挾醫而行至杭州卒年七十事聞上嗟悼輟視朝一日贈太師諡文敏又命中官往䕶喪歸建安葬事皆官給之夫人劉氏先卒以其弟繼亦封夫人子六人恭讓錫賜貴芳貴通上念公不已命恭為尚寳司丞公秪事列聖凡四十年未嘗去禁近每四皷起俟朝雖風雨寒暑不變日親所事至或廢飡常迫暮而後反初修髙廟實録其後三朝史事皆公為總裁紀載詳備實而不華京闈鄉試典文衡者一廷試讀巻者凡九其文施於國家與凡碑銘序記之散於天下者人皆傳誦之其於武事尤諳練將士之勇怯饋運之難易邊鄙之利害道里之迂直靡不知故每承顧問與籌筭皆能適事宜體國之心老而彌篤嘉謀至計造膝而言所以禆益於上惠利於下者蓋多矣直從公在翰林亦三十七年知公平生為詳故摭其事有關於天下國家之大者為公傳俾後有考焉若其徳義之施於親戚朋友以及鄉䣊州閭則有公之行述與墓銘在此不著論曰古之君子之事上也必委身於國而不顧其私故能視官事如家事知無不為為無不力公受任四朝竭心殫慮不以險夷禍福易意况經綸於外弼亮於内又有衆人所不能知者豈非古之君子與昔仲山甫事周出入中外所任者衆矣而皆能善其職詩曰肅肅王命仲山甫將之邦國若否仲山甫明之既明且哲以保其身夙夜匪懈以事一人今以公比之何有異哉何有異哉行在禮部左侍郎翰林侍讀學士國史總裁兼經筵官泰和王直撰少師楊公哀辭少師楊公勉仁予同年老友實關西世裔才識髙邁性質剛明敏事慎言慱極經史洪武已夘魁福建多士庚辰春闈廷試悉居前列授翰林編修累陞侍講諭徳庶子擢翰林學士兼文淵閣謹身殿大學士轉太常卿進太子少傅工部尚書尋陞少傅遷少師黼黻治道翼賛宫僚四十餘年始終一致功光社稷名重華夷古之名臣不能過也正統五年春皇上念其勲勞錫賚稠疊命歸展墓遣中使隨行恩意優渥拜掃事竟囘至武林遘疾而易簀焉訃聞上為之興悼輟朝追贈太師特進光禄大夫左柱國諡文敏賜祭踰等勅工部造墳仍遣中使䕶喪歸葬嗚呼公夀七袠位至台衡生榮死哀名垂竹帛夫復何憾雖死猶不死也予與公有同年之好相知之深故嘗形於夢寐用叙其㮣以哀之辭曰性之藴兮乾剛行之著兮端莊明心易而多才兮早發軔於科塲踵世徳而顯融兮掌絲綸於玉堂承列聖之寵眷兮殫心力於巖廊賛廟謨而密勿兮佐泰運以榮昌位益髙而勛益著兮知經筵而啓沃乎聖皇上念厥功兮賜歸展墓公詣先隴兮追逺焚黄事畢復還兮炎夏疾革捐館兮錢塘訃音聞上兮為之感愴遂輟視朝兮䘏典逾常諭祭營葬兮恩沐存亡追贈加諡兮萬古流芳雖沒不死兮永耀耿光資徳大夫正治上卿禮部尚書毘陵胡濙述少師楊公誄文鳴呼天下未嘗無賢才也其患在於有之而不能知知之而不能用用之而不能當知之而能用用之而能當竊見太宗皇帝之於故少師楊公矣太宗用之而不疑列聖繼之而不改書曰知人則哲又曰任賢勿貳聖明不可尚矣古稱夙夜匪懈以事一人又云鞠躬盡瘁死而後已公其庶幾矣乎公之沒也其子属循誄其平生循忝舉制科官翰林託從公之後者凡二十有六年誼不容黙為之詞曰緜緜楊宗肇漢太尉繼而顯者自唐之季遂官于閩因家浦城崇安建陽其徙屢更卒遷建安卜宅乃定世積忠厚子孫日盛盛豈徒然厥務惟臧冠裳文雅表于其鄉有偉達卿好義尤篤恵賙於人恒不自足達卿雖往萬木尚存鄉人所植酬其施恩再傳士美性亦樂施人謂達卿積徳有繼聖明撫運世際太平嵗丁辛亥而公遂生易云為善必有餘慶公之生也詎非其應警敏䟽達其孰與公遇義果為亦罕所同公自少時已拔流軰長游鄉校學篤弗懈堂堂閩藩賔興賢能公試其間獨冠群英既領薦書春闈校藝為第三人鵬摶鵠起大廷進對公擢髙科授職史舘日事編摩皇皇太宗入正大統特更公名以昭眷寵眷寵維何偕此七賢置諸宥宻專典代言代言之典豈真文翰託以腹心俾盡誠欵公每論事必持度權時㑹機要被奨上前數月之間其官疊進匪徒進公旌乃勤慎官雖六品出入禁廷襲衣之賚制視六卿擢兼宫僚用資贊輔進講之餘仍治職務凡承咨問有事于民匪寛不對匪恕不陳廷臣狎恩忌公伉直徉言薦公踈以外職上頼明聖私計不行公疏十弊指斥其情公雖伉直為衆所忌上益重公委信不貳車駕屢發廵幸親征往還扈蹕公咸在行内而舘閣外而夷狄衆或罕預公悉機宻有事邊閫往必命公公受親信或過元戎公每還朝隨事獻替成敗利鈍多如所計兵將勇怯邊方實虚公且究知如履其區公非能武盖知武者能者用之或出其下公雖知武所典者文凡百製述克任以身五經性理聖明所右纂緝編校公預領䄂四朝實錄盛徳豐功帝命緫裁公在其中一典京闈九侍廷試校文讀巻克稱上㫖公居清宻四朝所同未嘗一朝譴辱在躬於赫仁皇褒鍚孔厚範金刻文繩愆紏繆方直剛正簡在宣𠂻亦用範金刻文賜公或褒璽書或賜詩畫文綺繡服玉帶名馬三代考妣褒典咸加施及家室幽顯光華自昔文臣罕臻極品公位三孤更見親信儒者稽古苦難遭時公之際遇孰幸如之抑公平生所存忠厚有䧟非辜力為觧救憫人疾苦猶已不寧汲汲思濟必底于生家故多貲俸賜且倍施賑貧乏恒恐弗逮公宜耋耄丞相朝廷胡嵗七十溘然仙升千里訃聞主上震悼為輟視朝曰失元老亟命有司爵贈太師諡以文敏於禮誠宜紀徳述行已具太史顧予有情聊為公贅迢迢南服建水閩山計公之靈返棲其間翰林院侍講學士奉直大夫兼脩國史兼經筵官廬陵陳循述文敏集附録
