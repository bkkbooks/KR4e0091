body:
  text: 文敏集巻九明楊榮撰記進士題名記洪惟太祖髙皇帝受天明命混一海宇誕敷文教以興至治建學設科以造就多士三嵗一登其賢能而擢用之迄今十有餘科賢俊譽髦之士乘時彚進布列中外建功立業黼黻治化皇上繼承大統率由舊章尤惓惓焉以興學育材為務故得人之盛有逾於昔乃永樂十三年當㑹試之期時皇上駐驆北京天下之士來萃者凡數千人禮部既合試之擇其中選者以進三月朔旦上御奉天殿親降制䇿咨以古先帝王之治道聖情謙冲玉音涣發在廷大小百執事之臣莫不殫力恊心踴躍承事先是春雨方降浹日未霽及廷試之旦𤣥雲巻舒將雨復止祥飊㣲來天宇廓清霽景融和於是諸士子皆得雍容發舒各攄所藴以對揚聖訓上荅宸衷以自慶夫千載一時之遇而天意於此所以恊相文明之運有非偶然者既賜陳循以下三百五十一人及第出身有差臚傳之日都城人士抃舞稱歎以為北京之盛美有以過越前代也既而禮部請循舊制立石題名于太學上以命臣榮為記臣惟賢才致治之本也唐虞野無遺賢書紀其盛成周濟濟多士詩詠其美漢唐宋科目得人史著其實其來也乆矣欽惟皇上崇奨儒術作興士類而諸士子遭逢聖明乘風雲之㑹仰日月之光以得展其所學勒名貞石傳於無窮可謂榮且幸矣雖然後之人將於是觀焉可不慎哉惟其立身行事必光明俊偉上有以禆益國家下有以惠利生民斯可以無忝於科目有傳於來世其又可不思所以自勵哉臣榮承乏詞林祗承上命謹述國家所以求賢圖治崇重科目之意與夫諸士子遭遇之盛者如此且以傳之無窮焉進士題名記永樂十六年三月朔上在北京廷試天下貢士擢李騏等為進士禮部尚書臣震請立石題名于國子監於是上命臣榮記其實臣榮謹受命拜手稽首言曰國家膺文明之運撫太平之厯興學育材化成天下取士之制雖非一途恒以進士為重士子通經學古以圖進取而與名者世率以為榮夫當大比之秋京郡合國子監及畿甸之士天下布政司合所𨽻郡邑之士三試之拔其尤者貢于禮部盖什之一明年春禮部以其所貢士又合而三試之拔其尤者進之大廷盖二十之一其選至精也廷試之日天子御正朝賜清問翌旦復御正朝親覽而次第之臚傳之旦文武群臣朝服稱賀宴賜恩數一循常典寵光衣被盖渥如也與其列者誠可謂榮矣兹又立石題名以垂永乆後之人將歴指其名曰某也賢某也才足為國家千萬載之光則榮孰大焉或趣向有異德業無聞則亦不能免於公論矣已之善否人之勸戒胥此焉徴於乎可不敬慎之哉題名者凡二百五十人第一甲第一名即李騏也騏初名馬上特改今名云進士題名記永樂辛丑寔皇上正大統之二十年先是上巡狩北京營建都邑至是告成春正月元日乃御奉天殿受朝萬國來同景命維新而是嵗適當㑹試貢士之期領鄉薦而萃京師者三千人禮部拔其尤者二百二人三月望日上臨軒䇿試越二日以曽鶴齡為第一劉矩次之裴綸又次之賜進士及第餘賜進士出身有差掲黄榜于長安門外公卿大夫暨士庶人咸謂都邑肇建而人才彚進如此夫豈偶然哉莫不懽忻鼓舞以為目覩盛事誠曠世之嘉遇也有司復請題名于國子監上命臣榮為記臣惟昔周之武王遷都于鎬講學行禮以宣教化以作新人才而其子孫傳緒至於永乆盖啓之者有其道也方今都邑告成之日聖天子諮詢治道登進賢良以隆文明之運迓千萬載之太平斯世斯人亦何幸歟諸君子遭際明時題名於太學太學賢闗天下公論所自有其名宜有其實以副之詩曰古之人無斁譽髦斯士皇上之盛德也又曰濟濟多士文王以寧是尚有望於諸君子其勉之哉臣榮謹記御賜圖書記宣德二年二月戊寅上御文華後殿召臣榮諭之曰古者君臣莫不同心同德以成天下之務君有失則為臣者匡正之臣有過則為君者訓戒之庶幾更相警飭兩無猜嫌信所謂明良相逢千載一遇者也卿嘗祗事我皇祖太宗文皇帝皇考仁宗昭皇帝二十餘年竭誠效忠始終一致及今侍朕左右益加敬慎知無不言言無不當深用嘉恱兹特賜卿鍍金銀刻圗書五顆曰方直剛正曰忠孝流芳者以表卿之忠實也曰關西後裔建安楊榮曰楊氏勉仁者以著卿族系之所自出并表其名與字也卿尚體朕至意永永無斁臣榮竊惟人臣之義惟忠與誠乃能賛輔國家光膺寵命以享爵禄於悠乆茍阿徇以取容迎合以求恱不顧事體之重輕不念民情之休戚縱己之所欲言任己之所欲為則將無所不至矣其可乎哉臣榮自揣菲才夙夜祗慎惟恐有負委托之重為愧耳至於非分之恩曷敢希兾追惟初仕以至于今歴事三聖日得侍近清光屢沐天地大恩眷待之隆錫賚之厚非一言可述今復䝉恩賜以範銀圖書奨諭之重製作之精誠古今罕有臣榮敢不敬承佩服傳之子孫永為家寳哉故敢具述于左方以見皇上眷待恩禮之隆他日或可以備採録云建寧府學記國朝混一天下大興文教内建國子監外置郡縣學以教育天下之英才其制甚備薄海内外翕然嚮風學校之盛振古未有也士生斯時得以漸摩詩書仁義之澤而周旋揖譲乎絃歌俎豆之間何其幸歟建之學舊在郡治西南洪武辛巳夏燬于火永樂癸未冬有司上其事詔命擇勝地而新之于時郡守宣城芮麟教授姑蘇張信銳意斯事遂卜吉於郡東黄華之岡髙明廣衍於學為宜而帥閫廨舎軍士室廬實據其半於是都指揮師祐徐信撤其居室以地來歸乃庀材鳩工合屬邑之民以涖事凡藩憲兵衛官僚與夫使命之臣躬臨奨勵而建之人士亦皆捐貲樂助以相其成未幾郡守劉敬繼至命檢校李新專董其役經始於乙酉春二月訖工于丙戌冬十二月其東建大成殿翼以兩廡衛以㦸門而櫺星神厨庫室前後布列其西建明倫堂堂之左右則有志道據德依仁㳺藝四齋齋之兩旁則有生徒止舎尊經有閣㑹饌有堂文昌有祠師儒有室至于泮池庠門庖廩靡不完具而門之内外又有金聲玉振之坊繚以周垣深邃嚴宻黝堊丹碧光彩煥然信乎東南之偉觀而他郡莫及也今年春郡守劉公來京師請紀事刻石垂示于後嗟夫學校王政之本風俗教化之所關自昔帝王之治莫先乎此聖天子即位以來親幸太學御筵講經訓飭諸生藹然唐虞三代之風由是教化旁達賢才輩出郁郁乎聲名文物之盛豈非教養之功有以致之歟吾建為晦庵西山二先生過化之邦其流風餘韻宛然猶存士君子景仰其間而又遭逢聖明之治樂夫學之有成得以優㳺涵養于兹將見髙明特達乘時彚興效用當世以顯其功業流芳於無窮誠有以為邦家之光不徒為斯學之榮而已也固安隄記天下之難治者莫踰水而治水之先者尤莫踰京師故大禹之跡首在兾州豈非以水之利害所繫者大而帝畿之内宜慎其防以為宏逺之圖也歟盧溝之河發源太原之天池伏流至朔州馬邑從雷山之陽發為渾泉而為桑乾河鴈門應州雲中山西諸水皆㑹焉愈逺益大過懷來行兩山間拘束齟齬而不得肆至京城西四十里石經山之東地勢平而土脉䟽衝激震蕩遷徙弗常後魏都督河北道諸軍事建成侯劉靖及子平鄉侯𢎞築戾陵堰以防之水患以息後人思其功謂之劉師堰歴世既乆水勢漸更下流十五里距盧溝不逺有曰狼窩口時復衝决漫流而東浸没田廬民弗安業聖朝建北京視河為襟帶永樂間屢嘗修築輒復頽圯今聖天子嗣位命工部侍郎李庸内官監少監姜山義往任厥事復命太監阮公安少保工部尚書吳公中總其事且勑其務存堅乆勿為茍且庶幾暫勞永逸群公效命材謀具濟經始于正綂元年冬畢工于二年夏凡用工匠二萬餘月給糧餉以萬計累石重甃培埴加厚崇二丈三尺廣如之延袤百六十五丈視昔益堅既告成賜名固安隄命置守䕶者二十家建神祠於上有司以時修祀禮凡督事者悉賜鈔幣以勞之其視築戾陵堰役費加倍而堅實亦過之仰惟聖明至德蟠際穹壌而於京畿益圖鞏固以寧濟斯民於千萬年諸公亦能同寅恊恭用成厥功盖可乆可固而利益於世者不小皆所當書於是叙其始末俾勒諸石庶後之人有考焉應天府重建儒學記國家崇儒重道建學育材懋圖化理爰自京畿至于天下郡邑莫不有學設師儒以訓之豐廩餼以養之嘉惠斯文列聖一心人材之盛風俗之美卓冠前古士生斯世而䝉遇若此何其幸哉南京應天府為天下列郡之首學宫在郡治之東南盖宋景祐中所建歴元再燬于火大德癸夘總管陳元凱復之我太祖髙皇帝定鼎金陵即以是學為太學洪武辛酉始創國子監于鷄鳴山之陽而改是學為應天府學以江寧上元二學之生徒𨽻焉永樂戊子復燬于火所存者惟東廡及㦸門欞星門東序三齋而已學官因循迨今二十餘年未有能復之者宣德已酉南京守臣㐮成伯李公既視政即有事于學於是閱其舊址乃慨然曰是風化所自出而摧弊不復曷以稱皇上教育之盛心哉遂率府寮部屬各捐已帑僦工輸材而府尹史怡等咸捐俸貲用相其役以是年七月初吉經始越五月而明倫堂成明年而大成殿立齋廡門廊次第畢舉凡諸故構之陳朽者皆葺而新之煥然宏麗有加于前於是僉言立石以紀其事治中三山髙應以書請予記之予惟李公荷國家付托之重仰承德意作新學校倡起斯文固為政之所宜先其用意之勤經營之篤紀述以勸後人亦宜也夫自古帝王之建學莫不以明人倫為化理之本人倫之大莫先乎忠孝學者之學亦莫切于斯二者自家及國以至於平天下莫不由是而推之馴致其極天地以之而貞觀日月以之而貞明五氣以之而順布萬物以之而化成者何莫不本乎此茍不務此而徒學於文辭以為進取之具是果何補於化理者哉予固知李公風勵之機而􅂅望於後來者如此故推本而書之俾鑱之石以示夫學者其母以吾言為迂尚相與勉于成也重建縉雲縣儒學記學校之設所以化民成俗而為治天下之本其所繫甚重矣唐虞三代之世治隆俗美莫不由是也我太祖髙皇帝龍興之初首詔天下郡縣皆立廟學而於京師建國子監選擇俊秀甄拔師儒以教之聖謨明訓盖宏逺矣繼以太宗文皇帝仁宗昭皇帝孜孜求治而於學校之政尤加意焉今皇上繼體守文茂圖化理欲使治效超於唐虞三代之盛為臣子者敷宣德意其可不以學校為重乎宣德庚戌縉雲重修縣學成教諭松溪楊銘馳書京師請予為記曰邑有舊學在史隠山下國初知縣劉澤民因唐人故址而新之歴嵗滋乆日就傾圮典學校者欲改為之而力不逮修補破壞茍且嵗月而弊陋滋甚宣德之初三山陳京來知縣事既至視學舎慨然曰兹非為政所當先者乎京在是其敢不勉圖新之然以視事之始教令未敷未可以勤民及再朞而民化乃謀於寮屬各捐俸貲以倡之而邑人之好事者皆樂從掄材伐石蠲吉興工化腐橈以堅良易傾陊以方正禮殿儀門講堂齋廡次第修舉丹碧黝堊煥然一新經始於庚戌之秋七月落成於是冬之十月計其用工雖不乆而宏規永圖超前數倍不為之記則無以示後來敢以為請予與京銘皆閩人而京又為令之有聲者顧其所為實治天下之本繫焉義不可辭乃謂之曰朝廷所以重學校者盖以明人倫美風化育賢材以興文明之治也有司奉行而修舉焉豈直備文具為觀美也哉亦因是而已矣然而人倫之所以明風化之所由美賢材之所由成非獨居之使然也必司政教者明道德於其身有以倡率之耳京以文學登進士其於聖賢之教究之有素兹為百里之政拳拳以興學為心而典教事者又得銘焉是不徒以其治民者治民而又能以其教民者教民吾知縉雲之理效必有加乎昔矣是可書也乃為之記清樂軒記駙馬都尉沐公乃開國輔運推誠宣力武臣榮禄大夫柱國西平侯贈黔寧王之仲子今太傅黔國公之貴介弟也為國勲戚而能忘乎貴富之勢日接賢士大夫敞一軒以㳺處列琴書尊俎其中外則環樹佳花美䕃之屬無埃􅅽喧囂之雜有夷曠静嘉之趣從㳺者因名其軒曰清樂或謂樂者人情之至願而公卿大夫士所得有不同者何以所處之地異也一介之士處衡茅之陋甘蔬食之泊味道德而佩仁義飢寒不以為累而其心休休焉以自得者衆人之所難也公卿大夫生以世閥寵以珪組而不溺於膏粱綺紈之習驕汰侈靡之歸其所為與所得較之一介之士曽不少異者雖君子亦難矣故世之有得於彼者終遺於此兹乃于公而具見之此軒之所以名因以表公之一身有以致衆樂之備而兹軒之勝又有以見乎為趣之清也又謂公之盛名足以榮于身而德益謙長才足以超於衆而志益崇顧乃得雍容自逸以享其樂何哉盖國朝之制所以優禮于貴戚者然耳然公雖被優禮之隆昔在永樂中詔營繕太嶽太和山宫觀已嘗命公督其役績用有成既而屢受命掌行後軍都督府事施設有序上以公為才下以公為惠而時論重焉兹遇聖明在上海宇晏安用是得遂享乎此所謂後天下之樂而樂者歟客有道名軒之意與兹軒之美於予者予方歆羨而致慕焉公乃屢走書金臺求軒之記意尤懇懇不獲辭也遂次第所聞者如此云重建孟瀆河閘記君子之立政有可以益國而利乎民者知無不為爲之有方雖疲民力而民忘其勞耗其財而民不自恤茍或役民於非所當務則謗怨隨之其能留聲當時為利後世者幾希孔子曰擇可勞而勞之又誰怨孟子曰以佚道使民雖勞不怨其信然矣乎工部侍郎廬陵周君忱奉命巡撫蘇常諸郡常之武進故有孟瀆河閘以通東南漕運及商販之舟且溉傍近田數千頃嵗乆閘壞公私病焉常守莫君愚圖改作之以役費繁重弗敢專謀於周君議以克合遂發往嵗節省税賦浮費以市財僦工礱石姑蘇洞庭山而舟致之郡民皆懽忻趍事作於舊址之南丈餘其下先錯列巨􅍻貫以長松而後寘石焉東西石甃縱以丈計為十有六崇以丈計為二百五中廣視縱當八之一南北為鴈翅状以殺水勢中夾木石鑿以納懸板而上下之經始於宣德八年九月而畢工於是年之冬用徒匠以日計二萬三千七百六十木以株計八千九百石以丈計三千五百灰以斤計二十二萬磚以片計十有二萬始終董其役者知縣朱恕效勞為多者耆民惲昶閘成而獲利如故莫君以為茍無記述則後世莫知所自遂因通判張齡來京請記於余余按圖誌兩浙運河貫郡城西行三十里歴奔牛吕城二埧以達京口舟行既艱而河小不足以通巨艦唐元和中刺史孟簡始令開北河自奔牛北行七十里至河莊鎮入揚子江舟無巨細皆得徑達于江而免過埧之勞第其水上引運河源逺不能常續下仰江潮去來不能常存簡於是置閘河莊為之節制使人以時啓閉而其利益博其惠之在人可謂深且乆矣人以其姓名河謂之孟瀆又謂之孟子故閘亦以孟瀆為稱閘廢民失其利今得周莫二君子恊謀而更置之二君子之惠足以繼簡而流於無窮是可尚也故系以詩曰孟瀆伊始唐元和中始之者誰刺史孟公公時為政佚道是崇鑿河築閘厥功既隆汎汎者舟往來具通毎毎者田嵗恒獲豐歴數百年湮塞嚙衝既阻于舟亦病乎農猗歟周君思成其終莫守賛之詢謀僉同相地之宜惟善之從乃市良材乃鳩衆工匪取于民匪私于躬錯􅍻累石既堅既礲傍峭而固中虚以容舟無阻艱農無嵗㓙人用懽謠二君之功功成惠施既博且洪勒辭于石用昭無窮浙江嚴州府重修儒學記學校教化之本王政之先自古有天下國家者莫不致謹於此洪惟我朝天啓文明之運太祖髙皇帝定鼎之初首建國學於是四方府州縣皆設庠序以教育天下之英俊以至于今聖聖相承五六十年之間髦士彚進而治道大興猗歟盛哉浙之嚴州郡學舊在城東南隅宋雍熈二年遷郡城之西北方其時諌議田公文正范公清獻趙公相繼來為郡於是廟學之制教養之具煥然大備然自雍熈至大觀自大觀至紹興百五十年之間凡三改作矣厥後知州事錢可則立石誌之元季兵燹燔蕩靡遺國朝洪武庚戌詔設學校廼即城西舊址以建嵗甲寅郡守趙士敏議徙城内今在郡治西南三十步中為大成殿殿之東西為兩廡南有㦸門門之外為泮池池之上為石梁東西立二祠池之南為欞星門殿之北為明倫堂闢四齋於堂之南左右堂之北為㑹饌堂東廡之東則有神厨神庫等房西廡之西則有射圃講肄之所倉廪庖湢靡不整備規模宏敞視舊有加焉邇嵗廟貌傾圯梁棟朽腐繼遭洪水漂蕩渰浸不堪瞩目嵗丁酉教授孫子敏首捐已俸以倡率之前太守李興同知曽所敬通判范耘吳顯推官申文才守禦千户劉福遂安知縣胡子澄暨各庠師儒六邑士人皆出財以助之繼而郡太守建安葉公溥下車之初惓惓然以興學為念復捐貲鳩力恊成厥美以是年夏四月經始至冬十二月訖工既成分教郡學謝坤舒宗辰具書其本末因葉公與予同郡來請記予惟正風俗厚人倫敦教化育賢才皆本於學校學校之設誠為政之急務茍非有賢守令誘掖奨勸黽勉維持以振起之則徒有其名而無其實曷足以致此哉嚴陵為浙名郡學校之政初未嘗或弛故其士習之美賢才之盛至於今而弗替雖廟學完圯不常此固物理而又得太守如葉公與前守貳寮屬暨師儒賢俊富家巨室相與綱維樂為之助俾仆者起弊者新漫者飭堂筵嚴整俎豆静嘉不惟聖賢之靈洋洋如在而凡為師生者亦得以雍容揖譲乎其間以講明聖賢之道是豈不為斯世之盛美乎故不可以不記也遂樂為記之使鐫于石庶後之人得有所考焉山西大同府重修儒學記學校王政之先務教化之本原自古帝王莫不興學育賢以隆治道故學校興賢才盛而教化行我朝混一以來尊崇文教自京師達于郡縣雖遐陬僻壌莫不建學設官以教育賢才登貢以時選用有法五六十年之間髦俊彬彬布列中外攄才效能以輔成太平雍熈之化者何莫不本於學校之教也其盛矣哉山西大同即古之雲中為西北名郡永樂癸夘冬予以扈從車駕北征因奉命出使大同留寓旬日時躬謁先聖周覽殿堂圯壞弗堪退見諸生濟濟在列有揖譲禮義之風因憮然興歎以為群公鎮戍于兹者當有以作興之且以凡物之興廢盖自有時然亦必遇其人之賢達而後可以有成也去之又二三年廼有明詔修舉學校而山東叅政丹陽沈公固適以練達之才承命往賛邉務因詣廟學遂言於征西前將軍武安侯合肥鄭公亨叅將都指揮含山曹公儉暨山西都行二司都指揮滁陽羅公文等各捐貲聚材以為倡并召所部兵民各輸其力悉撤其舊建大成殿暨兩廡櫺星門崇峻宏敞偉然有加重塑聖賢像鐫刻神位龕帳案座靡不整嚴塗徑堦除甓甃端好并修明倫堂齋室神厨庫房庖湢之所栖息之舎無不完具丹漆黝堊煜然一新經始於洪熈元年之秋九月落成於宣德二年之夏五月廼奉書幣請予文以為記惟國家列聖相承其於學校之政皆惓惓致謹賢才之興日新月益爰自唐虞三代以降莫此為盛矧斯郡宻邇畿甸文物之富與他郡異况師範得人生徒務學而又幸際諸賢相聚于兹皆能㓗已奉公以祗承朝廷德意然則學校之教其有不興者乎予既念昔逰之慨歎樂兹學之重新而又喜諸公雖當邊務之繁知聖道之尊與學之重可謂知為治之本而識慮過於人逺矣因備書其本末俾刻于石以示四方來㳺來觀之士皆知所勸焉白鶴山房記榮家建寧去城東二里有山髙壯雄偉其勢昻然望之若鶴按郡誌云東晉時有望氣者以為山有靈秘將發而觀之朝鑿暮合已乃見白鶴雙翔其上遂不敢發因名曰白鶴山嘗有甘泉湧出其麓病者飲之即愈傍有真如寺寺西南地勢隆起状若伏龜兩水交流于前而紫芝鐵獅雲際梅仙諸峯争竒獻秀巍然對峙左環右抱前拱後挹風氣凝㑹盖隠然一善地也人多求塟而不可得榮先大父存日種德積善孝行純至既歿而窀穸未卜方是時真如寺僧無涯將有所營建而乏材乃邀鄉先生蘇公明逺踵門求施先伯父彦禎即集兄弟予以龍津之木三萬株兼資以運輸之費僧大感恱其後知先大父未塟遂舉其地以奉且曰此嘗有人酬以重價而吾弗之許誠有所待者願以是為報於是筮之而吉遂奉柩藏焉塟已人或以得地賀伯父及先公戚然曰先人體魄得妥於此幸矣他非所望也塟後數年無涯歿其徒昧所自因肆侵削已而愧悔復以塋外餘地來售榮復厚償其直遂創屋其傍為子孫守塜之所太守芮麟扁之曰白鶴山房并為之記榮㳺郡庠時嘗率群季讀書其中自後忝科第列職詞林叨承眷遇光寵極矣是皆先人遺澤所庇故能獲此朝夕思欲報上之恩與先人之德顧惟菲薄有所不能公退之暇追惟故山白鶴之勝實先塋之所在松楸霜露之念無時不存因請善畫者為山房之圖將求賢士大夫賦詠以昭先德庶傳之弗冺少紓榮拳拳之思也詩曰欲報之德昊天罔極誠以世之孝子慈孫之思慕其先者無所往而不致其意而榮之於此豈能忘也因書為記俾後之子孫知山房之所始焉存心堂記王氏以醫鳴世乆矣其先世家金斗曰德孚者仕宋大理丞子永嘉判揚州南渡時遷淛元之世曰宣伯者徙晉陵隠居鎮江黄鶴山始為醫藥濟人子致和仕為揚州路醫學提領聲著于時曰貴和仕為教授尤為人所推重教授之子克明能紹先志益勤所業以擅名譽壬辰間自晉陵避地龍潭洪武初召入京師尋寓鳳陽從太宗文皇帝之國居今北京盖十數年年八十三而終其為人敦厚質實孜孜以利濟為心治人之疾多有竒效而又工于文學以是文皇帝極愛重之嘗呼其字而不名焉其子彦昭克纉遺緒名譽益振間請於予曰吾家以存心名堂盖百餘年而未有文以記之幸賜一言不惟有以著先世之美為子孫者亦永有頼焉予惟心者人之神明具衆理應萬事操之則在舎之則失是以君子無時無處而不用其力焉况醫道於人死生所係茍心有不存其不至於謬誤舛錯以戕人之生者幾希今王氏世儒而業醫又能以存心名堂為子孫者世守其訓則其惠利及于人者豈不逺且博哉詩曰無念爾祖聿修厥德又曰子子孫孫勿替引之其是之謂乎彦昭有子曰譲曰謙聰明俊秀好學不倦而又循循雅飭親賢士大夫日進月益將必昌大其門閭振揚其家聲不啻於此而已是為記華鄂堂記伍氏南昌著姓世家邑之杜溪至漢用者克敦誼譲推祖父故業與諸昆弟獨徙居灌城鄉之懸榻里家益饒裕而好善樂施之心弗倦人以是多之漢用去世子伯遜伯暘伯逺伯璣篤友于之義不為私藏凡諸舉動一惟伯遜之命是聴口以百計而内外翕如也賔客過從兄弟怡然相與款遇盞斚之序行鴈行森列塤篪迭奏和氣藹乎一堂之上見者嘆羨不置因舉常棣之華鄂不􅀈􅀈凡今之人莫如兄弟之詩歌而美之且舉酒賀曰斯堂宜名以華鄂堂既得名而未有為發其義者伯遜子涣領鄉薦進為太學生擢貳教吳江縣學將行謁余具道其家名堂之意而請記之惟兄弟分形連氣人也方其幼時食則同案學則連業未始不相友也逮乎既長私意物欲或汨其良心弟或弗念天顯不恭厥兄兄或不念鞠子哀不友于弟小則䦧牆甚則分析門户相視如途人以貽士君子之誚者有之今伯遜兄弟去父歿時幾三十年而能篤於恩誼不異財産庭無間言使邑里聞見者咸興起感慕其有補於風化亦大矣掲扁華鄂夫豈不宜吾故為之記而繫以辭曰瞻彼棣華煒兮相承式相好矣維弟與兄兄弟孔懷不私其家孰堪儗之維棣之華棣華鄂然外見其美有聮其輝維兄與弟兄及弟矣和樂且湛不貳以二弗參以三惟一其心終始是同張仲孝友穆乎清風歐陽文忠公祠堂重創記甚矣文章之洗陋習而歸諸古著當時而傳後世者不恒有也宋歐陽公之文足以當之宜乎後之人讀其文而思其人思其人而崇其祀也公吉之永豐人嘗出守潁樂其風土有終焉之志既而歴事三朝出入二府思潁之念不忘晚而得請自以為慶幸則公之於潁盖惓惓也神靈精爽固在於是矣公舊祠在潁城比淪于河祀故乆廢正綂丁巳春監察御史彭勗董學事至潁念公為文章宗主而祀宇圯沒無以聳學者髙山仰止之思乃捐貲倡州守僚屬出禄餘市材創祠于城南儒學西中為堂三間門為屋一間繚以周垣工訖郡之守佐率師生朔望謁拜春秋次丁祀以特牲父老咸曰公嘗福惠潁人祀不為過也學正雷塏請記於予於戯文章闗天地之運盛衰㫁續固不偶然周秦以前無容論矣漢自賈董馬班諸子以來七百餘年而唐有韓子又二百餘年而宋有歐陽子其文推韓子以達于孔孟一洗唐末五季之陋當時學者翕然宗之及今四百年而讀其文者如仰麗天之星斗莫不爲之起敬雖通祀於天下學宫不為過矧嘗居於潁其遺風餘澤猶有在者乎是不可以不祀也彭君倡之郡僚屬和之俾公之神有所依後學有所仰可謂知所務也它日潁之士出能知通今學古為髙救時行道為賢則無負諸君興廢舉墜之深意矣姑為之記以俟餘慶堂記江西布政使司左叅議田君伯邑余之同門友也其材器宏偉而學識博達以明經登永樂甲申進士第歴官郎署超拜今職聲績焯然時論莫不以為賢然君之心則不自足也恒念曰吾幸䝉國恩備位藩垣皆吾先人積德之所致吾豈敢忘哉乃顔其所居之堂曰餘慶盖取易文言積善之家必有餘慶之義也今年冬君以朝賀來京師因請余記之余惟天人之理流通無間循理而行則善積而致慶悖理而行則惡積而致殃不啻如桴鼓影響之相應焉然君子惟知循理而已初不必其獲慶於天而天之錫慶不於其身必於其子孫若持左契以相付此天之可必者也余嘗序君族譜因得考其世德盖自君之髙祖以降代以儒術從宦司風紀録刑獄者相繼而皆長厚務德其所積深矣積之深者發之盛君之所以致位顯榮而克亢厥宗者豈偶然哉雖然不有於前孰為啓之不有於後孰為承之今日之慶固由其先之所積其後之慶豈不由於今日之所積乎矧君位居方岳其所設施則一方之民被其惠利茍推仁不已其善之積而致慶於後詎有涯哉然則君之世澤不惟有以承之抑且有以大之也傳曰德厚者流光余於田氏有望焉庸記以俟建寧重修府學記學校有闗於政教也尚矣任是責者不可不究心然欲舉廢墜勤力役必於民生富庶之餘而後可建故有學在郡治之南嘗毁于回禄昔太宗皇帝鋭意文治有司以聞詔擇勝地改創之前太守芮麟教授張信乃相黄華山之陽而建焉幾三十年復就摧毁今教授彭勗當太守徐公子玉下車之初首以修復為請公曰是吾之所當究心也然必資民力以成民未見德而遽勞之不可姑少俟焉至是政成乃與同知姚聞通通判蔣祐暨勗議其材用之費經畫之方捐俸倡率各有差等不足則資郡人之篤於義者既而量時命日擇敦朴耆民四人董其役材選其良工㑹其能用出有經役赴以期梁棟之傾者正之榱桷之腐者易之瓦甓之毁缺者補之轉朽敗為堅完新舊規為偉觀嚴嚴翼翼穹壯宏麗丹碧髹堊煥然生輝帷幕器用靡不備具又以餘力創尊賢堂祀郡先賢之有功於名教者經始于某年某月日迄工於是年某月日凡士之逰泮水者有思樂之懷縉紳大夫之過建郡者興嘉美之歎建安教諭楊夀夫郡人也謂是役之成不可以無紀貽書京師屬予為記將刻貞石告于方來惟建為郡居七閩上㳺詩書文獻之盛甲於東南晦庵西山二先生之流風餘澤迨今猶存重以國家培養之厚而吾建人賴有所立以表見於世非偶然也况今聖天子大興文教屢勅天下勸學政而公又能欽承德意振起士氣重新廟學於民事既治之後而適緩急次第之序如此是可書也嗚呼建之君子㳺業於此者可不知所以景仰而益勵志於學乎夫學非章句文辭之謂也所􅂅學孔子然後不負所學致君為堯舜然後不負聖天子若是則吾建詩書文獻之盛將千萬年有聞於世斯不負朝廷教學與太守修學之意矣予世家于建而竊禄于朝今年逾六袠日漸衰老建大功立大名以永國家治化無窮之美誠不能無望於後學也初學之建也予既記之兹復來請故不辭而致意如此云文敏集巻九
