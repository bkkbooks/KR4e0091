body:
  text: 文敏集巻二十明楊榮撰墓表國子監丞張緝熈墓表永樂癸卯五月二十五日國子監丞張顯緝熈卒於官予既徃哭而又為文以祭之今其䘮歸葬於故鄉某山之原子某以翰林侍講余正安所述行實請予表其墓予於緝熈有姻連之好誼不可辭按狀緝熈之先居湖廣之興國州世業儒曾祖彦文祖仁傑皆隱徳弗耀元季其父明善號誠齋者以避地移居豫章之奉新遂為奉新人緝熈生於甲辰六月十二日自㓜岐嶷不羣性識頴敏有志於問學誠齋屢迎師訓誨之及長復從教諭張克静學書經得其指歸才譽日振洪武中被薦為邑庠訓導謁選於京師適有詔選儒者教武臣子弟吏部乃以緝熈等十人應命未㡬擢靖江王府教授尋以外艱去職嵗壬午復選入中秘與修太祖髙皇帝實録永樂初書成䝉賜白金文綺襲衣陞國子學正丙戌三月朔上幸太學舍菜禮成御筵命講宴賚師儒緝熈亦獲與焉時人以為榮永樂戊戌秩滿陞國子監丞莅事公勤惓惓以經理學舍為務以勸懲淑慝為心故能贊輔司業貝公宗魯及與六堂師儒恊恭和𠂻嚴申學規激勵後進於是諸生數千人肅然敬服莫不以緝熈為能盡職也嗚呼緝熈始為學正時生徒不過數十人其中成徳逹材者居多及處是任尤能切切誘掖奬勵以致擢巍科登顯仕者率自太學出由是聲聞益著而作興之功賢於前人逺矣自非際遇昭代得以行其志又孰能知緝熈之才之賢若是乎嘗自以行已率直號曰憃叟故名其所為詩文曰憃叟藁凡若干巻藏于家享年六十娶同邑王氏初未有子以外姪戴氏子興𦙍為後尋側室楊氏生子三人興閭赦生臘生女一人巽順嫡生同邑廖子彤其婿也予以緝熈平生志節有足書者其沒也烏可泯故摭其槩表諸墓以告來者陳處士墓表三山陳處士之沒也今已四十有一年其諸孫翰林修撰曰棖字叔剛者始奉前真定某縣教諭劉彦行所述行實來請文將勒之墓石用垂不朽叔剛秀敏而質實由進士釋褐拜監察御史與修兩朝實録遂陞今官夙夜恪勤篤學勵行孜孜焉志於逺大思有以顯揚其祖考盖可尚已予因告之曰昔歐陽公有云非敢緩也盖有待也由此觀之抑何汲汲於表先墓哉叔剛泣且拜曰敢不敬承先生之訓然有父命不得文以慰先祖之靈吾父之哀痛何由而釋哉予於是弗克辭既閱其狀則知處士之為篤行君子孝於其親友於兄弟厚於婣族而仁於里閭嘗有族人困於賦役盡鬻其産業而出居外境者處士力勸其還割己田搆室廬以居之有女子孤㓜無依者收養而婚嫁之墳塋無主後與子孫貧乏弗克展祀者嵗時為祭掃如禮尤樂於施予見貧不能自存者觧衣推食惟恐後人有所貸而弗克償者未嘗以為言其居親䘮哀毁成疾至除服臞然若不勝見者憐之其奉親祀先必豐以偹其治家政必嚴以肅子弟能循蹈規矩留心問學者則奬勸之其輕躁浮靡棄本逐末者則戒飭之必使率徳改行而後已鄉人皆以處士質直而尚義凡忿争者不之有司唯得處士一言則莫不敬服而去自非篤行之君子疇克爾耶處士諱鈺字伯榮其先世與古靈先生襄皆出於太尉檄太尉自光州固始從王氏入閩生三子長令鎔居閩邑之大義次令圖令猷居侯官之古靈襄即令圖曾孫也大義之族寔蕃散居呉浙間宋時登科第列膴仕者纚纚弗乏淳祐中顯謨閣待制湖南安撫使愷自嘉興歸帥閩郡建榮繡坊于大義此其顯者也處士之曽大父諱某嘗任某副使官故鄉大父謀父父諱某皆隱徳弗耀母周氏昆仲五人處士第三初娶福清周氏性柔順而精於女紅先處士十七年卒實洪武乙卯十二月戊子也生元至正丁亥四月庚子享年二十有九繼同邑黄氏慈愛出於天性温淑本於自然其子男週女盈適張頥皆周氏出也黄氏撫之如已生孫男四人棖杪桭柶女二曾孫男煒燦女二淑源處士生元至正乙酉十二月癸酉卒洪武辛未九月乙巳享年四十有七以明年某月某日與配周氏合窆于藍利山黄氏生元至正乙酉八月庚午卒永樂甲辰九月乙卯享年八十以是年十二月庚申祔于處士之墓嗚呼處士之徳善固不待表暴而自能顯著於世然孝子之心尤惓惓於此者亦常情之所同也况處士復有賢孫如棖者方進用于時其所以顯揚先徳者盖未艾也予故摭其平生大槩以表於其墓尚有俟於異日焉龔思齊墓表崑山有篤善之士龔思齊以宣徳癸丑五月己巳卒於家其子理中今年禮部㑹試乙榜冠帯讀書太學聞訃將歸匍匐涕泣請於予曰理父少有抱負以家務乏人經理母老在堂當謹侍奉故弗獲仕以展其所藴乃延師篤意教理兄弟將冀其成人理兄弟不肖未克顯揚而吾父竟歿哀痛奚堪已丐詹事府少詹事兼翰林侍讀學士泰和王公為墓銘敢復求先生之文以表于墓庶幾慰吾父於地下且少逭理兄弟不孝之罪也予傷其志弗忍辭按狀思齊諱賢先世居汴有號遇仙者隨宋南渡至崑山乃折銀杏一枝揷地祝曰此枝若生吾於是居其枝果生遂家焉越七世有諱端甫者思齊之髙祖也諱天祐者其曽祖也諱士斌諱子瑞其祖與考也連世隱徳弗耀母姚氏有淑行思齊生而頴敏㓜知務學甫成童父祖相繼沒克自樹立事母甚孝既長從鄉先生講習聞見日博操行益堅理其家舉有條緒待族黨禮婣親處賔朋謹於禮節邑里推重之遂舉為粮長以董一區賦税思齊存心公恕不驅迫以厲其下人不知勞而賦無逋負鄉人有疑事必往咨詢無不裁置得宜有争訟多不之官惟求思齊一言以决方春播種聞農家種子弗給及艱於食者傾其家所藏以濟之弗足復為假貸以足之嵗旱作桔橰分置與人取水灌田弗取其傭人有䘮弗克舉者則市棺以給之嫁娶過期者則出貲以為助人多䝉其惠利焉其歿也無賢愚老少咸悼惜之奔走哭弔者相望於道生洪武丙寅十二月辛丑得年四十有八以某年月日葬里中駟馬涇先塋之次娶周氏子男三長珩次即理又次琚女一未適人孫男一慶同女三皆㓜嗚呼思齊存心忠厚才足幹濟惜乎夀年弗永未𢎞其施然有子克成厥志駸駸乎立身將顯融於時所以垂聲振燿而昌大其家者盖可待也故為叙次其事行俾表于墓道焉贈嘉議大夫工部右侍郎周公墓表宣徳六年秋九月癸未封奉議大夫越府右長史吉水周公秉昂卒於家其子忱時為工部右侍郎奉命廵撫南直𨽻諸郡得訃奔歸聖天子聞之遣使諭祭且詔忱起復視事明年四月丁酉葬邑之仙獅石南與其先室龍氏合窆焉又明年朝廷推恩贈嘉議大夫工部右侍郎忱惟墓石未立無以彰先徳侈君恩乃屬其友禮部侍郎章尚文述公行實請少傳西昌楊公為銘納諸壙復徵予文表墓道予素知忱父子之賢弗可辭公諱森秉昂其字也其先㑹稽人世次顯晦徙遷不常自敷文閣學士友賢生兩浙宣撫汝翼汝翼生瑞州知府應合應合生天驥元吉州路總管始徙廬陵天驥五子長至道横州路治中公之髙祖也曾大父諱圭忠州判官大父諱鑑南康路知事考諱潤隱徳弗耀號遺安先生元季徙吉水之月岡今為吉水人母李氏賢明知書史以遺安公四十未有子脱簪珥勸納黄氏女而生公自㓜穎敏好學言動不妄甫成童克任家政既長學識益充有司屢薦其才行以親老辭奉母李甚謹李嘗有疾躬奉湯藥衣巾不脱者累日既歿哀毁踰禮每念所生母早歿言及必流涕重以葬地卑濕卜遷之欲啓壙奉柩於家或言不利公毅然曰事死如事生奚不利之有竟舁置中堂設奠三日而後葬寡姊䘮其諸子不在側乃捐已貲為治䘮葬如禮妻母久歿未葬輙以已地畀之或謂此地主貴富公曰惟義所適豈希利耶待宗戚接賔朋恩義藹然人或有過面加規正有患難曲為拯救胥吏掊歛者不敢入公之里無賴相誘為盗者悉遵誡約而悔過里中嘗有犯偽鈔者誣及平人公言於官明其枉而出之嘗客淮西同行遇盗欲誣舟人公力言不可既而盗果獲平居以氣誼自髙慕古人竒節偉行厭士俗之庸庸碌碌者談世務論人品一恊於至公舉事必精思深慮急義而輕利族黨有訟惟公一言而决人皆謂公忠厚長者尤惓惓教諸子延師購書不吝所費以忱聰敏遣入郡庠受經夙夜親加督勵忱以永樂甲申進士入翰林為庶吉士擢秋官主事陞越府右長史拜今官公嘗兩就養於京師誡勉切至以故忱益知自勵逺大之福方及於公而公不待也可勝悼哉公生乙巳四月戊戌至是享年六十有七配龍氏贈淑人元義兵叅軍復皋次女婦道母儀著稱族里先二十七年卒繼室胡氏封太淑人亦賢而克相子男四長即忱次恫次恪先卒次怡女二蘭貞蕙貞陳行恭蕭肇成其婿也孫男八人英芾節著芳蘭莊茂女八人曾孫男五女四嗚呼連處士應山一布衣以積徳行善致二子舉進士為邑令其歿也應山之人至於今思之弗忘公明敏惇實孝行著於家信義孚於鄉身雖弗試而能成其子顯庸於朝薦膺恩命存歿光榮其過連處士逺矣是用述其平生大槩俾勒石墓道以示後之人焉奉議大夫衛府左長史金君用誠墓表衛府左長史三衢金君以正統己未夏五月廿日卒於官子紞懼其才行聲實之懿久或湮泯無以昭示後人謁予文表諸墓為之叙曰君諱實字用誠浙之三衢開化人曾祖振之祖伯圖父徳厚三世俱不仕母蘇氏君自幼穎悟書過目成誦始從叔祖戸科給事中玉衒學即知屏去浮靡専意經傳暨㳺邑庠甚為典教者稱賞且以逺大期之嵗壬午太宗皇帝入正大統詣闕獻書以君徳民政為之綱躬行仁義虚已納諫明察善斷審於用人恭儉節用為君徳之目厚風化尚亷耻省刑罰薄賦税愛民力為民政之目太宗嘉納其言復親䇿之對稱上㫖命入翰林與修太祖皇帝實録書成賜以金幣永樂紀元擢翰林典籍修永樂大典未㡬特選為東宫講官時仁宗皇帝在儲位恩眷累加丁亥以外艱去服除陞左春坊司直郎日侍經筵講説詳明致有良佐之褒辛卯丁母憂哀毁成疾閲十年始起任職仁宗登極妙簡宮僚之賢者輔導諸王乃授衛府左長史階奉議大夫誥贈其考如厥官妣為宜人是嵗復召入西掖纂述先正格言以偹顧問宣徳丙午歸謁先塋恩賜優厚拜奠既畢日召鄉黨宗戚相與燕樂以榮上賜既還益以輔導為已任上深敬禮之今上皇帝嗣大寳郊祀謁陵悉以命王左右之力居多戊午冬王薨哀感成疾己未春為禮部㑹試同考官事竣上疏乞骸骨命下而卒享年六十有九君天性至孝少逰學官以不得奉旦夕歡朔望歸謁必奉觴上夀以悦親心父沒奉母宜人娯養偹至友愛季弟老而弗衰處鄉黨以誠信善則揚之過則從容規之子弟好學者激勵而誘進之至於周貧恤難不吝所有故人林文節卒於京親為殯歛歸其遺骸太學生江表死無所託君既為治䘮事閲其篋得白金數十兩封識以歸其家其以義從事類如此居家敦行節儉而甚孝友賔客過從輙命酒為歡談論竟日亹亹忘倦閱經史日有程限或有事妨夜必補之不以寒暑少廢故經史子書以及陰陽星厯醫卜老釋諸書悉能探其賾而究其非嘗曰人不能無非覺而改之斯善矣蘧伯玉行年五十而知四十九年之非孔子嘗以君子稱之因以覺非名齋賦詩以自警有静存動察兢兢自持之語為文章舂容暢逹理與氣俱詩則和平冲淡無雕琢之病有文集若干巻藏於家配汪氏封宜人子男三人長曰讓次即紞己酉鄉貢士季曰紘女二人曰綺適方灒曰纓庶出也孫男十二人徙義養䝉俊童近思克己𢎞訓象賢鵬停熈載允濟汝霖某孫女二人其葬以某年某月某日其墓在某鄉某山之原嗚呼君之學行自足以昭當時傳後世豈待表而見哉然孝子之心自有所不能已者也故為之述其槩俾勒石於墓上贈奉政大夫陜西按察司僉事林君墓表林君仕紀既卒二十有六年是為宣徳壬子朝廷以其子時歴仕有能聲褒之誥命推恩贈君奉政大夫陜西按察司僉事配余氏宜人又四年時自貴州按察副使入覲間謁予泣告曰不幸先考妣早棄既合葬於邑之孝義里斗巖山之原重惟先徳未著圖恩未彰為歉敢徵文以表於墓予與時同出閩中素相善弗可辭君諱憲字仕紀性至孝早失怙哀泣動人事母恭謹始終弗替尤惓惓務善人有犯者不與較貧而負貸者不責償居室為公廪所迫遂徙居於後埭創造一新於是祀先有堂教子有塾至於庖湢廪藏各有其所既深愜所志乃隱約不仕惟篤勵諸子讀書以紹先業既而遣時入郡庠授經時能自奮勵登永樂乙未進士第累陞至今職配即余氏宋朝請大夫授之裔淑慧儉勤事舅姑相夫訓子俱恊理道子男四長即時次麟先卒次鸑次鷟克勤問學女二適宋適鄭皆名族也孫男九曰纘綬績紳純紘綖某某孫女三君生元至正丁亥三月辛酉卒永樂丁亥十二月丙午得年六十有一君之先出自宋金紫光禄大夫公恱始居莆城之朱紫坊三世府判公雱析居望京門外五傳至貢士諱精裕者君之髙祖也復遷烏石山下曽祖蜚孫仕元學諭祖治考宗傳俱有隠徳弗仕妣陳氏子三人君其季也嗚呼君先世之徳之隆如此而君又能敦徳好義以振其家聲如此且教其子底于有成致䝉褒贈之命光華賁於幽壤世豈多見哉是用書其事表之墓上以垂于不朽云故國子司業呉君墓表君子寓形天地間徳足以師表于士類學有以兼通乎古今修諸己者有餘而見於用者或有未盡故其既歿而哀傷追慕猶不能已於人者若予亡友國子司業呉君是也君諱溥字徳潤别號古崖先世家臨川之種湖曾大父景南號南牕愽學工文草廬呉文正公嘗序其南牕吟藁大父某號楚江隱徳弗耀父思清贅崇仁章氏後遂為崇仁人君生元至正癸卯四月四日少逰於鄉先生前渭南令鄧伯恭門伯恭見而竒之謂思清曰是子噐宇不凡異日必能大公之門弱冠舉孝廉不就洪武丙寅邑大夫知其才賢乃舉邑庠子弟員從前進士李原成治春秋文藻甚為原成稱賞家雖貧窘而志學不厭祁寒盛暑亦不少廢同軰有忌之而肆譏侮者恒不與校而所志益堅嵗庚午領江西鄉薦以疾弗果㑹試尋丁外艱哀毁骨立幾至不起服闋假舘學舎教授以自給衆亦易視之獨永豐羅博士師程時分教邑庠折節與交乙亥上京師以試期不及遂入為太學生嘗奉詔宣諭武臣使雲南卻其元戎文綺之贈又以閱士伍使福建一無毫髪之私人皆稱其廉介其所至遇古跡名勝輙賦詠紀之累至數百篇比還太學時太常丞張顯宗攝祭酒事嚴毅方正於諸生中罕與可獨以君為賢而為延譽於公卿大夫間嵗庚辰試禮部第一廷對賜進士出身擢翰林編修永樂初與修太祖髙皇帝實録書成大沐恩賚陞修撰既又纂修永樂大典充副總裁戊子用祭酒胡公若思薦陞國子司業居官以禮自持以師道自任以勤率諸生每五鼓升堂講授終日危坐無怠容諸生皆敬畏而心服焉仁宗皇帝在東宮監國南京眷遇殊厚洪熙紀元首膺勑命進階承徳郎贈及考妣宣徳丙午通政使陳璉奉命掌國子監事九月三日設宴公堂君從容言笑如平時酒闌忽得風疾舁歸私第以是夕卒享年六十有四臨終無一語及身後事但屬治䘮不用浮屠所著述有古崖藁若干巻配鄭氏封安人子男四人與弼與疇與年與性女二人長適應天府學教授孫曰讓次適豐城徐士英孫男三孫女七諸子奉柩歸葬崇仁邑治北二十里之左稿既葬十有三年與性以明經領薦至京泣而告曰先君子務學篤行以古人自期而官止司業弗究所施年未及古希不肖無似又不克致位通顯以光振先徳惟先生於先君子同年登第又同日擢官翰林知之悉者莫先生若也表諸墓道傳示永久亦莫若先生宜也不肖敢以請嗚呼君之孝友篤行出自天性清修苦節至老弗替其為詩文詞暢理明足追古作者第以不媚當道官太學幾二十年而不獲叙遷卒之日身無以為殮家無以為䘮子孫無以為衣食資而縉紳之流持乎公論者莫不為之悼歎也然君之志雖不獲大伸於當時而能使天下之人信君之徳操者無間於貴賤傳誦君之文章者無間於遐邇視彼之得志一時而泯沒於身後者豈不相去逺矣哉况君之子若孫有志問學期乎顯榮昌大以慰君於地下者又有可冀歟姑立表以俟云故翰林修撰張君墓表西江有清慎剛介君子曰張君伯頴者累官至翰林修撰以疾卒於永樂癸卯十二月一日距今蓋十有六年矣其子承翰以明經分教應天府庠乃奉學士錢君所為序述事行謁予請言表諸墓道予昔在翰林素重君為人乃不辭而次第之曰張氏為吉水文昌鄉右族累世業儒而多望士曽祖震可號南磵博學工文祖道益號道山元延祐中舉進士于鄉考安禮洪武初以經行修明仕河南鄧州學正學者稱為後山先生君諱嗣祖字伯頴母劉氏君以元至正辛卯十月八日生自㓜眉宇秀朗屹出不羣書過目輙成誦嘗為冦掠去養為己子久之出牧田間過者怪其異於常兒因就問之而得其里居與所生之悉遂走報其父贖以重貲既歸教之學闓悟絶人肆力群經而尤䆳于書洪武甲子領江西鄉薦明年㑹試禮部得乙榜授廣東陽山縣學教諭無何以外艱去官服除調蕪湖所至以師道自任禮法自持開導諸生曲折詳盡以是士多成材出而擢科取仕者相繼永樂初以近臣薦擢翰林五經博士與修高廟實録書成遷檢討賜白金文綺襲衣未幾修永樂大典充副總裁復膺楮幣之賚秩滿陞修撰時車駕幸北京留署南京翰林院事嘗考應天府鄉試去取公明士論服之晚得腫疾二子自鄉來省疾既少間亟遣歸報其母不數月而劇致僚友之親厚者語之曰吾以一介下士致身禁近死復何恨第上無以報國恩下不及見吾兒為憾爾言訖神爽如平時是夕奄然而逝享年七十有三君平生孝於親敬於兄信於朋友厚於宗族母嘗卧疾躬侍湯藥不去左右衣不觧帯者連旬既歿而毁顇不勝宗姓子弟以先世田産質諸人而不能自贖者捐貲為贖而畀之喜賔客過輙相與欵洽然不嗜酒當稠人大㑹中杯酌淋漓衆皆讙譁失次公則凝然中處卒不為酒所亂為人長身山立鬚髯奮張見者為之改容家居雖燕私必嚴以飭當溽暑而食不去巾服僮使畏憚戸内肅然無譁後生輩疎蕩少檢者噍讓不少貸或與坐移時不交一談其莊敬自持者接以温顔慰藉以好語既去尤稱道之不置居官亷勤臨財錙銖不茍取有官外郡而餽銀器者謂其所得非義峻辭却之出入舘閣二十年足未嘗履貴勢之門以希合幸進公退終日清坐玩誦書史雖家用弗給一不經意為文嚴正似其為人所著述有書題講説中庸析理苦澹齋集無名翁傳通若干巻藏于家配杜氏劉氏子男三人介申介甫杜出也介甫早卒承翰劉出也女三人皆適士族曾直温陳清渭劉景福其婿也孫男五人孫女五人初君之卒承翰偕其兄奉柩歸葬於鄉某山之原嗚呼士君子立身制行既能有所自持而又加以問學之懿則其人歿猶不忘矣張君之行之學固自足表著於世奚俟予言然以其子請之之勤故具述如右俾勒諸石而揭之于墓云明封翰林編修文林郎裴君墓表士君子奮用當世砥名礪行于平居無事之日固足重矣至其屢用屢退險夷一致者豈不尤足重歟觀之裴君可見矣君諱璉字汝噐荆之監利人曾大父興邦仕宋為某郡守大父文逹父伯衡俱有濳徳母孟氏君㓜穎敏補郡庠生弱冠湘獻王見其秀偉舉動老成命署邑東縣學事適靖江王道過與語器之俱載竟日賜詩為别及補上舎為祭酒宋訥所稱嘗偕同舎六人徃西凉計公廪比還太祖高皇帝問廪儲虧盈六人者莫能悉俱被罪惟君疏其實以對獲免未㡬擢知劔州高皇帝諭以理民之道賜衣衾路費甫三載用薦陞浙江按察僉事尋調江西永樂初坐事謫戍興州才四月驛召授監察御史四年陞河南按察副使坐事謫戍武清復用薦授監察御史已而丁母憂奪情起復時仁宗皇帝以皇太子監國知君賢陞左春坊中允為同列所連改大理評事繼遷刑部主事復坐事降易州同知仁宗踐阼念君舊在宮僚特陞工部右侍郎尋調北京刑部復坐事降知涪州宣徳三年春入朝時其子綸官翰林編修君得循例就封致仕此其進退之槩也始知劔州即訪民疾苦修舉百廢州民世以茶為利為王府權貴人所侵君請禁戢之民獲利如初他州之政類如此其為御史紏劾勢要不避艱危太宗皇帝嘗當朝奬諭河南皂軍山冦發命公廉其事既還上方畧緝捕頃時冦平陜之階文二州叛冦僭稱王號復命公按之公廉得其窟穴諸渠魁俱就縳歸言其餘脅從者皆出於不得己悉得從活居常以擊强植弱疏雪寃滯為念至於作興學校奬進士子其為州為按察所歴皆然惟於劔於易於江西久而彌著人至今稱之曩坐事去江西南昌守宻有厚贐一無所受其行事律己類如此性尤篤於孝思伯衡翁不逮養言及必慟所得月俸量其日費悉以奉母每遇生辰追悼不已人强之為壽輙避去平生藻思奮發見諸詩文若柏庭訓子圖野舟集俱藏于家其生以甲辰冬十月一日享年七十有二宣徳乙卯春三月十三日卒於家娶夏氏有婦徳側室王氏子男四人長經次即綸甲科第三今仕修撰次緗次紞女一人適池鳯孫男七人衮震裳辰𠂻褧扆孫女五人以某年某月某日祔葬邑之白湖東原祖塋綸奉翰林侍講劉永清所述行狀徵予表其墓予嘗與君同僚且交舊義弗可辭用書其槩俾劖諸石以示永久嗚呼君為人亷介不阿歴官中外四十餘年所至有為雖屢坐事未嘗有私過用是蹔去即復而行益堅名益著及恬退晚節俱足為世勸云故山溪逸士周君墓表周氏吉之右族衣纓圭組世裔踵接迄今數百餘年彌久彌盛者豈無自而然蓋詩書以涵養之禮義以維持之故生長髙門而能躬布衣韋帯之行勵志問學而不溺驕吝逸慾之樂宜江鄉所推尚而賢士大夫皆有取焉若今山溪逸士諱道字時立者其一也逸士世居泥田曾祖學顔祖孟泰俱博學不仕見稱於當時學士鉅卿考公明號溪園任教官累典藩方文衡既卒少保金公為銘其幽堂逸士承家學之懿兼有頴敏之資刻志問學從祖台州同知仲芳君竒其少而有志遂授以經弱冠出為鄉社弟子師大家争延致之溪園君既出仕逸士躬理家政奉賔祭待族姻咸中禮度每間嵗省其親不辭艱險至於事繼母撫諸弟尤克盡心從叔公智公顯坐累謫戍鞫其㓜子女為畢婚嫁里有素善者舉家疫作人無敢徃逸士獨旦暮徃視之有死者則督僮僕殯殮之故始遷之祖有祀田族大以繁久而湮沒今翰林修撰功叙倡族人建祠割田以助春秋祭饗且修譜以續世系逸士多力焉平生行己制事一由道義性尤介直不能容人過而亦不肯自容其過鄉有争辨而求直者面拆其是非弗少貸人亦心服而無怨惡之者結樓於重榮桂側藏書萬巻課子之餘日與賔客焚香鼓琴酌酒賦詩臨風翫月悠然自適為文雄逸浩汗曲盡物情而皆本於理有山溪集藏於家仲弟廸官翰林季弟進司訓襄陽子源典教徳清皆朂以飭身守官之道誘掖宗族後進無間戚疏雅志恬淡不嗜仕進雖當宗姓鼎盛豎仕版者相望而獨韜光歛榮肆意丘壑可謂篤行君子矣以正統丁巳六月十有四日卒得年五十有五娶毛氏繼楊氏子男四人長即源由鄉貢士任徳清教諭以薦陞知天台縣事方嚮用未涯次沂濳澤皆業儒女二人長適羅宗淵次在室孫男三人槃槩梁孫女四人將以某年某月某日葬於某山之原源預以修譔功叙所述事行謁予泣拜請表諸墓嗚呼世之大家望族弗克綿延其慶祚者無詩書禮義以為之節約也周氏累葉事儒業溪園君既以儒為世用而山溪逸士復能以其父之業訓諸子兄弟與其族人底於成材而篤夫詩書禮義使慶澤之流久而弗艾是大可嘉也為其子孫者能世守而躬踐之則周氏之昌大容有既乎宜為之表以勸後人故嘉議大夫刑部右侍郎呉君墓表天之福於人者厚人之得於天者全此世之希有而古今之所同羡者也自非其忠厚仁義之徳充培養封植之本固烏能夀富康寧享榮名保令終而得於天若是之厚哉徵於故封嘉議大夫刑部右侍郎呉公可見矣公諱朗字景亮别號菊莊世家建寧政和之豈弟坊曾祖越祖義考以甫俱隱徳弗耀妣魏氏公生元至正丙戌某月某日自少惇厚端慎不事浮靡性嗜學而尤謹言行事先奉親一於孝敬兄弟三人胥篤友愛晨興聚處于堂講論經史以淑子姪其或有過必諄諄誨諭未嘗疾言遽色二弟既去世諸姪以齒繁屢求分異乃俛從之貲産令自擇取以厭其意至於處鄉黨待交逰必和必信弔䘮問疾曲盡時宜性尤廓逹好施予恤匱周貧恒恐弗及里有䘮不能葬者捐地與之有鬻女以償其負金者即召其人止之而毁巻晚置别業於邑南曰南莊中置琴書旁植花卉日與耆舊杖藜幅巾笑歌徜徉不厭不倦時呼童命酒悠然共酌意豁如也子廷用永樂甲申進士任戸科給事中仁宗皇帝嗣位擢刑部右侍郎洪熙紀元䝉恩賜誥封公贈公之父皆如廷用職毋暨配俱淑人宣徳壬子盗竊公之金帯襲衣有司猝欲遣人捕索公止之曰愧無徳及人而以細故撓人是重予之不徳也願止勿捕人益服其雅量嵗乙卯廷用轉禮部左侍郎莅事南京正統丙辰得請歸省公時夀九十有三歩履言笑如壯者廷用年亦六十有七率厥子婦奉觴稱夀錦衣華髪照耀髙堂鄉邑莫不稱慕嘆羡以為不可及也公亦喜甚謂廷用曰吾老矣每盧弗及見爾今幸相見實出朝廷大恩爾宜亟徃以圖報於萬一勿吾念也是嵗十一月二十六日卒訃聞遣官賜祭命有司營葬以丁巳七月十八日竁于邑東瞿里仰山之陽壙之所需宜大板石徧求弗可得乃以木代之當啓土時穴傍忽得版石適足其用人皆以為公積善之報嗚呼生榮死哀若公者可謂盛矣非得於天之全者詎克然哉公初娶張氏繼邵氏男一即廷用張氏出也女一適同邑李景穆孫男三文焴旒通孫女三予於公為同郡於廷用相知深且久乃為表其墓曰昔蔡端明亦閩人當貴盛之時二親享壽考康寧之福母夫人後以九十二而終歐陽公乃謂世之為子者必以夫人祝其親為父母者必以端明教其子今廷用之賢之貴顯視端明為無異而公之五福具偹視其親為有加矣又烏知今之為子者不以公祝其親為父母者不以廷用而望其子歟數百年問僅兩見其美詎可多得哉是宜勒諸貞石使後之觀者又將有所考焉文敏集巻二十
