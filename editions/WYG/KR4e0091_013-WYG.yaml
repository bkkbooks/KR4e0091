body:
  text: 文敏集巻十三明楊榮撰序送翰林編修楊廷瑞歸松江序洪惟太宗文皇帝聰明睿智緝熙聖學以開萬世文明之治即位之初深惟古昔聖王作人之盛必賴培育之深故於甲科之外復簡其文學之尤者為翰林庶吉士俾讀中秘之書以資其博洽學古文辭日給筆札膳羞以優異之盖宸慮深逺以謂三代而下莫盛於漢唐宋帝王之治雖曰有間至於儒者若漢之賈誼董仲舒司馬遷揚雄班固唐之韓愈栁宗元李翺皇甫湜宋之歐陽修二蘇王安石曽子固諸賢皆能以其文章羽翼六經鳴於當時垂諸後世我國家隆興制作之盛超越前代敦本還淳以推明聖賢之學五十餘年所用文學之臣黼黻之盛焕乎可述榮嘗獲承清問每論及此以為必使真儒之盛克見於今毋令前代登瀛之流獨擅其美榮受命惶悚罔知報稱惟思與多士黽勉朝夕以禆賛聖治之萬一焉乃永樂辛丑詔簡庶吉士有成者用補館職而松江楊珙等六人並擢翰林編修珙性資温淳貌如其心操筆為文蔚然可觀處詞垣數載未嘗見其有浮薄之行焉歲甲辰嬰疾侵尋數月蓐食阽危者屢自夏徂秋雖獲小愈而肌體清羸若不勝衣恭遇皇上嗣登大位仁恩汪濊珙以情自陳得賜告歸以就醫藥濱行其友中書舍人蘇鎰良金等徵言以贈仰惟先皇帝至仁大德如天地之覆育凡在譽髦之士固弗敢隘以自私然珙職在禁近惟當以古人自期切劘砥礪奮發感激寜敢自畫哉然而疾者孔子所慎而况於學者其可以弗慎乎且皇上恩德深厚念人才培養之難因其所陳推誠嘉與為臣子者其可不感激而思所以報稱乎珙其遄歸登堂省覲敷陳上之恩德奉觴拜慶以為親夀尚敬節宣勿遲其來以成德器而為異時逺大之圖以光榮顯赫於邦家吾儕深有望焉是為序送教授魏仁夫之饒州序永樂甲辰予友魏仁夫䝉恩除江西饒州郡學教授惟仁夫昔與其從兄孟原同學郡庠予則與同里閈有姻戚之好契愛之厚今茲之行遂率能賦之士賦詩以送之盖仁夫自幼篤實有志於學雖祁寒盛暑未嘗少懈由是其學日進若木之發榮泉之暢逹也人皆敬服之予先以科目入京師列官詞林既五六年而仁夫始領鄉薦㑹試禮闈名在副榜遂得分教池州之銅陵繼丁内艱服闋改除上虞秩滿歴政春官以俟命將兩載始得典教饒州嗟夫學校之職其掌教事郡謂之教授州謂之學正縣謂之教諭雖其品秩有不同而其所以統率其教者一也至於訓導之職則專掌訓誨因其生徒有多寡而其職任無不同至若生徒有成循序陞進亦不越乎學校之間必其備歴郡縣然後陞之於太學以教育天下之賢才於是為至矣仁夫今自縣學陞于郡學非其平昔教之所及學之所成曷克臻茲而行將書最以進于太學其所以淑諸人者未有涯涘也古人有云師道立則善人多仁夫其尚朂之哉遂書此贈之送大理寺正郎子貞還錢塘序大理寺左寺正錢塘郎公子貞始為建寜推官時予方在郡庠一見之頃已黙識其為俊偉人未幾予由鄉薦入試禮部登進士第擢翰林編修益聞公清慎沈黙操履端嚴視事不以寒暑為倦不以蚤暮為勞推讞精審决斷公明由是案無留牒獄無滯囚郡之人莫不愛戴之不啻父母官滿得代咸惜其去而弗可留至有挽轡出涕而仰天頌禱以冀其逺大者道路相屬也然則其何以得此於人哉迨入京天官考其最進拜大理右評事復陞左寺正彌加勤勵益慎推察甚著平恕之聲既而僚屬作奸連及十餘載瀕於危殆者數四公處之㤗然不為動衆咸驚歎曰若斯人而遭禍患是滅公道無天理也既而果得釋衆復躍然而喜曰是雖朝廷清明神明佑護抑公操存清慎之所致也茲以考績來京䝉錫敕命得以推恩榮其考妣以及其配於是以年七十請于朝賜休于家亦可謂遂其生平之志願矣嗚呼人之生也幼而學壯而行老而休孰不有是心哉然享其全者世有幾矣惟公獲際明時而又得展其所蘊行其所志德被于人人福及于後世不惟身享安榮將見子孫益昌以盛有如于公之髙大其門閭者矣予叨在朝列垂三十年於人不敢有所毁譽而獨念公之志節有足尚者因其歸也情不能已遂書此以著公之美且將以為有官者勸焉送中書舍人劉長謙還吉安省墓序中書之為職尚矣周官内史掌書王命盖其任也漢魏以來始置中書令遂兼與政事降及晉隋其秩益崇任益重而名稱益著唐宋之世則有舍人之員兼司制勑當時號為鸞臺鳯閣尤為貴重我國朝稽古建官設中書舍人十員居侍從職司文武臣僚除拜封贈誥勑而凡有制命以諭四方萬國蠻夷君長則書之然必遴選文學之士精于翰簡者充其任盖因乎成周唐宋之遺典而職位之清切則又過之吁亦榮矣哉吉郡劉君長謙由太學生永樂初擢拜中書舍人出入禁闥二十餘年寛和周慎綽有令望時朝廷昭舉盛典褒寵臣下凡久於其任者皆得推恩榮及其親長謙實在中書制命之下日不啻數十而能恪勤朝夕不憚勞勩由是人益賢之而又得以已職贈其先大夫其母氏亦贈孺人錦勑焕頒寵賁泉壤又可謂膺存没之榮極遭逢之盛矣今年秋以久違鄉土曠省丘墓陳請以歸詔命允許戒行湖廣叅議陳君彛訓時以事留京師與長謙有同寅之舊乃請文於予以為贈曩予職翰林與長謙地分兩制日處禁垣及扈從兩京而往還甚相好也則於其去豈能已于言耶惟士生聖明之時負卓犖之才爵位顯於時褒崇逮其親此衆人之所同欲而不能以致者今長謙乃兼有之從容内廷歴年滋久聲聞著於當時錦衣照乎里閭盖有得乎衆人之所難得者豈非其平昔志行操履純固有以為之本歟則是行也其為慶幸亦豈偶然為一時之榮豔者可同日語耶抑予又有告焉凡交逰之為别必著之文字以為贈者盖將寓其綢繆不忍相舍之情以祝其及早還朝無久戀於鄉土也長謙之歸其尚念天子恩寵之隆與夫職任之要遄當重來以圖報稱毋重以桑梓為念以違夫素志是予之所屬望也於是乎序太醫院使蔣公挽詩序自薤露蒿里之曲傳於世而哀挽之作緣此而興乆矣然非其人才足以用世德足以及人名足以垂後者抑豈能使人悲思哀慕形之詩歌以寓其情於無窮哉贈太醫院使蔣公用文之没也兩京士大夫與之交游者既相與咨嗟傷悼以為斯人不可復見而又作為歌詩以哀挽之其子主善次為一帙來請予言為序盖公世業儒家于淮南為人惇厚恭謹自幼以孝聞尤喜於讀書既長以名醫薦至京師授太醫院御醫其為學於經史百氏靡不渉獵其為醫自黄帝岐伯下至歴代諸家所著論難方藥罔不精通專主李明之朱彦修之傳不執古方故其視人之疾驗虚實定死生無弗中者居京師凡有求之者雖祁寒盛暑風雨暮夜必往愈人之疾無責報之心人咸比之董奉以為忠實過之其在職專事仁宗皇帝周密小心夙夜勞勩未嘗少懈每承顧問能隨事規諫多所禆益由是深䝉眷愛陞太醫院判甚見親厚同列罕及焉公既没官為具舟歸其䘮命中使督治祠墳踰月仁宗嗣位贈奉議大夫太醫院使特諡恭靖親為文遣官祭之命其長子主善為太醫院判錫予甚厚嗟夫公以致用之才膺受知遇非特以醫之良信任於時而又能攄其忠藎有所獻納足以見公之素藴非衆人所及矣則士大夫之咨嗟感歎而哀慕之弗置者豈不宜哉予於公交最久且厚因序于篇端庶幾後之人欲求公之為人者尚有徵於此焉送桂修撰還鄉詩序今天子即位下寛大之詔布維新之治恩澤所加霈若霖雨於是翰林修撰慈溪桂宗儒以老病自陳遂得承命退休于家盖桂氏為四明鉅族簮纓詩禮代弗乏賢國朝洪武初有曰彦良者仕為晉王傅老成文學甚見優禮其後懸車致政以夀考終宗儒實其從子也永樂初繇太學與修大典書成授湖廣蘄州同知以事入朝遂轉今官及今雖年未七十而疾病侵尋方將求優閒之樂為歸老之計而一旦荷上恩命賜歸其鄉其榮為何如邪將行士大夫相率賦詩以華之而請予言叙其端夫士君子之生世惟得以其才學見知於時獲霑一命以克展其所蘊措之於政事播之於述作英聲令譽足以揚於今而傳于後可謂榮矣迨夫晚節既倦而欲休浩然思其初服乃又得有以遂其志此其幸又何如耶然而古今人得之者幾何人哉宗儒承閥閲之胄襲簮笏之美既克無忝於其先宦游兩京出入禁苑又能以文學揚光振耀於縉紳之間以無媿於其職今茲遺榮而歸言望桑梓招白雲於故山采黄花於籬下日與故人賓客舉觴賦詩以為樂鄉之人士必有瞻望而歎息者且曰此玉堂天上之人復來人間也其榮燿可勝言哉予于宗儒有僚寀之好遂弗辭而為之序送余侍講致仕還南康分題詩序古者七十致仕盖優老待賢以示崇勸之道也後世或有貪進而不知己者往往至於厖眉皓首羸疾弗勝猶不以趨走承順為勞其為人賢不肖何如也今上皇帝即位寛仁好賢優待眷顧唯恐弗及於是翰林侍講南康余正安以疾陳乞致仕時年六十有二詔許之將還其同年之官于朝者即其所居匡南山川之勝分而為題若五老峯彭蠡湖瀑布泉三峽橋白鹿洞冰玉澗以及釣臺天池石梁栗里虎溪醉石凡二十人賦之將謂正安歸此而樂其退休之樂也因來請予言弁其端惟正安自其先世宦游居南康多歴年矣若其山川之勝風物之美皆其少時釣游觀覽之地正安既以科第入官受職詞林二十餘年其榮名顯仕固已超乎庸衆而非尋常之所可及茲以老疾相侵一旦浩然有歸志值國家恩澤霶霈之日得遂所請掛帆秋風千里一息其快意可知矣今之歸也又得歴其少時行樂之處探勝賞於泉石之間指遺跡於風烟之表錦衣晝遊照耀桑梓其於人生仕宦始終進退之際豈不榮且幸矣此諸公所以惓惓焉致意於其歸榮告别之頃而為此詩以歆豔而張大之也雖然正安他日誦是詩想其人亦豈無玉堂天上之思乎尚其敬慎自持介茲眉夀優游太平之世以為後進之所楷式庶有以慰予與諸公之望也遂書以為序送古春坊大學士兼翰林侍講學士王時彦詩序皇上即位孜孜以圖至治思惟古先帝王之政理必躬行以率之於是布維新之政興孝弟之行將以化成天下迺勑吏部凡臣屬有親在乆未歸省暨親没而弗一展丘墓者皆許歸其道里之費則以品秩之崇卑而賜賚有差焉右春坊大學士兼翰林侍講學士臨川王時彦以母老陳乞歸省先是朝臣五品以上皆賜誥命以封贈其親時彦亦䝉推恩封其母為宜人至是幸遂所請因得以是歸榮其親將行詞林諸公各賦詩以為贈且以首簡請予序之予惟人子之心孰不願仕宦以顯揚其親然有係于天不可以必致者是故曽子謂吾及親仕三釡而心樂後仕三千鍾而不洎吾心悲仲由謂昔家貧無以為養今也累裀而坐列鼎而食雖欲為親百里負米其可得乎此二賢者皆以不逮顯親為歉至于今誦其言者莫不為之悵歎時彦少孤母氏守志弗易以訓以育冀其有成而時彦亦克自勵當太宗皇帝即位之初首以明經領江右鄉薦明年甲申登進士第始繇翰林庶吉士進職修撰侍講以擢今官處詞林二十餘年文學聲譽振耀發越蔚然為士林之望及今得被恩命言還故鄉而慈顔在堂康寧夀考想夫升堂拜慶之際煥紫誥之光華絢綵衣之璀璨稱觴介夀宗戚交欣非惟足以慰慈親於暮齡而國家所以褒嘉激勸於臣下者使鄉之人士皆有所感發興起莫不延頸企慕思有以自效於當時豈徒同昔人晝錦之榮而已也邦家之光實有在焉送張教授赴汀州郡學序國家混一海宇誕敷文教内建國子監以養天下之賢才外設郡縣學以育民間之俊秀尤必擇師儒之官俾之訓誨以底于成而後進而用之故成德達材無不出於學校自公卿大夫以至百執事之職亦莫非教育之人顒顒昻昻布列中外相與輔成雍熙太平之治何其盛哉然此皆本於朝廷教養作興之功而亦未必不由賢師範有以成就之也㑹稽張君文舉始以明經領鄉薦既試禮部名在副榜遂授廣東崖州之寜逺縣學教諭惟是州僻居海島俗習朴野不尚文學而於諸生未易開導君獨能以身為之表率誘掖奬勸使其循蹈規矩而俱樂從之遊乆之考績來京天官以科貢不及改閩之建寜郡學訓導雖弗克以伸其所志其誨諭諸生一以忠信孝弟為本而於文藝精審講究通貫日夕孜孜亦未嘗見其少懈由是諸生出而效用於時率皆識治體而播聲譽秩滿陞河間之寜津教諭其為教益勤學益篤而諸生之見用者亦鮮有弗勝其任者焉今年以秩滿考最超擢汀之郡學教授將行士大夫相率賦詩以送之且徵予言以為序盖君分教建庠時予為翰林侍講因歸省視得以聆其議論深知其為清雅之士而又克以師道自重士子皆推服之至於往還兩京與予繾綣之情久而弗替尤足以見其藹然斯文之契誼也今茲别去烏能已於言乎古人云師道立則善人多誠以師儒之職所以模範於人者也一言一行必可以為師表一動一静必可以為楷式使人親炙薰􅇽於其教者如金之在冶玉之就琢焉斯有以成其學而適於用其為功不小矣茍師道不立則聖賢之學不明而規矩凖繩所以為法則者亦皆蕩然隳廢所謂模不模範不範者是已學者烏從而師之而善人亦何自而多乎君歴教三學垂四十載而後克遷今職盖其師道老而益嚴勤而彌篤而諸生之出其門者又皆足以致用於時若君者奚忝於學校之職哉以是而觀國家之養士育賢必擇乎師儒之任而居是職求其稱者幾何人哉予于是嘉君為賢師範而又喜其能體聖朝教育之意以成賢才之盛如此也故樂為之序而不辭送周職方還文江序士君子貴於立志夫學足以致用才足以有為而志不立則亦安能奮發揚厲以自見於當世哉吉之文江周君岐鳯承閥閲之華胄習詩書之遺澤刻苦問學自其以明經為教職時已侃侃負志節慨然思欲有見於當時既而用薦起為即墨簿有聲未幾入為國子學正繼遷紀善之職益有聲不數載出為姑蘇之長洲儒學教諭雖隨其所任皆得名譽然不足以盡其才而遂其志也故自長洲九載秩滿考績京師復入國子為博士以憂去官今上嗣位服闋入朝方是時君之子叙為翰林編修既受􅎁命或謂君將棄職就封君曰吾雖幸以子之官推恩得䝉褒典然不得上及吾親也吾其敢獨受此榮名乎無何亦用薦陞南京兵部職方員外郎今年夏以三載上吏部考最遂得給誥命且追贈其二親援例歸省丘墓以展焚黄之禮將行朝之大夫士相率請予言以贈之惟人子以顯親為孝仕者以還鄉為榮此天下之同情也君以通敏之資該博之學故能以其所蓄施之於用自處卑秩至于崇顯克榮其躬以及二親簮紱之華耀于兩世絲綸之寵無間存没然則若君者非能先立乎其志者歟今之歸也其鄉之人士將必瞻望歎息曰此盖能顯其親者也此盖能榮其鄉者也古之人所謂有志之士其在於斯歟雖然君之志殆不止此盖將敷揚德澤輔理政化欲以大有為于斯世也尚當促裝重來展其致君澤民之術俾名譽馳于海内事業顯于邦家炳炳烺烺垂之無窮庶有以副士大夫之所望而亦足以成君之素志也豈徒一家之光一時之榮而已哉遂書此以贈送龍推官還鄉序江西龍用良才質通敏而勇於有為永樂初應求賢之詔擢知真定縣事盖真定之為邑當西北道路之衝蕃國朝貢之往來餼廩供億之繁奔走迎送之勞視他邑恒倍用良既至能均其賦平其役約其冗費民咸樂于趨事百爾之需不勞而輯比九年考滿當遷其民皆願借留不聽遂調萊州府推官萊為海濱大郡魚鹽之利東南是資然以土地磽瘠租賦所入甚薄故民多貧困用良既蒞職為宣布朝廷欽恤之政佐太守以寛刑罰薄稅歛不逾三年而獄訟以平民安其業小大咸德之今復以初考至吏部國家方將圖任舊人共理庶務相與以致雍熙之治而用良乃以年老急於引退皇上重違其意特許休于家噫若用良亦榮矣哉將行工部侍郎羅汝敬與其有連世之好來徵予文以贈别嗟夫幼而學壯而行既老致事而歸此士君子出處之大節也然或學之而不得行其所學行矣又或溺于貴富而忘返若此者皆非所以合乎中道者也用良敭歴郡邑有聲於時二十年于茲矣一旦乞身而去不茍于貴富不狃於勢利其賢於人也逺矣想其北風吹帆日踔千里拜桑梓於故土幅巾藜杖日從賓朋遨遊山水間賦詩觴酒以為樂悠焉休焉不知其老之既至而人生之樂孰有加於此哉雖然古者賢良之臣雖頃刻不忘乎君以其身雖退而其志未嘗一日不在朝廷也用良歸矣尚當訓廸其鄉之英俊俾得用以效力于當時庶不負朝廷優老待賢之意而用良之退歸益有光矣用良其勉之哉送江西僉憲黄汝申歸省序聖朝致治之道必先之以孝行故凡仕而違其親者弗計其久近皆許請告歸省至矣哉天地之仁也今天子以聖繼聖遵奉祖宗之法纎毫弗違而於孝理尤加之意親存而願迎養弗能就養者或分禄或乞歸省罔不允許其所以優遇羣臣者德甚厚也永樂辛邜京畿鄉試予忝司文衡而雲間黄翰汝申實在髙選明年㑹試禮部登進士第觀政于烏府既而出僉江西憲臺揚厲風紀摧惡撫善大愜衆望由是藹然得譽於縉紳之間軍民深所恱服汝申可謂不負所學矣今以九載秩滿考最得階四品待缺于京因慨然曰吾所以居官食禄致身通顯者親之訓也去鄉久矣朝廷幸有歸省之令義不可違也遂上章陳乞歸省既得請將行監察御史林衡宗度與汝申素所交游乃來謁予文以贈焉予謂士君子立身大節惟忠與孝而已盖親生之而君食之其德同也而其報亦同也既委質事君恪恭乃職而不顧其私者所謂忠也而為君者探其情而使之遂所欲俾為子者不忘乎其親得非所謂孝乎傳曰無公義非忠臣無私恩非孝子臣之事君必先公而後私君之使臣必先恩而後義君臣之間既各得以申其情者如此而其遭際亦惟時焉而已爾今汝申之仕也當太平極盛之時忠以事君孝以事親兩得而兼遂豈非榮幸之至矣乎茲焉榮歸而展敬桑梓二親在堂康强無恙蒼顔白髪輝映尊爼間而緋袍金帯稱觴上夀拜舞于親之側鄉邦見者孰不曰黄氏之父善訓其子如此其子之克致顯榮又如此世之仕宦如斯者幾何人哉雖然顯親揚名固足以為榮矣尚未足以為至也汝申繼今已往益懋前聞駸駸不已他日重來或居方岳或登廊廟拜恩受誥推恩封贈其先代光映鄉閭其榮也當復何如此予與士大夫所以望於汝申者如此而汝申所以自勉者亦豈不在於斯乎因宗度之請遂書此以贈幸無以予言為迂送楊運使還任河東序士君子必有通敏卓異之才超邁穎悟之識然後居官涖職無所往而弗稱其任也故雖以黄霸之賢善政施于潁川比入相而功名減于治郡况其下者乎大抵人之才固有不齊操履端確者剸繁之不足明察有餘者豈弟之未至譬之器也若舟車之不能相通盖自昔既然矣抑一才一善果足以成名人固不以其不足者而掩其為賢也况于兼之者哉河東運使濟南楊傑子英洪武中以明經領鄉薦卒業成均擢刑部主事推讞平反聲稱籍甚永樂中遂以薦陞福建按察僉事其涖官風紀整肅法令明信郡邑汙官黠吏望風而歛跡在任九年人皆稱其才既而以最陞兩淮運使或謂子英由秋官郎署擢僉臬司典刑名任風紀餘二十年一旦委以㩁鹽之政俾董財賦通商賈恐非其素習而熟諳也既而子英涖職一去向之震擊凌厲之威而平心易氣以為之勤以督課公以通商惠以恤下未幾其職大舉而人莫不以為宜宣德初元以舊官復任遂調河東既至一以施諸兩淮者施之由是績用登最夫人一才一善之足稱人尚不以其不足者掩之如子英居風紀居鹺司而皆克稱其任也若是非所謂通敏卓異之才也歟今年春子英考績將還所治閩中大夫士請予言為贈予與子英交久相知最深故因其請而樂道子英之賢也雖然我朝用人惟其賢才罔不信任至公同天地進退黜陟一無所私子英歸誠能懋修厥政始終不懈異時九載政成秩以最陞不患不躋乎崇顯華要之地也子英尚其勉諸京闈試録序天朝興禮樂教化以成當代文明之盛肇千萬世治平之基設科取士考求文藝選真才實學以資世用由科目而進者或貴為列卿或榮登清要才德稱位者咸有其人匪直為文具而已洪惟我皇上紹承大統興崇文教致盛隆之治科舉得人大有其效今年當秋試之期於是合太學京畿郡縣之士千五百餘人以校其藝有司循故事奏請考官於朝皇上命臣等以司文衡其同考及諸執事皆簡中外儒臣涖之甚嚴密也乃慎選精純屏黜浮靡撤棘之日得中程式凡三百人於戯盛哉明良賡歌于巖廊多士從㳺于巻阿其雍容氣象復見于今日竊思皇上即位以來勵精圖治惟欲得真才實學而用之訏謨逺慮卓越千古其所以匡輔國家以致治功之美者亦有望於爾多士也爾多士尚當琢磨淬礪㑹試于春官對揚于大廷以展其所藴以副皇上之所期望毋徒事虚名取榮于一時而已能如是庶幾上不負朝廷造就之恩下得以盡顯揚之道則今日得人之盛誠可為國家賀也敢以是為諸君子勸尚懋之哉送常州府通判陳良玉考滿復任序予友陳良玉通判常州既三載秩滿考績史部復還其職監察御史雷祐之相率賊詩以送之請予為序良玉自幼端重而穎敏稍長入為郡庠弟子員益知務學其志甚專思甚敏而氣甚壯也予時雖忝先進然常自以為弗及暨予以科目叨禄詞林而良玉業益修學益充又數年始貢禮部升太學乃克㑹京師朝夕相與講論文藝敦叙舊好盖怡然甚歡也永樂壬辰春良玉以才能選歴事于天官遂擢通判常州夫常為京畿大郡東連海甸西抵鎮江左控姑蘇右通都邑黎庶之衆租賦之多供億之繁比於他郡為劇而良玉居此獨能亷謹小心勤慤弗懈凡民政之所闗鉅細緩急之宜先後設施之序與夫承上率下待人處已之間無不得其當焉此非有疏通明敏之才恢廓超詣之識者疇克爾耶予嘗竊謂郡守之職所以掌千里之治而通判則佐之以施政而涖民者其職介乎上下之間可否重輕皆有所闗係而其經營綜覈一郡之政務俾庶事修而民生遂閭閻有安居之樂田野無愁歎之聲者實有賴焉良玉之賢且才庶幾上不負聖朝教育任官之意下得以盡其撫字斯民之職矣今而復還其官也將益勵所操益勤厥政異時治效昭著聲聞洋溢超擢之榮夫豈有涯哉良玉尚勉焉是為序送浙江右布政石君赴任詩序方伯連帥古之制也方今布政司承朝廷委寄俾撫綏于一隅得非斯職乎盖聖澤之宣布閭閻之休戚與夫大小庶務之善否興革悉任焉其闗係重矣一司之間有使以長之叅以佐之而凡是非輕重可否悉於使焉從决則長一司者其所闗尤不輕也邇者浙江右布政使員闕吏部以聞于上遂命金城石君執中往踐其任君子莫不以為宜良以其從事之既久練覈之有自又能以亷慎自將者焉君在永樂中為主事為郎中于刑部克舉厥職著聲稱于後先殆非一日矣太宗皇帝臨御之秋起授山東右布政使其在官也敬慎以臨事公勤以率衆僚寀之間莫不和恊而亷介之操恪如也用是聖澤以宣閭閻以安庶務咸集考績屢最以浙為東南重鎮故特移君以治之焉抑予聞之南北山川不同風氣亦異民情俗尚不能以皆齊為政之道固宜隨其所異而修其教令君早膺不次之擢居方伯之任既克振治效於山東則變通弛張之道施之於浙必將有以得之矣詩曰左之左之君子宜之右之右之君子有之殆是之謂乎用序以贈善詩者尚有以繫之送王率常南歸序王生經字率常來自文江槖所業求正於其鄉之先達而就試京闈既而廷議天下解額各有定名籍非𨽻所屬者弗許與率常於是束裝將南還而告别於予予因追念率常之父欽止為同年且同官翰林而相厚又恨其早世文章事業未及大顯于天下而中道止也遂不忍率常之去舍之齋居俾之從容益得肆力問學大其蘊蓄以繼先志而慰欽止于地下居無何率常又進而告曰先生辱念先君子而愛及於生者至矣而生母已老家素貧又無他奉養者生始來時思正所業或得竊科第以為母榮庶乎韓子所謂詹在京師雖有離憂其志則樂今既無以樂親志又久違旦夕之養則於人子之道豈不大有歉乎予聞而惻然又因其言而知其不久困也夫天道降祥與國家之用人未始不本於德行率常惓惓于先業之紹而篤於事母如此可謂孝子矣天之所以福之國家之所以用之夫豈不可必哉况率常之曽大父充耘嘗以書兩冠倫魁至今天下士子猶傳習其文其父欽止亦以書魁于鄉庚辰進士及第入為翰林修撰兄修又繼領首薦典教德州郡庠一門三世既皆以儒科名世率常誠能益加奮勉歸而不怠棄所業則所以承祖考掇巍科以為母榮者可計時而待矣夫豈久困哉率常既拜别而行遂書以贈之使益知所以自朂也待詔滕公輓詩序姑蘇滕公用衡年幾七十承召至京師仕為翰林待詔凡五年無疾而終朝之士大夫相與賦哀輓之詩於今又十年積為鉅帙公之婿凌浩求予言以為序夫古有輓歌盖執紼者歌之以助其哀其後始有蒿里薤露之曲以送王公及士庶人之葬而近世於輓詩之作為最盛然士之生世或聰明俊秀可進於學而不得其夀或懷材抱德可見於用而不得其位故志弗獲展澤弗及施而一旦溘然長逝則夫世之所以仰慕而期待之者既皆失其願望之心則其所以形之詩歌以寓其哀戚之情者盖自有不容已今公以稀有之年遭逢聖明之世列職清華優游暮景顯榮光耀夀考令終自常情觀之若公者可以瞑目九原無毫髪遺恨而哀輓之作猶且惓惓若此者何哉盖公自視雖無復不足而交游士林之間慨前輩之凋謝思典刑之尚存則其所以見于詩者又豈容已哉宜夫聨篇累牘之多如是也雖然公之居京師也嘗寓予官舍其于朝夕笑談游處神情態度至于今宛然若在目睫則予于言也又豈可已乎遂為序弁其端且以泄予之悲云送教諭楊夀夫復任建安詩序師道立則善人多信哉是言也師道不立而欲求夫賢才之造就豈不難哉吾郡楊恭叔先生嘗以春秋之學分教建安宿德碩望後進皆師宗之于時先生之從子夀夫實在弟子之列予亦叨處郡庠歲時還往既有以承先生之誨廸又得與夀夫講論以資麗澤之益厥後先生捐館而夀夫退歸于家予于是不能無孤陋之歎未幾予忝以科目入京師叨職詞林而夀夫亦起為建安訓導獨能以其學開導奬掖所以造就諸生者甚多後以秩滿諸生舉留䝉恩陞典本學教事旋以内艱去官服闋循例當有所調而諸生陳乞復留遂得仍其舊職于是先後十有餘年往來兩京之間每相見握手盡歡雖古人盍簮傾盖之樂豈有過於此哉夫士大夫抱才能負學問出仕於時惟夙夜兢惕思有以盡其職焉茍獲一展桑梓之敬則其榮豔欣慶比於晝錦今夀夫以家庭淵源之學典教庠序自始至今未嘗一去其鄉朝而出也則與諸生進退於廟堂爼豆之間暮而歸也則與賓朋雍容歡愛於壺觴文字之樂若是則夀夫遭際聖明之世得以其學淑後進有師範之尊名教之寄而又得優㳺鄉閭無違離之戚契闊之懷此其為樂又當何如也於是朝之縉紳皆榮夀夫之歸相與賦詩以送之予於夀夫有久要之好乃為之序以冠諸篇首焉送侯都指揮之福建序自古國家之興必有熊虎心膂之臣所以輔成億萬年太平之業甚非偶然也皇上龍飛之初當時四方英傑之士川歸雲從凡受任使者罔不茂著功勲而顯膺爵禄何其盛哉河南歸德侯公本鍾初以㑹州衛千户自太寜來歸既得召見即授指揮之職日侍左右屢著勲績累官至都指揮誠可謂榮顯矣永樂九年春皇上念藩鎮乏賢以公練逹兵政明習機務命守福建之行都司賜以敕諭訓誡諄切無非欲其愛養士卒安輯黎庶以享其榮名厚禄於無窮恩至厚也公自受任以來克尊上命涖職未幾士民安堵盗賊不興城池完固奸邪屏跡講武之暇尤能禮遇賢士崇奬學校日與章逢之士㳺於是環建延汀邵數千里間外户不閉道不拾遺凡老稚疲癃莫不熙熙然安於田里以樂其生者皆公之力有以致之也皇上駐蹕北京先後凡兩率師肅清沙漠公皆承命為中軍神機將軍能身先士卒罔有少懈嘗與北敵遇出竒制勝若有神助凱旋之日賞賚有加去秋皇上復欲北廵邉境綏輯逺人公再至京師操習以俟今年夏命還守建寜濱行凡仕于朝者莫不惜其去而又喜其南歸有足以慰閩人之望者乃相率出餞于都門之外屬予為文以彰之且因以華其行也予惟菲薄叨職詞林顧不足以揚勵厥美而建寜又吾鄉邑所在有弗可辭因告之曰凡人所以樹立於斯世者唯忠與孝而已忠則竭誠奉上孝則盡力事親若是則真可以無愧矣公夙抱才略負志氣入則扈蹕驂乘出則茂建事功至於鎮撫邉陲掌握軍務仁足以濟衆勇足以敢為義足以教俗明足以察㣲事無鉅細必慎必戒故其行事並恊時宜此尤人之所難能而公獨能之故其勲名赫赫在人耳目有不待言而著者茲非孝友忠義出於天性而然歟予嘗觀古者將帥所以承眷顧享厚禄者必能竭誠效忠以盡其折衝禦侮之道然後足以稱其職故詩人託干城腹心以歌詠之播於無極今公之才猷皆有以追蹤古人而猶退然若弗勝此其所以顯敭振發有以副國家倚托之重俾東南一藩休養生息於太平之世其豐功偉績誠非他人之可比異時膺位秩之崇荷恩數之厚其又可量也哉詩曰王命召虎來旬來宣公之謂矣請書此以為贈文敏集巻十三
