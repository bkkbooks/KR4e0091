body:
  text: 文敏集巻十二明楊榮撰序送文選郎中孫斯玉歸連江序文選郎中孫斯玉以病乞歸于鄉既得所請治裝戒行鄉之仕于朝者皆歆豔其去請予文以為贈盖斯玉世居福唐之連江其上世皆積善儲慶濳德弗耀至斯玉始以材入仕自永樂初用大臣薦擢文選主事繼陞員外郎以進今職盖先後餘二十年矣夫朝廷欲設官分職以理庶務布列中外不可以數計也而凡沾一命階一級者悉掌於吏部文選吏部首屬也鑑閲天下士而量才度德以為之權衡者皆資其賛襄弼成文移政務浩穰旁午其職要其任重其事劇盖非他屬比也斯玉以精明闓鬯之材剛介端方之操而居其地秉執公道堅若金石䟽剔凝滯㨗如雨風勤事夙夜或至寢食不遑天官器重之至而屬任之專是以歴事三朝老成練逹佳聲偉績暢逹遐邇今也厥秩告滿華階峻級可以指日而待乃引疾辭榮忻忻焉釋要劇清耀之地而就閒曠寂寞之濱無有一毫眷戀不忍去之態夫進足以禆世用退足以保榮名亦士之難能也斯玉盖賢於人巳乎抑予不能無言者今聖天子聰明睿智邁古帝王圖任舊人恒懼或遺斯玉之乞歸雖許其請且有疾巳復來之命德音宣布優渥隆重誠千載一時也斯玉遭際亨㑹載沐殊恩以歸而春秋尚盛既從容暇豫無所累於心則安養調攝俾疾之康復不難矣尚將式遄其來以副當宁之望披竭忠赤庶幾少盡禆報之萬一若曰履盛滿之地而存止足之戒思脫屣世累引恬山林以為髙豈臣子委身之道哉予與斯玉同鄉且同朝交久知其才尚足以有為故於其行也不徒嘉其志且有以勉其重來云送浙江左布政黄敷仲之任序國朝官人之法備而考績之制嚴盖内外之職率以九載為滿滿則必覈其課之殿最而進退之賞罰明而黜陟公由是百官有司莫不有以奮發振起其事功以求無愧於其職而思以日進於華要崇顯之地孰肯碌碌於庸衆之流也哉乃宣德三年夏湖廣左參政三山黄君敷仲以三考秩滿上其績于吏部吏部具其實奏之遂得䝉恩陞擢浙江左布政使命下之日朝士皆竊相告語以為銓衡之惟允方靣之得賢也既將赴官凡與同鄉者皆屬予言以為贈盖敷仲資性英敏器識超詣釋褐永樂壬辰進士未幾即拜河南左參政方其時以壯盛之年負勇銳之氣一旦出任旬宣之重而於民情風土之宜利有當興害有當去者無不條奏以行之其為政詳審而寛厚其施惠自近而及逺不踰年境内翕然稱治一時以才能當方靣者皆瞠乎其後矣繼以内艱去官服闋遂調湖廣政績益彰而聲望彌著當今上嗣位之初上疏敷陳十事皆切於民政闗於治體而辭理暢逹計慮深逺䝉荷嘉納縉紳推讓焉然則其所以荐躋重任而光華震耀也亦豈偶然哉然予竊惟我朝仕進者雖非一途而惟重進士之選者豈不以其通經學古則知時識變而逹於政也不難矣奈何事佔畢者昧於變通之宜假儒術者徒尚迂逺之論及其都髙爵膺重寄則一籌不展而政績無稱者世豈少也敷仲經術之優推之足以禆世用文辭之美逹之足以飾政治至於臨事明敏知無不言未嘗較利害得䘮於其間可謂毅然自任而非尋常衒名實者之比然則進士得人如敷仲其見重於世也豈不宜哉雖然敷仲之所以見稱於既往者巳表表若是今焉進秩方伯受任浙江而浙為東南大藩布政使又方靣之長也其位髙其責重百官有司之所視傚郡邑民庶之所仰賴朝廷倚之以宣布德意田野望之以敷施惠澤其為職如此又豈可以不加之意也哉予欲敷仲兼聽廣納以防壅蔽凝神定慮以决紛揉開誠布公以𢎞大體由是可以不動聲色而使其民相安相樂於湖山千里之外庶幾上不負朝廷之重下有以副士大夫得人之慶也敷仲與予有鄉里之好故於贈言也并致其愛助之意云送福建參政楊公致仕序國家之於羣臣其褒崇之厚優待之隆揆之古昔實為過之然而為人臣者遭遇斯世以克膺禄位之重荷寵眷之榮顯名始終而進退以禮者幾何人哉以予觀福建參政永嘉楊公景衡盖其人焉公始繇鄉薦起至京師洪武中擢夏官司馬部主事繼陞天官司勳部郎中未幾超拜福建左參政為人寛厚平恕䆳於問學而識達治體其佐方靣能知民政之先後緩急而次第行之皆有條緒各適其宜故於旬宣之餘不動聲色而八郡之民仰之如父母此非其藴之有素而能措之於用者疇克爾耶予始游郡庠盖得瞻公之儀刑覩公之政事退而歎慕於私室者屢矣及後承乏詞林或居京師或囘故鄉辱公往還契誼甚厚雖昔人所謂金蘭膠漆不過是也然豈獨於予哉凡予家子弟與閩故家大族之裔輒諄諄訓飭勉其務學以無忝所生而承公之誨尤多焉故至于今有所倚賴底于造就者皆本於公之厚德也然則八郡之所仰者斯民之同情而吾家之所以感激於公者又豈斯民之比乎此予之情所以惓惓焉弗暫釋也公在閩三十餘年永樂間既以九載考滿書最例當遷秩朝廷特以閩人信服仍命還官去秋復以兩考上其績吏部得膺誥命以還今復將以三考秩滿進階二品而公年七十澹然無進取之意因其奉表來京陳乞致政䝉恩賜歸其鄉惟公以儒業發身致位通顯自少壯至于衰暮勤勞始終未嘗少懈榮名厚禄振耀當時晚節康疆尚堪大任而引年告歸懸車謝事若公者非所謂知足戒滿進退以禮者歟公之榮盛亦云至矣雖然公之歸也想三徑之未荒構田園之别墅日與賓客故人觴詠其間以樂夫天然之樂誠可謂安且適矣况公為鄉郡人望必將以其所有淑諸後進之士俾彬彬輩出而効用於時則公之所及者不亦溥乎公之行予以交舊情不能巳因備述公平生之槩以為贈并求翰林諸公之詩以寓别云送劉副使歸省詩序父母具慶人之至願而甚樂者也既遂其所願而又出膺顯仕禄俸之入足為鼎茵㫖甘之需而名譽之振又足以榮耀乎親視啜菽飲水之奉恒若不足者相去盖懸絶矣况當仕途敭歴之久定省踈曠之餘一旦得以過家登堂捧巵酒以為其親夀承顔視色喜溢庭闈而里閭皆歎羡歆􅃩以為不可及則其願之遂而樂之至舉天下之物孰得以加之哉此廣東按察副使劉咸士皆之行而學士大夫之詩所以作也士皆吉之泰和人早服家庭之訓以茂年擢永樂壬辰進士釋褐即拜河南按察僉事不皦皦以為明不混混以保位闓敏敦詳憲職克舉越九載以最陞本司副使未幾調廣東於是去家凡幾寒暑矣而二親在堂康寧未艾比廣東之命下士皆喜幸以為道出于吉得過門省覲學士大夫聞之遂摭唐杜少陵詩綉衣春當霄漢立綵服日向庭闈趨析而為韻賦詩凡十四首贈之盖以相其喜焉士皆奉以示予請序予謂人莫不知孝事其親而能得親之俱存者鮮或幸而得之而能享其子之禄養者為尤鮮由是其親往往汨没至于白首而人莫知其有具慶之樂也士皆之二親家居康寧遭際國家太平熙洽之日齊眉偕老以享禄養之榮積善之慶於此益可見矣今茲及見其子咸冠豸衣繡拜舞膝下安富夀康榮耀桑梓世豈可以多得哉是宜學士大夫嘆羡之不足又從而咏歌之也雖然士皆之行將使為父母者今而後益思教其子為人子者今而後益思榮其親則是詩之作盖將以為世勸也亦豈徒為劉氏一家之榮而已哉予故不辭為之序云送翰林侍讀錢君習禮南歸詩序仁宗皇帝即位之初恩澤霶霈覃布宇内首詔文臣皆得給誥勅以封贈其親去家既久者又皆給與内帑楮幣許其歸省而展祀焉恩徳之厚天地莫量今上皇帝嗣承寳位繼志述事一遵成憲推恩施德有加無替於是翰林侍讀錢君習禮奉敇命歸祀祖考于其家盖習禮始以明經擢魁江右遂㑹試春官入對大廷皆在前列初授翰林檢討以進今秩其在職夙夜恭勤莅事通敏屢與纂修而勞效益著其操履超乎儔輩其聲譽揚于遐邇故能近穆穆之清光以踐華要而躋顯秩有非庸衆之所可及也今而䝉荷恩命南還故鄉撫松檟於髙丘薦蘋蘩於春雨得以致其孝思釋其違離間闊之懷然後與賓客故人觴酒賦詩以為樂因相與道論聖朝明良際遇之盛德教治化之隆典章文物之備與夫四方萬國朝覲㑹同皆前古之所未有則習禮之歸也盖非特有以為鄉閭之榮而於我朝以聖繼聖祖述憲章之美皆可得而槩見焉豈不榮盛也哉於是詞林諸君子相率賦詩送之而予為之序送潘參議歸永嘉序士君子之生世壯而仕老而休人情之至願也其間有年及謝事而仕或不逹願固得矣而情未必慊也至若年未逮老仕至通顯又特承恩命致政而歸則其願幸之情不其尤至矣乎若吾福建參議永嘉潘君文奎殆庶幾焉君以明經登第初歴行人出知許州入侍桂坊復佐名郡屢典文衡有聲于時秩滿陞今官積階朝列大夫可謂顯矣宣德紀元之初用知者薦與纂修太宗文皇帝仁宗昭皇帝兩朝實録書成承恩荷白金文綺襲衣之賜既而上嘉與羣臣纂述之勤詔各進秩以旌異之以君儒者不欲重煩以旬宣之任特命退休于家以遂其優逸之情聖德深厚何其盛哉戒行詞林諸君子咸賦詩送之屬序於予予與君嘗同官桂坊復同事中秘久不可以辭惟君博洽之學謹厚之資敭歴宦途三十餘載事業播于中外聲光溢于縉紳居官而至通顯未老而獲歸休則其願幸之情所以慊乎己者為何如哉視彼之年雖及謝事而仕或不達名雖同於休致而實則有間矣是歸也徜徉于雲林泉石之間時出賜金與鄉人故老醉醲擊鮮從容歡宴以窮暮齒之適暇則發諸詞􅇨以詠歌太平之化以感激聖朝之恩則其為樂可勝言哉是盖君之所獨得者非他人所能與也於是乎書送貴州左參政劉君序聖天子臨御以來德化大洽海内晏然而尚念貴州之地介乎湖湘巴蜀之間谿峒蠻夷或違於所司而慢於政令即欲加之以法則無知而可矜欲置之不理則恃頑而廢法遂設三司以臨之尤必簡夫才能練習之士以任其職非負聲譽歴内外有政績治效者盖不得與焉吾建寧郡守劉公敬以九載秩滿上吏部考最䝉恩拜貴州布政使司左叅政將行建之士友相率來請予文贈之盖公嘗由太學生擢授兵部主事後陞守建寧其在職公而能勤敏而善斷而又達夫為政之體凡政令之所施設而民無不樂于趨事未嘗有咨怨之聲此非撫之盡其道而治之有其術者能若是耶此其所以欽承恩命以當夫方靣之寄亦宜然也雖然其位髙則其任重藩維之職比于一郡其地大以遐其民衆以蕃矧貴州素為僻逺之區民夷雜處一旦臨之以官府繩之以法度制之以禮文使之早暮遵依乎矩度之間而進退乎衣冠之習若未易然者故必在於上之人撫摩訓誨之得其宜有不自知其鼓舞於聖朝德化之中然後足以盡夫方靣之職而無負乎國家簡賢任官之意矣然則公之于此必慮之熟而行之有效復何俟於予之言哉送錢參政考滿復任序永樂辛丑夏五月福建叅政錢孝循以考滿上其績吏部䝉恩例得還職將行吾鄉宦遊之士相率來請文以贈之盖孝循由太學生擢授兵部主事歴官至郎中甚有能聲未幾朝廷以方靣難于得人遂選拜今官其在任也存心忠厚而尤敏于政事凡一切煩劇之務參賛和恊剖析如流由是案無留牘之稽事無後期之責郡縣吏民罔不倚賴之才能之聲洋溢於道路旬宣之任勤勞於一方可謂無愧于其職而足以當方靣之寄矣予復奚言然予聞方靣之職所以任承流宣化之重將使列郡皆有所視傚斯民皆有所庇依賦役必均獄訟必平學校必修農桑必勸暴者必翦良者必植貪者必黜亷者必旌有利必興有害必去若是則邇之於境内逺之於海隅莫不歡欣鼓舞于聖明德化之中而自有不能已焉者今孝循以三載之績書最而還必將益勵其志益謹其事聲譽日益增惠澤日益流然後八郡之民皆有以仰而望之雖島嶼荒遐之地亦莫不顧瞻企慕思欲覩其容儀想其風采農則願耕於其野商則願出於其途工則呈其巧士則樂其化善者則日趨而為善頑者則日革而為良如是則孝循之盛美又當何如哉異時政成入覲其超擢之榮褒嘉之侈將必流芳簡册以垂不朽夫豈特見稱於八閩䝉恩於一時而己哉願以是為贈送知縣黄時懋赴東陽序國朝選賢任官尤慎擇守令之職誠以其為近民之司非得性資敦厚才敏通逹者不足以居是也吾郡黄仲芳時茂始由永樂乙未進士詔入翰林為庶吉士讀書館閣有年旦夕惴惴焉亹亹焉能不以其所巳得者自足亦不以其所未至者自畫駸駸乎古人之學深以逺大為期予每愛而敬之既而扈從南旋與予别者五年餘近銜命抵北京見予官署聆其論議知其問學巳加於昔矣兼及政務施設井然有條予益為之喜特為上聞乃屬吏部得試親民之職而令東陽濱行縉紳大夫咸賦詩以餞之以予同鄉屬予為序予不獲辭乃為之言曰牧民之道貴於愷悌平易優柔不迫使之安於休養樂於生遂而無束縛馳驟之患則民得其所矣設若恣其志意任其性情輕重之不審緩急之不察休戚利病漠然不經於其心若是而欲民受其惠以相安於田里者豈不戛戛乎其難哉昔漆雕開濳心問學可以試於政矣及夫子使之仕尚有吾斯未信之辭况今之學者逺不逮古奚可不以仕為難乎時茂績學有年其求諸已者既能信而無疑其於為政將和平而當於理必不為矯激之行以欺世眩俗信所謂為民之父母者矣異時報政必居諸令之上俾人稱之曰名進士如時茂賢縣令如時茂斯無負於聖天子選士之意亦無負於縉紳君子之所望而是邑之民抑自幸其得賢令也時茂朂之它日造就奚可量哉送禮部侍郎兼華盖殿大學士張公子玉歸省序聖天子嗣位以來登庸賢俊庶政維新而尤夙夜孜孜眷念舊勞於是張公子玉以司經局洗馬䝉恩特陞禮部侍郎未幾復命兼華盖殿大學士寵眷之隆視昔有加焉盖子玉初以教職選除吏科給事中太宗皇帝以其敦厚特命隨侍今上朝夕講論經史期有禆益于聖學而子玉實克勤恪日在左右從容輔導啓沃居多至是遂膺顯擢焉廼宣德元年冬十月請于朝以父老告歸省侍上既許之而恩賚特厚濱行同寅之士相率賦詩以送之且以首簡屬予予惟人子莫不欲其親之顯揚而為父母亦莫不欲其子之顯宦然子既顯矣而親或不逮親既存矣而子或弗顯斯二者兼而有之古今以為難今子玉得以儒學發身列官内庭荐歴榮顯而其親家居康寧耆夀榮享禄養兼被褒封及茲又獲欽承恩命升堂拜舞慶靈椿之獨茂藹仙桂之清芬朱衣象笏輝暎閭里雍容怡愉舉觴介夀其樂為何如哉是則古人以為難致者子玉盖兼之矣烏得不為之欣幸耶雖然子玉受知聖主必將竭忠盡職益思所以顯揚其親尚有以為邦家之光也豈特一時榮耀而巳哉是為序送浦城陳大尹考滿復任序建之浦城為東南山水之奥區民物豐富風俗淳厚比之他邑實為易治然其壤與衢之江山相接凡往來閩浙暨之京師者以其路㨗而近莫不争趨焉由是上官使客告至告去者絡繹不絶而其民亦不免於勞役宰是邑者非得通敏才能之士不足以愜士民之望四明陳景淵才優而志銳始由太學生擢令浦城蒞事之初即有能聲予往歲省墓還京道經于此因得歴觀乎井邑墟里之間桑麻蔚然烟火相望絃歌機杼之聲逺邇相聞而其民咸得相安相樂于無事於此足以識景淵之為政矣今己歴兩考赴天官以其績最䝉恩得復職將行其邑中士大夫之官于朝者咸出餞於都門外以予嘗識景淵來請文以贈之予惟守令之職有父母斯民之道父母之於子其愛養之深撫摩之至惟恐一毫之未盡一息之不安而閔閔焉兢兢焉惟求其得所而後巳守令之於民亦猶是也稽之於古能盡是職卓然見稱於史傳者不過龔黄卓魯數人豈不以其能盡是職者之為難哉雖然士君子有民牧之寄者當不以其施政為難而惟以吾之心恐有所弗盡焉耳盖能立心以愛乎民故凡民政之巨細無所往而不致其意焉是雖供億之廣賦役之繁而民亦樂於趨事不以為勞矣茍無愛恤之心而蒞之以嚴臨之以察則其施設舉措之間不能無所偏倚若是則輕重失宜公私繁擾斯民何以受其惠哉今景淵之歸也尚當益謹其所施益勵其所操益勤其所事則上不負朝廷任官之意下無愧父母斯民之心將見名譽日増功業日著循而至於為州為守為方岳不難矣復何患乎爵禄之不至哉景淵尚勉之是為序屛山先壠圖序屏山先壠圖者予友吳仲原氏之所作以寓其孝思者也山在建城之西磅礴竒秀拱挹而廻抱形勢綿密風氣深厚聳若玉屛而仲原之先人窀穸實在焉仲原以進士為婺源令能以其所學施于政疏通明敏足以剸繁劇慈祥豈弟足以敷教化於是煜然有聲于幾甸之間人皆知其為賢令也然而仲原自宦逰以來去家既逺獨念其先人塋域遥在玉屏之山松楸蓊然霜露繁積思欲一致展掃之誠而縻於官守有弗能得廼託繪事者為屏山先壠之圖政事之暇得以覽觀於此以寄其思親之意焉間來北京出以示予且請為之序夫古之人於墳墓最重故去其國者必祭於墓而後行或既久而弗返則必有子孫以世守之後世有棄墳墓樂處異鄉而終其身不形於念慮者往往見譏於君子此獨何心哉仲原違鄉未久乃能惓惓焉於其先人之宅兆睇山河之邈悠嘅九亰之永隔既弗得躬臨其地以翦其榛翳撫其封域則又託之於圖若是其思之切而孝之至為何如耶想其披閱之際雲山綢繆黯然焄蒿之情觸乎目也烟林莽蒼凄然風木之聲接乎耳也至於𤣥堂深固夜臺㝠漠非吾親之體魄安妥於茲乎霜烏啼殘風猿嘯罷非吾親之精靈往來於茲乎然則仲原誠可謂純孝之士矣仲原自其祖父積善行義至仲原而遂顯今仲原益自修飭其葬親也得山水靈秀之區其居官也有仁愛慈惠之政非惟行將大用足以顯揚光耀於其先抑且庇子䕃孫足以垂裕於其後也予與仲原同遊郡庠有硯席之好切磨講論有相成之益及予官翰林仲原宰百里往還兩京之間時得相見握手道故舊盡平生歡交遊先後盖數十載而暌離之思恒鮮㑹合之樂恒多焉然則世之為朋友若予二人者又何其幸也因并書此以為序送德慶州同知鄒孟輝考滿復任序吾鄉鄒孟輝氏以太學生授廣東德慶州同知既至官詢諸父老凡州之境内利有當興害有當去弊有未革蠧有未除何政所宜先何事所當急其以告我父老具言之於是上白于守下語于判即次第行之不逾歲政平訟理州人咸和盖孟輝為人沉黙寡言惇厚而篤實故其為政不為察察之明不為詡詡之能而寛以綏之莊以蒞之使民皆樂於其教由是能相與以有成也今年夏五月以三載秩滿當考績于天官至是得以課最䝉恩還所治予惟孟輝之復政也必益勵厥志益勤所事益廣其德以惠利于斯民將俾聲名洋溢以底夫逺大之業不啻若斯而已也予以菲才叨禄翰林與孟輝實有姻好且其大父季和先生嘗以經術分教建寧予視之為先輩因得與孟輝自幼交游故相知為最深是行也不能不為之繾綣因托中書舍人陳宗淵作閩粤雲山圖以寓離别之意且為序於其上他日公署展而觀之知予心之所以拳拳於孟輝者如此雖然古人以官怠宦成為戒孟輝今雖克著治效得書上考然不可少有一毫自足之心而遂弛於其政若然則此州之民將無所倚賴以克終其惠矣孟輝尚慎之哉送陶僉憲還福建序聖朝統一天下慎選方靣之職所以為其民者無所不至然既設藩府以總治之復立郡縣以分理之又有兵衞以守禦之俾上下相安小大相承秩然若無所事矣雖然茍非有風憲之司振綱紀肅百官革奸弊以維持之實未易治也故藩府之職為難而風憲之司為尤難閩為東南大藩通道于海夷朝貢之往來舟車之輻輳民物之蕃庶從昔分治于是者率稱繁劇比來多擢文學侍從暨憲臺之臣以居是任未至則聲望已著既至則益能以亷謹自持不驕不矜不事苛刻夙夜惟思所以盡厥職焉若今僉憲陶德温是也德温世家南康初以太學生擢給事中秩滿超遷是職為人端方儀度肅然所謂以亷謹自持者是已嘗按廵郡縣所至去貪暴旌善良興學勸農敦勵風俗海山千里之外軍民咸愛戴之若父母焉予聞之竊自嘆曰閩雖大藩事雖繁劇而德温之為憲官獨能卓卓如是豈不賢於衆人逺哉比年以考績而來既課最留董工于京師今將還閩也縉紳大夫取經行山川為題賦詩以贈之而屬予為序予素知德温者也乃不獲辭既道其所以能而又重有所以告焉昔常衮治閩興文教由是人皆知學多以科第入仕至宋則有龜山豫章延平考亭西山諸先生出而講明道學以嘉惠將來故閩之士益盛而絃歌之聲比屋相聞矣然昔之士習於詩書禮義之教其流風餘韻至于今尚存也藩憲之職雖在於除奸剔蠧然所以振勵作興使文風藹然如昔時者獨非其職乎德温之聲望素著矣是行也其可不加意于此哉予閩人也故敢以是為言矧予忝職文史凡吏治之臧否皆得預聞於德温盖將觀其治績之大著又當頌之且為特書之也姑序此以弁衆作訓子篇序古者男女其未生也則有胎教既生也則有姆師之教其自幼至長也則有詩書禮樂之訓言行動止之則何莫而非教之之地哉惟古有是教也則飲食動息進退語黙之間承訓誨之勤習見聞之熟由是邪僻之念不萌于心非禮之事不干其志盖其德性之美才行之懿皆得于􅇽養薰陶之久以成之也是以其教無不備而其人無不賢者良以是夫迨至後世教法不立有子女而不知所以教有父師而不知所以學由是放肆淫佚㝠行瞽蹈貿貿焉以自恣於禮法之外者衆矣然求其成人者豈不難哉予于公退之暇料檢先聖賢所以垂教者掇其切要類為一帙名之曰訓子篇以藏于家俾為父師者知所以教為子女者知所以學庶幾有以成其德性之善而不至放僻邪侈以為不肖之歸則幸矣至於傳世垂後則非予之所敢僭也是為序志訓堂序志訓堂者今刑部郎中吳興章善之所作也善昔為山東茌平典史其父自明在鄉念之弗克靣訓故遣書誨諭凡千五百餘言辭意諄懇一皆切於時用善由是自典史屢陞至今官慈祥豈弟忠厚敬謹行彌篤而善益臻智彌廣而政益勤豈非有得于斯訓者乎自明殁既有年善每思往昔耳濡目染之時未嘗不欷歔流涕如見父之存焉故構堂於其所居扁曰志訓以示不敢忘也間復録其父之手跡裝潢成巻來徵予言予惟父母之於子莫不知愛自襁褓以至成人一飲一食一裘一帛凡日用所需茍可以與之規畫者無所不用其心然徒愛之而不知教是不能盡其為父之道矣父既教之而子或不肖弗克以承其教是亦不能盡其為子之道矣父子之間若是烏足以論其可否哉今自明之為父既克愛其子又能教之諄諄而深至善之為子既克孝其父又能恪遵其訓而不違實父子兩得其道矣昔鄭𤣥遣書諭其子不過欲其勤儉以承其家房𤣥齡集古今家戒書于屏風令諸子各取一具以為足以保躬至如韓忠憲戒其子以為窮逹禍福固有定分切勿枉道而求以䘮所守史册著之千載之下耿耿不磨况自明戒其子之立身行道居官守職纎悉畢具之若是予又烏得不嘉美之雖然忠孝無二道事親孝則忠可移於君善今位列于朝職專刑名尤當凝心定志進思所以體皇上欽恤之意退思所以守父之訓俾獄無寃而刑不濫將來所至不惟髙明逺大而隂隲之及于子子孫孫以食夫天報者豈有涯哉與人為善君子之道予故不辭而為之序林塘秋意圖序練川張氏為姑蘇之巨族有字仲章者襟懷磊落卓然不混于流俗平生所好尚往往與時輩不同邑里多稱之嘗得宋宗室趙大年所畫山水小景愛其寒汀烟渚之趣與所居之景相似因名之曰林塘秋意而又得袁文清楊鐵崖諸君子為之題詠珠聨璧粲寔可珍也仲章時一展玩而清流峭石汀蒲岸栁鳬鷖鱗介之㣲飛濳出没之態盡在目前盖悠然有適於其中也故竟日不忍去手且訓其子孫曰此吾所愛者也當寳藏之今仲章之殁已久其諸孫孟昇以才俊馳聲䝉恩授職歴政憲臺因公暇持此以求予序余惟祖父之遺物或手澤之所存或心志之所在為子孫者有見於此則必兢兢惕惕慨然以吾祖父平生之所以留意者為念不敢不敬得非孝子之心善思其親者乎故曰思其所樂思其所嗜思其志意者皆所以為孝也今孟昇既能寳其祖父之所愛復能持示賢士大夫而求為題識非惟有以彰其先世之遺德而孟昇之克孝克敬亦於此可見矣視昔人之拳拳然念其青氊以為我家故物者何異哉孟昇之志深可嘉尚也已遂喜而為之序焉薊門别意圖序士君子之生世負卓犖之才懷英偉之氣而又得遭逢聖明以見於設施振聲光而建事業榮當時而慶後裔斯不謂之至幸矣乎然而内則有老親在堂既夀而康外則有平昔交㳺朋友相與同朝以遂朝夕親愛之歡輸寫其終始懇欵之私其情彌篤其樂未涯兹豈不尤為至幸矣乎然而世不可以多得也若予友田伯邑者其殆庶幾乎伯邑世家鳯陽先德相承代有顯宦洪武初其祖秀實來為福建行都司斷事遂家建寜伯邑其諸孫也幼而聰穎長而敦厚嘗以俊秀選為建安邑庠生循循雅飭容止端詳夙夜孜孜克勤所業討論講貫逈出儔輩師友既推許之官長亦莫不為之敬愛焉永樂甲申登進士第選入翰林讀書為庶吉士方是時詔修永樂大典伯邑得與纂修出入内廷小心慎密克專克勤書成特拜繒楮之賜未幾授户部主事涖職以敬律已以亷事上使下表裏一致弗為矯飾嘗承委於淮甸間專督餽運出納惟允布置有方深得士民心于是九載之間能聲大著今年夏以秩滿超拜南京兵部武庫郎中濱行予無以為贈遂託中書舍人陳宗淵寫薊門别意圖且求文士賦詩於上以寓予惓惓之意焉嗟夫朋友以義合者也古之君子深所重焉竊自念予與伯邑居同鄉其游庠序雖有郡邑之殊而志意相孚契誼相合未始有間及登宦途雖有先後之異而心跡相親出於相近以至往來兩京迨今三十餘年藹然如一日然則予二人者其遭逢之盛交㳺之篤亦豈不為至幸也耶若是則今之别抑安得不為之憮然於臨岐之頃乎斯圖之作盖不能無情矣雖然離别之際所以悵焉而弗忍者人之常情也丈夫之志氣有不在此伯邑列官郎署秩為大夫方當激昂奮發以攄其抱負益有以見於功業他日或居廊廟之任或受方靣之寄必能振耀於其先垂裕於其後其顯榮光大誠有未易量也然則區區離别之意又何足深惜遂命觴載酌豁然而别贈尚書陳公致政歸延平序宣德甲寅秋八月初吉户部尚書兼謹身殿大學士鐔津陳公伯髙引年乞致政既得請行且有日其鄉友户部郎中江惠葉宜等偕來謁予文為贈予亦公鄉人也且官相聨道相孚相好餘二十載及茲有行雖不求予言尚將有以贈之况其請之勤哉古者大夫七十而致事禮也功成名遂身退天之道也君子之進退惟求合乎禮順乎天之道故仕至七十必致其事而朝廷亦以七十致事著為令者遂君子亷退之心然有年及而不敢以請者又有請而不得謝者盖各有攸當也不敢以請者臣子感恩遇之厚顧筋力之未憊必欲罄其餘長以圖報是所謂委致其身者也請而不得謝者君上念相與之久不欲違去左右故優其禄秩逭其責任所以禮待老臣也公以雅量博學自教官超擢給事中獲事皇上於居濳忠嘉行誼深為上所知逮上正位九五即以宫僚進貳六卿未幾復徙司徒之命仍加兼秩之隆公之所遇可謂厚矣皇上復念舊日輔導之勤不欲重煩以政思有優禮而奬重之遂解政務置諸宥密從容論思上之處公可謂極其恩禮矣是宜未可以老請也今而以請請且得命者誠以公為疾所困欲强其不能而為之則有貪位慕䘵之誚上之所以特與其歸亦憫公之疾而重違其志且以成公亷退之美則公茲歸合於禮而順乎天之道雖曰自遂實皆皇上之所賜也今而扁舟南旋優游歸第杖屨丘園詩酒自適况鐔津溪山之勝不减鑑湖而公之所得世盖未有養攝之久則精神日完聰明日復履耆頤而享夀康也必矣然古者大臣之去身雖田里而心則闕廷盖無一飯而忘乎君故趙公槩致仕歸睢陽既久而猶以讀書著文為事集古今忠讜之論為諫林以進時論韙之况公忠誠之素益以恩遇之隆其必以趙公之心為心矣此公之所知而予猶為公言者盖友義之篤而重以鄉人之請庸敢致瀆告焉文敏集巻十二
