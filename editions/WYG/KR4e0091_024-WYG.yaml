body:
  text: 文敏集巻二十四明楊榮撰墓誌銘定西伯夫人李氏墓誌銘夫人姓李氏考諱駟母某氏世居金臺彰義門家世長厚以積善稱夫人生洪武壬戌十一月二十七日自幼聰敏端淑克勤女事父母鍾愛之年十八為之擇婿得同里大姓今奉天翊運宣力武臣特進榮禄大夫柱國定西伯蔣貴遂歸之夫人既入門家室攸宜克盡婦道事舅姑以孝相其夫以禮閨門整肅内外雍睦宗黨稱之宣徳間以夫貴受誥封夫人今復封伯夫人子男二長曰義次曰雄今以邊功擢千戸女二長適杭州前衛指揮使李剛次適密雲衛指揮使劉容孫男二曰璟曰琬女一尚幼正統四年六月十九日夫人以疾卒於家享年五十有八時貴以平西冦功佩平羌將軍印充總兵官鎮守甘肅訃聞皇上特加垂念遣官賜祭命有司造墳恩徳之厚無以加矣卜以是年十月初十日奉柩葬於彰義門泥井里之原嗚呼夫人徳儀兼美膺受褒封顯榮始終世不多見銘以昭徳不可無也乃為之銘曰懿哉夫人有美厥先善積既厚慶澤斯延是生夫人柔嘉静莊為女之淑為婦之良克相夫君茂隆厥功乃殄羌孽乃進伯封子長千夫克奮忠義女獲所歸動必循禮婦徳母儀夫人兼全存殁光榮復何憾焉峩峩新阡密邇都門藏銘幽宫百世永存明封徴仕郎中書舍人宋原亮墓誌銘宣徳乙夘六月辛丑封徴仕郎中書舍人宋原亮卒於家其子禮部主事琰奔訃將歸卜是年某月某日奉葬於鄉之日嶺山先塋之側乃述原亮行義詣予泣拜請銘予雖未識原亮觀琰之為人足以知其父之善奚可辭原亮諱亮號竹軒其先有諱嗣宗者邢之南和人仕唐為奉化令因家焉舊傳廣平文正公之後因名所居之地曰廣平鄉曽祖其五積徳行善隠居弗仕大父鄮山書院山長起潛父雙峯居士信義世以文行為鄉閭所重母蔣氏原亮生元至正庚子十月乙未自幼穎敏務學及長經史醫卜星命之書無不覽究居家以孝弟聞父患痢嘗糞而憂既卒哀毁㡬殞兄原剛坐誣逺謫請隨行兄以其幼弱止之輒泣曰豈忍遽離吾兄耶遂同至役所代兄力作勞苦備至未嘗見於辭色兄歿棺歛歸葬如儀尤謹於祀先遇祖考妣忌辰祭必盡哀喪其配朱氏持服如禮或勸其再室原亮曰昔吾生再周失恃吾父終再不娶我奚敢違女弟家疫作俗忌相染無敢過門者原亮獨宿其家生者為治醫藥死者為之殯葬始終弗懈而竟以無事其待族黨幼長賓朋戚疏恩禮兼至捐財以助婚喪積粟以濟貧匱凡於義所當為者罔不盡心族里有乖争欲搆訟者必委曲開喻使之改悔由是人感其徳而敬畏之有司春秋釋奠學宫每令攝分獻臨祭敬愼容止端肅諸生莫不取法焉性雅尚正嘗感風疾人言禱祈可愈原亮曰吾素不為惡奚禱祈之有已而病亦愈琰始為邑庠生夙夜督勵以成其業及登永樂乙未進士第入翰林為庶吉士擢中書舍人遷今官屢以書誡勉之令盡厥職不語家事洪熈紀元得推恩褒封原亮如琰職琰得歸省升堂拜慶鄉人以為榮而原亮獨懐兢惕未㡬琰被召命行戒之曰汝但盡心國事愼勿以吾老為念享年七十有六卒之日人無貴賤賢愚咸悼惜之配即朱氏贈孺人恭儉慈仁先二十七年卒權厝於西布山今合窆焉子男三長即琰次璘次琬女淑瑛適同里陳文昕孫男五觀亨福亨禄亨祚亨夀亨女二嗚呼原亮孝弟行於家行誼著於鄉而又克成其子顯宦於朝榮被恩命夀考令終蓋亦世之鮮者是宜有銘以昭來世銘曰吁嗟原亮孰與儔孝友行誼追前修履道坦坦心休休有子擢科侍宸旒恩光寵命賁林丘身全五福日優㳺俯仰無愧奚所求嗚呼我銘表厥幽鄞江流水同悠悠封大理寺副劉仲綸墓誌銘士之佚老於鄉享有榮名盛福於治世非慶積其家而善修其躬者不足以致此觀諸大理寺右寺副劉仲綸蓋可驗已仲綸諱璋别號杏林西隠先世居長沙為士族宋季有諱勵叔者避兵於吉因家廬陵之髙沙精岐扁之術子惠可世其業仕元為龍泉醫學官孫思敏曽孫鼎成仍邃於醫俱隠居終身而濟利之澤益厚矣仲綸鼎成中子也少穎敏務學祖母康病劇刲股和藥愈之事父兄克供子弟之職國朝洪武中郡縣薦其孝友擢知一縣尋坐累罷歸事二親益孝起居飲食務得其懽心二親相繼没葬祭以禮不用浮屠而弟季紳亦蚤沒兄伯經有疾仲綸篤同氣之誼不異爨撫視猶子逾於已出姑老無子且貧迎歸終養之久而彌謹嘗慕先世以醫藥濟人有疾者輒能赴之間出㳺淮浙荆陕之間比還而濟人之心益勤不懈然未嘗責報有貧不能自存者則兼濟以財用是人多徳之暇日輒延賓友極觴詠之娛而尤篤家訓遣長子英㳺郡庠受經英果登進士第官大理寺副讞獄多平反聲譽日著朝廷推恩褒封仲綸如英職暨英拜南京大理寺丞仲綸來視之申以守官盡職之戒諄懇切至聞者以其善訓子也比抵家遂嬰疾不起實正統紀元丙辰正月二十四日也其生以至正辛丑五月朔日享年七十有六母衛氏配王氏並有賢徳而王亦以英貴封安人子男二人長即英次俊女三人適王志端蕭禮獨景皆望族孫男六元亨利貞仁義亨蚤殤女五曽孫男吉祥英既聞訃哀慟匍匐而歸將以某年某月某日葬於某山之原奉事狀泣請銘嗚呼仲綸之善皆可稱於世垂於後矧以英惓惓之請烏得已於辭耶銘曰維劉之裔初處星沙顯顯家聲簪紱之華爰及其後來徙于吉廬陵髙沙從而卜室所積者善所業者醫以藥利人克普厥施傳及五葉曰仲綸甫匪直醫道篤率乃祖孝於二親友於伯兄老姑弱姪是愛是矜才足治劇牛刀小試尋云退休優㳺終嵗人有疾疢我從瘳之人有匱乏我從周之善之所為垂老益至有子在朝恩寵斯賁命服煌煌煜乎耿光曷以致斯積善之償我作銘詩勒於貞石用俾後人於此考徳兵部主事陸友仁墓誌銘國朝置内閣切居禁近乃制誥所出而機務之繫莫重焉故從事於斯者非端重愼密之士弗克與矣宣徳乙夘春兵部車駕主事陸友仁以薦得從事於其間友仁今春坊庶子沈民望弟子也始由民望以楷書薦擢中書舍人九載考稱陞今官嘗與修兩朝實録成荷文綺襲衣金幣之賜嗚呼友仁所歴踐誠榮矣其筮仕以及陞遷俱從事於翰林日邇清光優㳺嵗月非他職僕僕簿書奔走旦暮者比也及入内閣予將期之逺大遽抱疾不起以是嵗十月四日即世斯亦命矣夫明年正統紀元其弟宗義自其鄉北上將舁柩還葬遂以其僚友吏部考功郎中夏衡所狀行實拜予請銘友仁諱輔自少穎敏讀書過目成誦喜吟咏字學尤所肆力者也為人寛和崇孝友在京師恒念親老不敢迎養請分常俸於家充具兄弟四人夙篤友愛友仁居官儉約衣止布褐而出徒步居雖樸陋處之裕如人因號之曰裕齋人或干以外務輒辭之不就及沒室如懸罄棺歛之具多出於故舊其生以洪武癸酉十一月十日享年四十有三世家華亭相傳為華亭侯遜所出稱簪纓家曽祖某祖某父文昌嘗仕宛平縣主簿有治績休官家居洪熈時以友仁貴賜勅封中書舍人母計氏封孺人配陳氏封如其母子男四曰經曰纊陳氏出曰縉曰紳側室周氏出女一適里人胡綱亦陳氏出將以某年某月某日葬縣之白砂鄉故村之原嗚呼友仁蓋不可起矣予既素知其為人之善而以之在薦又烏得靳一言以銘其墓石也哉銘曰陸氏之先侯封華亭以官為家子孫繩繩機雲以還世有聲譽詩書簪纓以永厥緒嗚呼友仁克光於前薇垣粉署官以叙遷凡厥服勤克遵矩度縉紳之間令聞日著内閣優㳺榮幸駸深煜煜文翰用昭綸音式期永年一疾不起天耶命耶如斯而已胡村之原偉哉新墳銘以藏之爰示後人都察院右僉都御史魯君墓誌銘正統二年六月十日都察院右僉都御史魯穆希文以疾卒於官上聞遣禮部右侍郎章敞諭祭仍給舟歸其喪卜以某年某月某日葬於某山之原其邑人翰林修撰杜寧為述其歴官行已之實來請銘希文嘗僉福建按察司事操行履歴予知之悉故不辭為叙而銘之希文宋散騎常侍澤之裔建炎初澤自汴徙居於嚴七世祖祁温州平陽令始自嚴徙天台遂為天台人曽祖古訓祖谷珤皆隠徳弗仕考友敬以希文貴贈文林郎監察御史妣奚氏贈孺人希文自幼舉動異常兒里有識者語其祖父曰是兒他日當為偉器宜善教之稍長肄學邑庠攻苦食澹篤志經史雖祁寒盛暑不少休息嘗自書人嘗咬得菜根則百事可做之語於座右蓋已毅然以清操自勵永樂丙戌登進士第勑賜歸榮於鄉因是益肆力問學鄉生執經受業者亦多造就及赴召有司贐鈔萬緡謝而卻之或曰行者以贐何用固卻希文曰筮仕之始未有益於鄉里而先厲之可乎言者愧服嘗覈江北諸衛儲糧巡兩淮鹽法及監龍江抽分竹木局綜理周密吏莫肆其奸既而以外艱去家居杜門哀毁逾禮服除拜福建道監察御史介然自持人莫敢干以私時太宗皇帝巡幸北京仁宗皇帝監國希文屢上封事知者皆稱其為敢言又嘗鞫常州巨商法當死商家托其姻舊厚餽白金覬免死希文斥而拒之竟寘之法秩滿擢福建按察僉事理寃滯繩貪墨摧豪右無所顧避泉州進士李某調官廣西妻吳少而美故富民林肄欲圖之陽與某善遣二黠僕偕行至中道毒死某并其姪吳還肄納之某之族人訴於郡及臬司官受肄賂反罪訴者希文至㢘得其情執而訊之果服罪漳州民許某富而無子初以姪為後晚而妾生子因析貲産與姪而以子托之許死姪謬言子非叔出逐之奄有其貲希文按行至郡妾携孤訴其狀希文乃於市集諸小兒密以許之孤雜其中令父老别之父老獨指是兒狀類許某必其子也於是悉歸其貲晉江縣境有四閘水以蓄洩溉田數百頃為豪右專以自利嵗旱細民羣訴希文罪其專利者民皆驩呼皷舞今上皇帝嗣位大臣薦希文治行驛召至陞今職尋命捕蝗大名廣平循行阡陌勞來不倦民不知擾而害隨息暨還賛肅憲紀駸駸有聲朝退方治事疾遽作而卒家無以為歛公卿賻治其喪始克襄事希文生洪武辛酉某月某日享年五十有七配張氏温柔淑慧先希文三月卒於家子男二人長曰昇次曰昻孫男三人曰誠曰誼曰譓希文為人剛正清愼内恕外嚴寡嗜慾薄滋味歴仕中外二十餘年家無饒貲被服如寒士卒之日聞者莫不咨嗟歎悼嗚呼士之為世用才足以應變智足以决疑者非不有也而求其清介有守執法不回似希文者殆亦不多見焉是故不可以無銘也銘曰介如石兮維守之貞直如矢兮維心之平維介維直士徳之偉人一鮮稱君乃兼美方其蜚聲震耀當時今焉云亡孰不悼思遥遥閩藩政傳永久奕奕憲臺名著不朽天台之原考卜維新安此宅兆永裕後人故節婦髙孺人墓誌銘婦徳莫重於貞良莫先於孝慈故為婦當盛年而喪所天能秉志不貳奉姑以終養教子以成名足以表則於閨門其有益於俗化也大矣於其歿也銘之以為後世勸豈不宜哉若今吏科給事中髙旭母孺人蓋其人也孺人諱妙善姓李氏福之望族女父宗善母林氏業儒而有淑徳父亡時尚幼旦夕哀號聞者歎異侍母執麻枲治絲蠒無異成人姆教以孝經列女傳輒能記誦性行勤儉篤於孝敬家居不事華靡雖善女工而織紝組紃之外無他好伯父亡哭之如父兄有瘖疾彷象以通其意及笄母擇所宜配得同邑髙景陽氏以歸焉既歸孝於姑順於夫欵遇賓親豐儉適宜景陽嘗痛父墓地圯於水欲更葬之貧不能具孺人輒傾粧資為助春秋祭祀必先期齋沐治具務致誠潔既而景陽領鄉薦入太學以疾卒於京訃聞慟絶時姑年七十有四男女俱幼守節自誓早蠶而繰暮燈而織以為衣食資故姑有所托若子之存子有所頼若父之在及姑以天年終備棺槨衣衾營葬如禮遇有困乏者輒周之夫妹適陳而家窶官有逋租弗克營辦孺人曰凡人急難尚相扶持况夫之同氣乎即出金帛予之邑里敬服嘗呼諸子語曰汝父亡時吾以姑老汝幼弗忍相從地下汝能力問學以繼先業吾後死無憾况汝父存日以過時失學為悔汝豈可自怠而貽他日悔乎於是每旦促旭兄弟就學旭弱冠以禮經魁於鄉念孺人老而弟幼浮沉於鄉十餘年宣徳癸丑始以進士第五人試政天官正統丙辰擢給事黄門恩封未下而孺人以疾卒於家孺人生洪武乙酉七月二十八日殁正統丁巳四月三十日享年六十有九子男二人長即旭次曰明先儒人卒女三人長適許清次適林順次適戸部主事鄭亮孫男四人曰㙨曰均曰墇曰至孫女三人旭歸卜以某年某月某日合景陽之葬於懐安之興盛坑旭乃以亮所述行謁予泣請銘嗚呼先王之教始於閨門女子言動有史以昭勸戒故其化行而俗美後世治不古若女婦之善罕所表見故人心無勸而俗去古益逺矣若孺人之孝慈貞淑婦道母道皆足為世式夫豈可使之無傳也哉銘曰莫白匪玉莫堅匪石不二所天乃婦之徳猗歟孺人閨閫稱賢如玉之白如石之堅夫歿養姑一其終始以育以教克成厥子為婦盡道為母有儀俗化之勸慶澤之垂俗勸慶垂彌逺彌耀勒此銘辭以告厥後故盤洲李處士墓誌銘正統元年秋河南布政使李禎昌祺述職來京師造予以其先考盤洲處士墓誌銘為屬曰惟禎之先人生有懿徳善行足以表著於世卒葬以來且踰一紀而幽堂之銘迨今未刻用是夙夜痛心愳無以逭不孝之罪謹撰次事實以請余與昌祺相知非一日且稔聞處士之賢不可以不銘乃序而銘之處士諱揆字伯葵其先金陵人宋南渡時有尚書郎諱義者徙家江西之吉水又數遷至今廬陵之螺岡曾祖諱良叔祖諱華道皆賢而隠於醫考諱廷賓仕元為天臨路醫學教授妣林氏處士自少穎敏有竒志書過目輒不忘受毛氏詩於進士王紹值元季兵興從醫學公避亂徃來弗及卒業逮國朝平定天下處士始復緝業將筮仕以為親榮而醫學公年老不欲其離膝下處士遂業醫以為養不復有仕進意而學行益修時吉之遺老宿儒若翰林修撰張𢎞毅兵部郎官伯顔子中刑部尚書吳山立皆折輩行與之逰山立以詩名家處士相與講論詩益工尤長於五言髙古雅健有漢魏之風人因稱為李五言云處士事親婉愉備至甘腝滫瀡之奉極力營致雖艱窘之際親以忘憂處弟妹恩誼尤篤家無間言其為醫務以利濟為心不求肥家凡疾者扣其治必徃不擇貧富為趨舍尤善治竒疾衆之所不療者處士輒能療之前東宫説書周仁逺與處士家故連姻其子遘疾危甚延處士視之比至羣醫方集議不决處士診之曰脉洪數而心懣此内熱也當以涼劑解之即愈周氏館賓黄玉潤愽洽知醫與處士談間因舉宋中興十將傳中語以諭用藥之方處士為誦全傳不遺一言又問數事無不知者玉潤大駭遂賛於仁逺曰李君非止善醫其學問亦不易及也既而疾者愈玉潤為詞贈之還由是處士名益振值嵗疫邑大姓劉氏闔門皆病親隣愳為所染無敢視者醫亦不赴處士聞之惻然曰為鄉人者患難相恤固其義也安可坐視其斃乎遂具藥餌携一老僕往宿其家蚤夜躬調治之越數日先愈其病甚者復勸諭其親隣使相與扶持月餘而疾者盡起處士乃歸鄉䣊之人莫不義之處士為人寛厚簡澹喜愠不形介不立異和不詭隨故其所至人咸敬慕前後守令及當道者多欲薦之輒懇辭以止其學於諸子百家之言靡不該覽書札得晉唐人風致至於隂陽方技皆精其能晚年益致力於性理之學雖不授徒而樂為人講説郡邑後進之士皆尊事之每鄉飲必以首賓席名卿大夫之㳺宦徃來經其郡者必造門訪問焉郡城之隂有洲臨水清曠可釣㳺去處士之居不半里處士日夕杖䇿往㳺其間吟弄風月逍遥容與意甚適也因自號盤洲釣者故翰林學士解公縉紳為文美之初昌祺為禮部郎中處士嘗一至京視之其還也翰林諸公咸以詩贈行及昌祺布政廣西往返皆便道過家為處士上夀鄉人榮之處士嘗戒之曰孔子居鄉黨恂恂如也張湛下里門聖賢皆然汝可法之毋驕慢為吾之恥又曰當官操守必務終始汝其愼之茍違吾言非吾子也昌祺佩服惟謹遂以清白顯名而人稱處士善教其子焉處士生元丁亥四月十五日卒永樂辛丑十一月二十九日夀七十有五比得疾猶日起正衣冠坐閲書親賓問疾從容談笑如常迨屬纊無一言之亂諸子請遺言曰吾願汝等勉為善而已且屬歛以深衣幅巾嗚呼處士可謂安於死生之際者矣處士初娶彭氏繼劉氏生子男四人長即昌祺次旭次循次芳女四皆適士族孫男十孫女七曽孫男二處士所著有盤洲漁唱藁若干巻永言集若干巻皆藏於家其葬在廬陵何山之原惟聖朝褒嘉臣下恒推恩榮及其親以昌祺之賢久居方岳處士積善之報將膺寵贈有日矣掲徳麗牲之石得不尚有待乎銘曰韡矣盤洲士流之竒有徳有言學充譽馳曷不仕進而隠於醫為子翼翼為兄怡怡家政允修鄉閭所儀恤難拯疾聿推厥施全活孔多獲報攸宜篤生賢嗣克顯明時方伯之貴名宗有輝紫誥頒恩褒寵有期嗚乎處士其存逺而㢘貪敦薄髙風可師何山之原有塚巍巍爰詔來裔刻此銘詩徐處士墓誌銘翰林編修徐珵之父處士孟聲以正統元年十一月廿八日卒於京師珵兄弟遵治命將奉柩還葬于姑蘇某鄉之原乃踵門再拜泣請銘予與珵同事史館不獲有辭遂摭大理評事張士謙所狀事行為叙次而銘之處士諱震孟聲其字也别號善菴世為蘇之長洲人曽祖孝基祖文禎父子復子復之弟子明乏嗣以處士後之處士自幼至長篤厚謙愼行義樂善汲汲若不及其事親奉先以孝以誠洪武中子明以閭右徙實京師嘗坐累當被逮處士欲代往子明切止之處士徑先赴獄久之㑹赦得釋人稱子明為有後四時奉祀必齋戒豐潔器物不親視不以祭其用財䘏匱義以周鄉人尹某貸貲數萬為貿易已而盡費於家之婚喪納券請緩償期處士笑謂之曰子吾友也義有通財况以襄家之大事乎取其券焚之鄰有徐某謝某俱母老貧不能備養處士厚給之俾生息以自資其教子治家嚴正而有法每念其先連世不仕而徳善之積不凉後必有興者於是遣珵從師受經不以祁寒盛暑廢其業家庭内外尊卑長幼秩如也其他處宗族朋友以及鄉黨悉井井可觀殆古所謂善士者歟其生以某年某月某日享年六十有六娶丁氏邑右族内助克賢先處士八年卒子男四長琪早世次璘次即珵次瑛女一人許琳其婿也方今聖朝重褒嘉之典士之有官於朝者皆得榮及其親若處士之善教子而珵之克自樹立其寵命可指日待矣而躬弗逮其榮其亦可悲也夫銘曰古稱善士一行已名猗歟處士匪一足徴其身雖嗇其嗣克承褒封將至躬弗逮榮没云何悲譽也則馨我作銘詞永閟泉扃故處士薩君墓誌銘閩有純孝篤行之士薩君享年六十有六卒於家其子翰林編修琦將奔訃南歸迺持翰林修撰陳叔剛所狀事行謁予泣拜求葬銘予與君同為閩人琦復同在館閣不可有辭遂按狀叙次而銘之君之先世居今北京宛平縣祖諱野芝父諱仲禮仕元為福建行省檢校始家閩縣之通賢坊君諱琅字用謙七歲而孤母沙氏守節不貳篤意訓育之其舅孟相學行重鄉里君從之學事若嚴父暨長徳器成就得舅氏之教為多焉君孝於事母家素貧至躬採薪拾穗以資養㫖甘温煗之奉恒竭力營辦而母不知其勞鄉人以孝子稱之有不善事親者聞其風多感激改行里中旱父老禱於神久弗應或曰薩孝子有至行必能致感求之偕禱果雨繼有火災又求君禳之火隨息母嘗遘疾更數醫弗效君憂惶無措每夜露禱北辰祈以身代時母不粒食七日矣忽甦曰適神人語我曰而子孝加爾夀三十四自是疾成風痺卧起須人扶掖君夫婦日夜不離側比母沒時乃三十四月云君哀毁骨立杖而後起服除與人言輒嗚咽流涕遇忌辰節序哀慟如初喪平生尚義於財不茍取里中唐氏女往所親家適其家當籍沒女倉猝以布囊貯金珠首飾擲寄隣寓誤落君廢圃中君逰圃得焉訪知其為唐物也悉歸之鄉人馬某家被火以地售君君除之得白金一罌召還之馬分其半謝君君曰汝方值災吾忍受此耶堅却之女弟適福建都司斷事周某周來謁惟語以居官守法未甞涉私非嵗朔不造其廬藩臬諸公聞君名或欲致之一見即深避匿有白君行義擬薦之者輒固辭曰斯人道當然也若爾是眩名求售矣其他教子處鄉黨䘏窮匱事尤累累不可殫紀君生以洪武辛亥十一月九日沒正統丙辰十一月某日配林氏子二長即琦舉宣徳庚戌進士選入翰林為庶吉士擢編修次璘早世女三俱適士族孫男一文昌嗚呼孝百行之本也君善事於所生又敦守節義卓卓可稱若此詎非所謂純孝篤行之士歟是宜有銘銘曰人有至行貴孝其親天有顯徴匪私其身其身不有慶鍾厥後爰及子孫奕世悠久故河南府知府李尚徳墓銘士之為世用徳足以有守才足以有用平易之政足以得民此其不愧平生永終譽也宜矣若故知河南府事李君尚徳其殆庶幾矣乎君諱驥尚徳其字也先世居清州曽大父紹宗大父輝祖始徙沂之剡城世業儒考諱夀康好善而樂施母某氏有懿行尚徳甫六嵗而失怙自幼穎敏嗜學從鄉先生遊以超出倫輩稍長為邑庠生謹言行勤問學師友敬愛之洪武癸酉以詩經領鄉薦入太學嵗丙子朝命拔太學生才貌魁傑者十有八人俱授給事中尚徳預焉任戸科時關市譏商旅者徃徃發其囊笥窺覦為奸尚徳奏罷之尋坐事免官已而被薦起知新鄉縣縣當四達之衝往來屬道尚徳處之事不廢而下無苦間命葺苃舍置農具以撫輯逋逃來歸者至數千人庚辰以内艱去民相率乞留之者至於數四永樂初服除改知東安勸課農桑綏輯流亡事有病於民者輒請於朝罷免之邑故荒墟多狼嘗有􅄔婦訴其子為狼噬者尚徳禱於城隍深自咎責明旦狼死於其所今刑部尚書施公寔東安人聞而異之為紀其事而揚於縉紳間既而刑部侍郎李公昶暨素所知者交章薦之遂擢刑部郎中鞫獄詳愼人無寃抑嘗以崇教化重農桑䘏民省徭重版籍育賢才優養軍士寛䘏馬政擇守令汰冗員禮㢘能抑倖進通鈔法十餘事陳於朝多見采納未幾坐事謫保安仁廟嗣位詔求賢工科都給事中吳彛首以尚徳薦召還擢監察御史操履益堅未嘗以經患難而渝其志循行郡邑以簡賢革貪為務又陳經國利民督農事察民情備邊儲省營造及海運邊防驛傳芻牧凡十事仁廟嘉納之嘗自語人曰予今叨職耳目當知無不言以盡分内事若掇拾人之短長以沽名則不為也暨考最蒙恩褒贈父母如制仍賜歸焚黄及還朝適命下簡廷臣為郡守遂受璽書出知河南府既下車求古循良所以用心者而推行之如興學校時地利均賦役弭盜賊審度量之類皆罄心力暇輒閱書作為箴銘以自勵家居雖几席必端嘗曰細事既正則達之他務無往不正矣公署後植松竹梅每退食盤桓其中因曰彼三友而益我一夫得非四友乎遂號堂為四友郡嘗大疫捐俸市藥貯之㕔事遇民有疾即與之賴全活者衆嵗旱躬率父老禱於嵩嶽雨應期而至傍郡民訟不平者咸求決焉莫不心服而去守河南逾六年一日與賓客飲於四友堂談笑中瞑目而逝正統元年夏六月二十有七日也僚友耆民相弔哭者皆失聲享年七十娶劉氏封孺人克勤内助子男五人長隣以通經舉授長垣縣教諭次傑英輔恭輔早世孫男二興道興邦孫女五以某年某月某日葬於某山之原隣以所次行實謁予泣拜請銘夫以尚徳之才徳兼茂幾於古之循良者如此是不可無言以永其名於無窮也銘曰學優氣充徳茂才豐敭歴仕途曰㢘與公惟公不私惟㢘有守人所罕能君則兼有民心其懐後𦙍其昌嗚呼尚徳可謂不亡故嘉議大夫禮部左侍郎章君墓銘國家教養士類于兹有年故四方譽髦之士彚進輩出效用於時而其竭心盡誠不負所任者若故嘉議大夫禮部左侍郎章君其一也君諱敞字尚文别號質菴世居越之㑹稽髙祖斌宋景定中鄉舉第一人曾祖諱某不仕祖黼父昇俱以君貴贈嘉議大夫禮部左侍郎母某氏累贈淑人君自幼穎敏嗜學為父母鍾愛暨長為郡庠生師友咸器重之永樂癸未領鄉書首薦明年登進士第選入翰林為庶吉士偕狀元曽棨等二十八人績學中祕與脩永樂大典壬辰冬授刑部主事癸巳命同諸儒纂輯五經四書及性理大全書成重膺賜賚時近京西山有盜肆刼掠逮捕數百人鞫之多不服君察其寃惟拘其辭色異者一人餘悉遣出期翌日復至同官爭不可君卒遣之明旦至如約後勘驗其人皆非盜而一人辭色異者即盜也衆始服其明復有商夜宿都城外千戸何氏肆人掠其財商疑何欲訟之何不克自白乃訴於官而自經死太宗皇帝聞其故命司捕者三日不得盜扺死司捕者乃妄縶何鄰近二十餘家别取褚幣如商之數而以盜加之君察其誣辯理之皆得釋丙申轉員外郎階奉議大夫尋遷郎中丁外艱起復改吏部考功洪熈初賜誥命階奉議大夫丁内艱服除調驗封宣徳庚戌擢行在禮部右侍郎進階嘉議大夫奉詔往安南命黎利權署國事暨宣詔利遣人白相見禮君語之曰吾奉詔命至爾蓋小國一酋長能盡禮於使者即所以尊敬朝廷何用白為利聞即趨拜坐于下令所親給侍左右數為巧媚辭欲眩以聲色君正色待之終不為動及還餽贐珍異一無所受利曰假此以將誠爾何拒之甚君曰吾奉命令爾撫輯一隅以廣皇上一視同仁之恩豈為賂至耶利乃以所餽物付貢使致之且戒關吏俟使者出即閉關君忖知之及關親閱所貢方物餘悉封付關吏及利死君復奉命令利子麟權署國事關吏見曰此天使前卻金者比還卻所贐如初麟不敢更進蓋知君不可以利動也聖天子嗣位之初平陽王復封晉王即以故䕶衛官軍田廬為請君受命往理之至則較其軍數量以田廬歸之餘給於民王不恱君啓曰國中先三衛今止一千戸所以三衛田廬而歸一所之人得無過乎且朝廷以藩屏望殿下國内軍民宜均愛之庶副皇上至公之意王悟曰使方面諸官早有此言吾亦豈敢上煩朝廷哉還奏上嘉之未幾遷左侍郎君之莅政思慮精審防範周密以國家統理天下既久典禮品式有因革輕重之殊事或隨時損益有先後矛盾之異而吏胥亦稍縁此為奸於是白尚書胡公取國初至今凡所行條格籍記之付四司使得㕘酌而行以是事獲適宜奸弊頓革嘗有黠吏嗜酒怠事且増損公牘即寘於法羣吏自是悚息不敢為非太醫院每舉醫者人往往假以復怨及徴至多弗諳醫君察知之遂偕尚書奏革其弊比嵗僧道數給度牒輒以千計君與尚書請依洪武例三歲一給凡僧道出家及舉為僧道官者止於所居封内不容越籍冐濫四夷貢使日給廩餼庖人毎侵剋之君聞之曰小人為口腹計而使朝廷薄懐柔逺人之禮可不禁乎即令所司具日給之數付通事者或給不如數乃從而督治之自是逺人以為朝廷待之加厚也君生洪武丙辰十一月十有四日殁正統丁巳十二月四日享年六十有二訃聞遣官諭祭命有司治喪葬君為人性質端厚接人待物意氣豁然賙貧濟難尤克盡心在刑部時有同官尤許二人坐累謫戍邊君資之甚厚後又汲汲欲拔之既而許果膺薦為御史殁又為之經理喪事恤其孤􅄔尤既老遣其子代戍而窘甚乃贈以衣裝金幣且遺書所親在邊者令周之其輕財重義類如此君問學優裕為文簡暢所著有質菴藁藏於家配葉氏先卒累贈至淑人繼趙氏封淑人子男五人長璨次瑾葉出也瑾丙辰進士璠璵瑛趙出也女一人適錢康孫男一曰恩孫女四瑾將奉柩葬其鄉稷山之原乃匍匐泣拜請銘予素知君存心行已居官臨政皆有足稱者故不辭而銘之銘曰於皇太宗乘時之隆登崇俊乂以熈治功嶷嶷章君奮身科第丕承寵光績學中祕爰受恩命勤勵自將偕諸髦士以頡以頏迺職秋官式敬由獄迺登正郎天官之屬祗事列聖垂三十年厥績懋著亞卿式遷奉使南交誕播威徳禠其奸驕安彼反側惟守之確惟績之勞視彼金帛藐若毫毛帝用爾嘉信任一致君亦攄誠終始弗替夫何遘疾奄忽云亡宸章諭祭煜乎恩光煜乎恩光垂之永久誌幽有銘式昭不朽故禮部祠祭主事干汝霖墓銘禮部主事干霈汝霖以疾卒於正統丁巳五月二十有九日次子善偕從姪欽自家奔訃來迎其柩歸臨之新淦將卜葬於某鄉某山之原預以翰林修譔習嘉言所述事行謁予泣拜請銘予素嘉汝霖之為人乃按狀而叙之曰干氏本春秋時宋大夫犨之後在晉有諱寳者仕為始安太守其裔某官新淦子孫因家焉遂為新淦人世居學宫後十一傳至叔沂者為汝霖髙祖家饒於貲而篤忠厚人稱長者曽祖茂翁有隠徳祖利賓始徙居縣之東門以故宅讓諸兄父子楫淳厚有古君子風母龔氏俱夀考在堂汝霖生而穎異嗜學績業邑庠讀詩得温柔敦厚之㫖嘗以所業試藩闈不偶益自克勵稍暇兼工真草書前翰林學士解公見而竒之因語以書法要妙遂大有得永樂乙亥少保金文靖公時為學士以其善書薦入翰林已而擢中書舍人階徴仕郎洪熈初䝉恩封父如其官而母為孺人九載秩滿遷禮部祠祭主事仍從事翰林宣徳庚戌與修兩朝實録書成受白金襲衣文綺之賜未幾歸省二親即召還京益愼厥職復與修宣廟實録垂成而卒聞者莫不嗟惜之汝霖生洪武甲子十二月十有七日得年五十有四娶周氏子二人曰明曰善其三曰冀者則劉氏出也女璟真適同邑饒顯慶瑄真適劉中和寳真幼在室汝霖為人温雅詳實動循禮度性孝友善事二親居官得四方之物有資服食者輒封識以歸丁未秋父以謝封官恩至京畱養官舍順意承志務得其歡遇諸弟必盡恩愛待師友敬久弗衰今國子祭酒貝君昔嘗教其邑而汝霖師之及已貴益謹弟子禮至於見素所交㳺者輒握手歡如平生其有未善則委婉以告之或嬰憂患死喪而不克自給者必推所有以賙之公退則彈琴賦詩各適其趣或肆意草書尤臻其妙得者皆愛重焉汝霖既沒人皆謂其言寡而信行端而謹可謂君子矣而官未至大夫夀不至於週甲是大可哀也故為銘曰善而膺福乃理之常厥福有永其報乃彰嗟嗟昊穹曷為爾嗇位不稱才夀不滿徳維善之報弗爽于天不在其躬維後之賢金川之陽溪山盤遶刻銘於兹以永厥紹贈吏部稽勲主事楊君墓銘世之克成其子以有禄位而膺國家褒贈之典者非偶然也蓋由積善之久餘慶之流而有以致之若故贈吏部稽勲主事楊君彦成有足見矣楊氏為唐祭酒膳之後以宦留蜀之眉州其裔有曰夀者彦成十世祖也徙居廣安之大竹縣元季冦盜擾攘多妄殺人彦成父夀卿時以衆推為萬戸獨能率義兵保陣鄉邦人賴以寧老稚私相祝曰全活我輩者楊公也今無以報願公之子若孫世世盛大彦成生九嵗而失怙母李氏鞠育教誨底於成立既壯遷居長夀之大城河東平居性端重善事母承順之際詞氣雍容母之所欲務適其意凡旦夕供養之具極力營辦而不辭勞春秋祀先俯仰齋慄儼若祖考之臨尤謹於言行嘗語人曰人之速戾於厥躬者由弗慎致爾言行茍慎則何戾之有至於處友朋以誠篤遇鄉里以和易歲或㓙歉往往出餘粟以濟貧窮而人皆稱為長者其生以元至正庚寅九月二十五日殁今永樂壬辰八月十有六日得年六十有三其子若孫以某年某月某日葬於宅右之山從吉卜也殁後至洪熈元年始以長子應春貴荷朝廷推恩贈以官娶方氏贈安人子男五應春由永樂乙酉鄉貢入太學預修中祕書書成授吏部稽勲主事考最陞郎中以知者薦擢雲南右㕘政未幾轉太僕寺卿次子應先應賢應禄應貞俱克自立女三人長適大竹馮昱次適巴縣朱興舉又次適同邑柴魁皆望族子也孫男十有七人某以賢良方正授安慶府經歴某為邑庠生人皆謂楊氏子孫多賢而貴者皆由彦成能積善而致然也比者應春來朝以順徳府通判陳廣所述行實謁予泣拜請銘予嘉應春篤念其親故為叙次其事行而銘之銘曰維善之積報弗於身式衍厥慶垂裕後人嗟嗟彦成曷以致此活人濟貧惠洽閭里善積既厚其發斯光傳之子孫奕世其昌河東之原兆此塋域刻詞藏幽永昭厥徳故欽天監正黄濟民墓銘厯象授時從古帝王所重肆國朝申命厥官尤致謹焉其或學之弗專且精而於推測或昧焉則弗足以盡敬天勤民之道惟得人以任其職則天象明而人時定其有補於政治非小也故奉政大夫欽天監正黄愷濟民可謂專其業而精其術者矣濟民之先為鄴之古蕩人始祖泓仕東晉為太史令後世遂以星厯名家髙祖清曽祖秉彛俱有隠徳祖尹中仕元為彰徳長官父諱榮洪武中任彰徳府隂陽正術積徳行善人以長者稱母雷氏有懿行嵗戊午二月二十有八日生濟民於湯隂之尊貴鄉自少明敏簡重嗜學忘倦凡隂陽厯數諸書悉皆通曉父嘗摘其中之祕奥以難之剖答明快畧無凝滯父喜語所親者曰他日興吾門者必是子也其孝敬出於天性事二親承顔順志務得其歡心出告反面雖祁寒暑雨未嘗暫違父嘗遘疾躬侍湯藥日夕不離左右疾革稽顙北辰願以身代父果愈人以為孝感所致父殁哀毁骨立葬祭以禮歲時伏臘俯仰拜奠無異生時嘗自泣嘆曰吾父弗逮終養幸吾母存猶得以致其孝道事之愈謹其處宗黨待親屬接賓朋篤於信義恩禮不替嵗乙亥被徴入欽天監無何授五官司厯轉保章正遷夏官正又進為監副先後三十餘年敬愼小心夙夜匪懈用是上契聖心寵任益隆及擢為監正祗勤如初尤好善喜施薦拔士類奬勵後進惟恐不及洪熈紀元仁廟上賓宣宗皇帝嗣位召問山陵之事條對稱㫖受白金綵幣之賜宣徳辛亥䝉賜誥命階奉議大夫又推恩贈父如其官母為宜人乙卯冬九載秩滿加授奉政大夫食正四品禄仍掌監事丁巳十二月二十一日卒於官享年六十初娶袁氏贈宜人繼馬氏俱有賢行克勤内助子男一人曰永昌克世其業兼究心地理以與視宣廟陵寢授本監漏刻博士女四人福慶適天文局賈瑜福貞適隂陽典術鄭亮福善適遵化衛指揮吕整福源尚在室皆袁氏出也馬氏女一曰福延孫男一人孫女二人將以戊午二月六日奉柩葬於順天府宛平縣香山鄉麻峪之原永昌先期奉司經局洗馬藺君從善所叙事行拜謁請銘惟厯象之學豈易言哉濟民承世業之懿遭際聖明效用於朝推步測候不爽毫髪使天象不失其正人事不失其時非其術專而精能若是乎先是濟民有疾猶力疾趨朝上疏懇乞骸骨上不從所請遣醫往視數四濟民語子及孫曰吾幸以數術得官生平弗以才識自矜功能自衒兹荷聖眷如此其何以報及訃聞上悼惜之遣官諭祭夫以濟民之端愼重厚歴仕四朝克舉其官而洊膺寵命如此是不可以不銘銘曰繄天道兮杳乎難知維聖人兮欽若不違命官測候兮分方與時術不違天兮政不失宜偉哉濟民兮察星厯於毫釐仕歴四朝兮妙於步推視羲和而無忝兮於祖考而有輝夫何下夀之甫登兮天不憗遺幸子之才兮克紹弓箕身雖遐逝兮名則永垂文敏集巻二十四
