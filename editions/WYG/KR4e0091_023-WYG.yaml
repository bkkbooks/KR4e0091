body:
  text: 文敏集巻二十三明楊榮撰墓誌銘故河間王夫人王氏墓誌銘夫人姓王氏字慧明元樞宻院判執中之女贈奉天靖難推誠宣力武臣特進光禄大夫右柱國追封榮國忠顯公進封河間忠武王張公世美之配今奉天靖難推誠宣力輔運佐理武臣特進光禄大夫左柱國太師英國公之母也生元至正乙未十月八日自幼端淑純誠穎敏慈惠為父母所鍾愛及笄擇配歸于河間王事夫順而義奉舅姑孝而敬理家勤儉教子嚴明待親族和而有禮撫僮婢寛而有恩尤好善樂施内外疏戚罔不稱其賢王初為北平都指揮同知從太宗皇帝靖難累建竒功死義東昌内難既平太宗隆報功之典錫爵上公夫人封榮國夫人仁宗皇帝嗣位軫念舊績再錫王封夫人封河間王夫人時年已七十康寧彊健命服煌煌人莫不以為榮而夫人若固有之未嘗有矜大之色嵗時子孫為夀必從容語之曰髙而不危滿而不溢所以長守貴富也汝軰宜識之子男三長曰輔即太師次輗神策衛指揮使次軏錦衣衛指揮同知女一太宗册為貴妃孫男八長曰忠授勲衛次某某某某某某某孫女八長為仁宗敬妃次適清平伯呉英餘在室曾孫男三人正統己未四月十有八日夫人以疾終於正寢享年八十有五訃聞賻贈優厚屢遣禮官臨祭卜以是年某月某日奉柩與王合葬於順天府宛平縣京西鄉太師豫以銘屬予嗚呼忠武奮勇效勞蹈匪躬之節巋然靖難勲冠人臣而夫人為之配太師繼美策功經邦論道褎然四朝元勲之傑而夫人為之母婦道著於夫母徳顯於子世為國戚夀考令終榮哀偹至推今考古豈有多哉是宜為銘以昭永久銘曰樞宻之先累善儲祥是生夫人柔惠端莊年甫及笄作嬪于張有偉君子維忠武王桓桓忠武蹇蹇匪躬肇膺公爵荐登王封夫人偕兹天寵實隆康寧夀考榮哀始終顯允太師為嗣之賢猗歟皇妃為女之媛惟子惟孫有永其傳藏銘幽宮垂千百年太恭人康氏墓誌銘福降自天惟有徳者始克全之徳偹諸身而兼有諸福者於今右通政李君錫之母康氏太恭人見焉太恭人實有令徳婦道母儀為姻族楷法其年九十有六受封于朝而享其子之禄養康强和裕而以天年終其於五福誠可謂全矣錫將歸葬以其僚友左叅議虞君祥所為狀來請銘予親且舊其可辭乃為叙而銘之叙曰康氏在元為燕京著姓其諱仲名仕為翰林學士者太恭人考也許氏以賢淑稱者其妣也元季兵興學士擕家寓陜右後遂占籍為陜右人太恭人自幼聰慧喜讀書於徃昔賢婦貞女嘉言懿行服履不違尤閑女事紡績織絍務極精緻父母賢之擇所宜歸得故贈中憲大夫右通政李公榮既歸李氏恭順以事夫勤儉以理家撫僮婢以慈仁待夫族姻務中禮節嵗時伏臘相祀事必恪而誠旦暮訓誡諸子必肅而嚴錫逰邑庠出任教職擢為禮科給事中而中憲君卒錫歸終䘮制太恭人必勉以忠謹期以遠大服闋進通政司右叅議正綂初奉命祀西嶽便道歸省時太恭人年雖髙而尚無恙間語錫曰吾齒落更生飲食如舊爾無我憂宜益殫爾職以報國恩錫還朝無何遷右通政於是太恭人夫婦歿者有贈存者加封邑里咸以為榮嵗己未二月廿六日甫昕得㣲恙瞑目而逝訃至有司以聞上特命徃襄事即起復錫歸卜以某年某月某日祔葬于豹坡山中憲君之塋子男五人鏵鐸錫鑑銘鏵鐸早世錫享天禄女三人同邑傅祥董傑袁端其壻也孫男十四人琰琮瑛珍璥瑄琳璟璋琬瑞瑶玉閏孫女五人福英夀英錦蘭綉蘭蕙蘭曽孫男二人曾孫女一人嗚呼自古有徳者必受其福太恭人生為淑女為命婦為賢母宜天錫多福以表襮其徳也銘曰康氏在元職典絲綸伊誰之考維太恭人考賢妣良是生淑女厥淑云何幽閒中處婦功之修婦道之行克相君子家底于成有偉其嗣荐登崇顯綸誥推封國有常典象服是宜煜煜煌煌閨門之表閭里之光夀及百年奄然去世五福具全無憾無愧豹坡祔葬考卜維宜後千百祀視此銘詩户部員外郎張君墓誌銘永樂甲辰户部廣東清吏司員外郎張君賔暘以疾乞謝事賜冠帯還鄉醫治宣徳癸丑十二月乙亥卒于家享春秋六十有七遺命嗣子紹請予銘墓君在朝時與予交厚義不可辭按狀君諱昕賔暘字也官以字行别號林岫宋相商英之後有扈蹕南渡者家於杭髙祖隱庵居士始徙松江曽祖號南山祖號碧雲世韜徳不耀母呉氏君生有竒姿六嵗就外傅語以善惡禍福之説即悟其㫖授之書誦習不少怠侍於長者揖讓進退若成人稍長父或命之家政措置有方鄉儒孫大雅王叔明見之咸以逺大期焉年十四姑之夫遘訟詞連其父君代父繫獄與辨得白未㡬受賕吏誣指贓物寄其家於法既徵贓仍坐輸作君又代父之京訴得免輸作人稱其孝洪武戊辰以才行徵授殿廷儀禮司序班在職恭慎尋以親老歸侍家充萬石區長君遣弟姪督細民輸租必以時務從寛厚不尚苛急租外有費皆出已資不一毫歛於人嵗或旱澇憂税無徵悉發已廪代之輸又築室髙阜地出貲資貧人俾之貨殖以取給人多徳之永樂甲申蘇淞水户部尚書夏公奉命徃治以君輔行時呉淞舊江淤塞滋久疏浚為難君請開范家浦以洩浸滛用工省而除患易夏公從之民頼其利丁亥有薦之于朝遣中官召至入覲于武英殿奏對稱㫖命光禄賜膳授户部福建清吏司主事西域大寳法王來朝選廷臣徃迎以君好善執禮遂命之己丑通政趙君任治農于蘇淞等六郡以澇聞時仁宗皇帝監國以君諳其地宜命徃佐之時立秋已旬日有司尚督民車水君至則曰此過時不能成禾徒勞民也白通政悉散遣之躬行原隰示以水利蓄洩防患之宜民甚便焉召還陞本部廣東清吏司員外郎經畫政務凡可以利民者知無不為卿佐咸加器重君前後在官悉辭俸出使于外未嘗食官廪九載將叙遷而以疾歸家庭之間雍睦整肅處鄉黨無驕矜而樂賑施饑窘者予之粟病者予藥死者予棺宿負不能償者燬其劵開義塾教里中子弟橋道傾圯者捐貲修之遇荒歉輙為之惻然嵗旱嘗禱於神獲雨其志於濟人盖若是君襟懷夷坦接賢士大夫情文兼至自少精於奕晚喜釋老之學閒與名僧羽士相徃還甫六十即治夀藏其逹於死生之故又若是娶盧氏早卒繼王氏俱無子先育表弟之子繼表姊之子嗣今以紹為後君從弟子也葬以某年某月某日墓在集賢鄉鳯山之原銘曰宋相之後再遷于松其積也厚其培也豐世富於貲至君始仕為属司徒荐膺任使官不食禄志在濟人弛害興利惟敬惟勤篤于孝忠樂善好施進退顯榮終始一致身之沒矣徳則孔彰銘詔爾後善嗣勿忘故陳處士墓誌銘永樂戊戌春正月二十三日金華陳處士卒于家其子中書舍人茂時扈從北京聞訃將歸葬持國子司業貝泰所述處士之行泣請予銘按狀處士諱誠字信中其先出漢太尉蕃蕃之後有為汝南都尉諱澄者居蔡之平輿唐昭宗時曰讜議避黄巢之亂徙浙之烏傷清泰中曰曽復遷金華由是為金華人然其族至今稱平輿陳氏處士少孤賴母張氏鞠育之從伯父堯芝學既長克自樹立里有王與權者故魯齋文憲公之裔聞處士孝友以其女妻之處士事伯父盡愛敬及卒為營䘮葬克盡其力性雅淡好問學恂恂謙退與物無忤鄉黨稱為善士所居芙蓉峯下泉石清美滋蘭種菊布衣韋帯日徜徉其間每慨然曰吾得老此足矣乃顔其室曰知止軒初曽葬金華北山子孫昭穆相祔者百餘墳號陳百墓有田以供嵗祀宗人掩為己有處士奮然以大義復其田由是烝嘗不缺尤樂交賢士大夫若汪潤之汪可名諸儒者每欵門必談論移日或至夜分乃罷無厭倦之意子茂初以善書選入翰林每寓書戒其謹飭勿怠肆及為中書舍人嘗至京就養旬朔休暇必誨諭諄切大要欲其盡忠効報其卒也命家人具湯沐梳盥衣冠端坐而逝遺言訓子茂等益切不及他事處士生元至正丙戌四月二十七日享年七十有三子男五人長即茂次安隂陽學正術次可次文次蓂女一人適王淵孫男四孫女二以是年九月二十六日祔葬于赤松鄉七世祖宋大理卿墓右曽祖諱端祖諱英世有隱徳父禹壁仕元開化尉銘曰平輿之宗世赫奕烏傷金華胄愈碩處士承之綿世澤隱居樂善甘遯迹原初要終瞭不惑凝然而歸返𤣥宅迹幽徳昭允是式後有考者視斯刻故大理寺右評事陳以義墓誌銘閩之著姓其先世多光州固始人蓋自五代時從王審知入閩遂家于此今長樂古槐陳氏其一焉陳氏歴宋渉元衣冠相望至國朝有諱銘字以義者實其裔也以義之祖諱汝謙考諱則文皆隱徳弗耀母潘氏邑之名族有賢行以義始生當元季擾攘流離奔竄弗克自保迨至髫齓適四方平定文運誕興將謂身際太平得以遂其有為之志不幸早失所怙家道荒落與兄震奔走經營日弗暇給既得葬其先人而母尋患風疾久卧弗起以義同兄晨夕扶持求醫禱神日奉食飲湯藥弗少替既而母語以義曰吾久病非旦夕可愈爾兄一人侍奉足矣爾年尚少且自幼穎敏宜立志讀書將期顯親揚名以振家聲毋以吾病為念且廢汝之學也遂命入邑庠為弟子辛勤刻苦日有所進隆師親友各得其道同舍生有貧困弗克自給者則相率出財以濟之入則事母與兄孝友兼盡出則與宗族鄉䣊相接謙謹有加家雖儉薄而相其兄奉祭祀待賔客皆極豐潔儕軰悉推重焉學既成乃入貢為太學生志節彌著時同郡友鄔孟為監察御史得罪誅其妻王氏當沒入官乃自經死人皆憚法莫敢視以義獨收瘞之其鄉人或有客死無依者皆為之殯葬兄震為人所誣逮至京師以義力為伸雪後竟得直洪武丁丑擢湖廣衡州府推官聼斷公明遇疑獄即從輕典嘗曰古者罪疑惟輕又曰與其殺不辜寧失不經尤以亷慎自持惟守其月俸之入以自供一毫無苟取繼丁内艱去職民皆挽留弗得則涕泣以隨之永樂癸未服闋沔陽知州王孟薦其才遂擢大理寺右評事授文林郎凡獄囚有寃抑者悉為之詳讞務得其平乃已莅職三年聲譽籍甚嵗丁亥九月二日以疾卒于官僚友咸悼惜之生元至正壬寅五月四日卒之日享年四十有六娶同邑林氏有淑徳以義之卒也二子三女俱幼林氏扶其柩匍匐歸鄉以明年戊子某月某日葬邑之蘿墩下村先塋之側訓育其子女以底于成長子曰璉克持家事次子曰京舉辛丑進士任浙之縉雲知縣有能聲長女適林祐次適潘綱次適程鄉縣學訓導馮實皆同邑士族也孫男四藇艿苪蕚孫女一兹京以考滿來京慮其先人之徳湮沒無聞乃屬監察御史陳叔剛述其父之行來請銘予弗獲辭遂摭拾其大槩而為之銘銘曰有媯之裔實家固始乃從審知長樂是徙偉哉其嗣自幼而孤孝友篤至張仲同符幼學壯行素既有志仕轍方亨青雲騏驥况當明時足展其才中道而踣孰不興哀相成厥家惟有賢配厥嗣克承聲光弗替蘿墩之山其髙嶙峋勒銘貞石用告後人習母孺人呉氏墓誌銘婦處閨閫而賢否未易窺惟夫得内助以培植厥家子承慈訓而有譽於時然後懿徳賢行可得而徵也若故習母孺人呉氏可謂克相夫教子而信為賢者矣孺人諱某臨之新喻望族之裔祖憲章父有諒皆隱居修德鄉稱善人母晏氏柔淑端静為呉諸婦儀範孺人幼而慈良長而禮順祗服母訓斯須不違治女事不以寒暑少怠既笄父母以歸于故封翰林編修文林郎習君懷恭恪持婦道孝養舅姑洪武中文林君用薦分教南雄瀏陽平江諸學家政一以委孺人事舅梅隱翁若事父然時賔友過從無虛日躬治欵具畧不厭怠姑嘗教諸女曰汝軰他日適人能如爾嫂方可為賢婦舅姑既沒相夫葬祭以禮鄉黨稱嘆永樂丁酉文林君擢掌教湘潭始從官居衣服飲食率從儉節日工女事如少壯時洪熙乙巳以子嘉言貴朝廷錫恩封於是文林君去職就封與孺人偕老于家冠服煌煌鄉里瞻望以為榮宣徳丙午文林君捐舘嘉言歸終䘮制嘗語之曰吾聞郡邑仕者徃徃以清慎致逺大貪墨就顛覆爾宜知所勸懲庶上不負國家下不忝爾父嘉言服除仍厥職疏乞分禄為養得請遂月給於縣庾孺人遺書諭曰荷䝉國家恩封又獲禄養此固汝克立所致然汝當勉圖報稱以殫臣子之道嘉言服訓惟謹將乞假歸省奉觴膝下為八袠之慶而孺人以正統戊午十月廿有九日得疾卒于家距生年七十有九子男三長曰經字嘉言登戊戌進士官翰林累陞侍讀次約次緘咸克世其家女一適彭邦憲先孺人卒孫男六人褒表裘衷某某孫女一人適章良劭曽孫男某曽孫女某嘉言聞訃哀毁不勝間謁予泣而告曰先妣仁慈儉勤樂濟貧乏恩䘏幼弱及僮婢俱不失其歡心内而宗姓外而親黨為婦者莫不仰式比以衰暮得疾而經弗獲躬侍湯藥以罄子職罪莫大焉兾先生賜之銘以彰先妣懿行於不泯以慰神靈於地下庶不孝之罪為少逭也惟嘉言予素所知者其母之賢又夙所聞也故不以老倦辭勉次其行實而為之銘銘曰易家人兮利女貞顧所繫兮良匪輕婉婉孺人兮賢足稱慈良静専兮自天成相夫君兮婦道行理内政兮和以平子才而賢兮官于京龍章下錫兮沐恩榮煌煌命服兮珠翟明母徳之著兮斯有徵夀踰古稀兮身康寧宜承禄養兮躋百齡馭靈風兮溘遐征魄下降兮魂則升繚溪山兮卜兹塋垂慶澤兮福雲仍後之人兮思儀刑欲考其詳兮在斯銘故資政大夫工部尚書李君墓誌銘士之生世遭際隆興之運得以宣力效猷致位通顯光及先世而恩榮無間於始終者若故資政大夫行在工部尚書清苑李君是已君諱友直字居正先世家隴西元季弗靖君之曽大父山始自隴西徙保定清苑之柳林莊因家焉祖彥名考仁義俱以君貴贈資善大夫北京行部尚書祖妣臧氏妣杜氏俱贈夫人君生洪武己酉十一月二十有一日自幼謹厚不事嬉戱動止儼若成人甚為父母鍾愛暨長讀書通大義兼習法律遇事勇為不計利害太宗皇帝舉義靖難之初君時從事北平藩司首發宻事用是深契宸衷遂擢藩佐之職贊翌居守攄誠效勞禦敵之方扞城之具罔不周偹永樂紀元肇建北京設行部以君為左侍郎及營宮宇承命綜理㳂河輸運諸務悉心殫慮雖隆寒盛暑不替利興害去人咸徳之竣事調任行在工部益効勞勤仁宗皇帝嗣位追念舊勞拜行部尚書未㡬奉命代祀秦中前代陵寢還朝懇懇以軍民利害為言深承眷遇尋頒誥命贈君祖考如所受官龍光煌煌賁及泉壤鄉邑莫不以為榮宣廟繼統改任行在工部命徃西蜀總董夫匠鳩工料材寛不至於縱嚴不失於苛軍民便焉自是凡有營建一以董督之任委君君益恪承上命夙夜敬慎撫循慰勞人忘其勞而事畢就今上皇帝臨御屢勑君繕葺京倉及濬築通濟等河施設措置智力弗衰正綂戊午九月四日以疾卒於官訃聞上為嗟悼賜棺諭祭仍勑有司營葬事其子昉卜以是月二十有七日奉柩歸葬於邑某鄉之原吏部尚書郭公與君同里交久且厚遂具述君之世系履歴之詳請銘於予惟君為人謙和坦直自筮仕迄今㡬四十年小心慎宻弗踰禮度待人接物一以至誠處宗黨􅊚戚各盡其道人有善則稱之不置有過為之掩覆兾其自改禄俸有餘悉均於族人鄉里有以不給告者即捐貲賙之教諸子事耕讀以足衣食餘無他營識者以是多之娶臧氏先卒贈夫人次劉氏王氏俱有賢行子男三人長即昉次曰暉臧所出也曰暘王所出也女二人亦出於臧長適府軍前衛指揮使徐震次適保定右衛指揮同知王原孫男四人􅀈琰璿珪孫女二人在室曽孫男四人源潔清濬曽孫女一人尚幼嗚呼君以淳實之資明敏之才仕歴四朝位列六卿榮及祖考慶流後世豈多見哉是宜有銘銘曰李居隴西有繁其先君曽大父清苑肇遷爰及厥考世積厥徳德積既久其發以赫厥赫云何維時之逄兼時奮興在君之躬君有所獻式協廟筭擢佐藩司維楨維榦於皇太宗崇徳報勤超拜亞卿以旌厥忠司空之命實自仁廟一其忠勤罔問先後光華尊榮甫四十年今雖云亡夫何憾焉蕃蕃子孫受君之慶惟慶之流彌久而盛有峩其墳樹之堅珉勒此銘詩以詒後人封太淑人李母王氏墓誌銘正綂戊午秋八月十有九日嘉議大夫通政使長安李君暹之母太淑人王氏以疾卒於家享年九十有三訃聞朝廷遣官賜祭命有司為營䘮葬嗚呼可謂獲福之偹者矣夫福有五壽富康寧考終命四者繫於天其存諸人者攸好徳而已徳有厚薄故福之錫有偹有不偹焉太淑人生長名族在父母家孝於其親慈惠寡言聼從姆教組紃織紝諸女皆不及既笄歸李氏事舅姑如事父母相夫以禮和宗族睦姻親皆有恩意尤勤女紅夫聚先卒極於哀痛悉其所有以畢葬事教諸子治生就學各隨其材以暹聰敏遣就學邑庠凡家務一不相干惟恐有妨其學每語之曰學必勤而後成或作或輟非所以為學也汝其砥勵厥志庶他日足以昌大李氏之門暹服膺弗忘洪武己卯遂以明經領鄉薦入太學初擢户曹主事秩滿陞郎中累遷至今官出使外蕃入掌錢榖皆有能聲䝉恩封贈二親於是太淑人存而有光為之父者歿而有榮暹自筮仕迄今太淑人享其禄養㡬四十年嗚呼誠可謂全福也已世之人或膺壽考而不得禄養或得禄養而多疾疢抑欝弗寧皆不得謂之全福也太淑人自幼至長精爽不替老而耳目聰明動履彌健又榮膺冠帔之錫煌煌金緋瞻望輝華乃㡬百嵗而以令終既終復沐身後之榮自非徳福之厚能如是乎其生元至正丙戌五月二日子男四人長曰遜次即暹曰遇早卒季曰逹女二人長適咸寧雷其次適同里宋其皆鉅族也孫男十有四人孫女十人曽孫男女七人卜以是嵗某月某日祔葬於其山先隴之次暹預以銘請嗚呼太淑人克孝克敬又善訓其子以致通顯為婦為母之道美矣是不可以不銘銘曰昔人之生百年為期九十有三今世則稀匪年之稀亦偹諸福矧有賢子政修行篤遭際明時龍章自天曰贈曰封光寵煜然婦道之純母徳之偹奄然以終夫復何愧夫復何愧始終之榮告彼後人式觀斯銘故通議大夫資治尹行在吏部右侍郎鄭君墓誌銘士君子遭時得位才行兼茂克舉厥職上無負國家下不負所志人皆仰其存而哀其歿者斯豈多見哉若故通議大夫行在吏部右侍郎鄭君盖其人也君諱誠字文實世家建昌之南城髙祖禎仕元為撫州路醫學學録曽祖徳銘歴彭澤南陵二縣典史祖瀚逺以君貴贈吏部右侍郎父守中累封吏部右侍郎妣王氏累封贈淑人君生洪武庚午九月十日自少刻志問學選為邑庠生究春秋之㫖同軰自以為莫及永樂辛卯領鄉薦入為太學生夙夜淬礪器宇日充歴政冬官以勤慎自効擢為吏部司務於職克稱尋以侍郎師逵薦陞考功員外郎君雖年少居要職懋履謙恭事先軰以禮課功責實無所徇人以是多之未㡬丁内艱痛念母疾弗克躬侍湯藥哀毁逾禮及葬隂雨不止君號泣籲天天稍霽人以為孝感所致制未終特起改文選員外郎尋轉郎中時同官孫英號稱狷介少許可於君獨加敬讓洪熙紀元受誥命榮及二親宣徳丁未歸省還朝仍故職庚戌以少師蹇公薦為吏部右侍郎選任精審敷奏詳明尤為衆所推宣廟嘗召問庶官品級及居職者賢否君歴對稱㫖遂受寳帯襲衣之賜今上皇帝嗣位益致公勤雖故舊執贄相見亦却而不納鄉人有為太學生者於君有宿怨及當受官自謂必見抑君惜其才擢寘五品其所守所行類如此正綂戊午十一月一日以疾卒於官自卿士以及僕隸莫不嗟惋翌日上聞為之悼惜遣禮部尚書胡公致祭仍命有司治葬事君娶黄氏有淑行初封宜人進淑人子男一曰垕女一在室弟其來自南城將奉柩歸葬於鄉山之原乃以刑部侍郎何君文淵所述事行謁拜請銘惟君天性孝友父嘗遘足疾繼以目眚君憂形於色遍求良醫得善藥輙附傳以歸療之疾遂愈奉繼母傅氏淑人不異所生遇諸昆弟及從昆弟俱有恩位雖貴顯歸拜舊師惟執弟子禮見其貧厚遺以金繒待僮𨽻亦未嘗加以疾聲厲色居官二十餘年小心慎宻始終如一至其寛厚和易虛已容人識逹政要旁行不流卓卓乎有足稱者是不可不銘銘曰麻姑之山秀擁一方下有旴水其流洋洋維水之清維山之英孰其鍾之天官亞卿亞卿之生人中褎然師竒其敏友推其先肇自小官荐登顯庸弗倨弗隨克勤克公勤不自盈公而生明鑒别妍媸衡審重輕天子曰嘉是為能臣輿論攸歸咸曰偉人生不失榮歿不失哀悠悠逝川去不可回勒此銘辭閟之幽宮惟千百祀令名罔終故承事郎永豐知縣董孟聲墓誌銘惟世之士登名科甲身躋顯融者殆謂榮矣其或低回嵗月淹延卑秩而文學之是任政事之是勤又為時論所與者詎不為榮哉觀之孟聲蓋可見已孟聲諱庸姓董氏初號安遇生晩號臞菴杭之仁和人曽祖某祖某考均義連世不仕妣李氏孟聲自幼穎異長遵嚴命逰邑庠學春秋徳業日進為師友所推擢永樂甲申進士入翰林為庶吉士官奉祠正於晉府屢見奬與久之改訓導於閩之順昌丁外艱服闋調建陽所至克舉師道造就賢才比秩滿去建陽諸生封章上聞願留以卒業乃從復任尋丁内艱調蘇之嘉定教鐸益振正統丁巳太僕少卿沈升薦其才賢陞廣信永豐知縣到官勵政理勤撫字尤尚慈惠人謂不負升所薦嵗己未上計入覲遽卧疾卒於旅舎正月二十五日也聞者莫不悼惜孟聲生洪武戊午八月二十八日至是得年六十有二配顧氏有淑行子男二曰璠曰璵女四珍歸兵部侍郎于謙累封淑人瓊歸王訥瑩璁俱在室孫男三曰文曰庠曰序女二孟聲平生篤孝友親存則能順承厥志親歿則葬祭悉循於禮撫二弟極歡愛為人恭謹不妄言動或與人相即則和氣藹如恒慕董生召南之為人因扁所居為安豐堂以見已志素負學識嘗與考山東南京鄉試甄别士類輿論韙之所著詩文若干巻藏於家尤善書遒勁可愛其卒時璠在侍將奉柩還葬於里中仙芝嶺先塋之側乃狀其行實匍匐來乞銘用昭不朽銘曰皇朝隆興運臻文明設科取士海宇蜚英孟聲奮志時乎遭際永樂初科褎然擢第玉署彤邸歴被清光改職師儒令譽載揚晚乃用薦作宰百里政用有成人懷豈弟善教善政孰克兩全於乎孟聲著稱煜然惟其有之垂休身後昭兹銘章永世不朽贈奉議大夫考功郎中夏君墓誌銘國家隆封贈之恩凢仕者之父母存歿俱被光榮者予於夏君宗文暨厥配鄭氏見矣宗文嘗以子衡貴贈徵仕郎行在中書舍人加贈奉議大夫行在吏部考功郎中鄭封太孺人加封太宜人宗文之卒葬於華亭集賢鄉彭家庄之原已二十八年而墓未有銘迄今正綂己未二月二十有二日鄭氏乃卒於北京官舍衡將奉柩以歸合葬焉乃以大理少卿沈君民望所狀世出事行泣拜謁予銘衡從事内閣且在經筵侍書予朝夕相親既久義不獲以衰邁辭用摭其槩而銘之按狀宗文諱文别號醉漁世家華亭曽祖某祖福父彥容咸有隱徳宗文幼失怙頼母顧氏訓育性敏嗜學從鄉先生張夢辰㳺習詩律有竒語兼攻漢𨽻章草弱冠為郡庠生後以母老辭洪武庚午坐累謫隸戍籍尋以疾代還與鄭氏養母篤孝敬務得歡心迨卒葬祭無違禮而思慕不忘每語及則流涕教二子各以一經永樂丁亥以楷書被召預修永樂大典暨寫勸善書事竣授主廣平縣簿佐理有方庶務畢舉公餘輙造學宮策勵生徒奬善止惡士風為之丕變既而董役營長陵永樂壬辰四月七日得疾卒享年四十有七子某扶櫬歸葬所著有長淮醉漁藁若干巻藏於家鄭氏諱善性行端淑工女事善順承其親及笄歸宗文勤于内助服食必中節宗文既卒始遣二子相繼就學郡庠家窶無以供所需親率子婦勤紡績為助衡既貴嘗語之曰居官宜清儉雖疏食布衣吾不厭也又曰爾幸際遇得近日月之光宜竭誠以圖報稱尤善睦族婣賑貧乏惠恤卑弱卒之日晨興盥潄端坐而逝享年七十有七二子長曰正由丁酉鄉貢擢岢嵐州學正娶范氏俱先卒衡初任中書舍人陞考功郎中娶顧氏封宜人二女長適禮部主事龔定次適府庠生俞宗善孫男一早卒孫女四銘曰猗歟宗文少孤㷀㷀遘罹非辜艱屯荐更亨自壯年無何而傾雖曰傾矣不泯者名厥名伊何佐縣政平欝欝棠隂惠愛在甿有淑其配柔嘉而貞克相君子家爰以興二子受教各底于成伯司教鐸由歌鹿鳴仲官中禁累沐恩榮綸誥錫封靡間死生生則同室死則同塋勒銘幽宮垂千百齡故陳母孺人楊氏墓誌銘予子壻陳順德母孺人楊氏以正綂四年己未正月廿有三日卒於家順徳時以㑹試寓京師訃聞泣而告曰不肖早失所怙頼母鞠育教誨底於成人幸以一經第名鄉書違旦夕之養逺來欲取一官以為母榮志弗克遂而母遽以疾去世湯藥不獲躬侍殯殮不獲親見又無他兄弟以執䘮負不孝之罪大矣今歸卜以某年某月某日葬於某鄉某山之原丐大人賜之銘以昭徳垂後庶效子職之萬一言訖號慟不止予哀其意迺按吏部稽勲郎中蘇良金所述狀而叙之曰孺人諱枳字淑定鳯陽中衛知事楊和叔之女母呉氏有懿行洪武庚申四月五日孺人生自幼温淑端謹勤於女事不俟訓董尤祇承姆教能誦孝經列女傳記習不忘父母鍾愛之既長擇所配以歸鳯陽左衛知事陳某之子亨克執婦道奉姑鄒極盡孝敬娣姒姻族待之咸適其宜至於飯食衣服之節祭祀賓客之禮處之亦未嘗失序姑殁致哀相夫治䘮葬無違禮族黨共稱其賢宣徳某甲夫又殁痛哭屢絶久而後蘇順徳時尚幼躬理家政惟勤惟儉事上接下恩禮兼至用是内外肅然而家業不墜嘗訓順徳曰汝父既歿承家在汝宜勵志於學庶他日有成而於父無忝時孺人從兄翰林修撰楊壽夫掌建安邑教乃遣之就學受春秋經宣徳乙卯順徳領鄉薦而歸孺人喜而戒之曰得此弗可自滿宜因所已得而求所未得可也暨將赴春官又語之曰汝不可以我老而懷依依之養當思顯揚以慰爾父於地下以悦吾心於生前可也聞者益嘆孺人之賢今孺人未及見子之仕膺一日禄養而遽殁是大可哀也子男一即順徳孫男二曰相曰楧孫女一曰懿嗚呼孺人以名家子歸為大家婦克盡奉姑相夫訓子之道誠女婦之賢者是不可以不銘銘曰婦處於内雖賢曷徵克相克教乃當賢名嗟嗟孺人有淑其聲既翼於夫而家有成又迪其子而業弗傾今雖已矣其賢足稱勒石揚休垂千百齡孺人彭氏墓誌銘正綂己未夏翰林編修廬陵陳文述其祖妣孺人事行謁予拜且泣曰文幼失所恃賴祖妣撫育之恩弗獲效報萬一將謁告歸以奉旦夕之歡而訃音遽至文夙夜悲痛無所用其情惟請銘于先生俾淑徳懿行垂光不朽庶幾少慰焉予嘉文能孝因按狀而叙之曰孺人諱淑柔姓彭氏廬陵儒家女自幼聰慧喜學孝經列女傳俱能通其大義於女事不勞姆教父體昇母揚氏愛而擇所宜歸以孺人無他兄弟遂納同里陳君𢎞徳壻于家父母晚多疾孺人奉養篤至湯藥飲食必親嘗衣服必親浣既殁哀毁踰禮相夫葬祭如儀鄉人嘆曰體昇夫婦有此女何異於子哉舅姑居家嵗時屢迎養有一㫖味必遣僮婢馳獻舅卒姑唐氏獨存迎養尤數姑安其孝或其子孫請歸必相泣而不忍别聞者稱焉治家以勤儉率下貲雖饒而不廢紡績服布素弗事華飾諸婦視以為法里閈宗戚敬慕者無間嵗壬午室燬于冦贊相改築凡諸家政悉親綜理𢎞徳不勞而事具客過飲饌豐潔若預知然性尤好施予見饑寒者即濟之永樂甲申邑里旱歉丐者踵門輒命女奴詢其道里逺近而量給之𢎞徳喜曰正吾志也每慮日用言動或昧於理而忤鬼神夜必焚香祝天以自省子孫由是皆知懼而益加操持故孺人自笄至老尊者悦其敬幼者感其慈賤者懷其恩内外疎戚罔不得其歡心嵗遇壽旦親族捧觴祝夀者咸相謂曰孺人積徳累善雖百嵗不多也時夫婦俱無恙子孫盛而賢人以為善徳之報是嵗正月八日奄然而逝弔哭者日相屬又竊嘆曰孺人可謂有福有壽矣子男一人字大訓以文貴封翰林院編修文林郎孫男四人長悅次即文又次曰敬曰定女五人其某其壻也孫女二人卜以嵗冬某月某日葬于里之某山之原嗚呼孺人婦道修母儀著皆可書以傳烏可以無銘銘曰猗惟孺人毓秀名宗有淑女徳有美婦工既宜其親亦宜其夫恩禮周浹靡間戚疎為婦若兹孰不謂賢式穀厥後克光于先有光者誰實維仲孫仲孫徵銘不泯者存山髙而深土厚而堅藏銘幽宮垂千百年故羅君宗讓墓誌銘閩有好古力學君子曰羅君諱泰字宗讓别號覺非道人先世居江右撫之臨川其五世祖諱某仕元為福清縣尉子孫因家焉故今為閩人君之孝友行於家信誼重於人文章經術師表于鄉之後進居其門獲指教者徃徃取科名登仕籍嗚呼為人若君亦可謂難矣曽祖諱某祖諱某考諱伯淳世有隱徳母楊氏君生洪武癸丑八月十有一日早失所恃從鄉先生宋瑜受春秋經得尊王抑伯褒善貶惡大㫖時丁家多難而母未葬布衣疏食常如袒括之日語及則泫然下涕先是授徒所得悉以營冢壙既葬乃曰我情事少伸矣爰卒業于訓導林友從潛心易學卦爻十翼之㫖研窮精索造詣閎奥嘗與故春坊諭徳林尚黙論易尚黙稱之曰宗讓能先得予所未得一時同逰如進士鄭澄初主事鄭介叔知縣鄭彦韜文學鄭廷玉鄭希晦林範伯輩咸與切磋講明互相裨益學乃大進鄉之後學皆師尊之弟澤亦登甲辰進士授監察御史其諸交㳺者徃徃出仕四方君獨隱居教授于鄉凡四十餘年生徒所造就者若林元美張偉皆以易登進士第其領鄉貢為教官者尤多有司奉朝命有所纂修必禮致君以董其事賢士君子至者必就見焉宣徳壬子應天尹聘司文衡君辭曰吾以一鄉之善淑一鄉人則可其敢以布衣去取甸内士哉遂不果行家居衣冠整肅操觚執翰之外澹無他營性好古道嘗嘆冠禮久廢鋭志舉行從而化者甚多翰林編修薩琦父殁族人欲以俗禮治其喪君力贊其家一遵文公家禮以殯殮琦歸謝曰先君子之終免蹈非禮惟先生是賴至於其師林友從鄉老林崇髙及里中有貧不克葬者悉倡率出財以助之凡事有得為而不為與不得為而為之者皆委曲勸喻使無後悔年甫四十配周氏殁義不再娶邑里髙之正綂丁巳次子繹及壻張諤俱以訓導嵗滿得歸省為卜夀藏于閩東康峯之寳林既成深衣藜杖徜徉其間命酒賦詩次為十詠喜曰吾終歸於此則死之日猶生之年也有寳林終隱集仍語繹諤曰汝二人身為國有毋以我故久留也繹諤既上京師待選吏部而君以是嵗四月十有二日卒于正寢享年六十有七卜以某年某月某日葬寳林子男三長綂由太學生分教湖廣長沙府學娶林氏次繹由鄉貢士中乙榜分教廣東肇慶府學娶段氏繼鄭氏又次曰繒娶呉氏女一人壻即諤亦以明經任肇慶府學訓導孫男五曰雅曰𤣥錫曰稚曰睢曰𤣥祐孫女五繹將奔歸襄事以諤所述事行謁予泣拜請銘惟士能力學好古雖弗躬有禄位而學淑諸人慶鍾于後壽考令終是可銘也已銘曰有韞于中維學之充既淑其徒抑華厥躬躬弗顯榮而後乃昌二子具美分教大邦夫既有子又享其年安居禄養殁何憾焉寳林之東有墳在兹垂千百年維此銘辭文敏集巻二十三
