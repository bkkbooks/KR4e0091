body:
  text: 文敏集卷八明楊榮撰賦皇都大一統賦有序洪惟聖天子龍飛當天下大一統聲教所暨無有逺邇咸樂清寧乃猶夙夜孜孜思所以紹承太祖髙皇帝之先志於是倣成周卜洛之規詔建兩京以肇國家萬萬世之鴻基以開天下萬萬世之太平甚盛舉也况北京實當天地之中山川形勢之壯帝王基業之盛莫逾於此由是車駕纍經巡幸宸謨睿算上合天心昭孚祖考百神協順川嶽效靈故自經始以來嘉祥駢集靈貺昭答而中外臣庶百工衆伎之流罔不歡欣子來樂於趍事而皇上擴天地之量戒之以勿亟撫之以厚恩賚錫駢蕃慰諭備至不數年間厥工告成以今年春正月朔旦皇上御奉天殿朝百官凡內外文武群臣與夫四方蠻夷酋長來覲于廷者莫不歡欣踴躍以為氣象宏偉規模壯麗卓冠千古真足以臨四方朝萬國實為聖夀萬萬年鴻福之徴宗社萬萬年磐石之固聖子神孫帝王萬萬世隆長之慶也猗歟盛哉臣備員侍從覩兹盛美敢不鋪張其事以昭示於無窮焉乃為賦一篇述其大槩謹拜手稽首以獻其詞曰維皇明之有天下也於赫太祖受命而興龍飛淮甸風雲依乘恢拓四方弗遑經營既渡江左乃都金陵金陵之都王氣所鍾石城虎踞之險鍾山龍盤之雄偉長江之天塹勢百折而流東炯後湖之環繞湛寶鏡之涵空壯江南之佳麗匯萬國之朝宗此其大略也逮于聖皇嗣大一統剛健日新聰明天縱囿四海以為家登羣賢而致用思繼志之所先惟都邑之為重於是天意鑒觀人心和同神靈效順龜筮協從既應天以順人爰辨方而正位視往聖而獨超繼髙皇之先志乃相乃度載經載營眷兹北京山川炳靈其為形勢也西接太行東臨碣石巨野亘其南居庸控其北勢拔地以峥嶸氣摩空而崱屴復有玉泉漫流宛若垂虹金河澄波雪練涵空膏渟黛蓄浩渺冲融包絡經緯混混無窮貫天河而為一與瀛海其相通爾其𣲖連析津源分潞水既環抱以縈回亦瀰茫而清泚來職貢於四方通檣帆於萬里至若王畿之內輦轂之間沃野彌望原陸寬閒烟火相接雞犬相聞宵無警柝外户不關以牧則蕃以種則穫以佃以漁以耕以鑿隨其所營皆得其樂而其為都也四方道理之適均萬國朝覲之所同梯航玉帛為都邑之會隂陽風雨當天地之中爰勑臣庶爰伐材木南浮湖湘西入巴蜀斧披虹霓聲撼山谷徂徠之儲新甫之蓄楩楠杞梓杉櫧柳橚梢橫青天根連地軸巨細畢輸長短悉録駕雲車之百輛振龍驤之萬斛紛紜輻凑彌布川陸厥材之良不一而足若乃美石比玉從古所稱瑩者如圭潔者如瓊溫者若璐潤者若瑛以磨以礱乃堅乃貞鏗林振壑馳飈驚霆千夫所攻萬里啓行山靈助其光華坤后發其精英豈碔砆之敢混實寶玉之爭呈若夫坎離播功坤艮合德出於陶冶成于埏埴飛紫焰於半空結祥烟於八極或規以圓或矩以方粲琉璃之一色耀文采於中央或肖形於獸吻或擬質於鴛鴦於是良時載啓吉旦既卜臣庶駿奔滃若雲矗源源其來登登其築百堵皆興萬夫相屬行若魚貫立若鱗蹙斧斤揮霍尺度攢簇由是賁育效力公輸獻竒曰殳曰斨伯與暨倕攄厥巧思運厥神機各效其能以見於為顧小善之並録矧妙伎之或遺羣材碨磊以山積巨棟騰躍而翬飛爾乃九門洞開三殿攸建觚稜雲聳丹漆霞絢輦路逶迤閣道回轉華蓋屹立乎中央奉天端拱乎南面其北則有坤寧之域乾清之宫璇題耀日寶柱凌空金鋪璀璨綺疏玲瓏珠玉炫爛錦繡丰茸葳㽔起鳳夭矯盤龍千門瑞靄萬户春融其南則有午門端門左掖右掖丹闕峙而上聳黃道正而下直豁大明之髙張屹正陽之拱挹繚周廬之穹崇蔽重甍之護翼其左則有宗廟之祀以奉祖考仰在天之神靈隆萬古之尊號謹嵗時之蒸嘗薦純誠於蘋藻其右則有社稷之靈以崇祀享汛壇􅀈之肅清通神祗於肸蠁爰春祈而秋報用昭答於靈貺若夫乾清之前門列先後日精月華之對峙景運隆宗之並構謹身翼乎其前仁夀屹乎其右又有奉先之祠大善之殿文樓武樓之特聳左順右順之並建若乃震位育德文華穹窿亦有武英實為齊宫有天財寶藏以貯珍貨有大烹光祿以典飱饔寶善在左以翼翼思善居右而崇崇若夫欽安之後珠宫貝闕藻繡交耀雕櫳嶻􅑖六宫備陳七所在列親蠶有館繅絲有室二南詠歌播于篇什輔德相成風化洋溢皇城之外殿宇魁渠有翼有嚴太孫之居金水之濵瑤階玉除梁棟巍巍上凌太虛為諸王宫翊衛皇圖星羅棊列以臨九衢至若文淵之閣祕書之府纂述乎今儲蓄乎古汗牛充棟莫知其數牙籖迤邐緗帙旁午粲奎壁之上連赫虹霓之夜吐若夫飛閣峩峩實為承天繡楹霧簇畫拱星聨踞石猊之盤礡竦華表之巋然至若南郊之設特超古制圜丘方丘不岐以二合祀於中父天母地壇分內外二十有四羣祀有典百神有位惟我太祖實配上帝乃嵗孟春三陽之始吉日斯蠲祀事有備薦以粢盛泛以醴齊豆籩秩秩庭燎㫼㫼鼓鐘戒嚴鑾輿至止儼對越以升中祝蕃禧之攸萃至若山川有壇先農有祀馬祖旗纛各以時祭寅畏恪恭罔有弗至若夫稽古建官為民之牧內外相承各率其屬至若黃門給事青瑣仙班典內廷之封駁近咫尺之天顔復有文翰之林詞藝之苑處嚴密之清禁列英華之妙選優遊玉堂之署出入金鑾之殿擅瀛洲之美譽承黼扆之清問至若鳳池之職尚寶之司掌絲綸於紫誥典符璽於彤闈有宗人以統天潢之𣲖有銀臺以通喉舌之機若乃六卿分職位躋台鼎贊廟堂之謀謨總藩方之政令至若憲臺之任風紀是司誠耳目之所寄實法度之攸施若夫都府有五軍政是宣奮貔貅之將士耀霜雪之戈鋋保輿圖於按堵掃絶漠之烽烟至若都邑有庠辟雍有學育才于兹以儲以擢若夫容臺典祀士師明刑錦衣總夫儀衛巡警係於五城鴻臚謹朝謁之禮太僕司監牧之名京畿布列於州郡田野參錯於屯營至若奉神有祠報功有廟梵宇琳宫光輝朗耀倉廪之積如坻如京露積紅腐陳陳相因鎧甲晶熒士卒精鋭靡强弗摧靡堅弗碎驊騮騏驥騕裊驌驦宛冀之駿渥窪之良充乎內廏磊落騰驤又有福山後峙秀出雲烟實為主星聖夀萬年層嶂疊擁竒峯相連鼓鐘有樓其髙接天勢若貫珠萬里綿延若乃朝市既成井邑斯列閭閻輻湊闤闠有截豁九達之通衢羅萬室之如櫛富商巨賈肩摩袂接北通朔漠南極閩越西跨流沙東涉溟渤來百貨之縱橫雜輪蹄之填咽珠璣爛其輝㸌羅綺煜其騰沓至若青樓並峙綺榭相連妖姬窈窕艷女嬋娟穠妝競倚粉黛爭妍引歌喉之宛轉回舞袖之蹁躚極酣嬉於暇日窮勝賞於芳年至若太液之池萬嵗之山澄波㶑灔層岫㠝岏開闔蔽虧縈帶回環竦飛樓於暗曖敞貝闕於岩端門臨碧蘚之磴橋跨玉虹之灣晴光出乎軒檻飛翠灑乎闌干瞻廣寒之月殿撫桂樹之團團爾其瑤草蘢䓗琪樹羃䍥長松之蟠古柏之直修篁烟挺老檜雲積瑰偉之姿竒異之植蓊然其隂嫣然其色宛蓬瀛之在兹恍塵凡之遂隔至若上林衍沃靈囿逶迤瀦以碧海湛以深池百草緑縟群卉芳菲寬閒薄乎禁籞平廣屬乎坤維樂鱗介之遊泳縱毛羽之離褷乃有騶虞效祥麒麟表瑞白質黑章麕身牛尾神鹿貢於遐方白象出於南裔倐𤣥兔之繼呈忽天馬之沓至復有馬哈福祿厥獸殊形駝雞之異白烏之禎竒姿詭態率舞縱橫𨽻首莫紀伯益難名至若地祗協順天心昭格嘉祥疊臻靈貺蕃錫神木不運而自行祥氛煥發於巨石忽靈蛇之前導現大青於沙磧瑞光煜乎半空卿雲煜兮五色醴泉湧兮瓊漿甘露湑兮玉液靈芝産于碧山景星見於南極秃千兔以難窮殫百喙而莫悉然而歷觀前代迄于往古帝王所都難可畢舉豐鎬之美崤函之固宛洛之竒汾晉之富雖或雄據於一時控馭於中土而於今兹帝都之壯麗又豈可以同年而語哉乃嵗庚子告成厥功辛丑正旦方春和融聖皇御朝萬方㑹同百辟卿士肅肅雍雍東西南朔罔不率從戴白之叟垂髫之童且欣且抃拜舞呼嵩仰祝聖夀萬福來崇慶此皇都佳氣鬱䓗擴基圖於萬世偉壯觀於九重真帝王悠久之業據山河表裏之雄然而聖天子以六合為家以四溟為池以仁義為干櫓以禮樂為藩維不恃險以為固惟在德之所施至和塞乎穹壤恩澤洽乎華夷致九有以寧謐躋萬國於雍熙此其所以德侔乎堯舜道合乎軒羲窮天地亘古今而莫能與齊也臣職禁垣叨䝉眷顧謭陋是慙㳙埃莫補覩皇都之巨麗壯宏規於往古潔泓頴於長辰陳盛事以為賦又從而為之歌曰翼翼皇都萬方之㑹兮聖德之宏實同覆載兮聲教所暨一統無外兮又歌曰皇都翼翼民之所止兮惟皇萬夀福祿無已兮聖子神孫寶祚萬世兮三峯書舍賦有序建陽書林葉添德景達氏自其大父榮軒父彥齡世以詩書為業嘗作室以貯古今書版日積月增棟宇充牣凡四方有所購求者皆樂然應之由是縉紳大夫莫不稱譽其賢其室之外有三峯秀出霄漢望之嶻然挺拔千仭嵐光翠黛浮動乎几席之間甚可愛也因名其室曰三峯書舍蓋景達之意其於群書不惟鋟梓以廣其傳而將欲俾其子孫耳濡目染無非道德之懿口誦心維莫匪仁義之說然則書舍亦豈泛然而作也哉閒來徴言於豫豫於景達素相知不可以辭乃為賦其事以彰厥美云其詞曰繄建陽之為邑實南紀之奧區仰紫陽之遺澤沐道德之膏腴俗嫓美乎鄒魯家諷誦乎詩書况山川之形勢鬱磅礴而扶輿矗三峯其突兀偉奕奕兮華居匪燕息之是安乃版籍之攸儲嗚呼堯舜道逺素王有作刪詩定書考禮正樂贊易理之𤣥微嚴春秋之筆削奈薄蝕於戰國再焚絶於秦虐幸小復於漢代徒騁騖乎穿鑿尚有賴於宋儒卒光明而表襮維紫陽之挺生實闡揚夫正學遡淵源於洙泗踵軌轍於濂洛微詞奧義資之以發揮六經群籍因之以充拓此三峯書舍之所由創而千載斯文之是托也若乃其森若筍植髙若凌空孤撑兮嶪岌並峙兮巃嵸根盤盤其數里翠冉冉其千重青連武夷之秀勢壓雲谷之雄中有傑構重簷翬飛廓乎宏敞翼乎蔽虧堊素是尚藻繪弗施圖史序列庋閣逶迤如櫛之比如鱗之差名曰書林為世所資異孔壁之斷爛匪汲冢之怪竒上該乎皇王之紀下偹夫技藝之詞莫不俱收而並蓄旁積而靡遺實人間圖書之府宜海內購求者之交馳也嗚呼噫嘻世人金玉之豐寧若子圖書之蓄子家圖書之富寧若身誦習之篤究往聖之遺言籍先賢之賸馥日涵詠以優遊羌潜心而佩服匪在躬之致勤課孫曽以私淑殆見鄧林之産終需梁棟之材渥窪之駿髙奮雲衢之躅聲價昭乎前聞輝光播乎鄉族益勉焉以自强諒子心之攸屬也清白軒賦有序金華祝君存禮洪武中由太學生擢秋官主事歷河南湖廣兩道按察僉事今為閩郡憲副自筮仕以來揚歷中外幾四十年矣恆念家居逰學時其先君子嘗訓之曰汝異日居官以清白自勵庶彰令名不然非所以為學矣由是服膺訓言因以清白名其軒其後入仕果能振揚風紀綽著聲稱不負所學且克承其先人之志惟昔豫之先太尉有曰使後世稱為清白吏子孫以此遺之不亦厚乎故歷數世皆以德位顯至于今幸守先訓賴以不墜夫存心以清白者惟君子為能然非先太尉則亦不能為是言也今觀祝君先大夫之貽訓若此豈非深有契於太尉公之所存者乎豫既嘉君之志而君復求豫言以發其義遂為之賦曰繄君子之植立兮貴制行之彌堅懷清白以自勵兮斯素履之淡然靈臺湛以澄徹兮令聞蔚其昭宣既流芳於往哲兮宜承式於後賢粵金華之名邦兮鬱山川其秀麗鍾靈實于其人兮率明揚於盛世眷祝氏之多賢兮偉夫君其特異佩先人之遺訓兮持清白而弗替力問學以好修兮齒俊乂於上庠羌發軔於秋官兮振憲府之風霜歷河洛湖湘之顯官兮佐閩海八郡之宏綱踐履確以純固兮聲價煜其輝光諒所存之介特兮中瑩徹而虛明皎乎若昆玉之潔兮炯乎若淵水之澄塵氛之不能昧其質兮妍媸之莫或逃其形實夫君之為德兮迥超邁乎群英謇豫懷夫先烈兮仰遺躅之未逺紹卿相於纍葉兮綿千祀而逾顯嗟豫生之已後兮承餘慶而黽勉念惟日之孜孜兮竭微躬之蹇蹇恐盛美之弗繼兮歎流光之荏苒詎於豫之獨爾兮諒君子以皆然緬夫君而信美兮期同服於訓言隨雲龍以上下兮參鸞鷺以周旋俾修名之有立兮庶忠孝之兩全髙軒廓其宏敞兮華扁鬱乎穹窿懼誓言之難固兮致針警於始終聊攄詞於翰簡兮庶流譽之無窮筠軒賦三山有篤行君子陳君仲昌性嗜竹扁其退息之所曰筠軒其子監察御史叔剛與史館纂修事乃持卷請豫題豫作筠軒賦以畀之庶表豫同好之意焉賦曰披往牒以𤣥覽想幽致於淇園慨竹林之勝迹悵豫情之弗諼寄一賞而莫遂日轇轕於囂煩撫遺詩而載誦益惓惓夫道學自修之言既而螭陛朝回雍容公署思理未遑凝神息慮有客衣繡衣冠章甫披畫圖持尺素再拜向豫周旋合度受而閲之蓋其嚴君所謂筠軒縉紳之所歌詠而以求豫為之賦豫曰噫嘻自來薊北久與此君之不相覿矣方稽古而追思淇澳之風况展圖而感夫故鄉之植耶爰濡毫以紓思試與子而敷繹粵有勝地閩山之陽岱嶺峩峩瀨江湯湯面竒據幽天設地藏其中則修竹萬竿紛敷鬱蒼環繞垣砌蔽繄軒廊質嬋娟以閒淑性竦直而堅剛資生成於雨露傲徑節於氷霜宜君子之所愛匪羣植之可方爾其密葉含翠輕筠凝緑森如羽蓋煜若膏沐隂翳翳其滿林根綿綿其連谷漏明月兮篩金結香雲兮團玉若乃凉雨乍歇旭景弄晴天風微度戛然有聲如雲韶之迭奏若鸞鳳之和鳴可以滌塵氛而清俗慮可以恱心耳而怡性情此王猷所謂一日之不可無而蔣詡三徑之所由成也然論其為德則亭亭翼翼中虛外直獨凌厲於嵗寒並後凋於松柏論其為質則鬱鬱青青凝烟遏雲苞錦籜以絢爛滋緑綺而紛紜是蓋所謂筠乃竹之文煜乎其璘􅀈者也今子之嚴君以筠名軒豈非因其質以取其德重其植而美其文耶記禮者謂君子之有禮如竹之有筠子之嚴君豈非欲因物以喻道而惟禮之是親耶子之兄弟森如立竹克承親志通籍金門異日所就詎不為南閩之光而永是軒之聞耶客曰唯唯先生有以命我矣碩言佩服勉焉思勵豫亦翛然自適充然心醉恍不知其置身淇園之濵而寄足瀨江之涘也頌平安南頌有序皇天眷命于大明開千萬世太平之鴻業太祖髙皇帝龍飛淮甸順天應人掃清六合凡際天薄海大小蠻夷之國罔不臣服嵗時貢獻雜遝後先無有少懈自歷代以來土地之廣幅員之長未有若今日之盛者也我皇上既嗣大統奉若天道率由舊章臣民守職夙夜惟寅而海外諸蕃暨諸僻逺之邦素未入中國者亦莫不梯山航海稽顙扶服奉表獻方物以得瞻覲天朝為喜幸是蓋逺人向慕之誠實由皇上懷柔之有其道也邇者安南賊人黎季犛及子蒼濟惡不才滅絶倫理欺天罔聖久蓄祻心肆虎狼吞噬之暴興狐鼠狡黠之謀賊弒其主侵我邉境以逞凶劫奪占城要取其貢賦僣稱大號毒痡其生民奸宄日滋𡨕頑益甚朝臣屢請加兵致討皇上尚念無知遣使諭以禍福俾其自新而賊怙終弗悛復上表欺誑請迎陳氏孫嘗避禍來京者歸立之皇上信之不疑遣使送還本國而賊乃伏兵於途要而殺之事聞皇上召廷臣諭之曰今四方寧靖無事干戈惟兹安南小醜以蕞爾之地恃其險逺敢逞凶逆其可置之度外乎羣臣咸進言曰悖逆不道國有常憲此而不誅何以警衆於是不得已告于神明命征夷將軍率偏師往討其罪師行皇上乃載謀載惟躬詣龍江禡纛而遣之授以神謀睿算仍戒其毋妄殺無辜毋毁人墳墓廬室毋剽掠子女財帛曽未數月師駐鄰疆不疾不徐紀律嚴明甲胄精飭旌旗炫耀鉦鼓有節諸將士感恩慕義人懷敵愾之心奮迅鼓勇徑由坡壘破雞翎飛渡富良江直搗東都遂平西都而賊黨即時殄滅所過秋毫不犯市肆不易百姓引領望風來歸者日以萬計將臣乃敷宣恩意拯其焚溺釋其脅從遍求陳氏子孫立之已無遺類國中官吏耆老咸詣軍門請復古郡縣以𨽻中國設官兼治庶幾咸沐聖朝清化以脫遐荒蠻服之陋俗以永永福其子孫於無窮也捷音入奏皇上一從所請以其地為郡縣設官兼理詔為陳氏立祠設官典祀悉除苛虐用其才良而廩其無告者中外聞之莫不歡欣鼓舞以為皇上恢𢎞基業之功光昭於祖宗而安輯黎庶之恩遍及於天下也臣榮備員禁掖欣覩盛事謹拜手稽首而獻頌曰於皇太祖統一萬邦普天率土來廷來王嵗時貢獻厥篚相望如彼葵藿傾心太陽赫赫業業端拱而治嘉祥屢臻靈物畢至文武將相視同一體龍興雲從風行草靡南平江漢北定朔方中原晏然以耕以桑閩浙蜀越悉歸版章定鼎金陵既盛而昌我皇繼統一遵成憲敬天勤民登庸俊彥信賞必罰疸惡彰善皥皥熙熙恭已南面萬里邈逺如覿目前幽側荒僻無不燭焉聰明神聖廣運如天無微不被無鬱不宣蠢兹南夷肆逞悖逆詭詐萬狀罔知紀極在廷臣庶請加誅殛以振皇威以靖逺域皇帝曰吁藐焉狂獠敢肆凶頑自致天討乃命大將以遏凶暴以整我師以控蠻島鎧仗煌煌旗旐央央鉦鼓喧鍧師律而臧涉彼巨海鯨波不揚平躋險阻虎豹遁藏嗟爾蠻夷蕞爾土壤蜂蟻之衆狐貉之黨潜形穴巢孰使狂罔天戈一麾魄禠膽喪帝戒將臣神武不殺殱厥渠魁下人可活我師我旅毋飢毋渴綿綿翼翼其何能遏帝戒將臣奮揚威武相其原隰深入其阻旄倪毋辜載用輯撫雖云遐荒我疆我土將臣所至悉諭聖恩振揚威武雷擊電奔逆豎潜伏殱拔厥根以解倒懸以雪陳寃帝謂將臣爾訪陳氏厥𦙍伊何求立續嗣咨詢陪臣曰無餘裔國人衋傷欷歔怨詈帝曰吁哉惟彼南人雖在蠻貊同乎大鈞棄而弗理禍亂彌臻滌瑕蕩穢綱紀維新邦之耆老咸詣轅門請置郡邑維屏維藩教以忠孝俾知彛倫耕食鑿飲同我夏人邦人有言荷戈執㦸昏迷弗恭妖狐所惑今見王師如拯焚溺輸誠歸向剗磢洗滌邦人有言聚嘯跳踉猘犬所制莫知其方今覿義旗正正堂堂引拔崖石置之康莊扶攜涕泣指誓天日銷兵歸田裂幟入室袪其很暴以效質實世世臣妾永保寧謐將臣撫循以寬以勤征夫鼓舞行旅歡欣歸牛休馬喜動風雲萬姓咸曰吾皇至仁捷書入奏大賚勳庸功逾銅柱勒碑崇崇凡在戎行咸預顯融莫不稽首惟皇之功惟皇之功克紹太祖惟皇之基超軼前古惟皇之德上侔堯禹於萬斯年作民父母河清頌有序臣比者伏覩髙平王平陽王奏蒲之河津縣黃河水清繼而二王奉表賀未幾秦王復來奏亦繼奉表賀億兆臣民莫不欣忭臣聞天降嘉應黃河水清今皇上御極統治萬方拯生民於墊溺致諸國之來廷海宇清寧庶類咸若而河水澄徹雖甘露醴泉景星慶雲不是過也况夫野蠶吐絲嘉禾呈穗騶虞獻祥神龜表孝休禎疊臻是皆皇上仁孝誠敬有以上格于天心故天昭貺之如此者也今黃河水清延數百里此又莫大之瑞曠世之所罕逢昔漢獲白麟赤鴈芝房寶鼎之類固以著為樂歌薦之郊廟若兹嘉祥其可無述作乎謹拜手稽首而獻頌曰瞻彼河流浩浩湯湯來自西極源于天潢奔駛蕩潏厥勢混茫道雍經冀歷兖踰梁逶迤中原晝夜弗止逝者如是瞬息千里黃流一清粵嵗三千適應其期夫豈偶然聖神御極德合羲軒川嶽效靈諸福駢臻騶虞獻祥神龜表孝復覩河清實符至道以應太平以彰治效萬姓胥慶歡呼舞蹈帝德如天績紹平成湛然止水昭兹清明蒲陽之堧河津之邑居民競觀奔走原隰昔猶罕聞今喜親覿欣忭蹈舞樂沾聖澤龍門巍峩河流分中千古萬古神禹之功猗歟吾皇德洽恩隆拯民墊溺曰禹實同天眷聖皇福覃華夏瑞協前聞龜書龍馬於萬斯年慶延宗社微臣獻頌以配風雅御編為善隂隲書頌有序洪惟皇上以天錫勇智之資鋭意於古昔聖帝明王之治夙夜孜孜以振起斯文為已任以敦德勸善為天下先即位之初首詔設科幸國學修大典崇奬儒術興行禮義由是詩書絃歌之化衣被六合無有逺邇翕然大同人莫不曰天下已治風俗已淳惟皇上謙冲之心尚以為未足乃以聖人之道具載六經燔滅於秦穿鑿於漢晦盲否塞千五百年逮至宋之諸儒雖已發明表章之然其奧義微㫖尚或有遺不無詳此略彼之患於是特發宸衷命儒臣類而纂之授以成法備載聖賢之言搜輯諸儒之說由是六經四書之㫖聖人之道粲然而復明書成名曰性理大全遂命刻梓賜之羣臣頒于天下使學者一覽莫不豁然貫通咸有以造乎閫奧以為聖賢教人之言雖無不備若曰積善之家必有餘慶積不善之家必有餘殃又曰作善降之百祥作不善降之百殃又曰德惟一動罔不吉德二三動罔不凶又曰惟天隂隲下民其善惡之理警戒之意不一而足而凡古人為善獲報者亦皆載之簡冊歷歷可指然而簡籍浩穰難以披閲垂拱之暇乃取古人有隂隲而享其福慶顯有明效者彚次世代系其姓氏著其事蹟仍各為論斷以附其後且為詩以列之凡一十卷名曰為善隂隲頒示四方家傳人誦俾舉目之際莫非為善之事游心之頃莫非種德之機於是罔不躍然興起樂於為善而思有以享其報也皇上之所以隂隲於斯世斯民而納之於泰和仁夀之域者又何其至哉四海之民生乎今之世者實為幸矣臣榮叨逢盛世列職詞林進得依日月之光退得盡文翰之職屢承聖訓諄切懇至恩眷之隆榮幸已極今既喜覩聖道之復明樂斯民之盡善安得不鋪張盛事以昭示於無窮乎謹拜手稽首而獻頌曰惟我聖皇纘承大統夷夏同春南面垂拱乃敷文教乃幸辟雍暨于遐邇絃聲渢渢乃召儒生乃修大典殘者以完微者以顯載惟聖道具乎六經秦焚漢蝕謬說肆興千數百年是非蜂起有宋諸儒克究厥㫖紬繹系緒研窮窔奧搜精獵微以明斯道其言浩浩萬里散殊學者望洋莫測其樞乃劘羣編乃集衆論類聚倫分式昭大訓嘉惠萬世頒布四方性罔或昧理無弗彰復念斯民未悉歸善隂隲罔修懿德弗踐古有善人天道昭然既顯其躬福澤綿綿其人雖亡善行猶在史傳百家孰不備載乃輯乃編俾㑹于一從古迄今靡有遺失民既獲此一覽粲然作善之應降福自天惡德弗滋善念斯著如彼善人户曉家喻四海之內皥皥熙熙戴白垂髫惟善之為惟皇之德與天同大宵旰孜孜動罔或懈惟皇之仁與物皆春涵和發育惠無弗均博施濟衆堯舜猶難惟皇神聖恩周八寰皇弗自聖虛已謙冲澤深斯溥德大乃容臣作頌歌載拜稽首聖夀萬年天長地久表升授謝表欽蒙聖恩加授臣榮等太子少傅等官不勝感戴之至謹奉表稱謝者臣等誠歡誠忭稽首頓首上言伏以奉天撫運仰景命之維新論道經邦置名賢於重任不圖三少之命猥及一介之愚恩德自天悚慚無地恭惟皇帝陛下剛健中正文武聖神覆載無私同乾坤之大德逺近畢照如日月之至明自臨寶位以來仰荷德音之霈華夏蠻貊咸歸熙熙暤暤之仁動植飛潜均沐蕩蕩平平之化二儀之內萬象皆春臣某等朴􅈪之材朽鈍之質學深慙於博古用不足以適時昔先帝之御朝叨居詞苑事陛下於儲位咸列宫臣雖為輔導之官靡有㳙埃之報虛縻廩祿久積嵗年撫躬自切於忸怩感德更深於銘刻幸際六龍御天之日光屬萬邦惟臣之時仁聖之心不忍棄遺於舊物恩寵所及特䝉超越於衆人顧寅亮天地之資保傅承華之寄究觀往古所用惟賢揣分非宜實慙負乘控辭不獲徒重戰兢惟當竭愚力於駑駘效忠誠於葵藿堅如金石誓同報國之心敬效華嵩仰祝齊天之夀駕幸文淵閣謝表臣楊榮等兹者欽䝉聖駕臨幸文淵閣周視臣等寓直之所特頒恩命增益室宇兼賜飲饌器用周悉備至聖恩廣大感戴惟深謹上表稱謝者臣等誠歡誠忭稽首頓首上言伏以日月光華當大聖龍興之運車書混一正文明天啓之時鑾御幸臨儒紳遭遇恭惟皇帝陛下聖神天錫剛健日新典章法度之𢎞修功成理定華夏蠻貊之率俾近恱逺來萬幾餘閒怡神稽古六龍捧御寵顧延英上深軫於天心俯垂矜於寒士廣其室宇遂凉燠之攸宜給以饔飱兼什器之咸備凡百所用靡一弗周同乾坤覆載之恩踰父母生成之賜是皆皇上聖仁廣大明睿照臨溥德澤於萬方施由侍從昭禮文於千載髙出古今所以致海宇之雍熙所以隆皇圖於永久臣等深慙末學幸際明時被沐恩榮匪名言之可罄策勵駑鈍豈報效之敢忘端秉寅誠恭陳申謝龍翔鳳翥瞻五采於中天春育海涵祝萬年之聖夀文敏集卷八
